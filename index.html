        let { data: recurring } = await supabaseClient.from('recurring_transactions').select('*').order('id', { ascending: false });
        let html = `<div class="form-card"><div class="form-header"><h2><i class="fas fa-clock"></i> Transaksi Berulang</h2><button class="btn btn-primary" onclick="showAddRecurringForm()"><i class="fas fa-plus"></i> Tambah</button></div>
            <div class="filter-item"><label>Perusahaan</label><select id="recCompanyFilter" class="filter-select" onchange="loadRecurringList()"><option value="all">Semua</option>${companies.map(c=>`<option value="${c.id}">${c.nama}</option>`).join('')}</select></div>
            <div class="table-container"><table class="table"><thead><tr><th>Nama</th><th>Deskripsi</th><th>Total Cicilan</th><th>Mulai</th><th>Progress</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="recurringTableBody"></tbody></table></div></div>`;
        document.getElementById('content').innerHTML = html;
        let tbody = '';
        (recurring || []).forEach(r => {
            let progress = Math.round((r.bulan_ke / r.total_cicilan) * 100) || 0;
            let statusClass = r.status === 'aktif' ? 'status-paid' : 'status-draft';
            tbody += `<td>${r.nama}</td><td>${r.deskripsi || '-'}</td><td class="text-center">${r.total_cicilan}x</td><td class="text-center">${r.mulai}</td><td class="text-center">${r.bulan_ke}/${r.total_cicilan} (${progress}%)</td><td><span class="status-badge ${statusClass}">${r.status}</span></td><td><button class="action-btn" onclick="alert('Detail menyusul')"><i class="fas fa-eye"></i></button></td></tr>`;
        });
        document.getElementById('recurringTableBody').innerHTML = tbody || '<td><td colspan="7">Belum ada数据</td></tr>';
    }
    
    function showAddRecurringForm() {
        getAccountList(currentCompanyId).then(accountsList => {
            let accountOptions = '<option value="">Pilih Akun</option>'; accountsList.forEach(a => { accountOptions += `<option value="${a.account_code}">${a.account_code} - ${a.account_name}</option>`; });
            let today = new Date().toISOString().split('T')[0];
            let html = `<div class="form-card"><div class="form-header"><h2><i class="fas fa-plus"></i> Tambah Transaksi Berulang</h2><button class="btn btn-secondary" onclick="loadRecurringList()">Kembali</button></div>
                <div class="form-group"><label>Perusahaan</label><select id="recCompanyAdd" class="form-control">${companies.map(c=>`<option value="${c.id}">${c.nama}</option>`).join('')}</select></div>
                <div class="form-group"><label>Nama Transaksi</label><input type="text" id="recNama" class="form-control" placeholder="Angsuran Kendaraan"></div>
                <div class="form-group"><label>Deskripsi</label><textarea id="recDesc" class="form-control" rows="1"></textarea></div>
                <div class="form-group"><label>Total Cicilan (bulan)</label><input type="number" id="recTotal" class="form-control" value="12" min="1"></div>
                <div class="form-group"><label>Tanggal Mulai</label><input type="date" id="recMulai" class="form-control" value="${today}"></div>
                <div style="background:#f8f9fa; padding:0.8rem; border-radius:10px;"><h4>Detail Jurnal</h4><div id="recLines"><div class="rec-line" style="display:grid; grid-template-columns:2fr 1fr 1fr 2fr; gap:0.3rem; margin-bottom:0.3rem;">
                    <select class="rec-account form-control">${accountOptions}</select>
                    <input type="text" class="rec-debit form-control" placeholder="Debit" onkeyup="formatMoney(this)">
                    <input type="text" class="rec-kredit form-control" placeholder="Kredit" onkeyup="formatMoney(this)">
                    <input type="text" class="rec-ket form-control" placeholder="Keterangan">
                </div></div>
                <button class="btn btn-secondary btn-sm" onclick="addRecLine()">+ Tambah Baris</button></div>
                <div style="display:flex; gap:0.5rem; justify-content:flex-end;"><button class="btn btn-primary" onclick="saveRecurring()">Simpan</button></div>
                <div id="recResult"></div></div>`;
            document.getElementById('content').innerHTML = html;
            $('.rec-account').select2({ width: '100%' });
            window.recLineCounter = 1;
        });
    }
    
    function addRecLine() {
        let accountOptions = '<option value="">Pilih Akun</option>'; accounts.forEach(a => { accountOptions += `<option value="${a.account_code}">${a.account_code} - ${a.account_name}</option>`; });
        let container = document.getElementById('recLines');
        let lineId = window.recLineCounter++;
        let newLine = document.createElement('div'); newLine.className = 'rec-line'; newLine.style.display = 'grid'; newLine.style.gridTemplateColumns = '2fr 1fr 1fr 2fr'; newLine.style.gap = '0.3rem'; newLine.style.marginBottom = '0.3rem';
        newLine.innerHTML = `<select class="rec-account form-control">${accountOptions}</select><input type="text" class="rec-debit form-control" placeholder="Debit" onkeyup="formatMoney(this)"><input type="text" class="rec-kredit form-control" placeholder="Kredit" onkeyup="formatMoney(this)"><input type="text" class="rec-ket form-control" placeholder="Keterangan">`;
        container.appendChild(newLine);
        $(newLine).find('.rec-account').select2({ width: '100%' });
    }
    
    async function saveRecurring() {
        let lines = []; let totalDebit = 0, totalKredit = 0;
        document.querySelectorAll('.rec-line').forEach(line => {
            let account = line.querySelector('.rec-account').value;
            let debit = parseRupiah(line.querySelector('.rec-debit').value);
            let kredit = parseRupiah(line.querySelector('.rec-kredit').value);
            let ket = line.querySelector('.rec-ket').value;
            if (!account) { alert('Semua akun harus dipilih'); return; }
            totalDebit += debit; totalKredit += kredit;
            lines.push({ account_code: account, debit, kredit, keterangan: ket });
        });
        if (Math.abs(totalDebit - totalKredit) > 0.01) { alert('Total debit harus sama dengan total kredit'); return; }
        let data = {
            company_id: parseInt(document.getElementById('recCompanyAdd').value),
            nama: document.getElementById('recNama').value,
            deskripsi: document.getElementById('recDesc').value,
            total_cicilan: parseInt(document.getElementById('recTotal').value),
            mulai: document.getElementById('recMulai').value,
            bulan_ke: 0,
            status: 'aktif',
            lines: lines
        };
        if (!data.nama || !data.total_cicilan || !data.mulai) { alert('Isi semua field'); return; }
        showLoading();
        let { error } = await supabaseClient.from('recurring_transactions').insert({
            company_id: data.company_id, nama: data.nama, deskripsi: data.deskripsi, total_cicilan: data.total_cicilan,
            mulai: data.mulai, bulan_ke: 0, status: 'aktif', created_by: currentUser?.email
        }).select().single();
        if (error) { hideLoading(); document.getElementById('recResult').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
        for (let line of lines) {
            await supabaseClient.from('recurring_lines').insert({ recurring_id: data.id, account_code: line.account_code, debit: line.debit, kredit: line.kredit, keterangan: line.keterangan });
        }
        hideLoading(); document.getElementById('recResult').innerHTML = '<div class="alert alert-success">✅ Transaksi berulang disimpan!</div>'; setTimeout(() => loadRecurringList(), 2000);
    }
    
    // ==================== MASTER DATA ====================
    async function loadCustomerList() {
        let cust = await getCustomerList(currentCompanyId);
        let html = `<div class="form-card"><div class="form-header"><h2><i class="fas fa-users"></i> Data Customer</h2><button class="btn btn-primary" onclick="alert('Fitur tambah customer menyusul')"><i class="fas fa-plus"></i> Tambah Customer</button></div>
            <div class="table-container"><table class="table"><thead><tr><th>Kode</th><th>Nama</th><th>NPWP</th><th>Alamat</th><th>Telepon</th><th>Email</th></tr></thead><tbody>${cust.map(c=>`<tr><td>${c.code||'-'}</td><td>${c.name}</td><td>${c.npwp||'-'}</td><td>${c.alamat||'-'}</td><td>${c.telp||'-'}</td><td>${c.email||'-'}</td></tr>`).join('')}</tbody></table></div></div>`;
        document.getElementById('content').innerHTML = html;
    }
    
    async function loadProjectList() {
        let proj = await getProjectList(currentCompanyId);
        let html = `<div class="form-card"><div class="form-header"><h2><i class="fas fa-project-diagram"></i> Data Project</h2><button class="btn btn-primary" onclick="alert('Fitur tambah project menyusul')"><i class="fas fa-plus"></i> Tambah Project</button></div>
            <div class="table-container"><table class="table"><thead><tr><th>Kode</th><th>Nama</th><th>Company</th></tr></thead><tbody>${proj.map(p=>`<tr><td>${p.code||'-'}</td><td>${p.name}</td><td>${companies.find(c=>c.id==p.company_id)?.nama||'-'}</td></tr>`).join('')}</tbody></table></div></div>`;
        document.getElementById('content').innerHTML = html;
    }
    
    // ==================== SALDO AWAL ====================
    async function loadOpeningBalanceForm() {
        if (currentUserRole !== 'direktur' && currentUserRole !== 'finance') { alert('Hanya direktur dan finance yang bisa input saldo awal'); return; }
        let accountsList = await getAccountList(currentCompanyId);
        let asetOptions = '', liabilitasOptions = '', ekuitasOptions = '';
        accountsList.forEach(a => {
            if (a.account_type === 'Aset') asetOptions += `<option value="${a.account_code}">${a.account_code} - ${a.account_name}</option>`;
            else if (a.account_type === 'Liabilitas') liabilitasOptions += `<option value="${a.account_code}">${a.account_code} - ${a.account_name}</option>`;
            else if (a.account_type === 'Ekuitas') ekuitasOptions += `<option value="${a.account_code}">${a.account_code} - ${a.account_name}</option>`;
        });
        let today = new Date().toISOString().split('T')[0];
        let html = `<div class="form-card"><div class="form-header"><h2><i class="fas fa-scale-balanced"></i> Saldo Awal</h2><button class="btn btn-primary" onclick="saveOpeningBalance()">Simpan Saldo Awal</button></div>
            <div class="alert alert-warning"><i class="fas fa-exclamation-triangle"></i> <strong>PENTING!</strong> Saldo awal hanya dapat diinput SATU KALI.</div>
            <div class="form-group"><label>Perusahaan</label><select id="openingCompany" class="form-control" onchange="loadOpeningAccounts(this.value)">${companies.map(c=>`<option value="${c.id}">${c.nama}</option>`).join('')}</select></div>
            <div class="form-group"><label>Tanggal Saldo Awal</label><input type="date" id="openingDate" class="form-control" value="2026-01-01"></div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.8rem;"><div style="background:#f8f9fa; padding:0.8rem; border-radius:10px;"><h3 style="color:var(--primary); font-size:0.9rem;">ASET</h3><div id="openingAsetContainer"></div><button class="btn btn-secondary btn-sm" onclick="addOpeningRow('aset')">+ Tambah Aset</button><div class="mt-1 fw-bold">Total Aset: <span id="totalAsetOpening">Rp 0</span></div></div>
            <div style="background:#f8f9fa; padding:0.8rem; border-radius:10px;"><h3 style="color:var(--warning); font-size:0.9rem;">LIABILITAS</h3><div id="openingLiabilitasContainer"></div><button class="btn btn-secondary btn-sm" onclick="addOpeningRow('liabilitas')">+ Tambah Liabilitas</button><div class="mt-1 fw-bold">Total Liabilitas: <span id="totalLiabilitasOpening">Rp 0</span></div></div>
            <div style="background:#f8f9fa; padding:0.8rem; border-radius:10px;"><h3 style="color:var(--success); font-size:0.9rem;">EKUITAS</h3><div id="openingEkuitasContainer"></div><button class="btn btn-secondary btn-sm" onclick="addOpeningRow('ekuitas')">+ Tambah Ekuitas</button><div class="mt-1 fw-bold">Total Ekuitas: <span id="totalEkuitasOpening">Rp 0</span></div></div></div>
            <div style="margin-top:0.8rem; padding:0.8rem; border-radius:10px; background:var(--primary); color:white;"><div style="display:flex; justify-content:space-between;"><span><i class="fas fa-balance-scale"></i> <strong>ASET = LIABILITAS + EKUITAS</strong></span><span id="openingBalanceStatus">Belum Balance</span></div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.5rem; margin-top:0.3rem;"><div>Aset: Rp <span id="statusAset">0</span></div><div>Liabilitas: Rp <span id="statusLiabilitas">0</span></div><div>Ekuitas: Rp <span id="statusEkuitas">0</span></div></div>
            <div id="openingSelisih">Selisih: Rp 0</div></div></div>`;
        document.getElementById('content').innerHTML = html;
        window.openingAccounts = accountsList;
        addOpeningRow('aset', true); addOpeningRow('liabilitas', true); addOpeningRow('ekuitas', true);
        window.openingRowCounter = 3;
    }
    
    function addOpeningRow(kategori, isFirst = false) {
        let containerId = `opening${kategori.charAt(0).toUpperCase() + kategori.slice(1)}Container`;
        let container = document.getElementById(containerId);
        if (!container) return;
        window.openingRowCounter = (window.openingRowCounter || 0) + 1;
        let rowId = `row-${kategori}-${window.openingRowCounter}`;
        let accountOptions = '<option value="">Pilih Akun</option>';
        if (window.openingAccounts) {
            window.openingAccounts.forEach(acc => {
                if (kategori === 'aset' && acc.account_type === 'Aset') accountOptions += `<option value="${acc.account_code}">${acc.account_code} - ${acc.account_name}</option>`;
                else if (kategori === 'liabilitas' && acc.account_type === 'Liabilitas') accountOptions += `<option value="${acc.account_code}">${acc.account_code} - ${acc.account_name}</option>`;
                else if (kategori === 'ekuitas' && acc.account_type === 'Ekuitas') accountOptions += `<option value="${acc.account_code}">${acc.account_code} - ${acc.account_name}</option>`;
            });
        }
        let row = document.createElement('div'); row.id = rowId; row.style.display = 'grid'; row.style.gridTemplateColumns = '2fr 1fr auto'; row.style.gap = '0.3rem'; row.style.marginBottom = '0.3rem';
        row.innerHTML = `<select class="form-control opening-account" data-kategori="${kategori}" style="font-size:0.7rem;">${accountOptions}</select><input type="text" class="form-control opening-amount" placeholder="Rp" onkeyup="formatMoney(this); calculateOpeningTotal()" style="font-size:0.7rem;">${!isFirst ? `<button class="btn btn-danger btn-sm" onclick="removeOpeningRow('${rowId}')"><i class="fas fa-times"></i></button>` : '<div style="width:24px;"></div>'}`;
        container.appendChild(row);
    }
    
    function removeOpeningRow(rowId) { document.getElementById(rowId)?.remove(); calculateOpeningTotal(); }
    
    function calculateOpeningTotal() {
        let totalAset = 0, totalLiabilitas = 0, totalEkuitas = 0;
        document.querySelectorAll('#openingAsetContainer .opening-amount').forEach(i => totalAset += parseRupiah(i.value));
        document.querySelectorAll('#openingLiabilitasContainer .opening-amount').forEach(i => totalLiabilitas += parseRupiah(i.value));
        document.querySelectorAll('#openingEkuitasContainer .opening-amount').forEach(i => totalEkuitas += parseRupiah(i.value));
        document.getElementById('totalAsetOpening').innerHTML = `Rp ${formatNumber(totalAset)}`;
        document.getElementById('totalLiabilitasOpening').innerHTML = `Rp ${formatNumber(totalLiabilitas)}`;
        document.getElementById('totalEkuitasOpening').innerHTML = `Rp ${formatNumber(totalEkuitas)}`;
        document.getElementById('statusAset').innerHTML = formatNumber(totalAset);
        document.getElementById('statusLiabilitas').innerHTML = formatNumber(totalLiabilitas);
        document.getElementById('statusEkuitas').innerHTML = formatNumber(totalEkuitas);
        let selisih = totalAset - (totalLiabilitas + totalEkuitas);
        document.getElementById('openingSelisih').innerHTML = `Selisih: Rp ${formatNumber(selisih)}`;
        let statusEl = document.getElementById('openingBalanceStatus');
        if (Math.abs(selisih) < 1) { statusEl.innerHTML = '✅ BALANCE'; statusEl.style.color = '#10b981'; }
        else { statusEl.innerHTML = '❌ TIDAK BALANCE'; statusEl.style.color = '#ef4444'; }
    }
    
    async function saveOpeningBalance() {
        let totalAset = parseRupiah(document.getElementById('totalAsetOpening').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        let totalLiabilitas = parseRupiah(document.getElementById('totalLiabilitasOpening').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        let totalEkuitas = parseRupiah(document.getElementById('totalEkuitasOpening').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        if (Math.abs(totalAset - (totalLiabilitas + totalEkuitas)) > 1) { alert('Aset harus sama dengan Liabilitas + Ekuitas!'); return; }
        let companyId = parseInt(document.getElementById('openingCompany').value);
        let tanggal = document.getElementById('openingDate').value;
        let periode = tanggal.substring(0, 7);
        let lines = [];
        document.querySelectorAll('#openingAsetContainer .opening-account').forEach((select, idx) => {
            let account = select.value;
            let amount = parseRupiah(document.querySelectorAll('#openingAsetContainer .opening-amount')[idx]?.value);
            if (account && amount > 0) lines.push({ account_code: account, amount: amount, type: 'Aset' });
        });
        document.querySelectorAll('#openingLiabilitasContainer .opening-account').forEach((select, idx) => {
            let account = select.value;
            let amount = parseRupiah(document.querySelectorAll('#openingLiabilitasContainer .opening-amount')[idx]?.value);
            if (account && amount > 0) lines.push({ account_code: account, amount: amount, type: 'Liabilitas' });
        });
        document.querySelectorAll('#openingEkuitasContainer .opening-account').forEach((select, idx) => {
            let account = select.value;
            let amount = parseRupiah(document.querySelectorAll('#openingEkuitasContainer .opening-amount')[idx]?.value);
            if (account && amount > 0) lines.push({ account_code: account, amount: amount, type: 'Ekuitas' });
        });
        if (lines.length === 0) { alert('Tidak ada data saldo awal yang diinput'); return; }
        showLoading();
        for (let line of lines) {
            let { error } = await supabaseClient.from('opening_balances').insert({
                company_id: companyId, account_code: line.account_code, amount: line.amount, periode: periode, created_by: currentUser?.email
            });
            if (error) { hideLoading(); alert(error.message); return; }
        }
        hideLoading(); alert('✅ Saldo awal berhasil disimpan!'); showMenu('dashboard');
    }
    
    async function checkSession() {
        let { data } = await supabaseClient.auth.getSession();
        if (data.session) {
            let { data: profile } = await supabaseClient.from('user_profiles').select('*').eq('email', data.session.user.email).single();
            currentUser = data.session.user; currentUserRole = profile?.role || 'staff'; currentCompanyId = profile?.company_id || 1;
            let { data: comps } = await supabaseClient.from('companies').select('*'); companies = comps || [];
            document.getElementById('loginPage').style.display = 'none'; document.getElementById('appPage').style.display = 'flex';
            document.getElementById('userName').innerText = profile?.name || currentUser.email; document.getElementById('userRole').innerText = currentUserRole;
            document.getElementById('userAvatar').innerText = (profile?.name || currentUser.email).charAt(0).toUpperCase();
            renderSidebar(); loadDashboard();
        }
    }
    checkSession();
    </script>
</body>
</html>
