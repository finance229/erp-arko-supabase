        // Ambil daftar bank
        const bankList = await getBankList(currentCompanyId);
        let bankOptions = '<option value="">Pilih Bank</option>';
        bankList.forEach(b => bankOptions += `<option value="${b.code}">${b.display}</option>`);
        
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content" style="max-width:500px;">
                <div style="padding:20px;">
                    <h3><i class="fas fa-paper-plane"></i> Ajukan Pembayaran Vendor</h3>
                    <div class="alert alert-info">Invoice: ${inv.invoice_no}<br>Sisa utang: Rp ${formatNumber(sisa)}</div>
                    <div class="form-group"><label>Tanggal Pembayaran</label><input type="date" id="payDate" class="form-control" value="${today}"></div>
                    <div class="form-group"><label>Jumlah Dibayar</label><input type="text" id="payAmount" class="form-control" value="${formatNumber(sisa)}" onkeyup="formatMoney(this)"></div>
                    <div class="form-group"><label>Pilih Bank Sumber Dana</label><select id="payBank" class="form-control">${bankOptions}</select></div>
                    <div class="form-group"><label>Keterangan</label><input type="text" id="payNotes" class="form-control" placeholder="Catatan pembayaran"></div>
                    <div style="display:flex; gap:1rem; justify-content:flex-end;">
                        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Batal</button>
                        <button class="btn btn-primary" onclick="submitPaymentRequestVendor(${invoiceId}, '${inv.project_code || ''}', ${inv.total})">Ajukan ke Direktur</button>
                    </div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    async function submitPaymentRequestVendor(invoiceId, projectCode, totalInvoice) {
        const payDate = document.getElementById('payDate').value;
        const payAmount = parseRupiah(document.getElementById('payAmount').value);
        const payBank = document.getElementById('payBank').value;
        const payNotes = document.getElementById('payNotes').value;
        
        if (!payDate || payAmount <= 0) { showToast('Isi tanggal dan jumlah pembayaran', 'error'); return; }
        if (!payBank) { showToast('Pilih bank sumber dana', 'error'); return; }
        
        showLoading();
        try {
            const { data: inv } = await sb.from('vendor_invoices').select('*').eq('id', invoiceId).single();
            
            // Buat payment request untuk invoice ini
            const { data: paymentReq, error: reqError } = await sb.from('payment_requests').insert({
                company_id: currentCompanyId,
                request_date: payDate,
                description: `Pembayaran invoice vendor ${inv.invoice_no} - ${inv.vendor_name}`,
                amount: payAmount,
                bank_account: payBank,
                bukti_url: null,
                requester_email: currentUser?.email,
                status: 'submitted',
                submitted_at: new Date(),
                project_code: projectCode,
                vendor_invoice_id: invoiceId
            }).select().single();
            
            if (reqError) throw reqError;
            
            await sb.from('payment_logs').insert({
                request_id: paymentReq.id,
                user_email: currentUser?.email,
                user_role: currentUserRole,
                old_status: 'draft',
                new_status: 'submitted',
                keterangan: `Request pembayaran invoice vendor ${inv.invoice_no} - ${payNotes || ''}`
            });
            
            showToast(`✅ Payment request #${paymentReq.id} diajukan ke direktur!`, 'success');
            setTimeout(() => { document.querySelector('.modal-overlay')?.remove(); loadVendorInvoiceList(); }, 1500);
        } catch (error) { showToast('Gagal: ' + error.message, 'error'); }
        finally { hideLoading(); }
    }
    
    // ==================== MASTER DATA ====================
    async function loadCustomerList() {
        let cust = await getCustomerList(currentCompanyId);
        let html = `<div class="form-card"><div class="form-header"><h2><i class="fas fa-users"></i> Data Customer</h2><button class="btn btn-secondary" onclick="loadDashboard()">Kembali</button></div>
            <div class="table-container"><table class="table"><thead><tr><th>Kode</th><th>Nama</th><th>NPWP</th><th>Telepon</th><th>Email</th></tr></thead><tbody>${cust.map(c=>`<tr><td>${c.code||'-'}</td>.html${c.name}</td>.html${c.npwp||'-'}</td>.html${c.telp||'-'}</td>.html${c.email||'-'}</td></tr>`).join('')}</tbody></table></div></div>`;
        document.getElementById('content').innerHTML = html;
    }
    
    async function loadProjectList() {
        let proj = await getProjectList(currentCompanyId);
        let html = `<div class="form-card"><div class="form-header"><h2><i class="fas fa-project-diagram"></i> Data Project</h2><button class="btn btn-secondary" onclick="loadDashboard()">Kembali</button></div>
            <div class="table-container"><table class="table"><thead><tr><th>Kode</th><th>Nama</th><th>Budget</th><th>Terpakai</th><th>Sisa</th><th>Status</th><th>Aksi</th></tr></thead><tbody>`;
        
        for (const p of proj) {
            // Hitung total terpakai dari payment_requests yang sudah paid (AP) dan invoices yang sudah paid (AR)
            const { data: payments } = await sb.from('payment_requests').select('total_with_tax').eq('project_code', p.code).eq('company_id', currentCompanyId).in('status', ['paid']);
            const { data: paidInvoices } = await sb.from('invoices').select('paid_amount').eq('project_code', p.code).eq('company_id', currentCompanyId).in('status', ['partial', 'paid']);
            
            const terpakaiAP = (payments || []).reduce((a,b) => a + (b.total_with_tax || 0), 0);
            const terpakaiAR = (paidInvoices || []).reduce((a,b) => a + (b.paid_amount || 0), 0);
            const terpakai = terpakaiAP + terpakaiAR;
            const sisa = p.is_unlimited ? 0 : (p.budget - terpakai);
            
            html += `<tr>
                <td>${p.code || '-'}</td>
                <td>${p.name}</td>
                <td class="text-right">${p.is_unlimited ? 'Unlimited' : `Rp ${formatNumber(p.budget)}`}</td>
                <td class="text-right">Rp ${formatNumber(terpakai)}</td>
                <td class="text-right">${p.is_unlimited ? 'Unlimited' : `Rp ${formatNumber(sisa)}`}</td>
                <td><span class="status-badge ${p.is_unlimited ? 'status-draft' : 'status-paid'}">${p.is_unlimited ? 'Unlimited' : 'Limited'}</span></td>
                <td><button class="action-btn" onclick="viewProjectDetail('${p.code}')"><i class="fas fa-chart-line"></i></button></td>
            </tr>`;
        }
        html += '</tbody></table></div></div>';
        document.getElementById('content').innerHTML = html;
    }
    
    async function viewProjectDetail(projectCode) {
        showLoading();
        try {
            const { data: project } = await sb.from('projects').select('*').eq('code', projectCode).eq('company_id', currentCompanyId).single();
            if (!project) { showToast('Project tidak ditemukan', 'error'); hideLoading(); return; }
            
            // Ambil semua transaksi AR (invoices yang sudah dibayar)
            const { data: invoices } = await sb.from('invoices').select('*').eq('project_code', projectCode).eq('company_id', currentCompanyId).in('status', ['partial', 'paid']);
            
            // Ambil semua transaksi AP (payment requests yang sudah paid)
            const { data: payments } = await sb.from('payment_requests').select('*').eq('project_code', projectCode).eq('company_id', currentCompanyId).in('status', ['paid']);
            
            // Gabungkan dan urutkan
            let transactions = [];
            invoices.forEach(inv => {
                transactions.push({
                    date: inv.last_payment_date || inv.invoice_date,
                    type: 'AR (Pemasukan)',
                    reference: inv.invoice_no,
                    description: `Invoice customer: ${inv.description || '-'}`,
                    amount: inv.paid_amount || 0,
                    is_income: true
                });
            });
            payments.forEach(pay => {
                transactions.push({
                    date: pay.paid_at || pay.request_date,
                    type: 'AP (Pengeluaran)',
                    reference: pay.voucher_no || `#${pay.id}`,
                    description: pay.description,
                    amount: pay.total_with_tax || pay.amount,
                    is_income: false
                });
            });
            transactions.sort((a,b) => new Date(b.date) - new Date(a.date));
            
            const totalIncome = transactions.filter(t => t.is_income).reduce((a,b) => a + b.amount, 0);
            const totalExpense = transactions.filter(t => !t.is_income).reduce((a,b) => a + b.amount, 0);
            const netCashflow = totalIncome - totalExpense;
            const budgetUsed = project.is_unlimited ? totalExpense : (project.budget - (project.budget - totalExpense));
            
            let html = `
                <div class="form-card">
                    <div class="form-header">
                        <h2><i class="fas fa-chart-line"></i> Detail Project: ${project.code} - ${project.name}</h2>
                        <button class="btn btn-secondary" onclick="loadProjectList()">Kembali</button>
                    </div>
                    
                    <div class="stats-grid" style="grid-template-columns: repeat(4, 1fr); margin-bottom:20px;">
                        <div class="stat-card"><div class="stat-value">${project.is_unlimited ? 'Unlimited' : `Rp ${formatNumber(project.budget)}`}</div><div class="stat-label">Total Budget</div></div>
                        <div class="stat-card"><div class="stat-value">Rp ${formatNumber(totalExpense)}</div><div class="stat-label">Total Pengeluaran (AP)</div></div>
                        <div class="stat-card"><div class="stat-value">Rp ${formatNumber(totalIncome)}</div><div class="stat-label">Total Pemasukan (AR)</div></div>
                        <div class="stat-card"><div class="stat-value" style="color:${netCashflow >= 0 ? 'var(--success)' : 'var(--danger)'}">Rp ${formatNumber(Math.abs(netCashflow))}</div><div class="stat-label">${netCashflow >= 0 ? 'Surplus' : 'Defisit'}</div></div>
                    </div>
                    
                    <div class="progress-budget" style="margin-bottom:20px;">
                        <div class="progress-fill ${project.is_unlimited ? 'unlimited' : (budgetUsed/project.budget*100 <= 70 ? 'safe' : (budgetUsed/project.budget*100 <= 90 ? 'warning' : 'danger'))}" style="width: ${project.is_unlimited ? 0 : Math.min((budgetUsed/project.budget)*100, 100)}%;">
                            ${!project.is_unlimited ? Math.round((budgetUsed/project.budget)*100) + '%' : ''}
                        </div>
                    </div>
                    
                    <div class="table-container">
                        <table class="table">
                            <thead><tr><th>Tanggal</th><th>Tipe</th><th>Referensi</th><th>Deskripsi</th><th class="text-right">Jumlah</th></tr></thead>
                            <tbody>
                                ${transactions.map(t => `
                                    <tr>
                                        <td>${formatDate(t.date)}</td>
                                        <td><span class="status-badge ${t.is_income ? 'status-paid' : 'status-draft'}">${t.type}</span></td>
                                        <td>${t.reference}</td>
                                        <td>${t.description}</td>
                                        <td class="text-right" style="color:${t.is_income ? 'var(--success)' : 'var(--danger)'}">${t.is_income ? '+' : '-'} Rp ${formatNumber(t.amount)}</td>
                                    </tr>
                                `).join('')}
                                ${transactions.length === 0 ? '<tr><td colspan="5" class="text-center">Belum ada transaksi</td></tr>' : ''}
                            </tbody>
                            <tfoot>
                                <tr style="font-weight:bold; background:var(--gray-100);">
                                    <td colspan="4" class="text-right">TOTAL PEMASUKAN</td>
                                    <td class="text-right" style="color:var(--success);">+ Rp ${formatNumber(totalIncome)}</td>
                                </tr>
                                <tr style="font-weight:bold; background:var(--gray-100);">
                                    <td colspan="4" class="text-right">TOTAL PENGELUARAN</td>
                                    <td class="text-right" style="color:var(--danger);">- Rp ${formatNumber(totalExpense)}</td>
                                </tr>
                                <tr style="font-weight:bold; background:var(--primary); color:white;">
                                    <td colspan="4" class="text-right">NET CASHFLOW</td>
                                    <td class="text-right">Rp ${formatNumber(Math.abs(netCashflow))} (${netCashflow >= 0 ? 'Surplus' : 'Defisit'})</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        } catch (error) { showToast('Error: ' + error.message, 'error'); }
        finally { hideLoading(); }
    }
    
    async function loadVendorList() {
        let vend = await getVendorList(currentCompanyId);
        let html = `<div class="form-card"><div class="form-header"><h2><i class="fas fa-truck"></i> Data Vendor</h2><button class="btn btn-secondary" onclick="loadDashboard()">Kembali</button></div>
            <div class="table-container"><table class="table"><thead><tr><th>Nama</th><th>NPWP</th><th>Bank</th><th>No Rekening</th><th>Termin</th></tr></thead><tbody>${vend.map(v=>`<tr><td>${v.name}</td><td>${v.npwp||'-'}</td><td>${v.bank_name||'-'}</td><td>${v.bank_account||'-'}</td><td class="text-center">${v.payment_term||30} hari</td></tr>`).join('')}</tbody></table></div></div>`;
        document.getElementById('content').innerHTML = html;
    }
    
    // ==================== CHECK SESSION ====================
    async function checkSession() {
        const { data } = await sb.auth.getSession();
        if (data.session) {
            const { data: profile } = await sb.from('user_profiles').select('*').eq('email', data.session.user.email).single();
            currentUser = data.session.user; currentUserRole = profile?.role || 'staff'; currentCompanyId = profile?.company_id || 1;
            const { data: comps } = await sb.from('companies').select('*'); companies = comps || [];
            document.getElementById('loginPage').style.display = 'none'; document.getElementById('appPage').style.display = 'flex';
            document.getElementById('userName').innerText = profile?.name || currentUser.email; document.getElementById('userRole').innerText = currentUserRole;
            document.getElementById('userAvatar').innerText = (profile?.name || currentUser.email).charAt(0).toUpperCase();
            renderSidebar(); loadDashboard();
        }
    }
    checkSession();
    </script>
