<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARKO GROUP ERP - Modern Financial System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            line-height: 1.5;
        }
        
        :root {
            --primary: #0f172a;
            --primary-light: #1e293b;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #2563eb);
            --success: #10b981;
            --success-light: #34d399;
            --warning: #f59e0b;
            --warning-light: #fbbf24;
            --danger: #ef4444;
            --danger-light: #f87171;
            --info: #6366f1;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--gray-100);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--gray-400);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-500);
        }
        
        /* Layout */
        .app {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            box-shadow: var(--shadow-xl);
        }
        
        .sidebar-header {
            padding: 1.75rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .logo i {
            color: var(--accent);
            font-size: 1.8rem;
        }
        
        .logo span {
            background: var(--accent-gradient);
            padding: 0.2rem 0.5rem;
            border-radius: 8px;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }
        
        .sidebar-menu {
            padding: 1.25rem;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            padding: 0.75rem 1rem;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 0.25rem;
            transition: all 0.25s ease;
            font-weight: 500;
        }
        
        .menu-item i {
            width: 22px;
            font-size: 1.1rem;
        }
        
        .menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .menu-item.active {
            background: var(--accent-gradient);
            color: white;
            box-shadow: var(--shadow-md);
        }
        
        .menu-item.has-dropdown {
            justify-content: space-between;
        }
        
        .dropdown-menu {
            margin-left: 1rem;
            border-left: 1px dashed rgba(255, 255, 255, 0.2);
            margin-bottom: 0.5rem;
        }
        
        .menu-item.submenu {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            padding-left: 2rem;
        }
        
        /* Main Content */
        .main {
            flex: 1;
            margin-left: 280px;
            padding: 1.5rem;
            background: #f0f2f5;
            min-height: 100vh;
        }
        
        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            background: white;
            padding: 0.875rem 1.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        
        .page-title {
            font-size: 1.35rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }
        
        .user-info {
            text-align: right;
        }
        
        .user-name {
            font-weight: 700;
            font-size: 0.875rem;
            color: var(--gray-800);
        }
        
        .user-role {
            font-size: 0.7rem;
            color: var(--gray-500);
            text-transform: capitalize;
        }
        
        .user-avatar {
            width: 42px;
            height: 42px;
            background: var(--accent-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            box-shadow: var(--shadow-md);
        }
        
        .logout-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.5rem;
            border-radius: 10px;
            transition: all 0.2s;
        }
        
        .logout-btn:hover {
            background: var(--gray-100);
        }
        
        /* Cards */
        .card {
            background: white;
            border-radius: 20px;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            box-shadow: var(--shadow-md);
        }
        
        .card h2 {
            font-size: 1rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--gray-200);
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray-700);
        }
        
        /* Form Card */
        .form-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow);
        }
        
        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--gray-200);
        }
        
        .form-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray-800);
        }
        
        .form-header h2 i {
            color: var(--accent);
        }
        
        /* Form Controls */
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            font-size: 0.75rem;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group label i {
            margin-right: 0.3rem;
            color: var(--accent);
        }
        
        .form-control {
            width: 100%;
            padding: 0.6rem 0.85rem;
            border: 1.5px solid var(--gray-200);
            border-radius: 12px;
            font-size: 0.85rem;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        /* Filter Card */
        .filter-card {
            background: var(--gray-50);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1.25rem;
            border: 1px solid var(--gray-200);
        }
        
        .filter-grid {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        
        .filter-item {
            flex: 1;
            min-width: 140px;
        }
        
        .filter-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--gray-500);
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .filter-select {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--gray-300);
            border-radius: 10px;
            background: white;
            font-size: 0.8rem;
        }
        
        /* Buttons */
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
            font-size: 0.8rem;
        }
        
        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            box-shadow: var(--shadow-sm);
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }
        
        .btn-secondary {
            background: var(--gray-200);
            color: var(--gray-700);
        }
        
        .btn-sm {
            padding: 0.3rem 0.7rem;
            font-size: 0.7rem;
        }
        
        .action-btn {
            background: none;
            border: none;
            color: var(--gray-500);
            cursor: pointer;
            padding: 0.35rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            color: var(--accent);
            background: var(--gray-100);
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.25rem;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            border: 1px solid var(--gray-100);
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            font-size: 0.65rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 0.3rem;
        }
        
        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }
        
        .chart-card {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            box-shadow: var(--shadow);
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        
        .chart-title {
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--gray-700);
        }
        
        .chart-title i {
            color: var(--accent);
        }
        
        .chart-container {
            height: 200px;
            position: relative;
        }
        
        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
            font-size: 0.8rem;
        }
        
        th {
            background: var(--gray-50);
            font-weight: 700;
            color: var(--gray-600);
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 0.5px;
        }
        
        tr:hover td {
            background: var(--gray-50);
        }
        
        /* Status Badges */
        .status-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .status-draft {
            background: var(--gray-200);
            color: var(--gray-600);
        }
        
        .status-submitted {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .status-verified {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status-paid {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-rejected {
            background: #fee2e2;
            color: #991b1b;
        }
        
        /* Progress Bar */
        .progress-budget {
            background: var(--gray-200);
            border-radius: 30px;
            height: 28px;
            width: 100%;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            color: white;
            font-size: 11px;
            font-weight: 700;
            transition: width 0.5s ease;
        }
        
        .progress-fill.safe {
            background: linear-gradient(90deg, #10b981, #34d399);
        }
        
        .progress-fill.warning {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }
        
        .progress-fill.danger {
            background: linear-gradient(90deg, #ea580c, #f97316);
        }
        
        .progress-fill.over {
            background: linear-gradient(90deg, #dc2626, #ef4444);
        }
        
        .progress-fill.unlimited {
            background: linear-gradient(90deg, #9ca3af, #d1d5db);
        }
        
        .budget-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 20px;
            padding: 1.25rem;
            color: white;
            margin-bottom: 1rem;
        }
        
        .budget-title {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }
        
        .budget-amount {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
        }
        
        .budget-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
        }
        
        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            display: none;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Alerts */
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.8rem;
        }
        
        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        
        .alert-warning {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fde68a;
        }
        
        .alert-info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }
        
        /* Login */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }
        
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: var(--shadow-xl);
        }
        
        .login-logo i {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        
        .login-logo h1 {
            font-size: 1.6rem;
            margin-bottom: 0.2rem;
            color: var(--primary);
        }
        
        /* Welcome Section */
        .welcome-section {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            border-radius: 20px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .welcome-section h1 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .welcome-date {
            background: rgba(255, 255, 255, 0.15);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .pagination .btn {
            min-width: 36px;
            justify-content: center;
        }
        
        /* Utilities */
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .text-muted { color: var(--gray-500); }
        .mt-2 { margin-top: 0.5rem; }
        .mt-3 { margin-top: 0.75rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .fw-bold { font-weight: 700; }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .charts-grid { grid-template-columns: 1fr; }
            .filter-grid { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>
    
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="fas fa-building"></i>
                <h1>ARKO GROUP</h1>
                <p>Enterprise Resource Planning</p>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="login()">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <div id="loginError" class="alert alert-error" style="display:none; margin-top:1rem;"></div>
        </div>
    </div>
    
    <div id="appPage" class="app" style="display:none">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-building"></i>
                    ARKO GROUP
                    <span>ERP</span>
                </div>
            </div>
            <div class="sidebar-menu" id="sidebarMenu"></div>
        </div>
        <div class="main">
            <div class="top-bar">
                <h1 class="page-title" id="pageTitle">Dashboard Keuangan</h1>
                <div class="user-menu">
                    <div class="user-info">
                        <div class="user-name" id="userName">Loading...</div>

            monthOptions += `<option value="${i+1}">${bulanNames[i]}</option>`;
        }
        
        let html = `
            <div class="form-card">
                <div class="form-header">
                    <h2><i class="fas fa-money-bill-wave"></i> Payment Request</h2>

                        <button class="btn btn-primary" onclick="showNewPaymentForm()"><i class="fas fa-plus"></i> Buat Request</button>

                    <div class="filter-grid">
                        <div class="filter-item">

                            <select id="filterCompany" class="filter-select" onchange="filterPaymentRequests()">${companyFilterOptions}</select>

                            <select id="filterMonth" class="filter-select" onchange="filterPaymentRequests()">${monthOptions}</select>
                        </div>

                            <label class="filter-label">Tahun</label>
                            <select id="filterYear" class="filter-select" onchange="filterPaymentRequests()">${yearOptions}</select>

                            </tr>
                        </thead>
                        <tbody id="paymentTableBody"></tbody>
                    </table>

                <div id="paginationControls" class="pagination"></div>
            </div>
        `;
        
        document.getElementById('content').innerHTML = html;

    function filterPaymentRequests() {
        let companyFilter = document.getElementById('filterCompany')?.value || 'all';
        let monthFilter = document.getElementById('filterMonth')?.value || 'all';
        let yearFilter = document.getElementById('filterYear')?.value || 'all';
        let statusFilter = document.getElementById('paymentStatusFilter')?.value || 'all';
        
        let filtered = allPaymentsData.filter(p => {
            if (companyFilter !== 'all' && p.company_id != companyFilter) return false;
            if (statusFilter !== 'all' && p.status !== statusFilter) return false;
            if (monthFilter !== 'all') {
                let d = new Date(p.request_date);
                if (d.getMonth() + 1 != monthFilter) return false;
            }
            if (yearFilter !== 'all') {
                let d = new Date(p.request_date);
                if (d.getFullYear() != yearFilter) return false;
            }
            return true;
        });
        
        renderPaymentTableWithPagination(filtered);
    }
    
    function renderPaymentTableWithPagination(filteredData) {
        let totalPages = Math.ceil(filteredData.length / paymentsPerPage);
        if (currentPaymentPage > totalPages) currentPaymentPage = 1;
        
        let start = (currentPaymentPage - 1) * paymentsPerPage;
        let end = start + paymentsPerPage;
        let pageData = filteredData.slice(start, end);
        
        let tbody = '';
        pageData.forEach(p => {
            let company = companies.find(c => c.id == p.company_id)?.nama || '-';
            let actions = `<button class="action-btn" onclick="viewPaymentRequest(${p.id})" title="Detail"><i class="fas fa-eye"></i></button>`;
            
            if (p.status === 'draft') {
                actions += ` <button class="action-btn" onclick="submitPaymentRequest(${p.id})" title="Ajukan" style="color:var(--success);"><i class="fas fa-paper-plane"></i></button>`;
                if (p.requester_email === currentUser?.email) {
                    actions += ` <button class="action-btn" onclick="editPaymentRequest(${p.id})" title="Edit" style="color:var(--warning);"><i class="fas fa-edit"></i></button>`;
                    actions += ` <button class="action-btn" onclick="deletePaymentRequest(${p.id})" title="Hapus" style="color:var(--danger);"><i class="fas fa-trash"></i></button>`;
                }
            }
            
            if (p.status === 'submitted' && currentUserRole === 'finance') {
                actions += ` <button class="action-btn" onclick="verifyPaymentRequest(${p.id})" title="Verifikasi" style="color:var(--success);"><i class="fas fa-check-circle"></i></button>`;
                actions += ` <button class="action-btn" onclick="rejectPaymentRequest(${p.id})" title="Tolak" style="color:var(--danger);"><i class="fas fa-times-circle"></i></button>`;
            }
            
            if (p.status === 'verified' && currentUserRole === 'direktur') {
                actions += ` <button class="action-btn" onclick="approvePaymentRequest(${p.id})" title="Approve" style="color:var(--success);"><i class="fas fa-thumbs-up"></i></button>`;
            }
            
            tbody += `<tr>
                <td>#${p.id}</td>
                <td>${p.request_date || '-'}</td>
                <td>${company}</td>
                <td>${p.description || '-'}</td>
                <td class="text-right">Rp ${formatNumber(p.amount)}</td>
                <td class="text-right">Rp ${formatNumber(p.total_with_tax || p.amount)}</td>
                <td><span class="status-badge status-${p.status}">${p.status}</span></td>
                <td>${actions}</td>
            </tr>`;
        });
        
        document.getElementById('paymentTableBody').innerHTML = tbody || '<tr><td colspan="8">Belum ada data</td></tr>';
        
        // Pagination
        let paginationHtml = '';
        if (totalPages > 1) {
            paginationHtml += `<button class="btn btn-sm" onclick="changePaymentPage(${currentPaymentPage - 1})" ${currentPaymentPage === 1 ? 'disabled' : ''}>« Prev</button>`;
            for (let i = 1; i <= totalPages; i++) {
                paginationHtml += `<button class="btn btn-sm ${i === currentPaymentPage ? 'btn-primary' : ''}" onclick="changePaymentPage(${i})">${i}</button>`;
            }
            paginationHtml += `<button class="btn btn-sm" onclick="changePaymentPage(${currentPaymentPage + 1})" ${currentPaymentPage === totalPages ? 'disabled' : ''}>Next »</button>`;
        }
        document.getElementById('paginationControls').innerHTML = paginationHtml;
    }
    
    function changePaymentPage(page) {
        currentPaymentPage = page;
        filterPaymentRequests();
    }

    async function saveNewPayment() {
        let desc = document.getElementById('newDesc').value;
        let amount = document.getElementById('newAmount').value;
        let bank = document.getElementById('newBank').value;
        let file = document.getElementById('newFile').files[0];
        
        if (!desc || !amount) { 
            document.getElementById('newPaymentMsg').innerHTML = '<div class="alert alert-error">Isi semua field!</div>'; 
            return; 
        }
        
        let buktiUrl = '';
        if (file) {
            let reader = new FileReader();
            reader.onload = async (e) => {
                let base64 = e.target.result;
                let res = await fetch(GAS_UPLOAD_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'upload', file: base64, name: file.name, mimeType: file.type, folderId: DRIVE_FOLDER_ID }) 
                });
                let result = await res.json();
                if (result.success) buktiUrl = result.url;
                await saveToSupabase(desc, amount, bank, buktiUrl);
            };
            reader.readAsDataURL(file);
        } else { 
            await saveToSupabase(desc, amount, bank, ''); 
        }
    }
    
    async function saveToSupabase(desc, amount, bank, buktiUrl) {
        let { error } = await _supabase.from('payment_requests').insert({ 
            company_id: currentCompanyId, 
            request_date: new Date().toISOString().split('T')[0], 
            description: desc, 
            amount: parseInt(amount), 
            bank_account: bank, 
            bukti_url: buktiUrl, 
            requester_email: currentUser?.email, 
            status: 'draft' 
        });
        
        if (error) { 
            document.getElementById('newPaymentMsg').innerHTML = `<div class="alert alert-error">${error.message}</div>`; 
        } else { 
            document.getElementById('newPaymentMsg').innerHTML = '<div class="alert alert-success">✅ Berhasil! Request tersimpan sebagai Draft.</div>'; 
            setTimeout(() => { 
                document.querySelector('.modal-overlay')?.remove(); 
                loadPaymentRequests(); 
                loadDashboard(); 
            }, 1500);
        }
    }

    async function updateBudgetDisplay() {
        let select = document.getElementById('verifyProject');
        let projectCode = select.value;
        let budgetDiv = document.getElementById('budgetDisplay');
        
        if (!projectCode || projectCode === '' || projectCode === 'NEW') {
            budgetDiv.style.display = 'none';
            return;
        }
        
        let req = window.currentVerifikasiReq;
        let projectBudget = await getProjectBudget(projectCode, req.company_id);
        let terpakai = await getTotalTerpakaiProject(projectCode, req.company_id);
        let requestIni = req.amount;
        let totalNanti = terpakai + requestIni;
        let persen = projectBudget.is_unlimited ? 0 : (totalNanti / projectBudget.budget) * 100;
        persen = Math.min(persen, 150);
        
        let warna = '';
        let statusText = '';
        if (projectBudget.is_unlimited) {
            warna = 'unlimited';
            statusText = '⚪ Unlimited (tanpa batas)';
        } else if (persen <= 70) {
            warna = 'safe';
            statusText = '🟢 Aman';
        } else if (persen <= 90) {
            warna = 'warning';
            statusText = '🟡 Mendekati batas';
        } else if (persen <= 100) {
            warna = 'danger';
            statusText = '🟠 Hampir habis';
        } else {
            warna = 'over';
            statusText = '🔴 OVER BUDGET!';
        }
        
        budgetDiv.style.display = 'block';
        budgetDiv.innerHTML = `
            <div class="budget-card">
                <div class="budget-title">🎯 ${projectBudget.name || projectCode}</div>
                <div class="budget-amount">${projectBudget.is_unlimited ? 'Unlimited' : `Rp ${formatNumber(projectBudget.budget)}`}</div>
                <div class="progress-budget">
                    <div class="progress-fill ${warna}" style="width: ${persen}%;">
                        ${!projectBudget.is_unlimited ? `${Math.round(persen)}%` : ''}
                    </div>
                </div>
                <div class="budget-stats">
                    <span>Terpakai: Rp ${formatNumber(terpakai)}</span>
                    <span>Request ini: Rp ${formatNumber(requestIni)}</span>
                    <span>${statusText}</span>
                </div>
                ${!projectBudget.is_unlimited && totalNanti > projectBudget.budget ? 
                    `<div class="alert alert-warning" style="margin-top:0.5rem; padding:0.3rem; font-size:0.7rem;">
                        ⚠️ Melebihi budget Rp ${formatNumber(totalNanti - projectBudget.budget)}
                    </div>` : ''}
            </div>
        `;
    }
    
    function hitungTotalVerifikasi() {

        let dpp = req.amount;

    async function updateVoucherPreview() {
        let req = window.currentVerifikasiReq;
        if (!req) return;
        
        let projectSelect = document.getElementById('verifyProject');
        let projectCode = '';
        
        if (projectSelect.value === 'NEW') {
            projectCode = document.getElementById('newProjectCode')?.value.toUpperCase().trim() || '';

        }
        
        let company = companies.find(c => c.id == req.company_id);
        let companyCode = company?.kode || 'ARK';
        let now = new Date();
        let year = now.getFullYear();
        let month = String(now.getMonth() + 1).padStart(2, '0');
        
        let basePattern = `${companyCode}/${year}/${month}`;
        if (projectCode && projectCode !== '') {
            basePattern += `/${projectCode}`;
        }
        
        let { data } = await _supabase.from('payment_requests').select('voucher_no');
        let lastNumber = 0;
        (data || []).forEach(v => {
            if (v.voucher_no && v.voucher_no.startsWith(basePattern)) {
                let parts = v.voucher_no.split('/');
                let num = parseInt(parts[parts.length - 1]);
                if (num > lastNumber) lastNumber = num;
            }
        });
        let nextNumber = (lastNumber + 1).toString().padStart(3, '0');
        
        let previewText = `${basePattern}/${nextNumber}`;
        if (projectSelect.value === 'NEW' && !projectCode) {
            previewText = `${basePattern}/[KODE]/001 (isi kode project dulu)`;

    async function submitVerifikasiDenganProject(id) {
        let debitAccount = document.getElementById('debitAccount').value;
        let creditAccount = document.getElementById('creditAccount').value;
        let kenaPPN = document.getElementById('kenaPPN')?.checked || false;
        let kenaPPh = document.getElementById('kenaPPh')?.checked || false;
        
        let req = window.currentVerifikasiReq;
        let taxConfig = window.currentTaxConfig;
        
        let dpp = req.amount;
        let ppn = kenaPPN ? Math.round(dpp * (taxConfig.ppn_rate / 100)) : 0;
        let pph = kenaPPh ? Math.round(dpp * 0.02) : 0;
        let total = dpp + ppn - pph;
        
        if (!debitAccount || !creditAccount) { 
            alert('Pilih akun debit dan kredit'); 
            return; 
        }
        
        // Handle project
        let projectSelect = document.getElementById('verifyProject');
        let projectCode = '';
        
        if (projectSelect.value === 'NEW') {
            projectCode = document.getElementById('newProjectCode')?.value.toUpperCase().trim();
            let projectName = document.getElementById('newProjectName')?.value.trim();
            let projectBudget = parseRupiah(document.getElementById('newProjectBudget')?.value);
            
            if (!projectCode) {
                alert('Isi kode project');
                return;
            }
            if (!projectName) {
                alert('Isi nama project');
                return;
            }
            
            let { data: existing } = await _supabase.from('projects')
                .select('*')
                .eq('company_id', req.company_id)
                .eq('code', projectCode);
            
            if (!existing || existing.length === 0) {
                await _supabase.from('projects').insert({
                    company_id: req.company_id,
                    code: projectCode,
                    name: projectName,
                    budget: projectBudget || 0,
                    is_unlimited: projectBudget === 0,
                    created_by: currentUser?.email
                });
                projects = await getProjectList(req.company_id);
            }
        } else {
            projectCode = projectSelect.value;
        }
        
        // Generate voucher
        let company = companies.find(c => c.id == req.company_id);
        let companyCode = company?.kode || 'ARK';
        let now = new Date();
        let year = now.getFullYear();
        let month = String(now.getMonth() + 1).padStart(2, '0');
        
        let basePattern = `${companyCode}/${year}/${month}`;
        if (projectCode && projectCode !== '') {
            basePattern += `/${projectCode}`;
        }
        
        let { data: existingVouchers } = await _supabase.from('payment_requests').select('voucher_no');
        let lastNumber = 0;
        (existingVouchers || []).forEach(v => {
            if (v.voucher_no && v.voucher_no.startsWith(basePattern)) {
                let parts = v.voucher_no.split('/');
                let num = parseInt(parts[parts.length - 1]);
                if (num > lastNumber) lastNumber = num;
            }
        });
        let voucherNo = `${basePattern}/${(lastNumber + 1).toString().padStart(3, '0')}`;
        
        await _supabase.from('payment_requests').update({ 
            status: 'verified', 
            verified_at: new Date(), 
            verified_by: currentUser?.email, 
            debit_account: debitAccount, 
            credit_account: creditAccount, 
            voucher_no: voucherNo, 
            ppn: ppn, 
            pph: pph, 
            total_with_tax: total,
            ppn_rate: taxConfig.ppn_rate,
            is_pkp: taxConfig.is_pkp,
            project_code: projectCode
        }).eq('id', id);
        
        await _supabase.from('payment_logs').insert({ 
            request_id: id, 
            user_email: currentUser?.email, 
            user_role: currentUserRole, 
            old_status: 'submitted', 
            new_status: 'verified', 
            keterangan: `Verifikasi, Voucher: ${voucherNo}, Project: ${projectCode || '-'}, PPN: ${ppn}, PPh: ${pph}` 
        });
        
        showToast(`✅ Diverifikasi! Voucher: ${voucherNo}`, 'success');
        setTimeout(() => { 
            document.querySelector('.modal-overlay')?.remove(); 
            loadPaymentRequests(); 
            loadDashboard(); 
        }, 1500);
    }
    
    async function approvePaymentRequest(id) {

        let confirmed = confirm(

            `ID: #${req.id}\n` +
            `Deskripsi: ${req.description}\n` +
            `Jumlah: Rp ${formatNumber(req.amount)}\n` +
            `Total Transfer: Rp ${formatNumber(req.total_with_tax || req.amount)}\n\n` +
            `Klik OK untuk menyetujui`
        );
        if (!confirmed) return;
        
        let lastJournal = await _supabase.from('journals').select('id').order('id', { ascending: false }).limit(1);
        let journalId = (lastJournal.data?.[0]?.id || 0) + 1;
        let now = new Date();
        let dateStr = now.toISOString().split('T')[0];
        
        await _supabase.from('journals').insert({ 
            id: journalId, 
            company_id: req.company_id, 
            journal_date: dateStr, 
            period: dateStr.substring(0,7), 
            description: `Pembayaran: ${req.description}`, 
            reference: req.voucher_no, 
            created_by: currentUser?.email, 
            status: 'posted' 
        });
        
        await _supabase.from('journal_lines').insert({ 
            journal_id: journalId, 
            account_code: req.debit_account, 
            debit: req.amount, 
            credit: 0, 
            description: `Beban dari ${req.voucher_no}` 
        });
        
        await _supabase.from('journal_lines').insert({ 
            journal_id: journalId, 
            account_code: req.credit_account, 
            debit: 0, 
            credit: req.total_with_tax || req.amount, 
            description: `Transfer ke vendor dari ${req.voucher_no}` 
        });
        
        let suffix = companies.find(c => c.id == req.company_id)?.singkatan || 'A';
        
        if (req.ppn > 0 && req.is_pkp) {
            await _supabase.from('journal_lines').insert({ 
                journal_id: journalId, 
                account_code: `1131-${suffix}`, 
                debit: req.ppn, 
                credit: 0, 
                description: `PPN Masukan dari ${req.voucher_no}` 
            });
        }
        
        if (req.pph > 0) {
            await _supabase.from('journal_lines').insert({ 
                journal_id: journalId, 
                account_code: `2103-03-${suffix}`, 
                debit: 0, 
                credit: req.pph, 
                description: `Utang PPh 23 dari ${req.voucher_no}` 
            });
        }
        
        await _supabase.from('payment_requests').update({ 
            status: 'paid', 
            paid_at: now, 
            approved_by: currentUser?.email, 
            journal_id: journalId 
        }).eq('id', id);
        
        await _supabase.from('payment_logs').insert({ 
            request_id: id, 
            user_email: currentUser?.email, 
            user_role: currentUserRole, 
            old_status: 'verified', 
            new_status: 'paid', 
            keterangan: `Approved, Jurnal: ${journalId}` 
        });
        
        showToast(`✅ Payment approved! Jurnal ID: ${journalId}`, 'success');
        loadPaymentRequests(); 
        loadDashboard();
    }
    
    // ==================== MASTER DATA ====================
    async function loadCustomerList() {
        let cust = await getCustomerList(currentCompanyId);
        let html = `
            <div class="form-card">
                <div class="form-header">
                    <h2><i class="fas fa-users"></i> Data Customer</h2>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead><tr><th>Kode</th><th>Nama</th><th>NPWP</th><th>Telepon</th><th>Email</th></tr></thead>
                        <tbody>${cust.map(c=>`<tr><td>${c.code||'-'}</td><td>${c.name}</td><td>${c.npwp||'-'}</td><td>${c.telp||'-'}</td><td>${c.email||'-'}</td></tr>`).join('')}</tbody>
                    </table>
                </div>
            </div>
        `;
        document.getElementById('content').innerHTML = html;
    }
    
    async function loadProjectList() {
        let proj = await getProjectList(currentCompanyId);
        let html = `
            <div class="form-card">
                <div class="form-header">
                    <h2><i class="fas fa-project-diagram"></i> Data Project</h2>
                    <button class="btn btn-primary" onclick="showAddProjectForm()"><i class="fas fa-plus"></i> Tambah Project</button>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead><tr><th>Kode</th><th>Nama</th><th>Budget</th><th>Status</th></tr></thead>
                        <tbody>${proj.map(p=>`
                            <tr>
                                <td>${p.code||'-'}</td>
                                <td>${p.name}</td>
                                <td class="text-right">${p.is_unlimited ? 'Unlimited' : `Rp ${formatNumber(p.budget)}`}</td>
                                <td><span class="status-badge ${p.is_unlimited ? 'status-draft' : 'status-paid'}">${p.is_unlimited ? 'Unlimited' : 'Limited'}</span></td>
                            </tr>
                        `).join('')}</tbody>
                    </table>
                </div>
            </div>
        `;
        document.getElementById('content').innerHTML = html;
    }
    
    function showAddProjectForm() {
        let modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content">
                <h3><i class="fas fa-plus-circle"></i> Tambah Project Baru</h3>
                <div class="form-group"><label>Kode Project</label><input type="text" id="newProjectCode" class="form-control" placeholder="Contoh: UNQ"></div>
                <div class="form-group"><label>Nama Project</label><input type="text" id="newProjectName" class="form-control" placeholder="Nama project"></div>
                <div class="form-group"><label>Budget (0 = Unlimited)</label><input type="text" id="newProjectBudget" class="form-control" placeholder="Rp 0" onkeyup="formatMoney(this)"></div>
                <div style="display:flex; gap:1rem;"><button class="btn btn-primary" onclick="saveNewProject()">Simpan</button><button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Batal</button></div>
                <div id="addProjectMsg"></div>
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    async function saveNewProject() {
        let code = document.getElementById('newProjectCode').value.toUpperCase();
        let name = document.getElementById('newProjectName').value;
        let budget = parseRupiah(document.getElementById('newProjectBudget').value);
        
        if (!code || !name) {
            document.getElementById('addProjectMsg').innerHTML = '<div class="alert alert-error">Isi semua field</div>';
            return;
        }
        
        let { error } = await _supabase.from('projects').insert({
            company_id: currentCompanyId,
            code: code,
            name: name,
            budget: budget,
            is_unlimited: budget === 0,
            created_by: currentUser?.email
        });
        
        if (error) {
            document.getElementById('addProjectMsg').innerHTML = `<div class="alert alert-error">${error.message}</div>`;
        } else {
            showToast('Project berhasil ditambahkan', 'success');
            document.querySelector('.modal-overlay')?.remove();
            loadProjectList();
        }
    }
    
    async function loadVendorList() {
        let vend = await getVendorList(currentCompanyId);
        let html = `
            <div class="form-card">
                <div class="form-header">
                    <h2><i class="fas fa-truck"></i> Data Vendor</h2>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead><tr><th>Nama</th><th>NPWP</th><th>Bank</th><th>No Rekening</th><th>Termin</th></tr></thead>
                        <tbody>${vend.map(v=>`<tr><td>${v.name}</td><td>${v.npwp||'-'}</td><td>${v.bank_name||'-'}</td><td>${v.bank_account||'-'}</td><td class="text-center">${v.payment_term||30} hari</td></tr>`).join('')}</tbody>
                    </table>
                </div>
            </div>
        `;
        document.getElementById('content').innerHTML = html;
    }
    
    async function loadExportBackupForm() {
        let html = `
            <div class="form-card">
                <div class="form-header">
                    <h2><i class="fas fa-download"></i> Export & Backup Data</h2>
                </div>
                <div class="stats-grid" style="grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="stat-card">
                        <div class="stat-value"><i class="fas fa-file-excel"></i></div>
                        <div class="stat-label">Export ke Excel</div>
                        <button class="btn btn-primary" onclick="exportAllToExcel()" style="margin-top:0.5rem;">Export Semua Data</button>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value"><i class="fas fa-database"></i></div>
                        <div class="stat-label">Backup Data</div>
                        <button class="btn btn-primary" onclick="backupAllData()" style="margin-top:0.5rem;">Download Backup (JSON)</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('content').innerHTML = html;
    }
    
    async function exportAllToExcel() {
        showLoading();
        let tables = ['payment_requests', 'invoices', 'vendor_invoices', 'journals', 'journal_lines', 'projects', 'customers', 'vendors'];
        let allData = {};
        for (let table of tables) {
            let { data } = await _supabase.from(table).select('*');
            allData[table] = data || [];
        }
        let wb = XLSX.utils.book_new();
        for (let [name, data] of Object.entries(allData)) {
            let ws = XLSX.utils.json_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, name);
        }
        XLSX.writeFile(wb, `ERP_Backup_${new Date().toISOString().split('T')[0]}.xlsx`);
        hideLoading();
        showToast('Export Excel berhasil!', 'success');
    }
    
    async function backupAllData() {
        showLoading();
        let tables = ['payment_requests', 'invoices', 'vendor_invoices', 'journals', 'journal_lines', 'projects', 'customers', 'vendors', 'chart_of_accounts', 'user_profiles'];
        let allData = {};
        for (let table of tables) {
            let { data } = await _supabase.from(table).select('*');
            allData[table] = data || [];
        }
        let jsonStr = JSON.stringify(allData, null, 2);
        let blob = new Blob([jsonStr], { type: 'application/json' });
        saveAs(blob, `ERP_Backup_${new Date().toISOString().split('T')[0]}.json`);
        hideLoading();
        showToast('Backup berhasil didownload!', 'success');
    }
    
    async function checkSession() {
        let { data } = await _supabase.auth.getSession();
        if (data.session) {
            let { data: profile } = await _supabase.from('user_profiles').select('*').eq('email', data.session.user.email).single();
            currentUser = data.session.user;
            currentUserRole = profile?.role || 'staff';
            currentCompanyId = profile?.company_id || 1;
            let { data: comps } = await _supabase.from('companies').select('*');
            companies = comps || [];
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appPage').style.display = 'flex';
            document.getElementById('userName').innerText = profile?.name || currentUser.email;
            document.getElementById('userRole').innerText = currentUserRole;
            document.getElementById('userAvatar').innerText = (profile?.name || currentUser.email).charAt(0).toUpperCase();
            renderSidebar();
            loadDashboard();
        }
    }
    
    checkSession();
    </script>
</body>
</html>
