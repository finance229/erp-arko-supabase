<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARKO GROUP | Modern ERP System</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Libraries -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            line-height: 1.5;
        }

        :root {
            --primary: #0f172a;
            --primary-dark: #020617;
            --primary-light: #1e293b;
            --accent: #3b82f6;
            --accent-dark: #2563eb;
            --accent-light: #eff6ff;
            --success: #10b981;
            --success-dark: #059669;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --warning-dark: #d97706;
            --warning-light: #fef3c7;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --danger-light: #fee2e2;
            --info: #8b5cf6;
            --info-light: #ede9fe;
            
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            
            --shadow-xs: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        }

        /* Layout */
        .app {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Premium */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--info));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
        }

        .logo-icon i {
            font-size: 1.2rem;
            color: white;
        }

        .logo-text h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
            letter-spacing: -0.3px;
        }

        .logo-text p {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
        }

        .sidebar-menu {
            padding: 0 1rem;
        }

        .menu-section {
            margin-bottom: 1.5rem;
        }

        .menu-section-title {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.35);
            margin-bottom: 0.75rem;
            padding-left: 0.75rem;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            padding: 0.7rem 1rem;
            color: rgba(255,255,255,0.7);
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 0.25rem;
            transition: all 0.2s ease;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .menu-item i {
            width: 22px;
            font-size: 1rem;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        .menu-item.active {
            background: linear-gradient(90deg, var(--accent), transparent);
            color: white;
        }

        .menu-item.active i {
            color: var(--accent);
        }

        .menu-item.has-dropdown {
            justify-content: space-between;
        }

        .dropdown-menu {
            margin-left: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .menu-item.submenu {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            padding-left: 2.5rem;
        }

        /* Main Content */
        .main {
            flex: 1;
            margin-left: 280px;
            padding: 1.5rem 2rem;
            background: #f1f5f9;
            min-height: 100vh;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-800);
            letter-spacing: -0.02em;
        }

        .company-selector {
            background: white;
            border: 1px solid var(--gray-200);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--gray-700);
            cursor: pointer;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: white;
            padding: 0.4rem 0.8rem 0.4rem 1.2rem;
            border-radius: 40px;
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow-xs);
        }

        .user-info {
            text-align: right;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--gray-800);
        }

        .user-role {
            font-size: 0.65rem;
            color: var(--gray-500);
            text-transform: capitalize;
        }

        .user-avatar {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent), var(--info));
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--gray-400);
            cursor: pointer;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .logout-btn:hover {
            color: var(--danger);
        }

        /* Hero Section */
        .hero-section {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 24px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 50%;
            height: 200%;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-text h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .hero-text p {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .hero-date {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-size: 0.75rem;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 1rem 1.25rem;
            border: 1px solid var(--gray-200);
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            background: var(--accent-light);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon i {
            font-size: 1.2rem;
            color: var(--accent);
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--gray-500);
            font-weight: 500;
        }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .chart-card {
            background: white;
            border-radius: 20px;
            padding: 1rem 1.25rem;
            border: 1px solid var(--gray-200);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .chart-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .chart-title i {
            color: var(--accent);
        }

        .chart-container {
            height: 220px;
            position: relative;
        }

        /* Table Card */
        .table-card {
            background: white;
            border-radius: 20px;
            padding: 1rem 1.25rem;
            border: 1px solid var(--gray-200);
            margin-bottom: 1rem;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .table-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .table-title i {
            color: var(--accent);
        }

        .btn-link {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            padding: 0.75rem 0.5rem;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--gray-500);
            border-bottom: 1px solid var(--gray-200);
        }

        .data-table td {
            padding: 0.75rem 0.5rem;
            font-size: 0.75rem;
            color: var(--gray-600);
            border-bottom: 1px solid var(--gray-100);
        }

        .data-table tr:hover td {
            background: var(--gray-50);
        }

        /* Status Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .status-paid {
            background: var(--success-light);
            color: var(--success-dark);
        }

        .status-submitted {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-verified {
            background: var(--warning-light);
            color: var(--warning-dark);
        }

        .status-draft {
            background: var(--gray-100);
            color: var(--gray-600);
        }

        .status-rejected {
            background: var(--danger-light);
            color: var(--danger-dark);
        }

        /* Form Card */
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 1.25rem;
            border: 1px solid var(--gray-200);
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--gray-200);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--gray-700);
        }

        .form-control {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        /* Filter Card */
        .filter-card {
            background: var(--gray-50);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .filter-grid {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-item {
            flex: 1;
            min-width: 150px;
        }

        .filter-label {
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--gray-500);
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        .filter-select {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--gray-300);
            border-radius: 10px;
            background: white;
            font-size: 0.75rem;
        }

        /* Buttons */
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-secondary {
            background: var(--gray-200);
            color: var(--gray-700);
        }

        .btn-sm {
            padding: 0.25rem 0.6rem;
            font-size: 0.65rem;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--gray-400);
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            color: var(--accent);
            background: var(--gray-100);
        }

        /* Priority Table */
        .priority-table {
            background: white;
            border-radius: 20px;
            padding: 1rem 1.25rem;
            border: 1px solid var(--gray-200);
        }

        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .badge-danger {
            background: var(--danger-light);
            color: var(--danger-dark);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        /* Toast */
        .toast-notify {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            max-width: 350px;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast-success { background: var(--success-light); color: var(--success-dark); border-left: 4px solid var(--success); }
        .toast-error { background: var(--danger-light); color: var(--danger-dark); border-left: 4px solid var(--danger); }
        .toast-warning { background: var(--warning-light); color: var(--warning-dark); border-left: 4px solid var(--warning); }
        .toast-info { background: #dbeafe; color: #1e40af; border-left: 4px solid var(--accent); }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            display: none;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Login Page */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            position: relative;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-xl);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-logo .logo-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 1rem;
        }

        .login-logo h1 {
            font-size: 1.5rem;
            color: var(--gray-800);
        }

        .login-logo p {
            font-size: 0.75rem;
            color: var(--gray-500);
        }

        .alert-error {
            background: var(--danger-light);
            color: var(--danger-dark);
            border-radius: 12px;
            padding: 0.75rem;
            font-size: 0.7rem;
            text-align: center;
        }

        /* Pagination */
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .pagination-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .pagination-btn {
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--gray-300);
            background: white;
            cursor: pointer;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            padding: 0.4rem 1rem;
            background: var(--gray-100);
            border-radius: 8px;
            font-size: 0.75rem;
        }

        /* Text utilities */
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-3 { margin-top: 0.8rem; }

        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; }
            .main { margin-left: 0; padding: 1rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Login Page -->
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon" style="margin: 0 auto 1rem;">
                    <i class="fas fa-building" style="font-size: 1.6rem;"></i>
                </div>
                <h1>ARKO GROUP</h1>
                <p>Enterprise Resource Planning</p>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="admin@arko.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="••••••••">
            </div>
            <button class="btn-primary" id="loginBtn" style="width:100%;">
                <i class="fas fa-arrow-right-to-bracket"></i> Sign In
            </button>
            <div id="loginError" style="display:none;"></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="appPage" class="app" style="display:none">

// ==================== PAYMENT REQUEST FUNCTIONS (MODAL ONLY) ====================

async function viewPaymentDetail(id) {
    showLoading();
    try {
        const { data: req } = await sb.from('payment_requests').select('*').eq('id', id).single();
        if (!req) throw new Error('Data tidak ditemukan');
        
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content">
                <h3 style="margin-bottom: 1rem;"><i class="fas fa-file-invoice"></i> Detail Payment Request #${req.id}</h3>
                <table style="width:100%; border-collapse: collapse;">
                    <tr><td style="padding: 0.5rem; background: var(--gray-50); width: 40%;"><strong>Tanggal</strong></td><td style="padding: 0.5rem;">${formatDate(req.request_date)}</td></tr>
                    <tr><td style="padding: 0.5rem; background: var(--gray-50);"><strong>Deskripsi</strong></td><td style="padding: 0.5rem;">${req.description || '-'}</td></tr>
                    <tr><td style="padding: 0.5rem; background: var(--gray-50);"><strong>Jumlah</strong></td><td style="padding: 0.5rem;">Rp ${formatNumber(req.amount)}</td></tr>
                    <tr><td style="padding: 0.5rem; background: var(--gray-50);"><strong>Status</strong></td><td style="padding: 0.5rem;"><span class="status-badge status-${req.status}">${req.status}</span></td></tr>
                    ${req.bukti_url ? `<tr><td style="padding: 0.5rem; background: var(--gray-50);"><strong>Bukti</strong></td><td style="padding: 0.5rem;"><a href="${req.bukti_url}" target="_blank" class="btn btn-sm btn-primary">Lihat Bukti</a></td></tr>` : ''}
                </table>
                <div style="display: flex; justify-content: flex-end; margin-top: 1.5rem;">
                    <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Tutup</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    } catch (error) {
        showToast('Gagal memuat detail: ' + error.message, 'error');
    } finally {
        hideLoading();
    }
}

// ✅ VERIFY - VERSI MODAL (tanpa confirm)
async function verifyPaymentRequest(id) {
    if (currentUserRole !== 'finance') {
        showToast('Hanya finance yang bisa verifikasi', 'error');
        return;
    }
    
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content" style="max-width: 400px;">
            <div style="padding: 20px;">
                <h3 style="margin-bottom: 1rem;"><i class="fas fa-check-circle" style="color: var(--success);"></i> Verifikasi Payment Request</h3>
                <p>Apakah Anda yakin ingin memverifikasi payment request ini?</p>
                <p style="color: var(--gray-500); font-size: 0.8rem; margin-top: 0.5rem;">Status akan berubah menjadi "verified" dan diteruskan ke direktur untuk approval.</p>
                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem;">
                    <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Batal</button>
                    <button class="btn btn-primary" onclick="confirmVerify(${id})">Ya, Verifikasi</button>
                </div>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
}

async function confirmVerify(id) {
    document.querySelector('.modal-overlay')?.remove();
    showLoading();
    try {
        await sb.from('payment_requests').update({ 
            status: 'verified', 
            verified_at: new Date(), 
            verified_by: currentUser?.email 
        }).eq('id', id);
        
        await sb.from('payment_logs').insert({
            request_id: id,
            user_email: currentUser?.email,
            user_role: currentUserRole,
            old_status: 'submitted',
            new_status: 'verified',
            keterangan: 'Diverifikasi oleh finance'
        });
        
        showToast('✅ Payment request diverifikasi', 'success');
        loadDashboard();
    } catch (error) {
        showToast('Gagal verifikasi: ' + error.message, 'error');
    } finally {
        hideLoading();
    }
}

// ✅ APPROVE - VERSI MODAL (tanpa confirm)
async function approvePaymentRequest(id) {
    if (currentUserRole !== 'direktur') {
        showToast('Hanya direktur yang bisa approve', 'error');
        return;
    }
    
    showLoading();
    let req = null;
    try {
        const { data } = await sb.from('payment_requests').select('*').eq('id', id).single();
        req = data;
    } catch(e) { console.error(e); }
    hideLoading();
    
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content" style="max-width: 500px;">
            <div style="padding: 20px;">
                <h3 style="margin-bottom: 1rem;"><i class="fas fa-thumbs-up" style="color: var(--success);"></i> Approve Payment Request</h3>
                <div style="background: var(--gray-50); padding: 1rem; border-radius: 12px; margin-bottom: 1rem;">
                    <table style="width: 100%; font-size: 0.8rem;">
                        <tr><td style="padding: 4px 0;"><strong>ID</strong></td><td>#${req?.id}</td></tr>
                        <tr><td style="padding: 4px 0;"><strong>Deskripsi</strong></td><td>${req?.description || '-'}</td></tr>
                        <tr><td style="padding: 4px 0;"><strong>Jumlah</strong></td><td>Rp ${formatNumber(req?.amount)}</td></tr>
                        <tr><td style="padding: 4px 0;"><strong>Total Transfer</strong></td><td>Rp ${formatNumber(req?.total_with_tax || req?.amount)}</td></tr>
                    </table>
                </div>
                <p>Apakah Anda yakin ingin menyetujui pembayaran ini?</p>
                <p style="color: var(--warning); font-size: 0.75rem; margin-top: 0.5rem;">
                    <i class="fas fa-info-circle"></i> Sistem akan membuat jurnal otomatis setelah approval.
                </p>
                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem;">
                    <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Batal</button>
                    <button class="btn btn-success" onclick="confirmApprove(${id})">Ya, Setujui</button>
                </div>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
}

async function confirmApprove(id) {
    document.querySelector('.modal-overlay')?.remove();
    showLoading();
    try {
        const { data: req } = await sb.from('payment_requests').select('*').eq('id', id).single();
        
        const lastJournal = await sb.from('journals').select('id').order('id', { ascending: false }).limit(1);
        const journalId = (lastJournal.data?.[0]?.id || 0) + 1;
        const now = new Date();
        const dateStr = now.toISOString().split('T')[0];
        
        await sb.from('journals').insert({
            id: journalId,
            company_id: req.company_id,
            journal_date: dateStr,
            period: dateStr.substring(0,7),
            description: `Pembayaran: ${req.description}`,
            reference: req.voucher_no,
            created_by: currentUser?.email,
            status: 'posted'
        });
        
        await sb.from('payment_requests').update({ 
            status: 'paid', 
            paid_at: now, 
            approved_by: currentUser?.email,
            journal_id: journalId
        }).eq('id', id);
        
        await sb.from('payment_logs').insert({
            request_id: id,
            user_email: currentUser?.email,
            user_role: currentUserRole,
            old_status: 'verified',
            new_status: 'paid',
            keterangan: `Approved, Jurnal: ${journalId}`
        });
        
        showToast(`✅ Payment approved! Jurnal ID: ${journalId}`, 'success');
        loadDashboard();
    } catch (error) {
        showToast('Gagal approve: ' + error.message, 'error');
    } finally {
        hideLoading();
    }
}

// ✅ DELETE - VERSI MODAL
async function deletePaymentRequest(id) {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content" style="max-width: 400px;">
            <div style="padding: 20px;">
                <h3 style="margin-bottom: 1rem;"><i class="fas fa-trash" style="color: var(--danger);"></i> Hapus Payment Request</h3>
                <p>Apakah Anda yakin ingin menghapus payment request ini?</p>
                <p style="color: var(--danger); font-size: 0.75rem; margin-top: 0.5rem;">Tindakan ini tidak dapat dibatalkan!</p>
                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem;">
                    <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Batal</button>
                    <button class="btn btn-danger" onclick="confirmDelete(${id})">Ya, Hapus</button>
                </div>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
}

async function confirmDelete(id) {
    document.querySelector('.modal-overlay')?.remove();
    showLoading();
    try {
        await sb.from('payment_requests').delete().eq('id', id);
        showToast('Payment request berhasil dihapus', 'success');
        loadDashboard();
    } catch (error) {
        showToast('Gagal menghapus: ' + error.message, 'error');
    } finally {
        hideLoading();
    }
}
        
        // ==================== COMPANY CHANGE ====================
        function changeCompany(companyId) {
            currentCompanyId = parseInt(companyId);
            showToast(`Beralih ke perusahaan: ${companies.find(c => c.id == currentCompanyId)?.nama || '-'}`, 'info');
            loadDashboard();
        }
        
        // ==================== CHECK SESSION ====================
        async function checkSession() {
            const { data } = await sb.auth.getSession();
            if (data.session) {
                const { data: profileData } = await sb.from('user_profiles').select('*').eq('email', data.session.user.email);
                const profile = profileData?.[0];
                currentUser = data.session.user;
                currentUserRole = profile?.role || 'staff';
                currentCompanyId = profile?.company_id || 1;
                
                const { data: comps } = await sb.from('companies').select('*');
                companies = comps || [];
                
                // Update company selector
                const selector = document.getElementById('companySelector');
                if (selector) {
                    selector.innerHTML = companies.map(c => `<option value="${c.id}" ${c.id == currentCompanyId ? 'selected' : ''}>${c.nama}</option>`).join('');
                }
                
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('appPage').style.display = 'flex';
                document.getElementById('userName').innerText = profile?.name || currentUser.email;
                document.getElementById('userRole').innerText = currentUserRole;
                document.getElementById('userAvatar').innerText = (profile?.name || currentUser.email).charAt(0).toUpperCase();
                
                renderSidebar();
                loadDashboard();
            }
        }
        
        // ==================== EVENT LISTENERS ====================
        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('companySelector').addEventListener('change', (e) => changeCompany(e.target.value));
        
        // Expose functions to global
        window.showMenu = showMenu;
        window.viewPaymentDetail = viewPaymentDetail;
        window.verifyPaymentRequest = verifyPaymentRequest;
        window.approvePaymentRequest = approvePaymentRequest;
        
        // Start
        checkSession();
    </script>
</body>
