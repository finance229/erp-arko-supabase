            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem;"><div style="background:#f8f9fa; padding:1rem; border-radius:12px;"><h3 style="color:var(--primary);">ASET</h3><div id="openingAsetContainer"></div><button class="btn btn-secondary btn-sm" onclick="addOpeningRow('aset')">+ Tambah Aset</button><div class="mt-2 fw-bold">Total Aset: <span id="totalAsetOpening">Rp 0</span></div></div>
            <div style="background:#f8f9fa; padding:1rem; border-radius:12px;"><h3 style="color:var(--warning);">LIABILITAS</h3><div id="openingLiabilitasContainer"></div><button class="btn btn-secondary btn-sm" onclick="addOpeningRow('liabilitas')">+ Tambah Liabilitas</button><div class="mt-2 fw-bold">Total Liabilitas: <span id="totalLiabilitasOpening">Rp 0</span></div></div>
            <div style="background:#f8f9fa; padding:1rem; border-radius:12px;"><h3 style="color:var(--success);">EKUITAS</h3><div id="openingEkuitasContainer"></div><button class="btn btn-secondary btn-sm" onclick="addOpeningRow('ekuitas')">+ Tambah Ekuitas</button><div class="mt-2 fw-bold">Total Ekuitas: <span id="totalEkuitasOpening">Rp 0</span></div></div></div>
            <div style="margin-top:1rem; padding:1rem; border-radius:12px; background:var(--primary); color:white;"><div style="display:flex; justify-content:space-between;"><span><i class="fas fa-balance-scale"></i> <strong>ASET = LIABILITAS + EKUITAS</strong></span><span id="openingBalanceStatus">Belum Balance</span></div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; margin-top:0.5rem;"><div>Aset: Rp <span id="statusAset">0</span></div><div>Liabilitas: Rp <span id="statusLiabilitas">0</span></div><div>Ekuitas: Rp <span id="statusEkuitas">0</span></div></div>
            <div id="openingSelisih">Selisih: Rp 0</div></div></div>`;
        document.getElementById('content').innerHTML = html;
        window.openingAccounts = accountsList;
        window.openingRowCounter = 0;
        addOpeningRow('aset', true); addOpeningRow('liabilitas', true); addOpeningRow('ekuitas', true);
    }
    
    function addOpeningRow(kategori, isFirst = false) {
        let containerId = `opening${kategori.charAt(0).toUpperCase() + kategori.slice(1)}Container`;
        let container = document.getElementById(containerId);
        if (!container) return;
        window.openingRowCounter++;
        let rowId = `row-${kategori}-${window.openingRowCounter}`;
        let accountOptions = '<option value="">Pilih Akun</option>';
        if (window.openingAccounts) {
            window.openingAccounts.forEach(acc => {
                if (kategori === 'aset' && acc.account_type === 'Aset') accountOptions += `<option value="${acc.account_code}">${acc.account_code} - ${acc.account_name}</option>`;
                else if (kategori === 'liabilitas' && acc.account_type === 'Liabilitas') accountOptions += `<option value="${acc.account_code}">${acc.account_code} - ${acc.account_name}</option>`;
                else if (kategori === 'ekuitas' && acc.account_type === 'Ekuitas') accountOptions += `<option value="${acc.account_code}">${acc.account_code} - ${acc.account_name}</option>`;
            });
        }
        let row = document.createElement('div'); row.id = rowId; row.style.display = 'grid'; row.style.gridTemplateColumns = '2fr 1fr auto'; row.style.gap = '0.5rem'; row.style.marginBottom = '0.5rem';
        row.innerHTML = `<select class="form-control opening-account" data-kategori="${kategori}">${accountOptions}</select><input type="text" class="form-control opening-amount" placeholder="Rp" onkeyup="formatMoney(this); calculateOpeningTotal()">${!isFirst ? `<button class="btn btn-danger btn-sm" onclick="removeOpeningRow('${rowId}')"><i class="fas fa-times"></i></button>` : '<div style="width:32px;"></div>'}`;
        container.appendChild(row);
    }
    
    function removeOpeningRow(rowId) { document.getElementById(rowId)?.remove(); calculateOpeningTotal(); }
    
    function calculateOpeningTotal() {
        let totalAset = 0, totalLiabilitas = 0, totalEkuitas = 0;
        document.querySelectorAll('#openingAsetContainer .opening-amount').forEach(i => totalAset += parseRupiah(i.value));
        document.querySelectorAll('#openingLiabilitasContainer .opening-amount').forEach(i => totalLiabilitas += parseRupiah(i.value));
        document.querySelectorAll('#openingEkuitasContainer .opening-amount').forEach(i => totalEkuitas += parseRupiah(i.value));
        document.getElementById('totalAsetOpening').innerHTML = `Rp ${formatNumber(totalAset)}`;
        document.getElementById('totalLiabilitasOpening').innerHTML = `Rp ${formatNumber(totalLiabilitas)}`;
        document.getElementById('totalEkuitasOpening').innerHTML = `Rp ${formatNumber(totalEkuitas)}`;
        document.getElementById('statusAset').innerHTML = formatNumber(totalAset);
        document.getElementById('statusLiabilitas').innerHTML = formatNumber(totalLiabilitas);
        document.getElementById('statusEkuitas').innerHTML = formatNumber(totalEkuitas);
        let selisih = totalAset - (totalLiabilitas + totalEkuitas);
        document.getElementById('openingSelisih').innerHTML = `Selisih: Rp ${formatNumber(selisih)}`;
        let statusEl = document.getElementById('openingBalanceStatus');
        if (Math.abs(selisih) < 1) { statusEl.innerHTML = '✅ BALANCE'; statusEl.style.color = '#10b981'; }
        else { statusEl.innerHTML = '❌ TIDAK BALANCE'; statusEl.style.color = '#ef4444'; }
    }
    
    async function saveOpeningBalance() {
        let totalAset = parseRupiah(document.getElementById('totalAsetOpening').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        let totalLiabilitas = parseRupiah(document.getElementById('totalLiabilitasOpening').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        let totalEkuitas = parseRupiah(document.getElementById('totalEkuitasOpening').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        if (Math.abs(totalAset - (totalLiabilitas + totalEkuitas)) > 1) { alert('Aset harus sama dengan Liabilitas + Ekuitas!'); return; }
        let companyId = parseInt(document.getElementById('openingCompany').value);
        let tanggal = document.getElementById('openingDate').value;
        let periode = tanggal.substring(0, 7);
        let lines = [];
        document.querySelectorAll('#openingAsetContainer .opening-account').forEach((select, idx) => {
            let account = select.value;
            let amount = parseRupiah(document.querySelectorAll('#openingAsetContainer .opening-amount')[idx]?.value);
            if (account && amount > 0) lines.push({ account_code: account, amount: amount, type: 'Aset' });
        });
        document.querySelectorAll('#openingLiabilitasContainer .opening-account').forEach((select, idx) => {
            let account = select.value;
            let amount = parseRupiah(document.querySelectorAll('#openingLiabilitasContainer .opening-amount')[idx]?.value);
            if (account && amount > 0) lines.push({ account_code: account, amount: amount, type: 'Liabilitas' });
        });
        document.querySelectorAll('#openingEkuitasContainer .opening-account').forEach((select, idx) => {
            let account = select.value;
            let amount = parseRupiah(document.querySelectorAll('#openingEkuitasContainer .opening-amount')[idx]?.value);
            if (account && amount > 0) lines.push({ account_code: account, amount: amount, type: 'Ekuitas' });
        });
        if (lines.length === 0) { alert('Tidak ada data saldo awal yang diinput'); return; }
        showLoading();
        for (let line of lines) {
            let { error } = await supabaseClient.from('opening_balances').insert({
                company_id: companyId, account_code: line.account_code, amount: line.amount, periode: periode, created_by: currentUser?.email
            });
            if (error) { hideLoading(); alert(error.message); return; }
        }
        hideLoading(); alert('✅ Saldo awal berhasil disimpan!'); showMenu('dashboard');
    }
    
    // ==================== EXPORT EXCEL & BACKUP ====================
    async function loadExportBackupForm() {
        let html = `<div class="form-card"><div class="form-header"><h2><i class="fas fa-download"></i> Export & Backup Data</h2></div>
            <div class="stats-grid" style="grid-template-columns:1fr 1fr; gap:1rem;">
                <div class="stat-card"><div class="stat-value"><i class="fas fa-file-excel"></i></div><div class="stat-label">Export ke Excel</div><button class="btn btn-primary" onclick="exportAllToExcel()">Export Semua Tabel</button><button class="btn btn-secondary" onclick="exportTableToExcel('all')">Export Tabel Pilihan</button></div>
                <div class="stat-card"><div class="stat-value"><i class="fas fa-database"></i></div><div class="stat-label">Backup Data</div><button class="btn btn-primary" onclick="backupAllData()">Download Backup (JSON)</button><button class="btn btn-secondary" onclick="restoreBackup()">Restore Backup</button></div>
            </div>
            <div class="alert alert-warning"><i class="fas fa-info-circle"></i> Export Excel: Download data ke file Excel.<br>Backup Data: Download semua data dalam format JSON (bisa untuk restore).</div>
            <div id="exportResult"></div></div>`;
        document.getElementById('content').innerHTML = html;
    }
    
    async function exportAllToExcel() {
        showLoading();
        let tables = ['companies', 'customers', 'projects', 'vendors', 'chart_of_accounts', 'payment_requests', 'invoices', 'invoice_items', 'vendor_invoices', 'vendor_invoice_items', 'journals', 'journal_lines', 'fixed_assets', 'recurring_transactions', 'recurring_lines', 'opening_balances', 'user_profiles'];
        let allData = {};
        for (let table of tables) {
            let { data } = await supabaseClient.from(table).select('*');
            allData[table] = data || [];
        }
        let wb = XLSX.utils.book_new();
        for (let [name, data] of Object.entries(allData)) {
            let ws = XLSX.utils.json_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, name);
        }
        XLSX.writeFile(wb, `ERP_Backup_${new Date().toISOString().split('T')[0]}.xlsx`);
        hideLoading();
        document.getElementById('exportResult').innerHTML = '<div class="alert alert-success">✅ Export Excel berhasil!</div>';
    }
    
    async function exportTableToExcel(tableName) {
        showLoading();
        let { data } = await supabaseClient.from(tableName).select('*');
        let ws = XLSX.utils.json_to_sheet(data || []);
        let wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, tableName);
        XLSX.writeFile(wb, `${tableName}_${new Date().toISOString().split('T')[0]}.xlsx`);
        hideLoading();
        alert(`✅ Export ${tableName} berhasil!`);
    }
    
    async function backupAllData() {
        showLoading();
        let tables = ['companies', 'customers', 'projects', 'vendors', 'chart_of_accounts', 'payment_requests', 'invoices', 'invoice_items', 'vendor_invoices', 'vendor_invoice_items', 'journals', 'journal_lines', 'fixed_assets', 'recurring_transactions', 'recurring_lines', 'opening_balances', 'user_profiles'];
        let allData = {};
        for (let table of tables) {
            let { data } = await supabaseClient.from(table).select('*');
            allData[table] = data || [];
        }
        let jsonStr = JSON.stringify(allData, null, 2);
        let blob = new Blob([jsonStr], { type: 'application/json' });
        saveAs(blob, `ERP_Backup_${new Date().toISOString().split('T')[0]}.json`);
        hideLoading();
        document.getElementById('exportResult').innerHTML = '<div class="alert alert-success">✅ Backup berhasil didownload!</div>';
    }
    
    function restoreBackup() { alert('Upload file backup JSON untuk restore data'); }
    
    function printReport(elementId) {
        let content = document.getElementById(elementId).innerHTML;
        let printWindow = window.open('', '_blank');
        printWindow.document.write(`<html><head><title>Laporan</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>body{font-family:'Inter',sans-serif;padding:30px}.card{background:white;border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.1)}table{width:100%;border-collapse:collapse}th,td{padding:0.8rem;text-align:left;border-bottom:1px solid #e5e7eb}.text-right{text-align:right}.text-center{text-align:center}.fw-bold{font-weight:bold}</style></head><body>${content}</body></html>`);
        printWindow.document.close();
        setTimeout(() => printWindow.print(), 500);
    }
    
    async function checkSession() {
        let { data } = await supabaseClient.auth.getSession();
        if (data.session) {
            let { data: profile } = await supabaseClient.from('user_profiles').select('*').eq('email', data.session.user.email).single();
            currentUser = data.session.user; currentUserRole = profile?.role || 'staff'; currentCompanyId = profile?.company_id || 1;
            let { data: comps } = await supabaseClient.from('companies').select('*'); companies = comps || [];
            document.getElementById('loginPage').style.display = 'none'; document.getElementById('appPage').style.display = 'flex';
            document.getElementById('userName').innerText = profile?.name || currentUser.email; document.getElementById('userRole').innerText = currentUserRole;
            document.getElementById('userAvatar').innerText = (profile?.name || currentUser.email).charAt(0).toUpperCase();
            renderSidebar(); loadDashboard();
        }
    }
    checkSession();
    </script>
