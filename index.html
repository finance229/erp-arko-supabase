<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP ARKO GROUP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; color: #1f2937; line-height: 1.5; }
        :root {
            --primary: #0f172a; --primary-light: #1e293b; --accent: #3b82f6;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
            --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        .app { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: white; border-right: 1px solid var(--gray-200); position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--gray-200); }
        .logo { font-size: 1.3rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; }
        .logo i { color: var(--accent); font-size: 1.5rem; }
        .sidebar-menu { padding: 1rem; }
        .menu-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.7rem 1rem; color: var(--gray-600); border-radius: 10px; cursor: pointer; margin-bottom: 0.2rem; transition: all 0.2s; }
        .menu-item:hover { background: var(--gray-100); color: var(--primary); }
        .menu-item.active { background: var(--primary); color: white; }
        .menu-item.has-dropdown { justify-content: space-between; }
        .dropdown-menu { margin-left: 1rem; border-left: 2px dashed var(--gray-300); margin-bottom: 0.5rem; }
        .menu-item.submenu { padding: 0.4rem 0.8rem; font-size: 0.8rem; padding-left: 2rem; }
        .main { flex: 1; margin-left: 260px; padding: 1.5rem; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; background: white; padding: 0.8rem 1.2rem; border-radius: 12px; box-shadow: var(--shadow); }
        .page-title { font-size: 1.3rem; font-weight: 600; }
        .user-menu { display: flex; align-items: center; gap: 1rem; }
        .user-name { font-weight: 600; font-size: 0.8rem; }
        .user-role { font-size: 0.7rem; color: var(--gray-500); text-transform: capitalize; }
        .user-avatar { width: 36px; height: 36px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
        .logout-btn { background: none; border: none; color: var(--danger); cursor: pointer; }
        .card { background: white; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
        .card h2 { font-size: 1rem; margin-bottom: 0.8rem; border-bottom: 1px solid var(--gray-200); padding-bottom: 0.3rem; display: flex; align-items: center; gap: 0.3rem; }
        .form-card { background: white; border-radius: 16px; padding: 1.2rem; border: 1px solid var(--gray-200); box-shadow: var(--shadow); }
        .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--gray-200); }
        .form-header h2 { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 0.3rem; }
        .form-group { margin-bottom: 0.8rem; }
        .form-group label { display: block; margin-bottom: 0.2rem; font-weight: 500; font-size: 0.75rem; color: var(--gray-700); }
        .form-control { width: 100%; padding: 0.4rem 0.6rem; border: 1px solid var(--gray-300); border-radius: 8px; font-size: 0.8rem; }
        .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }
        .filter-card { background: white; border-radius: 12px; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid var(--gray-200); }
        .filter-grid { display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: flex-end; }
        .filter-item { flex: 1; min-width: 120px; }
        .filter-label { font-size: 0.6rem; font-weight: 600; color: var(--gray-500); margin-bottom: 0.1rem; text-transform: uppercase; }
        .filter-select { width: 100%; padding: 0.3rem 0.5rem; border: 1px solid var(--gray-300); border-radius: 6px; background: white; font-size: 0.75rem; }
        .btn { padding: 0.3rem 0.7rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 500; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 0.3rem; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-sm { padding: 0.2rem 0.4rem; font-size: 0.65rem; }
        .action-btn { background: none; border: none; color: var(--gray-500); cursor: pointer; padding: 0.2rem; border-radius: 4px; }
        .action-btn:hover { color: var(--accent); background: var(--gray-100); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.8rem; margin-bottom: 1rem; }
        .stat-card { background: white; border-radius: 12px; padding: 0.8rem; text-align: center; box-shadow: var(--shadow); }
        .stat-value { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.6rem; color: var(--gray-500); text-transform: uppercase; margin-top: 0.2rem; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1rem; }
        .chart-card { background: white; border-radius: 12px; padding: 0.8rem; box-shadow: var(--shadow); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .chart-title { font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 0.2rem; }
        .chart-container { height: 180px; position: relative; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid var(--gray-200); font-size: 0.7rem; }
        th { background: var(--gray-100); font-weight: 600; color: var(--gray-600); text-transform: uppercase; font-size: 0.6rem; }
        tr:hover td { background: var(--gray-50); }
        .status-badge { padding: 0.1rem 0.4rem; border-radius: 20px; font-size: 0.6rem; font-weight: 600; display: inline-flex; align-items: center; gap: 0.1rem; }
        .status-draft { background: var(--gray-200); color: var(--gray-600); }
        .status-submitted { background: #dbeafe; color: #1e40af; }
        .status-verified { background: #fef3c7; color: #92400e; }
        .status-paid { background: #d1fae5; color: #065f46; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; border-radius: 12px; padding: 1rem; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; display: none; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .alert { padding: 0.5rem; border-radius: 8px; margin-bottom: 0.5rem; font-size: 0.7rem; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary), var(--primary-light)); }
        .login-card { background: white; border-radius: 20px; padding: 1.5rem; width: 100%; max-width: 380px; text-align: center; box-shadow: var(--shadow-lg); }
        .login-logo i { font-size: 2.5rem; color: var(--accent); margin-bottom: 0.3rem; }
        .login-logo h1 { font-size: 1.5rem; margin-bottom: 0.1rem; }
        .welcome-section { background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 16px; padding: 1rem; margin-bottom: 1rem; color: white; display: flex; justify-content: space-between; align-items: center; }
        .welcome-section h1 { font-size: 1.1rem; display: flex; align-items: center; gap: 0.3rem; }
        .welcome-date { background: rgba(255,255,255,0.15); padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-3 { margin-top: 0.8rem; }
        .fw-bold { font-weight: bold; }
        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } .stats-grid { grid-template-columns: 1fr 1fr; } .charts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>
    
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <div class="login-logo"><i class="fas fa-building"></i><h1>ARKO GROUP</h1><p>ERP System</p></div>
            <div class="form-group"><label>Email</label><input type="email" id="loginEmail" class="form-control" placeholder="email@example.com"></div>
            <div class="form-group"><label>Password</label><input type="password" id="loginPassword" class="form-control" placeholder="••••••••"></div>
            <button class="btn btn-primary" style="width:100%" onclick="login()">Login</button>
            <div id="loginError" class="alert alert-error" style="display:none; margin-top:0.5rem;"></div>
        </div>
    </div>
    
    <div id="appPage" class="app" style="display:none">
        <div class="sidebar">
            <div class="sidebar-header"><div class="logo"><i class="fas fa-building"></i> ARKO GROUP</div></div>
            <div class="sidebar-menu" id="sidebarMenu"></div>
        </div>
        <div class="main">
            <div class="top-bar">
                <h1 class="page-title" id="pageTitle">Dashboard</h1>
                <div class="user-menu">
                    <div><div class="user-name" id="userName">Loading...</div><div class="user-role" id="userRole">Loading...</div></div>
                    <div class="user-avatar" id="userAvatar">U</div>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
            <div id="content"></div>
        </div>
    </div>

    <script>
    // ==================== SUPABASE CLIENT (HANYA SEKALI) ====================
    const SUPABASE_URL = 'https://vtkineqwvnuzxxcegofx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0a2luZXF3dm51enh4Y2Vnb2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDU4OTMsImV4cCI6MjA5MDg4MTg5M30.7ygetyHX-_-5JDU-pXS2eP3iLgpI_zP6Gqms1gSY0ys';
    const GAS_UPLOAD_URL = 'https://script.google.com/macros/s/AKfycbzQDc9CUWZELs7iw9a4lDJJPC74jMMZr5savRc-2GTWnuWpFyUytI_zrYYgaCWZfXrMMQ/exec';
    const DRIVE_FOLDER_ID = '15OqEW00HkWJrBEJtPnNPV5jwaMZ24wik';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null, currentUserRole = null, currentCompanyId = 1;
    let companies = [], accounts = [], projects = [], customers = [], vendors = [];
    let statusChart = null, companyChart = null;
    let revenueAccounts = [];
    
    // ==================== FUNGSI HELPER ====================
    function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
    function formatNumber(num) { if (!num) return '0'; return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
    function parseRupiah(str) { if (!str) return 0; let cleaned = str.toString().replace(/[^0-9,-]/g, '').replace(',', '.'); return parseFloat(cleaned) || 0; }
    function formatMoney(input) { let v = input.value.replace(/\./g, '').replace(/[^0-9]/g, ''); input.value = v ? new Intl.NumberFormat('id-ID').format(parseInt(v)) : ''; }
    function formatDate(dateStr) { if (!dateStr) return '-'; let d = new Date(dateStr); return d.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' }); }
    
    async function getCustomerList(companyId) { let { data } = await supabaseClient.from('customers').select('*').eq('company_id', companyId); return data || []; }
    async function getProjectList(companyId) { let { data } = await supabaseClient.from('projects').select('*').eq('company_id', companyId); return data || []; }
    async function getAccountList(companyId) { let { data } = await supabaseClient.from('chart_of_accounts').select('*').eq('company_id', companyId); return data || []; }
    async function getRevenueAccounts(companyId) { let { data } = await supabaseClient.from('chart_of_accounts').select('*').eq('company_id', companyId).eq('account_type', 'Pendapatan'); return data || []; }
    async function getBankList(companyId) { let { data } = await supabaseClient.from('chart_of_accounts').select('*').eq('company_id', companyId).ilike('account_name', '%Bank%'); return data.map(b => ({ code: b.account_code, name: b.account_name, display: b.account_name })); }
    async function getVendorList(companyId) { let { data } = await supabaseClient.from('vendors').select('*').eq('company_id', companyId); return data || []; }
    async function getTaxConfig(companyId) { let configs = { 1: { ppn_rate: 11, is_pkp: true }, 2: { ppn_rate: 1.1, is_pkp: false }, 3: { ppn_rate: 1.1, is_pkp: false }, 4: { ppn_rate: 11, is_pkp: true } }; return configs[companyId] || { ppn_rate: 11, is_pkp: true }; }
    
    // ==================== AUTHENTICATION ====================
    async function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { let err = document.getElementById('loginError'); err.innerText = 'Isi email dan password'; err.style.display = 'block'; return; }
        showLoading();
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) { hideLoading(); let err = document.getElementById('loginError'); err.innerText = error.message; err.style.display = 'block'; return; }
        const { data: profile } = await supabaseClient.from('user_profiles').select('*').eq('email', email).single();
        currentUser = data.user; currentUserRole = profile?.role || 'staff'; currentCompanyId = profile?.company_id || 1;
        const { data: comps } = await supabaseClient.from('companies').select('*'); companies = comps || [];
        document.getElementById('loginPage').style.display = 'none'; document.getElementById('appPage').style.display = 'flex';
        document.getElementById('userName').innerText = profile?.name || email; document.getElementById('userRole').innerText = currentUserRole;
        document.getElementById('userAvatar').innerText = (profile?.name || email).charAt(0).toUpperCase();
        renderSidebar(); loadDashboard(); hideLoading();
    }
    
    async function logout() { await supabaseClient.auth.signOut(); document.getElementById('loginPage').style.display = 'flex'; document.getElementById('appPage').style.display = 'none'; }
    
    function renderSidebar() {
        let menus = [
            { icon: 'fa-chart-pie', label: 'Dashboard', action: 'dashboard', roles: ['direktur', 'finance', 'staff'] },
            { icon: 'fa-book', label: 'Jurnal & Akuntansi', type: 'dropdown', submenus: [
                { icon: 'fa-pen', label: 'Input Jurnal', action: 'jurnal', roles: ['direktur', 'finance'] },
                { icon: 'fa-book', label: 'Buku Besar', action: 'ledger', roles: ['direktur', 'finance'] },
                { icon: 'fa-chart-line', label: 'Laba Rugi', action: 'labarugi', roles: ['direktur', 'finance'] },
                { icon: 'fa-scale-balanced', label: 'Neraca', action: 'neraca', roles: ['direktur', 'finance'] },
                { icon: 'fa-book-open', label: 'Jurnal Umum', action: 'jurnal_umum', roles: ['direktur', 'finance'] }
            ] },
            { icon: 'fa-file-invoice-dollar', label: 'Invoice & Payment', type: 'dropdown', submenus: [
                { icon: 'fa-user', label: 'Invoice Penjualan (AR)', action: 'invoice_penjualan', roles: ['direktur', 'finance'] },
                { icon: 'fa-users', label: 'Invoice Pembelian (AP)', action: 'invoice_pembelian', roles: ['direktur', 'finance'] },
                { icon: 'fa-money-bill-wave', label: 'Payment Request', action: 'payment', roles: ['direktur', 'finance', 'staff'] }
            ] },
            { icon: 'fa-chart-pie', label: 'Manajemen Aset', type: 'dropdown', submenus: [
                { icon: 'fa-clock', label: 'Transaksi Berulang', action: 'recurring', roles: ['direktur', 'finance'] },
                { icon: 'fa-chart-pie', label: 'Manajemen Aset', action: 'aset', roles: ['direktur', 'finance'] },
                { icon: 'fa-scale-balanced', label: 'Saldo Awal', action: 'opening_balance', roles: ['direktur', 'finance'] }
            ] },
            { icon: 'fa-database', label: 'Master Data', type: 'dropdown', submenus: [
                { icon: 'fa-users', label: 'Data Customer', action: 'customers', roles: ['direktur', 'finance'] },
                { icon: 'fa-project-diagram', label: 'Data Project', action: 'projects', roles: ['direktur', 'finance'] }
            ] }
        ];
        let html = '';
        menus.forEach(menu => {
            if (menu.type === 'dropdown') {
                let hasAccess = menu.submenus.some(sub => sub.roles.includes(currentUserRole));
                if (!hasAccess) return;
                html += `<div class="menu-item has-dropdown" onclick="toggleDropdown('${menu.label}')"><i class="fas ${menu.icon}"></i><span style="flex:1;">${menu.label}</span><i class="fas fa-chevron-down" id="arrow-${menu.label}"></i></div><div id="dropdown-${menu.label}" class="dropdown-menu" style="display:none;">`;
                menu.submenus.forEach(sub => { if (sub.roles.includes(currentUserRole)) html += `<div class="menu-item submenu" onclick="showMenu('${sub.action}')"><i class="fas ${sub.icon}"></i> ${sub.label}</div>`; });
                html += `</div>`;
            } else if (menu.roles.includes(currentUserRole)) {
                html += `<div class="menu-item" onclick="showMenu('${menu.action}')"><i class="fas ${menu.icon}"></i> ${menu.label}</div>`;
            }
        });
        document.getElementById('sidebarMenu').innerHTML = html;
    }
    
    function toggleDropdown(label) { let d = document.getElementById(`dropdown-${label}`); let a = document.getElementById(`arrow-${label}`); if (d.style.display === 'none') { d.style.display = 'block'; if(a) a.style.transform = 'rotate(180deg)'; } else { d.style.display = 'none'; if(a) a.style.transform = 'rotate(0deg)'; } }
    
    function showMenu(menu) {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        if (event && event.currentTarget) event.currentTarget.classList.add('active');
        const titles = { dashboard: 'Dashboard', jurnal: 'Input Jurnal', invoice_penjualan: 'Invoice Penjualan', invoice_pembelian: 'Invoice Pembelian', payment: 'Payment Request', ledger: 'Buku Besar', labarugi: 'Laba Rugi', neraca: 'Neraca', jurnal_umum: 'Jurnal Umum', recurring: 'Transaksi Berulang', aset: 'Manajemen Aset', customers: 'Data Customer', projects: 'Data Project', opening_balance: 'Saldo Awal' };
        document.getElementById('pageTitle').innerText = titles[menu] || 'ERP';
        if (menu === 'dashboard') loadDashboard();
        else if (menu === 'jurnal') loadJurnalForm();
        else if (menu === 'invoice_penjualan') loadInvoiceList();
        else if (menu === 'invoice_pembelian') loadVendorInvoiceList();
        else if (menu === 'payment') loadPaymentRequests();
        else if (menu === 'ledger') loadLedgerForm();
        else if (menu === 'labarugi') loadLabaRugiForm();
        else if (menu === 'neraca') loadNeracaForm();
        else if (menu === 'jurnal_umum') loadJurnalUmum();
        else if (menu === 'recurring') loadRecurringList();
        else if (menu === 'aset') loadAsetList();
        else if (menu === 'customers') loadCustomerList();
        else if (menu === 'projects') loadProjectList();
        else if (menu === 'opening_balance') loadOpeningBalanceForm();
    }
    
    // ==================== DASHBOARD ====================
    async function loadDashboard() {
        if (statusChart) statusChart.destroy(); if (companyChart) companyChart.destroy();
        const today = new Date(); const currentMonth = today.getMonth() + 1; const currentYear = today.getFullYear();
        const greeting = today.getHours() < 12 ? 'Selamat Pagi' : today.getHours() < 18 ? 'Selamat Siang' : 'Selamat Malam';
        const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        let companyOptions = '<option value="all">Semua Perusahaan</option>';
        companies.forEach(c => { companyOptions += `<option value="${c.id}">${c.nama}</option>`; });
        let html = `<div class="welcome-section"><div><h1><i class="fas fa-hand-wave"></i> ${greeting}, ${currentUser?.name || 'User'}!</h1><p>Ringkasan keuangan konsolidasi</p></div><div class="welcome-date">${today.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' })}</div></div>
            <div class="filter-card"><div class="filter-grid"><div class="filter-item"><label class="filter-label">Perusahaan</label><select id="dashboardCompany" class="filter-select">${companyOptions}</select></div>
            <div class="filter-item"><label class="filter-label">Bulan</label><select id="dashboardMonth" class="filter-select"><option value="all">Semua Bulan</option>${monthNames.map((m,i)=>`<option value="${i+1}" ${i+1==currentMonth?'selected':''}>${m}</option>`).join('')}</select></div>
            <div class="filter-item"><label class="filter-label">Tahun</label><select id="dashboardYear" class="filter-select"><option value="all">Semua Tahun</option><option value="${currentYear-1}">${currentYear-1}</option><option value="${currentYear}" selected>${currentYear}</option><option value="${currentYear+1}">${currentYear+1}</option></select></div>
            <div class="filter-item"><button class="btn btn-primary" onclick="refreshDashboard()">Perbarui</button></div></div></div>

    async function refreshDashboard() {
        let companyId = document.getElementById('dashboardCompany')?.value || 'all';
        let month = document.getElementById('dashboardMonth')?.value || 'all';
        let year = document.getElementById('dashboardYear')?.value || 'all';
        let query = supabaseClient.from('payment_requests').select('*');
        if (companyId !== 'all') query = query.eq('company_id', parseInt(companyId));
        if (month !== 'all' && year !== 'all') { let start = `${year}-${month.padStart(2,'0')}-01`; let end = `${year}-${month.padStart(2,'0')}-31`; query = query.gte('request_date', start).lte('request_date', end); }
        let { data: payments } = await query.order('created_at', { ascending: false });
        let totalPending = payments?.filter(p => p.status === 'submitted' || p.status === 'verified').reduce((a,b) => a + (b.amount||0), 0) || 0;
        let totalApproved = payments?.filter(p => p.status === 'paid').reduce((a,b) => a + (b.amount||0), 0) || 0;
        document.getElementById('totalKas').innerHTML = `Rp ${formatNumber(totalApproved)}`;
        document.getElementById('totalPending').innerHTML = `Rp ${formatNumber(totalPending)}`;
        document.getElementById('totalApproved').innerHTML = `Rp ${formatNumber(totalApproved)}`;
        document.getElementById('totalRequest').innerHTML = payments?.length || 0;
        let statusData = { draft: 0, submitted: 0, verified: 0, paid: 0, rejected: 0 };
        let companyData = { 1:0, 2:0, 3:0, 4:0 };
        payments?.forEach(p => { statusData[p.status] = (statusData[p.status] || 0) + 1; companyData[p.company_id] = (companyData[p.company_id] || 0) + p.amount; });
        if (statusChart) statusChart.destroy();
        statusChart = new Chart(document.getElementById('statusChart'), { type: 'pie', data: { labels: ['Draft','Submitted','Verified','Paid','Rejected'], datasets: [{ data: [statusData.draft,statusData.submitted,statusData.verified,statusData.paid,statusData.rejected], backgroundColor: ['#9ca3af','#3b82f6','#f59e0b','#10b981','#ef4444'] }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });
        if (companyChart) companyChart.destroy();
        companyChart = new Chart(document.getElementById('companyChart'), { type: 'bar', data: { labels: ['Arko','MMC','USA','MST'], datasets: [{ data: [companyData[1]/1e6, companyData[2]/1e6, companyData[3]/1e6, companyData[4]/1e6], backgroundColor: '#3b82f6' }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: v => 'Rp ' + v + ' Jt' } } } } });
        let tbody = ''; (payments || []).slice(0,5).forEach(p => { let company = companies.find(c => c.id == p.company_id)?.nama || '-'; tbody += `<tr><td>#${p.id}</td><td>${p.request_date || '-'}</td><td>${company}</td><td>${p.description || '-'}</td><td>Rp ${formatNumber(p.amount)}</td><td><span class="status-badge status-${p.status}">${p.status}</span></td><td><button class="action-btn" onclick="viewPaymentRequest(${p.id})"><i class="fas fa-eye"></i></button></td></tr>`; });
        document.getElementById('recentTableBody').innerHTML = tbody || '<tr><td colspan="7">Belum ada data</td></tr>';
    }

            <div class="filter-card"><div class="filter-grid"><div class="filter-item"><label class="filter-label">Status</label><select id="paymentStatusFilter" class="filter-select" onchange="filterPaymentRequests()"><option value="all">Semua</option><option value="draft">Draft</option><option value="submitted">Submitted</option><option value="verified">Verified</option><option value="paid">Paid</option></select></div></div></div>

    function renderPaymentTable(payments) {
        let statusFilter = document.getElementById('paymentStatusFilter')?.value || 'all';
        let filtered = statusFilter === 'all' ? payments : payments?.filter(p => p.status === statusFilter);
        let tbody = '';

            let actions = `<button class="action-btn" onclick="viewPaymentRequest(${p.id})"><i class="fas fa-eye"></i></button>`;

            if (p.status === 'submitted' && currentUserRole === 'finance') actions += ` <button class="action-btn" onclick="verifyPaymentRequest(${p.id})" style="color:var(--success);"><i class="fas fa-check-circle"></i></button>`;

    function showNewPaymentForm() {
        let modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-content"><h3><i class="fas fa-plus"></i> Buat Payment Request</h3>

            <div class="form-group"><label>Jumlah (Rp)</label><input type="number" id="newAmount" class="form-control" placeholder="1000000"></div>
            <div class="form-group"><label>Bank / No Rekening</label><input type="text" id="newBank" class="form-control" placeholder="BCA 1234567890"></div>

            <div style="display:flex; gap:0.5rem; margin-top:0.5rem;"><button class="btn btn-primary" onclick="saveNewPayment()">Simpan</button><button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Batal</button></div>
            <div id="newPaymentMsg" style="margin-top:0.5rem;"></div></div>`;

    async function saveNewPayment() {
        let desc = document.getElementById('newDesc').value, amount = document.getElementById('newAmount').value, bank = document.getElementById('newBank').value, file = document.getElementById('newFile').files[0];
        if (!desc || !amount) { document.getElementById('newPaymentMsg').innerHTML = '<div class="alert alert-error">Isi semua field!</div>'; return; }
        let buktiUrl = '';
        if (file) {
            let reader = new FileReader();
            reader.onload = async (e) => {
                let base64 = e.target.result;
                let res = await fetch(GAS_UPLOAD_URL, { method: 'POST', body: JSON.stringify({ action: 'upload', file: base64, name: file.name, mimeType: file.type, folderId: DRIVE_FOLDER_ID }) });
                let result = await res.json();
                if (result.success) buktiUrl = result.url;
                await saveToSupabase(desc, amount, bank, buktiUrl);
            };
            reader.readAsDataURL(file);
        } else { await saveToSupabase(desc, amount, bank, ''); }
    }
    
    async function saveToSupabase(desc, amount, bank, buktiUrl) {
        let { error } = await supabaseClient.from('payment_requests').insert({ company_id: currentCompanyId, request_date: new Date().toISOString().split('T')[0], description: desc, amount: parseInt(amount), bank_account: bank, bukti_url: buktiUrl, requester_email: currentUser?.email, status: 'draft' });
        if (error) { document.getElementById('newPaymentMsg').innerHTML = `<div class="alert alert-error">${error.message}</div>`; }
        else { document.getElementById('newPaymentMsg').innerHTML = '<div class="alert alert-success">✅ Berhasil!</div>'; setTimeout(() => { document.querySelector('.modal-overlay')?.remove(); loadPaymentRequests(); }, 1500); }
    }
    
    async function submitPaymentRequest(id) { await supabaseClient.from('payment_requests').update({ status: 'submitted', submitted_at: new Date() }).eq('id', id); loadPaymentRequests(); }
    async function verifyPaymentRequest(id) { await supabaseClient.from('payment_requests').update({ status: 'verified', verified_at: new Date(), verified_by: currentUser?.email }).eq('id', id); loadPaymentRequests(); }
    async function approvePaymentRequest(id) { await supabaseClient.from('payment_requests').update({ status: 'paid', paid_at: new Date(), approved_by: currentUser?.email }).eq('id', id); loadPaymentRequests(); }
    async function viewPaymentRequest(id) { let { data } = await supabaseClient.from('payment_requests').select('*').eq('id', id).single(); alert(`Payment #${id}\nDeskripsi: ${data.description}\nJumlah: Rp ${formatNumber(data.amount)}\nStatus: ${data.status}\nBukti: ${data.bukti_url || '-'}`); }

    function showCreateInvoiceForm() {
        showLoading();
        Promise.all([getCustomerList(currentCompanyId), getProjectList(currentCompanyId), getTaxConfig(currentCompanyId), getRevenueAccounts(currentCompanyId), getBankList(currentCompanyId)]).then(([cust, proj, tax, rev, banks]) => {

                <div class="form-group"><label>Perusahaan</label><select id="createInvoiceCompany" class="form-control">${companies.map(c=>`<option value="${c.id}">${c.nama}</option>`).join('')}</select></div>

                <div class="form-group"><label>Project</label><select id="createInvoiceProject" class="form-control searchable-dropdown">${projectOptions}</select></div>
                <div class="form-group"><label>Akun Pendapatan</label><select id="createInvoiceRevenueAccount" class="form-control searchable-dropdown" required>${revenueOptions}</select></div>
                <div class="form-group"><label>Bank Tujuan</label><select id="createInvoiceBank" class="form-control searchable-dropdown" required>${bankOptions}</select></div>
                <div class="row" style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;"><div class="form-group"><label>Tanggal Invoice</label><input type="date" id="createInvoiceDate" class="form-control" value="${today}"></div>
                <div class="form-group"><label>Jatuh Tempo</label><input type="date" id="createInvoiceDueDate" class="form-control" value="${dueDate.toISOString().split('T')[0]}"></div></div>
                <div style="background:#f8f9fa; padding:0.8rem; border-radius:10px;"><h4>Item Barang/Jasa</h4><div id="invoiceItemsContainer"></div><button class="btn btn-secondary btn-sm" onclick="addInvoiceItem()">+ Tambah Item</button></div>

                <div style="background:var(--primary); color:white; padding:0.8rem; border-radius:10px;"><div style="display:flex; justify-content:space-between;"><span>Subtotal</span><span id="invoiceSubtotal">Rp 0</span></div><div style="display:flex; justify-content:space-between;"><span>PPN</span><span id="invoicePPN">Rp 0</span></div><div style="display:flex; justify-content:space-between; font-weight:bold;"><span>TOTAL</span><span id="invoiceTotal">Rp 0</span></div></div>
                <div class="form-group"><label>Catatan</label><textarea id="createInvoiceNotes" class="form-control" rows="1"></textarea></div>
                <div style="display:flex; gap:0.5rem; justify-content:flex-end;"><button class="btn btn-secondary" onclick="loadInvoiceList()">Batal</button><button class="btn btn-primary" onclick="saveInvoice()">Simpan</button></div>
                <div id="createInvoiceResult"></div></div>`;

    function renderInvoiceItem(id) {
        return `<div class="invoice-item" id="invoice-item-${id}" style="display:grid; grid-template-columns:3fr 0.8fr 1fr 0.8fr 1fr auto; gap:0.3rem; margin-bottom:0.3rem;">
            <input type="text" class="item-name form-control" placeholder="Nama Item" value="Item ${id+1}" style="font-size:0.7rem;">
            <input type="number" class="item-qty form-control" placeholder="Qty" value="1" min="1" onchange="calculateInvoiceTotal()" style="font-size:0.7rem;">
            <input type="text" class="item-price form-control" placeholder="Harga" value="0" onkeyup="formatMoney(this)" onblur="calculateInvoiceTotal()" style="font-size:0.7rem;">
            <input type="text" class="item-discount form-control" placeholder="Diskon %" value="0" onchange="calculateInvoiceTotal()" style="font-size:0.7rem;">
            <input type="text" class="item-total form-control" placeholder="Total" readonly style="background:#f0f0f0; font-size:0.7rem;">
            ${id > 0 ? `<button class="btn btn-danger btn-sm" onclick="removeInvoiceItem(${id})"><i class="fas fa-trash"></i></button>` : '<div style="width:24px;"></div>'}
        </div>`;
    }
    
    function addInvoiceItem() { let container = document.getElementById('invoiceItemsContainer'); window.invoiceItemCounter++; let newItem = document.createElement('div'); newItem.innerHTML = renderInvoiceItem(window.invoiceItemCounter); container.appendChild(newItem.firstChild); calculateInvoiceTotal(); }
    function removeInvoiceItem(id) { let item = document.getElementById(`invoice-item-${id}`); if (document.querySelectorAll('.invoice-item').length > 1) { item.remove(); calculateInvoiceTotal(); } else { alert('Minimal satu item harus ada'); } }
    
    function calculateInvoiceTotal() {
        let subtotal = 0;
        document.querySelectorAll('.invoice-item').forEach(item => {
            let qty = parseFloat(item.querySelector('.item-qty')?.value) || 0;
            let price = parseRupiah(item.querySelector('.item-price')?.value);
            let discount = parseFloat(item.querySelector('.item-discount')?.value) || 0;
            let itemTotal = qty * price * (1 - discount / 100);
            subtotal += itemTotal;
            let totalInput = item.querySelector('.item-total');
            if (totalInput) totalInput.value = formatNumber(itemTotal);
        });
        let companyId = parseInt(document.getElementById('createInvoiceCompany')?.value || currentCompanyId);
        let ppnRate = (companyId === 2 || companyId === 3) ? 1.1 : 11;
        let kenaPPN = document.getElementById('createInvoicePPN')?.checked || false;
        let ppn = kenaPPN ? subtotal * ppnRate / 100 : 0;
        document.getElementById('invoiceSubtotal').innerHTML = `Rp ${formatNumber(subtotal)}`;
        document.getElementById('invoicePPN').innerHTML = `Rp ${formatNumber(ppn)}`;
        document.getElementById('invoiceTotal').innerHTML = `Rp ${formatNumber(subtotal + ppn)}`;
        document.getElementById('ppnRateLabel').innerHTML = ppnRate + '%';
    }
    
    async function saveInvoice() {
        let companyId = parseInt(document.getElementById('createInvoiceCompany').value);
        let customerId = parseInt(document.getElementById('createInvoiceCustomer').value);
        let projectId = document.getElementById('createInvoiceProject').value || null;
        let revenueAccount = document.getElementById('createInvoiceRevenueAccount').value;
        let bankCode = document.getElementById('createInvoiceBank').value;
        let invoiceDate = document.getElementById('createInvoiceDate').value;
        let dueDate = document.getElementById('createInvoiceDueDate').value;
        let notes = document.getElementById('createInvoiceNotes').value;
        let items = [];
        let hasError = false;
        document.querySelectorAll('.invoice-item').forEach((item, idx) => {
            let name = item.querySelector('.item-name')?.value;
            let qty = parseFloat(item.querySelector('.item-qty')?.value) || 0;
            let price = parseRupiah(item.querySelector('.item-price')?.value);
            let discount = parseFloat(item.querySelector('.item-discount')?.value) || 0;
            if (!name) { alert(`Item ${idx+1}: Nama harus diisi`); hasError = true; return; }
            let amount = qty * price * (1 - discount / 100);
            items.push({ description: name, quantity: qty, unitPrice: price, discount: discount * price * qty / 100, amount: amount });
        });
        if (hasError) return;
        if (items.length === 0) { alert('Minimal satu item'); return; }
        let subtotal = parseRupiah(document.getElementById('invoiceSubtotal').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        let ppn = parseRupiah(document.getElementById('invoicePPN').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        let total = parseRupiah(document.getElementById('invoiceTotal').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        showLoading();
        let { data, error } = await supabaseClient.from('invoices').insert({
            company_id: companyId, customer_id: customerId, project_id: projectId, revenue_account: revenueAccount, bank_code: bankCode,
            invoice_date: invoiceDate, due_date: dueDate, notes: notes, dpp: subtotal, ppn: ppn, total: total, status: 'draft', created_by: currentUser?.email
        }).select().single();
        if (error) { hideLoading(); document.getElementById('createInvoiceResult').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
        for (let item of items) { await supabaseClient.from('invoice_items').insert({ invoice_id: data.id, description: item.description, quantity: item.quantity, price: item.unitPrice, discount: item.discount, amount: item.amount }); }
        hideLoading(); document.getElementById('createInvoiceResult').innerHTML = `<div class="alert alert-success">✅ Invoice berhasil dibuat! ID: ${data.id}</div>`; setTimeout(() => loadInvoiceList(), 2000);
    }
    
    async function editInvoice(id) {
        let { data: invoice } = await supabaseClient.from('invoices').select('*').eq('id', id).single();
        let { data: items } = await supabaseClient.from('invoice_items').select('*').eq('invoice_id', id);
        let customersList = await getCustomerList(currentCompanyId);
        let projectsList = await getProjectList(currentCompanyId);
        let banksList = await getBankList(currentCompanyId);
        let revenueList = await getRevenueAccounts(currentCompanyId);
        let customerOptions = '<option value="">Pilih Customer</option>'; customersList.forEach(c => { customerOptions += `<option value="${c.id}" ${c.id==invoice.customer_id?'selected':''}>${c.name}</option>`; });
        let projectOptions = '<option value="">Tanpa Project</option>'; projectsList.forEach(p => { projectOptions += `<option value="${p.id}" ${p.id==invoice.project_id?'selected':''}>${p.code} - ${p.name}</option>`; });
        let bankOptions = '<option value="">Pilih Bank</option>'; banksList.forEach(b => { bankOptions += `<option value="${b.code}" ${b.code==invoice.bank_code?'selected':''}>${b.display}</option>`; });
        let revenueOptions = '<option value="">Pilih Akun Pendapatan</option>'; revenueList.forEach(acc => { revenueOptions += `<option value="${acc.account_code}" ${acc.account_code==invoice.revenue_account?'selected':''}>${acc.account_code} - ${acc.account_name}</option>`; });
        let itemsHtml = ''; let idx = 0;
        items.forEach(item => { itemsHtml += renderInvoiceItemForEdit(idx++, item); });
        window.invoiceItemCounter = items.length;
        let ppnRate = (invoice.company_id === 2 || invoice.company_id === 3) ? 1.1 : 11;
        let html = `<div class="form-card"><div class="form-header"><h2><i class="fas fa-edit"></i> Edit Invoice #${invoice.invoice_no || invoice.id}</h2><button class="btn btn-secondary" onclick="loadInvoiceList()">Kembali</button></div>
            <div class="form-group"><label>Perusahaan</label><select id="editInvoiceCompany" class="form-control" disabled><option value="${invoice.company_id}">${companies.find(c=>c.id==invoice.company_id)?.nama}</option></select></div>
            <div class="form-group"><label>Customer</label><select id="editInvoiceCustomer" class="form-control searchable-dropdown" required>${customerOptions}</select></div>
            <div class="form-group"><label>Project</label><select id="editInvoiceProject" class="form-control searchable-dropdown">${projectOptions}</select></div>
            <div class="form-group"><label>Akun Pendapatan</label><select id="editInvoiceRevenueAccount" class="form-control searchable-dropdown" required>${revenueOptions}</select></div>
            <div class="form-group"><label>Bank Tujuan</label><select id="editInvoiceBank" class="form-control searchable-dropdown" required>${bankOptions}</select></div>
            <div class="row" style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;"><div class="form-group"><label>Tanggal Invoice</label><input type="date" id="editInvoiceDate" class="form-control" value="${invoice.invoice_date}"></div>
            <div class="form-group"><label>Jatuh Tempo</label><input type="date" id="editInvoiceDueDate" class="form-control" value="${invoice.due_date}"></div></div>
            <div style="background:#f8f9fa; padding:0.8rem; border-radius:10px;"><h4>Item Barang/Jasa</h4><div id="invoiceItemsContainer">${itemsHtml}</div><button class="btn btn-secondary btn-sm" onclick="addInvoiceItem()">+ Tambah Item</button></div>
            <div style="margin:0.5rem 0;"><label><input type="checkbox" id="editInvoicePPN" ${invoice.ppn>0?'checked':''} onchange="calculateEditInvoiceTotal()"> Kena PPN <span id="editPpnRateLabel">${ppnRate}%</span></label></div>
            <div style="background:var(--primary); color:white; padding:0.8rem; border-radius:10px;"><div style="display:flex; justify-content:space-between;"><span>Subtotal</span><span id="editInvoiceSubtotal">Rp ${formatNumber(invoice.dpp)}</span></div><div style="display:flex; justify-content:space-between;"><span>PPN</span><span id="editInvoicePPN">Rp ${formatNumber(invoice.ppn)}</span></div><div style="display:flex; justify-content:space-between; font-weight:bold;"><span>TOTAL</span><span id="editInvoiceTotal">Rp ${formatNumber(invoice.total)}</span></div></div>
            <div class="form-group"><label>Catatan</label><textarea id="editInvoiceNotes" class="form-control" rows="1">${invoice.notes||''}</textarea></div>
            <div style="display:flex; gap:0.5rem; justify-content:flex-end;"><button class="btn btn-secondary" onclick="loadInvoiceList()">Batal</button><button class="btn btn-primary" onclick="updateInvoice(${id})">Update</button></div>
            <div id="editInvoiceResult"></div></div>`;
        document.getElementById('content').innerHTML = html;
        $('.searchable-dropdown').select2({ width: '100%' });
        window.calculateEditInvoiceTotal = function() {
            let subtotal = 0;
            document.querySelectorAll('.invoice-item').forEach(item => {
                let qty = parseFloat(item.querySelector('.item-qty')?.value) || 0;
                let price = parseRupiah(item.querySelector('.item-price')?.value);
                let discount = parseFloat(item.querySelector('.item-discount')?.value) || 0;
                let itemTotal = qty * price * (1 - discount / 100);
                subtotal += itemTotal;
                let totalInput = item.querySelector('.item-total');
                if (totalInput) totalInput.value = formatNumber(itemTotal);
            });
            let companyId = invoice.company_id;
            let ppnRate = (companyId === 2 || companyId === 3) ? 1.1 : 11;
            let kenaPPN = document.getElementById('editInvoicePPN')?.checked || false;
            let ppn = kenaPPN ? subtotal * ppnRate / 100 : 0;
            document.getElementById('editInvoiceSubtotal').innerHTML = `Rp ${formatNumber(subtotal)}`;
            document.getElementById('editInvoicePPN').innerHTML = `Rp ${formatNumber(ppn)}`;
            document.getElementById('editInvoiceTotal').innerHTML = `Rp ${formatNumber(subtotal + ppn)}`;
        };
        window.calculateEditInvoiceTotal();
    }

            <input type="text" class="item-price form-control" placeholder="Harga" value="${formatNumber(item.price)}" onkeyup="formatMoney(this)" onblur="calculateEditInvoiceTotal()" style="font-size:0.7rem;">
            <input type="text" class="item-discount form-control" placeholder="Diskon %" value="${Math.round((item.discount / (item.price * item.quantity)) * 100)}" onchange="calculateEditInvoiceTotal()" style="font-size:0.7rem;">
            <input type="text" class="item-total form-control" placeholder="Total" readonly value="${formatNumber(item.amount)}" style="font-size:0.7rem;">

    async function updateInvoice(id) {
        let customerId = parseInt(document.getElementById('editInvoiceCustomer').value);
        let projectId = document.getElementById('editInvoiceProject').value || null;
        let revenueAccount = document.getElementById('editInvoiceRevenueAccount').value;
        let bankCode = document.getElementById('editInvoiceBank').value;
        let invoiceDate = document.getElementById('editInvoiceDate').value;
        let dueDate = document.getElementById('editInvoiceDueDate').value;
        let notes = document.getElementById('editInvoiceNotes').value;
        let items = [];
        let hasError = false;
        document.querySelectorAll('.invoice-item').forEach((item, idx) => {
            let name = item.querySelector('.item-name')?.value;
            let qty = parseFloat(item.querySelector('.item-qty')?.value) || 0;
            let price = parseRupiah(item.querySelector('.item-price')?.value);
            let discount = parseFloat(item.querySelector('.item-discount')?.value) || 0;
            if (!name) { alert(`Item ${idx+1}: Nama harus diisi`); hasError = true; return; }
            let amount = qty * price * (1 - discount / 100);
            items.push({ description: name, quantity: qty, unitPrice: price, discount: discount * price * qty / 100, amount: amount });
        });
        if (hasError) return;
        let subtotal = parseRupiah(document.getElementById('editInvoiceSubtotal').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        let ppn = parseRupiah(document.getElementById('editInvoicePPN').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        let total = parseRupiah(document.getElementById('editInvoiceTotal').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        showLoading();
        let { error } = await supabaseClient.from('invoices').update({
            customer_id: customerId, project_id: projectId, revenue_account: revenueAccount, bank_code: bankCode,
            invoice_date: invoiceDate, due_date: dueDate, notes: notes, dpp: subtotal, ppn: ppn, total: total
        }).eq('id', id);
        if (error) { hideLoading(); document.getElementById('editInvoiceResult').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
        await supabaseClient.from('invoice_items').delete().eq('invoice_id', id);
        for (let item of items) { await supabaseClient.from('invoice_items').insert({ invoice_id: id, description: item.description, quantity: item.quantity, price: item.unitPrice, discount: item.discount, amount: item.amount }); }
        hideLoading(); document.getElementById('editInvoiceResult').innerHTML = `<div class="alert alert-success">✅ Invoice berhasil diupdate!</div>`; setTimeout(() => loadInvoiceList(), 2000);
    }
    
    async function postInvoice(id) {
        if (!confirm('Posting invoice akan membuat jurnal otomatis. Lanjutkan?')) return;
        showLoading();
        let { data: invoice } = await supabaseClient.from('invoices').select('*').eq('id', id).single();
        let { data: company } = await supabaseClient.from('companies').select('*').eq('id', invoice.company_id).single();
        let suffix = company.singkatan || 'A';
        let piutangAkun = `1111-${suffix}`;
        let ppnAkun = `2103-01-${suffix}`;
        let lastJournal = await supabaseClient.from('journals').select('id').order('id', { ascending: false }).limit(1);
        let journalId = (lastJournal.data?.[0]?.id || 0) + 1;
        let { error: jError } = await supabaseClient.from('journals').insert({
            id: journalId, company_id: invoice.company_id, journal_date: invoice.invoice_date,
            period: invoice.invoice_date.substring(0,7), description: `Penjualan Invoice ${invoice.invoice_no || id}`,
            reference: invoice.invoice_no || `INV-${id}`, created_by: currentUser?.email, status: 'posted'
        });
        if (jError) { hideLoading(); alert(jError.message); return; }
        await supabaseClient.from('journal_lines').insert([
            { journal_id: journalId, account_code: piutangAkun, debit: invoice.total, credit: 0, description: `Piutang dari invoice ${invoice.invoice_no || id}` },
            { journal_id: journalId, account_code: invoice.revenue_account, debit: 0, credit: invoice.dpp, description: `Pendapatan invoice ${invoice.invoice_no || id}` }
        ]);
        if (invoice.ppn > 0) {
            await supabaseClient.from('journal_lines').insert({ journal_id: journalId, account_code: ppnAkun, debit: 0, credit: invoice.ppn, description: `PPN Keluaran invoice ${invoice.invoice_no || id}` });
        }
        await supabaseClient.from('invoices').update({ status: 'posted' }).eq('id', id);
        hideLoading(); alert(`✅ Invoice berhasil diposting! Jurnal ID: ${journalId}`); loadInvoiceList();
    }
    
    async function recordPayment(id) {
        let amount = prompt('Jumlah pembayaran:', '0');
        if (!amount) return;
        let { data: invoice } = await supabaseClient.from('invoices').select('*').eq('id', id).single();
        let sisa = invoice.total - (invoice.paid_amount || 0);
        if (parseFloat(amount) > sisa) { alert(`Maksimal pembayaran Rp ${formatNumber(sisa)}`); return; }
        let newPaid = (invoice.paid_amount || 0) + parseFloat(amount);
        let newStatus = newPaid >= invoice.total ? 'paid' : 'partial';
        let suffix = (await supabaseClient.from('companies').select('singkatan').eq('id', invoice.company_id).single()).data?.singkatan || 'A';
        let bankAkun = invoice.bank_code;
        let piutangAkun = `1111-${suffix}`;
        let lastJournal = await supabaseClient.from('journals').select('id').order('id', { ascending: false }).limit(1);
        let journalId = (lastJournal.data?.[0]?.id || 0) + 1;
        await supabaseClient.from('journals').insert({
            id: journalId, company_id: invoice.company_id, journal_date: new Date().toISOString().split('T')[0],
            period: new Date().toISOString().substring(0,7), description: `Penerimaan pembayaran invoice ${invoice.invoice_no || id}`,
            reference: invoice.invoice_no || `INV-${id}`, created_by: currentUser?.email, status: 'posted'
        });
        await supabaseClient.from('journal_lines').insert([
            { journal_id: journalId, account_code: bankAkun, debit: parseFloat(amount), credit: 0, description: `Penerimaan dari invoice ${invoice.invoice_no || id}` },
            { journal_id: journalId, account_code: piutangAkun, debit: 0, credit: parseFloat(amount), description: `Lunasi piutang invoice ${invoice.invoice_no || id}` }
        ]);
        await supabaseClient.from('invoices').update({ paid_amount: newPaid, status: newStatus, last_payment_date: new Date().toISOString().split('T')[0] }).eq('id', id);
        alert(`✅ Pembayaran Rp ${formatNumber(amount)} dicatat. Sisa: Rp ${formatNumber(newPaid >= invoice.total ? 0 : invoice.total - newPaid)}`);
        loadInvoiceList();
    }
    
    async function deleteInvoice(id) {
        if (!confirm('Hapus invoice ini? Tindakan tidak bisa dibatalkan!')) return;
        showLoading();
        await supabaseClient.from('invoice_items').delete().eq('invoice_id', id);
        await supabaseClient.from('invoices').delete().eq('id', id);
        hideLoading(); alert('Invoice berhasil dihapus'); loadInvoiceList();
    }

    function generateInvoiceHTML(invoice, items, company, customer, bank) {
        let ppnRate = (invoice.company_id === 2 || invoice.company_id === 3) ? '1.1%' : '11%';
        let itemsHtml = ''; let no = 1;
        items.forEach(item => { itemsHtml += `<tr><td>${no++}</td><td>${item.description}</td><td class="text-center">${item.quantity}</td><td class="text-right">Rp ${formatNumber(item.price)}</td><td class="text-right">Rp ${formatNumber(item.discount)}</td><td class="text-right">Rp ${formatNumber(item.amount)}</td></td>`; });
        function terbilang(angka) { let bilangan = ['', 'Satu', 'Dua', 'Tiga', 'Empat', 'Lima', 'Enam', 'Tujuh', 'Delapan', 'Sembilan', 'Sepuluh', 'Sebelas']; if (angka < 12) return bilangan[angka]; if (angka < 20) return bilangan[angka-10] + ' Belas'; if (angka < 100) return bilangan[Math.floor(angka/10)] + ' Puluh ' + bilangan[angka%10]; if (angka < 200) return 'Seratus ' + terbilang(angka-100); if (angka < 1000) return bilangan[Math.floor(angka/100)] + ' Ratus ' + terbilang(angka%100); if (angka < 1000000) return terbilang(Math.floor(angka/1000)) + ' Ribu ' + terbilang(angka%1000); return terbilang(Math.floor(angka/1000000)) + ' Juta ' + terbilang(angka%1000000); }
        return `<!DOCTYPE html><html><head><title>Invoice ${invoice.invoice_no || '#'+invoice.id}</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>body{font-family:'Inter',sans-serif;background:#f3f4f6;padding:30px}.invoice{max-width:1000px;margin:0 auto;background:white;border-radius:20px;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25)}.header{background:linear-gradient(135deg,#0f172a,#1e293b);padding:30px;color:white}.header-top{display:flex;justify-content:space-between}.logo{width:60px;height:60px;background:#3b82f6;border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:24px}.company-info{display:flex;justify-content:space-between;padding:20px 30px;background:#f8fafc}.customer-section{padding:20px 30px}.meta{padding:15px 30px;background:#f3f4f6;display:flex;gap:30px}.items-table{padding:20px 30px}table{width:100%;border-collapse:collapse}th{background:#0f172a;color:white;padding:12px}td{padding:10px;border-bottom:1px solid #e5e7eb}.summary{padding:20px 30px;background:#f8fafc;text-align:right}.terbilang{padding:20px 30px;background:#e0f2fe;border-left:4px solid #3b82f6}.footer{display:flex;justify-content:space-between;padding:20px 30px;background:#f3f4f6}.print-btn{text-align:center;padding:20px;background:white}button{background:#0f172a;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer}@media print{.print-btn{display:none}body{background:white;padding:0}}</style></head><body><div class="invoice"><div class="header"><div class="header-top"><div class="logo">${company.singkatan||'AG'}</div><div><h2>INVOICE</h2><p>${invoice.invoice_no||'#'+invoice.id}</p></div></div><h1>${company.nama}</h1><p>${company.alamat||''}</p></div><div class="company-info"><div><strong>NPWP:</strong> ${company.npwp||'-'}</div><div>Telp: ${company.telp||'-'}<br>Email: ${company.email||'-'}</div></div><div class="customer-section"><h4>Kepada Yth.</h4><h3>${customer?.name||'Customer'}</h3><p>${customer?.alamat||'-'}<br>NPWP: ${customer?.npwp||'-'}<br>Telp: ${customer?.telp||'-'}</p></div><div class="meta"><div><strong>Tanggal Invoice:</strong> ${invoice.invoice_date}</div><div><strong>Jatuh Tempo:</strong> ${invoice.due_date}</div></div><div class="items-table"><table><thead><tr><th>No</th><th>Deskripsi</th><th class="text-center">Qty</th><th class="text-right">Harga</th><th class="text-right">Diskon</th><th class="text-right">Jumlah</th></tr></thead><tbody>${itemsHtml}</tbody></table></div><div class="summary"><p>Subtotal: Rp ${formatNumber(invoice.dpp)}</p><p>PPN ${ppnRate}: Rp ${formatNumber(invoice.ppn)}</p><h3>Total: Rp ${formatNumber(invoice.total)}</h3></div><div class="terbilang"><strong>Terbilang:</strong> ${terbilang(Math.floor(invoice.total))} Rupiah</div><div class="footer"><div><strong>INFORMASI PEMBAYARAN</strong><br>✓ ${bank?.account_name || bank?.display || 'Bank Tujuan'}<br>Harap sertakan nomor invoice pada referensi transfer</div><div><div style="margin-top:30px; text-align:center;"><div style="border-top:1px solid #000; width:200px;"></div>${company.direktur||'Direktur Utama'}</div></div></div><div class="print-btn"><button onclick="window.print()">🖨️ PRINT / DOWNLOAD PDF</button></div></div></body></html>`;
    }

    function addVendorInvoiceItem() { let container = document.getElementById('vendorInvoiceItemsContainer'); window.vendorItemCounter++; let newItem = document.createElement('div'); newItem.innerHTML = renderVendorInvoiceItem(window.vendorItemCounter); container.appendChild(newItem.firstChild); calculateVendorTotal(); }
    function removeVendorInvoiceItem(id) { let item = document.getElementById(`vendor-item-${id}`); if (document.querySelectorAll('.vendor-item').length > 1) { item.remove(); calculateVendorTotal(); } else { alert('Minimal satu item harus ada'); } }
    
    function calculateVendorTotal() {
        let subtotal = 0;
        document.querySelectorAll('.vendor-item').forEach(item => {
            let qty = parseFloat(item.querySelector('.item-qty')?.value) || 0;
            let price = parseRupiah(item.querySelector('.item-price')?.value);
            let discount = parseFloat(item.querySelector('.item-discount')?.value) || 0;
            let itemTotal = qty * price * (1 - discount / 100);
            subtotal += itemTotal;
            let totalInput = item.querySelector('.item-total');
            if (totalInput) totalInput.value = formatNumber(itemTotal);
        });
        let kenaPPN = document.getElementById('vendorPPN')?.checked || false;
        let kenaPPh = document.getElementById('vendorPPh')?.checked || false;
        let ppn = kenaPPN ? subtotal * 0.11 : 0;
        let pph = kenaPPh ? subtotal * 0.02 : 0;
        let total = subtotal + ppn - pph;
        document.getElementById('vendorDPP').innerHTML = `Rp ${formatNumber(subtotal)}`;
        document.getElementById('vendorPPNAmount').innerHTML = `Rp ${formatNumber(ppn)}`;
        document.getElementById('vendorPPhAmount').innerHTML = `Rp ${formatNumber(pph)}`;
        document.getElementById('vendorTotal').innerHTML = `Rp ${formatNumber(total)}`;
    }

        let select = document.getElementById('vendorSelect');

                    date.setDate(date.getDate() + parseInt(term));
                    document.getElementById('vendorDueDate').value = date.toISOString().split('T')[0];

            }
        }

    async function saveVendorInvoice() {
        let companyId = parseInt(document.getElementById('vendorCompany').value);
        let showNew = document.getElementById('showNewVendor')?.checked || false;
        let vendorId = null, vendorName = '', vendorNpwp = '', vendorBank = '', vendorRekening = '', vendorTerm = 30;
        if (showNew) {
            vendorName = document.getElementById('newVendorName').value;
            vendorNpwp = document.getElementById('newVendorNpwp').value;
            vendorBank = document.getElementById('newVendorBank').value;
            vendorRekening = document.getElementById('newVendorRekening').value;
            vendorTerm = parseInt(document.getElementById('newVendorTerm').value) || 30;
            if (!vendorName) { alert('Nama vendor harus diisi'); return; }
        } else {
            vendorId = document.getElementById('vendorSelect').value;
            if (!vendorId) { alert('Pilih vendor'); return; }
            vendorName = document.getElementById('vendorSelect').options[document.getElementById('vendorSelect').selectedIndex]?.getAttribute('data-name') || '';
        }
        let invoiceNo = document.getElementById('vendorInvoiceNo').value;
        if (!invoiceNo) { alert('Nomor invoice harus diisi'); return; }
        let invoiceDate = document.getElementById('vendorInvoiceDate').value;
        let dueDate = document.getElementById('vendorDueDate').value;
        let accountCode = document.getElementById('vendorAccountCode').value;
        let bankCode = document.getElementById('vendorBankCode').value;
        if (!accountCode) { alert('Pilih akun debet'); return; }
        if (!bankCode) { alert('Pilih bank tujuan'); return; }
        let items = [];
        let hasError = false;
        document.querySelectorAll('.vendor-item').forEach((item, idx) => {
            let name = item.querySelector('.item-name')?.value;
            let qty = parseFloat(item.querySelector('.item-qty')?.value) || 0;
            let price = parseRupiah(item.querySelector('.item-price')?.value);
            let discount = parseFloat(item.querySelector('.item-discount')?.value) || 0;
            if (!name) { alert(`Item ${idx+1}: Nama harus diisi`); hasError = true; return; }
            let amount = qty * price * (1 - discount / 100);
            items.push({ description: name, qty: qty, price: price, discount: discount * price * qty / 100, amount: amount });
        });
        if (hasError) return;
        let file = document.getElementById('vendorInvoiceFile').files[0];
        if (!file) { alert('Upload bukti invoice'); return; }
        let dpp = parseRupiah(document.getElementById('vendorDPP').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        let ppn = parseRupiah(document.getElementById('vendorPPNAmount').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        let pph = parseRupiah(document.getElementById('vendorPPhAmount').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        let total = parseRupiah(document.getElementById('vendorTotal').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        showLoading();
        let reader = new FileReader();
        reader.onload = async (e) => {
            let base64 = e.target.result;
            let res = await fetch(GAS_UPLOAD_URL, { method: 'POST', body: JSON.stringify({ action: 'upload', file: base64, name: file.name, mimeType: file.type, folderId: DRIVE_FOLDER_ID }) });
            let uploadResult = await res.json();
            if (!uploadResult.success) { hideLoading(); document.getElementById('vendorInvoiceResult').innerHTML = `<div class="alert alert-error">Upload gagal: ${uploadResult.message}</div>`; return; }
            let vendorData = { company_id: companyId, vendor_id: vendorId, vendor_name: vendorName, vendor_npwp: vendorNpwp, vendor_bank: vendorBank, vendor_rekening: vendorRekening, vendor_term: vendorTerm, invoice_no: invoiceNo, invoice_date: invoiceDate, due_date: dueDate, bank_code: bankCode, account_code: accountCode, dpp: dpp, ppn: ppn, pph23: pph, total: total, notes: document.getElementById('vendorNotes').value, file_url: uploadResult.url, items: items };
            let { data, error } = await supabaseClient.from('vendor_invoices').insert({
                company_id: companyId, vendor_id: vendorId, vendor_name: vendorName, invoice_no: invoiceNo, invoice_date: invoiceDate, due_date: dueDate,
                bank_code: bankCode, account_code: accountCode, dpp: dpp, ppn: ppn, pph23: pph, total: total, notes: document.getElementById('vendorNotes').value,
                file_url: uploadResult.url, status: 'posted', payment_status: 'unpaid', created_by: currentUser?.email
            }).select().single();
            if (error) { hideLoading(); document.getElementById('vendorInvoiceResult').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
            for (let item of items) { await supabaseClient.from('vendor_invoice_items').insert({ vendor_invoice_id: data.id, description: item.description, qty: item.qty, price: item.price, discount: item.discount, amount: item.amount }); }
            hideLoading(); document.getElementById('vendorInvoiceResult').innerHTML = `<div class="alert alert-success">✅ Invoice vendor berhasil disimpan! ID: ${data.id}</div>`; setTimeout(() => loadVendorInvoiceList(), 2000);
        };
        reader.readAsDataURL(file);
    }

    async function submitVendorPayment(id) {
        let amount = prompt('Jumlah pembayaran:', '0');
        if (!amount) return;
        let { data: invoice } = await supabaseClient.from('vendor_invoices').select('*').eq('id', id).single();
        let sisa = invoice.total - (invoice.paid_amount || 0);
        if (parseFloat(amount) > sisa) { alert(`Maksimal pembayaran Rp ${formatNumber(sisa)}`); return; }
        let newPaid = (invoice.paid_amount || 0) + parseFloat(amount);
        let newStatus = newPaid >= invoice.total ? 'paid' : 'partial';
        let bankCode = prompt('Kode Bank (contoh: 1102-01-A):', invoice.bank_code);
        if (!bankCode) return;
        let suffix = (await supabaseClient.from('companies').select('singkatan').eq('id', invoice.company_id).single()).data?.singkatan || 'A';
        let utangAkun = `2111-${suffix}`;
        let lastJournal = await supabaseClient.from('journals').select('id').order('id', { ascending: false }).limit(1);
        let journalId = (lastJournal.data?.[0]?.id || 0) + 1;
        await supabaseClient.from('journals').insert({
            id: journalId, company_id: invoice.company_id, journal_date: new Date().toISOString().split('T')[0],
            period: new Date().toISOString().substring(0,7), description: `Pembayaran invoice ${invoice.invoice_no}`,
            reference: invoice.invoice_no, created_by: currentUser?.email, status: 'posted'
        });
        await supabaseClient.from('journal_lines').insert([
            { journal_id: journalId, account_code: utangAkun, debit: parseFloat(amount), credit: 0, description: `Pembayaran invoice ${invoice.invoice_no}` },
            { journal_id: journalId, account_code: bankCode, debit: 0, credit: parseFloat(amount), description: `Transfer ke ${invoice.vendor_name}` }
        ]);
        await supabaseClient.from('vendor_invoices').update({ paid_amount: newPaid, payment_status: newStatus, last_payment_date: new Date().toISOString().split('T')[0] }).eq('id', id);
        alert(`✅ Pembayaran Rp ${formatNumber(amount)} dicatat. Sisa: Rp ${formatNumber(newPaid >= invoice.total ? 0 : invoice.total - newPaid)}`);
        loadVendorInvoiceList();
    }

    async function refreshJurnalUmum() {

        let endDate = document.getElementById('juEnd').value;
        showLoading();
        let query = supabaseClient.from('journals').select('*, journal_lines(*)').gte('journal_date', startDate).lte('journal_date', endDate).order('journal_date', { ascending: false });

        let html = '<div class="table-container"><table class="table"><thead><tr><th>Tanggal</th><th>Deskripsi</th><th>Akun</th><th>Debit</th><th>Kredit</th><th>Aksi</th></tr></thead><tbody>';
        for (let j of data) {
            let firstLine = true;
            for (let line of j.journal_lines) {
                html += `<tr class="${firstLine ? 'journal-header' : ''}">
                    ${firstLine ? `<td rowspan="${j.journal_lines.length}">${j.journal_date}</td><td rowspan="${j.journal_lines.length}">${j.description}</td>` : ''}
                    <td>${line.account_code}</td>
                    <td class="text-right">${line.debit > 0 ? formatNumber(line.debit) : '-'}</td>

                    ${firstLine ? `<td rowspan="${j.journal_lines.length}"><button class="action-btn" onclick="editJournal(${j.id})"><i class="fas fa-edit"></i></button><button class="action-btn" onclick="deleteJournal(${j.id})"><i class="fas fa-trash"></i></button></td>` : ''}
                </tr>`;

            }
        }
        html += '</tbody></table></div>';
        document.getElementById('jurnalUmumContainer').innerHTML = html;
        hideLoading();

            <div class="form-group"><label>Deskripsi</label><input type="text" id="editJournalDesc" class="form-control" value="${journal.description}"></div>

            <button class="btn btn-secondary btn-sm" onclick="addEditJournalLine()">+ Tambah Baris</button>

            <div style="display:flex; gap:0.5rem; justify-content:flex-end;"><button class="btn btn-danger" onclick="deleteJournal(${journal.id})">Hapus</button><button class="btn btn-primary" onclick="saveEditJournal(${journal.id})">Simpan</button></div>
            <div id="editJournalResult"></div></div>`;
        document.getElementById('content').innerHTML = html;
        $('.account-select').each(function() { $(this).html(accountOptions); });
        journal.journal_lines.forEach((line, idx) => { $(`#edit-line-${idx} .account-select`).val(line.account_code); });
        window.editLineCounter = journal.journal_lines.length;
        updateEditJournalTotal();
    }
    
    function addEditJournalLine() {
        let accountOptions = '<option value="">Pilih Akun</option>'; accounts.forEach(a => { accountOptions += `<option value="${a.account_code}">${a.account_code} - ${a.account_name}</option>`; });
        let lines = document.getElementById('editJournalLines');
        let lineId = window.editLineCounter++;
        let newLine = document.createElement('div'); newLine.className = 'journal-line'; newLine.id = `edit-line-${lineId}`;
        newLine.style.display = 'grid'; newLine.style.gridTemplateColumns = '2fr 1fr 1fr 1.5fr auto'; newLine.style.gap = '0.3rem'; newLine.style.marginBottom = '0.3rem';
        newLine.innerHTML = `<select class="account-select form-control">${accountOptions}</select><input type="text" class="debit-input form-control" placeholder="Debit" onkeyup="formatMoney(this)"><input type="text" class="credit-input form-control" placeholder="Kredit" onkeyup="formatMoney(this)"><input type="text" class="desc-input form-control" placeholder="Keterangan"><button class="btn btn-danger btn-sm" onclick="removeEditJournalLine(${lineId})"><i class="fas fa-trash"></i></button>`;
        lines.appendChild(newLine);
        $(`#edit-line-${lineId} .account-select`).select2({ width: '100%' });
    }
    
    function removeEditJournalLine(id) { let line = document.getElementById(`edit-line-${id}`); if (document.querySelectorAll('#editJournalLines .journal-line').length > 1) { line.remove(); updateEditJournalTotal(); } else { alert('Minimal satu baris harus ada'); } }
    
    function updateEditJournalTotal() {
        let totalDebit = 0, totalCredit = 0;
        document.querySelectorAll('#editJournalLines .journal-line').forEach(item => {
            totalDebit += parseRupiah(item.querySelector('.debit-input')?.value);
            totalCredit += parseRupiah(item.querySelector('.credit-input')?.value);
        });
        document.getElementById('editTotalSelisih').innerHTML = `Rp ${formatNumber(totalDebit - totalCredit)}`;
    }
    
    async function saveEditJournal(id) {
        let lines = [];
        let totalDebit = 0, totalCredit = 0;
        document.querySelectorAll('#editJournalLines .journal-line').forEach(item => {
            let account = item.querySelector('.account-select').value;
            let debit = parseRupiah(item.querySelector('.debit-input').value);
            let credit = parseRupiah(item.querySelector('.credit-input').value);
            let desc = item.querySelector('.desc-input').value;
            if (!account) { alert('Pilih akun untuk semua baris'); return; }
            totalDebit += debit; totalCredit += credit;
            lines.push({ account_code: account, debit, credit, description: desc });
        });
        if (Math.abs(totalDebit - totalCredit) > 0.01) { alert('Total debit harus sama dengan total kredit'); return; }
        let journalDate = document.getElementById('editJournalDate').value;
        let description = document.getElementById('editJournalDesc').value;
        showLoading();
        let { error } = await supabaseClient.from('journals').update({
            journal_date: journalDate, period: journalDate.substring(0,7), description: description
        }).eq('id', id);
        if (error) { hideLoading(); document.getElementById('editJournalResult').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
        await supabaseClient.from('journal_lines').delete().eq('journal_id', id);
        for (let line of lines) {
            await supabaseClient.from('journal_lines').insert({ journal_id: id, account_code: line.account_code, debit: line.debit, credit: line.credit, description: line.description });
        }
        hideLoading(); document.getElementById('editJournalResult').innerHTML = `<div class="alert alert-success">✅ Jurnal berhasil diupdate!</div>`; setTimeout(() => loadJurnalUmum(), 2000);
    }
    
    async function deleteJournal(id) {
        if (!confirm('Hapus jurnal ini? Tindakan tidak bisa dibatalkan!')) return;
        showLoading();
        await supabaseClient.from('journal_lines').delete().eq('journal_id', id);
        await supabaseClient.from('journals').delete().eq('id', id);
        hideLoading(); alert('Jurnal berhasil dihapus'); loadJurnalUmum();
    }
