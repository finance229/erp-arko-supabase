<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP ARKO GROUP - Complete System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; color: #1f2937; line-height: 1.5; }
        :root {
            --primary: #0f172a; --primary-light: #1e293b; --accent: #3b82f6;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-500: #6b7280; --gray-600: #4b5563;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }
        .app { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: white; border-right: 1px solid var(--gray-200); position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--gray-200); }
        .logo { font-size: 1.3rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; }
        .logo i { color: var(--accent); font-size: 1.5rem; }
        .sidebar-menu { padding: 1rem; }
        .menu-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.7rem 1rem; color: var(--gray-600); border-radius: 10px; cursor: pointer; margin-bottom: 0.2rem; }
        .menu-item:hover { background: var(--gray-100); color: var(--primary); }
        .menu-item.active { background: var(--primary); color: white; }
        .menu-item.has-dropdown { justify-content: space-between; }
        .dropdown-menu { margin-left: 1rem; border-left: 2px dashed var(--gray-300); margin-bottom: 0.5rem; }
        .menu-item.submenu { padding: 0.4rem 0.8rem; font-size: 0.8rem; padding-left: 2rem; }
        .main { flex: 1; margin-left: 260px; padding: 1.5rem; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; background: white; padding: 0.8rem 1.2rem; border-radius: 12px; box-shadow: var(--shadow); }
        .page-title { font-size: 1.3rem; font-weight: 600; }
        .user-menu { display: flex; align-items: center; gap: 1rem; }
        .user-name { font-weight: 600; font-size: 0.8rem; }
        .user-role { font-size: 0.7rem; color: var(--gray-500); text-transform: capitalize; }
        .user-avatar { width: 36px; height: 36px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
        .logout-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem; }
        .card { background: white; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
        .card h2 { font-size: 1rem; margin-bottom: 0.8rem; border-bottom: 1px solid var(--gray-200); padding-bottom: 0.3rem; }
        .form-card { background: white; border-radius: 16px; padding: 1.2rem; border: 1px solid var(--gray-200); box-shadow: var(--shadow); }
        .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--gray-200); }
        .form-header h2, .form-header h3 { font-size: 1.1rem; font-weight: 600; }
        .form-group { margin-bottom: 0.8rem; }
        .form-group label { display: block; margin-bottom: 0.2rem; font-weight: 500; font-size: 0.75rem; color: var(--gray-600); }
        .form-control { width: 100%; padding: 0.4rem 0.6rem; border: 1px solid var(--gray-300); border-radius: 8px; font-size: 0.8rem; }
        .filter-card { background: white; border-radius: 12px; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid var(--gray-200); }
        .filter-grid { display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: flex-end; }
        .filter-item { flex: 1; min-width: 120px; }
        .filter-label { font-size: 0.6rem; font-weight: 600; color: var(--gray-500); margin-bottom: 0.1rem; text-transform: uppercase; }
        .filter-select { width: 100%; padding: 0.3rem 0.5rem; border: 1px solid var(--gray-300); border-radius: 6px; background: white; font-size: 0.75rem; }
        .btn { padding: 0.3rem 0.7rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 500; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 0.3rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-secondary { background: var(--gray-200); color: var(--gray-600); }
        .action-btn { background: none; border: none; color: var(--gray-500); cursor: pointer; padding: 0.2rem; border-radius: 4px; }
        .action-btn:hover { color: var(--accent); background: var(--gray-100); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.8rem; margin-bottom: 1rem; }
        .stat-card { background: white; border-radius: 12px; padding: 0.8rem; text-align: center; box-shadow: var(--shadow); }
        .stat-value { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.6rem; color: var(--gray-500); text-transform: uppercase; margin-top: 0.2rem; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1rem; }
        .chart-card { background: white; border-radius: 12px; padding: 0.8rem; box-shadow: var(--shadow); }
        .chart-container { height: 180px; position: relative; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid var(--gray-200); font-size: 0.7rem; }
        th { background: var(--gray-100); font-weight: 600; color: var(--gray-600); text-transform: uppercase; font-size: 0.6rem; }
        .status-badge { padding: 0.1rem 0.4rem; border-radius: 20px; font-size: 0.6rem; font-weight: 600; display: inline-flex; align-items: center; gap: 0.1rem; }
        .status-draft { background: var(--gray-200); color: var(--gray-600); }
        .status-submitted { background: #dbeafe; color: #1e40af; }
        .status-verified { background: #fef3c7; color: #92400e; }
        .status-paid { background: #d1fae5; color: #065f46; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; border-radius: 12px; padding: 1rem; max-width: 700px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; display: none; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .alert { padding: 0.5rem; border-radius: 8px; margin-bottom: 0.5rem; font-size: 0.7rem; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-info { background: #dbeafe; color: #1e40af; }
        .toast-notify { position: fixed; bottom: 20px; right: 20px; z-index: 9999; padding: 0.75rem 1.25rem; border-radius: 12px; font-size: 0.85rem; font-weight: 500; max-width: 350px; animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 0.5rem; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .toast-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .budget-card { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 16px; padding: 1rem; color: white; margin-bottom: 1rem; }
        .budget-title { font-size: 0.7rem; opacity: 0.7; margin-bottom: 0.3rem; }
        .budget-amount { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
        .progress-budget { background: rgba(255,255,255,0.2); border-radius: 30px; height: 24px; width: 100%; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 30px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; color: white; font-size: 10px; font-weight: 700; }
        .progress-fill.safe { background: linear-gradient(90deg, #10b981, #34d399); }
        .progress-fill.warning { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .progress-fill.danger { background: linear-gradient(90deg, #ea580c, #f97316); }
        .progress-fill.over { background: linear-gradient(90deg, #dc2626, #ef4444); }
        .progress-fill.unlimited { background: linear-gradient(90deg, #9ca3af, #d1d5db); }
        .pagination-container { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .pagination-btn { padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid var(--gray-300); background: white; cursor: pointer; }
        .page-info { padding: 0.4rem 1rem; background: var(--gray-100); border-radius: 8px; font-size: 0.8rem; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 0.5rem; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary), var(--primary-light)); }
        .login-card { background: white; border-radius: 20px; padding: 1.5rem; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .login-logo i { font-size: 2.5rem; color: var(--accent); margin-bottom: 0.3rem; }
        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } .stats-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>
    
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <div class="login-logo"><i class="fas fa-building"></i><h1>ARKO GROUP</h1><p>ERP System</p></div>
            <div class="form-group"><label>Email</label><input type="email" id="loginEmail" class="form-control" placeholder="email@example.com"></div>
            <div class="form-group"><label>Password</label><input type="password" id="loginPassword" class="form-control" placeholder="••••••••"></div>
            <button class="btn btn-primary" style="width:100%" id="loginBtn">Login</button>
            <div id="loginError" class="alert alert-error" style="display:none; margin-top:0.5rem;"></div>
        </div>
    </div>
    
    <div id="appPage" class="app" style="display:none">
        <div class="sidebar">
            <div class="sidebar-header"><div class="logo"><i class="fas fa-building"></i> ARKO GROUP</div></div>
            <div class="sidebar-menu" id="sidebarMenu"></div>
        </div>
        <div class="main">
            <div class="top-bar">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <h1 class="page-title" id="pageTitle">Dashboard</h1>
                    <select id="companySelector" class="filter-select" style="width: 180px;"></select>
                </div>
                <div class="user-menu">
                    <div><div class="user-name" id="userName">Loading...</div><div class="user-role" id="userRole">Loading...</div></div>
                    <div class="user-avatar" id="userAvatar">U</div>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
            <div id="content"></div>
        </div>
    </div>

    <script>
    // ==================== KONFIGURASI ====================
    const SUPABASE_URL = 'https://vtkineqwvnuzxxcegofx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0a2luZXF3dm51enh4Y2Vnb2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDU4OTMsImV4cCI6MjA5MDg4MTg5M30.7ygetyHX-_-5JDU-pXS2eP3iLgpI_zP6Gqms1gSY0ys';
    const GAS_UPLOAD_URL = 'https://script.google.com/macros/s/AKfycbzQDc9CUWZELs7iw9a4lDJJPC74jMMZr5savRc-2GTWnuWpFyUytI_zrYYgaCWZfXrMMQ/exec';
    const DRIVE_FOLDER_ID = '15OqEW00HkWJrBEJtPnNPV5jwaMZ24wik';
    
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null, currentUserRole = null, currentCompanyId = 1;
    let companies = [];
    let statusChart = null, companyChart = null;
    let currentPaymentPage = 1, currentPaymentPageSize = 20, totalPaymentPages = 1, totalPaymentItems = 0;
    let currentVerifikasiReq = null, currentTaxConfig = null;
    
    // ==================== HELPER FUNCTIONS ====================
    function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
    function formatNumber(num) { if (!num && num !== 0) return '0'; return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
    function parseRupiah(str) { if (!str) return 0; let cleaned = str.toString().replace(/[^0-9,-]/g, '').replace(',', '.'); return parseFloat(cleaned) || 0; }
    function formatMoney(input) { let v = input.value.replace(/\./g, '').replace(/[^0-9]/g, ''); input.value = v ? new Intl.NumberFormat('id-ID').format(parseInt(v)) : ''; }
    function formatDate(dateStr) { if (!dateStr) return '-'; let d = new Date(dateStr); return d.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' }); }
    function showToast(message, type) { 
        const toast = document.createElement('div');
        toast.className = `toast-notify toast-${type || 'success'}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    async function getCustomerList(companyId) { let { data } = await sb.from('customers').select('*').eq('company_id', companyId); return data || []; }
    async function getProjectList(companyId) { let { data } = await sb.from('projects').select('*').eq('company_id', companyId); return data || []; }
    async function getAccountList(companyId) { let { data } = await sb.from('chart_of_accounts').select('*').eq('company_id', companyId); return data || []; }
    async function getRevenueAccounts(companyId) { let { data } = await sb.from('chart_of_accounts').select('*').eq('company_id', companyId).eq('account_type', 'Pendapatan'); return data || []; }
    async function getBankList(companyId) { let { data } = await sb.from('chart_of_accounts').select('*').eq('company_id', companyId).ilike('account_name', '%Bank%'); return data.map(b => ({ code: b.account_code, name: b.account_name, display: b.account_name })); }
    async function getVendorList(companyId) { let { data } = await sb.from('vendors').select('*').eq('company_id', companyId); return data || []; }
    async function getTaxConfig(companyId) { let configs = { 1: { ppn_rate: 11, is_pkp: true }, 2: { ppn_rate: 1.1, is_pkp: false }, 3: { ppn_rate: 1.1, is_pkp: false }, 4: { ppn_rate: 11, is_pkp: true } }; return configs[companyId] || { ppn_rate: 11, is_pkp: true }; }
    
    // ==================== AUTHENTICATION ====================
    async function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { let err = document.getElementById('loginError'); err.innerText = 'Isi email dan password'; err.style.display = 'block'; return; }
        showLoading();
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { hideLoading(); let err = document.getElementById('loginError'); err.innerText = error.message; err.style.display = 'block'; return; }
        const { data: profileData } = await sb.from('user_profiles').select('*').eq('email', email);
        const profile = profileData?.[0];
        currentUser = data.user; currentUserRole = profile?.role || 'staff'; currentCompanyId = profile?.company_id || 1;
        const { data: comps } = await sb.from('companies').select('*');
        if (currentUserRole === 'direktur') companies = comps || [];
        else companies = (comps || []).filter(c => c.id === currentCompanyId);
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('appPage').style.display = 'flex';
        document.getElementById('userName').innerText = profile?.name || email;
        document.getElementById('userRole').innerText = currentUserRole;
        document.getElementById('userAvatar').innerText = (profile?.name || email).charAt(0).toUpperCase();
        renderSidebar();
        loadDashboard();
        hideLoading();
    }
    
    function logout() { sb.auth.signOut(); document.getElementById('loginPage').style.display = 'flex'; document.getElementById('appPage').style.display = 'none'; }
    
    function renderSidebar() {
        let menus = [
            { icon: 'fa-chart-pie', label: 'Dashboard', action: 'dashboard', roles: ['direktur', 'finance', 'staff'] },
            { icon: 'fa-file-invoice-dollar', label: 'Invoice & Payment', type: 'dropdown', submenus: [
                { icon: 'fa-user', label: 'Invoice Penjualan (AR)', action: 'invoice_penjualan', roles: ['direktur', 'finance'] },
                { icon: 'fa-users', label: 'Invoice Pembelian (AP)', action: 'invoice_pembelian', roles: ['direktur', 'finance'] },
                { icon: 'fa-money-bill-wave', label: 'Payment Request', action: 'payment', roles: ['direktur', 'finance', 'staff'] }
            ] },
            { icon: 'fa-database', label: 'Master Data', type: 'dropdown', submenus: [
                { icon: 'fa-users', label: 'Data Customer', action: 'customers', roles: ['direktur', 'finance'] },
                { icon: 'fa-project-diagram', label: 'Data Project', action: 'projects', roles: ['direktur', 'finance'] },
                { icon: 'fa-truck', label: 'Data Vendor', action: 'vendors', roles: ['direktur', 'finance'] }
            ] }
        ];
        let html = '';
        menus.forEach(menu => {
            if (menu.type === 'dropdown') {
                let hasAccess = menu.submenus.some(sub => sub.roles.includes(currentUserRole));
                if (!hasAccess) return;
                html += `<div class="menu-item has-dropdown" onclick="toggleDropdown('${menu.label}')"><i class="fas ${menu.icon}"></i><span style="flex:1;">${menu.label}</span><i class="fas fa-chevron-down" id="arrow-${menu.label}"></i></div><div id="dropdown-${menu.label}" class="dropdown-menu" style="display:none;">`;
                menu.submenus.forEach(sub => { if (sub.roles.includes(currentUserRole)) html += `<div class="menu-item submenu" onclick="showMenu('${sub.action}')"><i class="fas ${sub.icon}"></i> ${sub.label}</div>`; });
                html += `</div>`;
            } else if (menu.roles.includes(currentUserRole)) {
                html += `<div class="menu-item" onclick="showMenu('${menu.action}')"><i class="fas ${menu.icon}"></i> ${menu.label}</div>`;
            }
        });
        document.getElementById('sidebarMenu').innerHTML = html;
    }
    
    function toggleDropdown(label) { 
        let d = document.getElementById(`dropdown-${label}`); 
        let a = document.getElementById(`arrow-${label}`); 
        if (d && d.style.display === 'none') { d.style.display = 'block'; if(a) a.style.transform = 'rotate(180deg'; } 
        else if(d) { d.style.display = 'none'; if(a) a.style.transform = 'rotate(0deg'; } 
    }
    
    function showMenu(menu) {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        if (event && event.currentTarget) event.currentTarget.classList.add('active');
        const titles = { dashboard: 'Dashboard', invoice_penjualan: 'Invoice Penjualan', invoice_pembelian: 'Invoice Pembelian', payment: 'Payment Request', customers: 'Data Customer', projects: 'Data Project', vendors: 'Data Vendor' };
        document.getElementById('pageTitle').innerText = titles[menu] || 'ERP';
        if (menu === 'dashboard') loadDashboard();
        else if (menu === 'invoice_penjualan') loadInvoiceList();
        else if (menu === 'invoice_pembelian') loadVendorInvoiceList();
        else if (menu === 'payment') loadPaymentRequests();
        else if (menu === 'customers') loadCustomerList();
        else if (menu === 'projects') loadProjectList();
        else if (menu === 'vendors') loadVendorList();
        else document.getElementById('content').innerHTML = '<div class="card"><h2>Fitur dalam pengembangan</h2></div>';
    }
    
    function populateCompanySelector() {
        const selector = document.getElementById('companySelector');
        if (!selector) return;
        let options = '';
        companies.forEach(c => { options += `<option value="${c.id}" ${c.id == currentCompanyId ? 'selected' : ''}>${c.nama}</option>`; });
        selector.innerHTML = options;
    }
    
    async function changeCompany(companyId) {
        currentCompanyId = parseInt(companyId);
        showToast(`Beralih ke ${companies.find(c => c.id == currentCompanyId)?.nama}`, 'info');
        const currentMenu = document.getElementById('pageTitle').innerText;
        if (currentMenu === 'Dashboard') loadDashboard();
        else if (currentMenu === 'Invoice Penjualan') loadInvoiceList();
        else if (currentMenu === 'Invoice Pembelian') loadVendorInvoiceList();
        else if (currentMenu === 'Payment Request') loadPaymentRequests();
    }
    
    // ==================== DASHBOARD ====================
    async function loadDashboard() {
        populateCompanySelector();
        let companyOptions = '<option value="all">Semua Perusahaan</option>';
        companies.forEach(c => { companyOptions += `<option value="${c.id}">${c.nama}</option>`; });
        let html = `<div class="filter-card"><div class="filter-grid"><div class="filter-item"><label class="filter-label">Perusahaan</label><select id="dashboardCompany" class="filter-select">${companyOptions}</select></div><div class="filter-item"><button class="btn btn-primary" onclick="refreshDashboard()">Perbarui</button></div></div></div>
            <div class="stats-grid"><div class="stat-card"><div class="stat-value" id="totalKas">Rp 0</div><div class="stat-label">Total Kas</div></div>
            <div class="stat-card"><div class="stat-value" id="totalPiutang">Rp 0</div><div class="stat-label">Piutang</div></div>
            <div class="stat-card"><div class="stat-value" id="totalUtang">Rp 0</div><div class="stat-label">Utang</div></div>
            <div class="stat-card"><div class="stat-value" id="totalPending">Rp 0</div><div class="stat-label">Pending</div></div></div>
            <div class="charts-grid"><div class="chart-card"><div class="chart-header"><h3 class="chart-title">Status Payment</h3></div><div class="chart-container"><canvas id="statusChart"></canvas></div></div>

        document.getElementById('totalPiutang').innerHTML = `Rp ${formatNumber(totalPiutang)}`;
        document.getElementById('totalUtang').innerHTML = `Rp ${formatNumber(totalUtang)}`;
        document.getElementById('totalPending').innerHTML = `Rp ${formatNumber(totalPending)}`;
        let statusData = { draft:0, submitted:0, verified:0, paid:0, rejected:0 };

        if (companyChart) companyChart.destroy();
        companyChart = new Chart(document.getElementById('companyChart'), { type: 'bar', data: { labels: ['Arko','MMC','USA','MST'], datasets: [{ data: [companyData[1]/1e6, companyData[2]/1e6, companyData[3]/1e6, companyData[4]/1e6], backgroundColor: '#3b82f6' }] }, options: { responsive: true, maintainAspectRatio: false } });

        document.getElementById('recentTableBody').innerHTML = tbody || '<tr><td colspan="6">Belum ada数据</td></tr>';

    // ==================== PAYMENT REQUESTS ====================
    async function loadPaymentRequests() {
        let companyOptions = ''; companies.forEach(c => { companyOptions += `<option value="${c.id}" ${c.id == currentCompanyId ? 'selected' : ''}>${c.nama}</option>`; });
        let html = `<div class="form-card"><div class="form-header"><h2><i class="fas fa-money-bill-wave"></i> Payment Request</h2><div><button class="btn btn-primary" onclick="showNewPaymentForm()"><i class="fas fa-plus"></i> Buat Request</button></div></div>
            <div class="filter-card"><div class="filter-grid"><div class="filter-item"><label class="filter-label">Perusahaan</label><select id="paymentCompanyFilter" class="filter-select" onchange="refreshPaymentRequests()">${companyOptions}</select></div>
            <div class="filter-item"><label class="filter-label">Status</label><select id="paymentStatusFilter" class="filter-select" onchange="refreshPaymentRequests()"><option value="all">Semua</option><option value="draft">Draft</option><option value="submitted">Submitted</option><option value="verified">Verified</option><option value="paid">Paid</option><option value="rejected">Rejected</option></select></div></div></div>
            <div class="table-container"><table class="table"><thead><tr><th>ID</th><th>Tgl</th><th>Perusahaan</th><th>Deskripsi</th><th class="text-right">Jumlah</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="paymentTableBody"><tr><td colspan="7" class="text-center">Loading...</td></tr></tbody>}</div>
            <div class="pagination-container"><div><span id="paymentShowingInfo" class="page-info"></span></div><div><button class="pagination-btn" onclick="paymentPreviousPage()" id="paymentPrevPageBtn">« Sebelumnya</button><span id="paymentPageInfo" class="page-info">Halaman 1</span><button class="pagination-btn" onclick="paymentNextPage()" id="paymentNextPageBtn">Berikutnya »</button></div></div></div>`;
        document.getElementById('content').innerHTML = html;
        currentPaymentPage = 1;
        await refreshPaymentRequests();
    }
    
    async function refreshPaymentRequests() {
        let companyId = document.getElementById('paymentCompanyFilter')?.value || currentCompanyId;
        let statusFilter = document.getElementById('paymentStatusFilter')?.value || 'all';
        let query = sb.from('payment_requests').select('*');
        if (companyId && companyId !== 'all') query = query.eq('company_id', parseInt(companyId));
        if (currentUserRole === 'staff') query = query.eq('requester_email', currentUser?.email);
        let { data: payments } = await query.order('id', { ascending: false });
        if (statusFilter !== 'all') payments = payments.filter(p => p.status === statusFilter);
        totalPaymentItems = payments.length;
        totalPaymentPages = Math.ceil(totalPaymentItems / currentPaymentPageSize);
        if (currentPaymentPage > totalPaymentPages) currentPaymentPage = 1;
        let start = (currentPaymentPage - 1) * currentPaymentPageSize;
        let pageData = payments.slice(start, start + currentPaymentPageSize);
        let tbody = document.getElementById('paymentTableBody');
        if (!pageData.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-center">Tidak ada data</td></tr>'; return; }
        let html = '';
        for (let r of pageData) {
            let company = companies.find(c => c.id == r.company_id)?.nama || '-';
            let actions = `<button class="action-btn" onclick="viewPaymentRequest(${r.id})"><i class="fas fa-eye"></i></button>`;
            if (r.status === 'draft' && r.requester_email === currentUser?.email) {
                actions += `<button class="action-btn" onclick="editPaymentRequest(${r.id})" style="color:var(--warning);"><i class="fas fa-edit"></i></button>`;
                actions += `<button class="action-btn" onclick="deletePaymentRequest(${r.id})" style="color:var(--danger);"><i class="fas fa-trash"></i></button>`;
                if (currentUserRole === 'staff') actions += `<button class="action-btn" onclick="submitPaymentRequest(${r.id})" style="color:var(--success);"><i class="fas fa-paper-plane"></i></button>`;
            }
            if (r.status === 'submitted' && (currentUserRole === 'finance' || currentUserRole === 'direktur')) {
                actions += `<button class="action-btn" onclick="verifyPaymentRequest(${r.id})" style="color:var(--success);"><i class="fas fa-check-circle"></i></button>`;
                actions += `<button class="action-btn" onclick="rejectPaymentRequest(${r.id})" style="color:var(--danger);"><i class="fas fa-times-circle"></i></button>`;
            }
            if (r.status === 'verified' && currentUserRole === 'direktur') {
                actions += `<button class="action-btn" onclick="approvePaymentRequest(${r.id})" style="color:var(--success);"><i class="fas fa-thumbs-up"></i></button>`;
            }
            html += `<tr><td>#${r.id}</td><td>${r.request_date || '-'}</td><td>${company}</td><td>${r.description || '-'}</td><td class="text-right">Rp ${formatNumber(r.amount)}</td><td><span class="status-badge status-${r.status}">${r.status}</span></td><td>${actions}</td></tr>`;
        }
        tbody.innerHTML = html;
        let startNum = start + 1, endNum = Math.min(start + currentPaymentPageSize, totalPaymentItems);
        document.getElementById('paymentShowingInfo').innerHTML = `Menampilkan ${startNum}-${endNum} dari ${totalPaymentItems} request`;
        document.getElementById('paymentPageInfo').innerHTML = `Halaman ${currentPaymentPage} dari ${totalPaymentPages || 1}`;
        document.getElementById('paymentPrevPageBtn').disabled = currentPaymentPage <= 1;
        document.getElementById('paymentNextPageBtn').disabled = currentPaymentPage >= totalPaymentPages;
    }
    function paymentNextPage() { if (currentPaymentPage < totalPaymentPages) { currentPaymentPage++; refreshPaymentRequests(); } }
    function paymentPreviousPage() { if (currentPaymentPage > 1) { currentPaymentPage--; refreshPaymentRequests(); } }
    
    function showNewPaymentForm() {
        let today = new Date().toISOString().split('T')[0];
        let companyOptions = ''; companies.forEach(c => { companyOptions += `<option value="${c.id}" ${c.id == currentCompanyId ? 'selected' : ''}>${c.nama}</option>`; });
        let html = `<div class="form-card"><div class="form-header"><h3>Buat Payment Request</h3><button class="btn btn-secondary" onclick="loadPaymentRequests()">Kembali</button></div>
            <div class="form-group"><label>Perusahaan</label><select id="paymentCompany" class="form-control">${companyOptions}</select></div>
            <div class="form-group"><label>Tanggal</label><input type="date" id="paymentDate" class="form-control" value="${today}"></div>

            <div class="form-group"><label>Jumlah (Rp)</label><input type="text" id="paymentAmount" class="form-control" placeholder="0" onkeyup="formatMoney(this)"></div>

            <div style="display:flex; gap:1rem; justify-content:flex-end;"><button class="btn btn-secondary" onclick="loadPaymentRequests()">Batal</button><button class="btn btn-primary" onclick="savePaymentRequest()">Ajukan ke Finance</button></div></div>`;
        document.getElementById('content').innerHTML = html;
    }
    
    async function savePaymentRequest() {
        let companyId = parseInt(document.getElementById('paymentCompany').value);
        let date = document.getElementById('paymentDate').value;
        let desc = document.getElementById('paymentDesc').value;
        let amount = parseRupiah(document.getElementById('paymentAmount').value);
        let bank = document.getElementById('paymentBank').value;
        let fileInput = document.getElementById('paymentFile');
        if (!desc || !amount || !bank || !fileInput.files.length) { showToast('Semua field harus diisi', 'error'); return; }
        let file = fileInput.files[0];
        if (file.size > 5 * 1024 * 1024) { showToast('File maksimal 5MB', 'error'); return; }
        showLoading();
        let reader = new FileReader();
        reader.onload = async function(e) {
            try {
                let res = await fetch(GAS_UPLOAD_URL, { method: 'POST', body: JSON.stringify({ action: 'upload', file: e.target.result, name: file.name, mimeType: file.type, folderId: DRIVE_FOLDER_ID }) });
                let result = await res.json();
                if (!result.success) throw new Error(result.message);
                let { error } = await sb.from('payment_requests').insert({ company_id: companyId, request_date: date, description: desc, amount: amount, bank_account: bank, bukti_url: result.url, requester_email: currentUser?.email, status: 'submitted', submitted_at: new Date() });
                if (error) throw error;
                await sb.from('payment_logs').insert({ request_id: 0, user_email: currentUser?.email, user_role: currentUserRole, old_status: 'draft', new_status: 'submitted', keterangan: 'Request diajukan ke finance' });
                showToast('Request berhasil diajukan', 'success');
                loadPaymentRequests();
            } catch(err) { showToast('Gagal: ' + err.message, 'error'); }
            finally { hideLoading(); }
        };
        reader.readAsDataURL(file);
    }

        if (!req) return;
        let html = `<div class="form-card"><div class="form-header"><h3>Edit Payment Request #${req.id}</h3><button class="btn btn-secondary" onclick="loadPaymentRequests()">Kembali</button></div>

            <div class="form-group"><label>Jumlah</label><input type="text" id="editPaymentAmount" class="form-control" value="${formatNumber(req.amount)}" onkeyup="formatMoney(this)"></div>

    async function updatePaymentRequest(id) {
        let date = document.getElementById('editPaymentDate').value;
        let desc = document.getElementById('editPaymentDesc').value;
        let amount = parseRupiah(document.getElementById('editPaymentAmount').value);
        let bank = document.getElementById('editPaymentBank').value;

        showLoading();
        await sb.from('payment_requests').delete().eq('id', id);
        showToast('Payment request dihapus', 'success');
        refreshPaymentRequests();
        hideLoading();
    }
    
    async function submitPaymentRequest(id) {
        if (!confirm('Ajukan request ke finance?')) return;
        showLoading();
        await sb.from('payment_requests').update({ status: 'submitted', submitted_at: new Date() }).eq('id', id);
        showToast('Request diajukan', 'success');
        refreshPaymentRequests();
        hideLoading();
    }
    
    async function rejectPaymentRequest(id) {
        let reason = prompt('Alasan penolakan:');
        if (!reason) return;
        showLoading();
        await sb.from('payment_requests').update({ status: 'rejected', rejected_at: new Date(), rejected_by: currentUser?.email, rejection_reason: reason }).eq('id', id);
        showToast('Request ditolak', 'warning');
        refreshPaymentRequests();
        hideLoading();
    }
    
    async function approvePaymentRequest(id) {
        if (!confirm('Setujui pembayaran ini?')) return;
        showLoading();
        try {
            let { data: req } = await sb.from('payment_requests').select('*').eq('id', id).single();
            let suffix = companies.find(c => c.id == req.company_id)?.singkatan || 'A';
            let lastJournal = await sb.from('journals').select('id').order('id', { ascending: false }).limit(1);
            let journalId = (lastJournal.data?.[0]?.id || 0) + 1;
            let dateStr = new Date().toISOString().split('T')[0];
            await sb.from('journals').insert({ id: journalId, company_id: req.company_id, journal_date: dateStr, period: dateStr.substring(0,7), description: `Pembayaran: ${req.description}`, reference: req.voucher_no, created_by: currentUser?.email, status: 'posted' });
            await sb.from('journal_lines').insert([{ journal_id: journalId, account_code: req.debit_account || `5101-${suffix}`, debit: req.amount, credit: 0, description: `Beban dari ${req.voucher_no}` }, { journal_id: journalId, account_code: req.credit_account || `1101-${suffix}`, debit: 0, credit: req.total_with_tax || req.amount, description: `Transfer ke vendor` }]);
            await sb.from('payment_requests').update({ status: 'paid', paid_at: new Date(), approved_by: currentUser?.email, journal_id: journalId }).eq('id', id);
            showToast(`✅ Payment approved! Jurnal: ${journalId}`, 'success');
            refreshPaymentRequests();
        } catch(err) { showToast('Gagal: ' + err.message, 'error'); }
        finally { hideLoading(); }
    }
    
    async function viewPaymentRequest(id) {
        let { data: req } = await sb.from('payment_requests').select('*').eq('id', id).single();
        if (!req) return;
        let company = companies.find(c => c.id == req.company_id)?.nama || '-';
        alert(`Detail Payment #${req.id}\nPerusahaan: ${company}\nTanggal: ${req.request_date}\nDeskripsi: ${req.description}\nJumlah: Rp ${formatNumber(req.amount)}\nBank: ${req.bank_account}\nStatus: ${req.status}`);
    }
    
    // ==================== VERIFIKASI (FINANCE) ====================
    async function verifyPaymentRequest(id) {
        if (currentUserRole !== 'finance') { showToast('Hanya finance yang bisa verifikasi', 'error'); return; }
        showLoading();
        try {
            let { data: req } = await sb.from('payment_requests').select('*').eq('id', id).single();
            if (!req) throw new Error('Request tidak ditemukan');
            let taxConfig = await getTaxConfig(req.company_id);
            let projects = await getProjectList(req.company_id);
            let accounts = await getAccountList(req.company_id);
            let debitOptions = '<option value="">Pilih Akun Debit</option>';
            let creditOptions = '<option value="">Pilih Akun Kredit</option>';
            accounts.forEach(acc => {
                if (acc.account_type === 'Beban' || acc.account_type === 'Aset') debitOptions += `<option value="${acc.account_code}">${acc.account_code} - ${acc.account_name}</option>`;
                if (acc.account_type === 'Aset' && (acc.account_name.includes('Bank') || acc.account_name.includes('Kas'))) creditOptions += `<option value="${acc.account_code}">${acc.account_code} - ${acc.account_name}</option>`;
            });
            let projectOptions = '<option value="">[Tanpa Project]</option>';
            projects.forEach(p => projectOptions += `<option value="${p.code}">${p.code} - ${p.name}</option>`);
            let modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.id = 'verifikasiModal';
            modal.innerHTML = `<div class="modal-content"><div style="padding:20px;"><h3>Verifikasi Payment Request #${req.id}</h3>
                <div class="form-group"><label>Project</label><select id="verifyProject" class="form-control">${projectOptions}</select></div>
                <div class="form-group"><label>Akun Debit</label><select id="debitAccount" class="form-control">${debitOptions}</select></div>
                <div class="form-group"><label>Akun Kredit</label><select id="creditAccount" class="form-control">${creditOptions}</select></div>
                <div><label><input type="checkbox" id="ppnCheck"> PPN ${taxConfig.ppn_rate}%</label> <label><input type="checkbox" id="pphCheck"> PPh 23 2%</label></div>
                <div class="verification-summary" style="background:var(--primary);color:white;padding:1rem;border-radius:12px;margin:1rem 0;"><table style="width:100%;"><tr><td>DPP</td><td id="dppDisplay" style="text-align:right;">Rp ${formatNumber(req.amount)}</td></tr><tr><td>PPN</td><td id="ppnDisplay" style="text-align:right;">Rp 0</td></tr><tr><td>PPh</td><td id="pphDisplay" style="text-align:right;">Rp 0</td></tr><tr style="border-top:1px solid rgba(255,255,255,0.3);"><td><strong>TOTAL</strong></td><td id="totalDisplay" style="text-align:right;"><strong>Rp ${formatNumber(req.amount)}</strong></td></tr></table></div>
                <div style="display:flex; gap:1rem; justify-content:flex-end;"><button class="btn btn-secondary" onclick="closeVerifikasiModal()">Batal</button><button class="btn btn-success" id="confirmVerifyBtn">Verifikasi</button></div></div></div>`;
            document.body.appendChild(modal);
            currentVerifikasiReq = req;
            currentTaxConfig = taxConfig;
            let ppnCheck = document.getElementById('ppnCheck'), pphCheck = document.getElementById('pphCheck');
            let updatePajak = () => {
                let dpp = req.amount, ppn = 0, pph = 0;
                if (ppnCheck.checked) ppn = Math.round(dpp * taxConfig.ppn_rate / 100);
                if (pphCheck.checked) pph = Math.round(dpp * 0.02);
                let total = dpp + ppn - pph;
                document.getElementById('dppDisplay').innerHTML = `Rp ${formatNumber(dpp)}`;
                document.getElementById('ppnDisplay').innerHTML = `Rp ${formatNumber(ppn)}`;
                document.getElementById('pphDisplay').innerHTML = `Rp ${formatNumber(pph)}`;
                document.getElementById('totalDisplay').innerHTML = `<strong>Rp ${formatNumber(total)}</strong>`;
            };
            ppnCheck.onchange = updatePajak;
            pphCheck.onchange = updatePajak;
            document.getElementById('confirmVerifyBtn').onclick = async () => {
                let debitAccount = document.getElementById('debitAccount').value;
                let creditAccount = document.getElementById('creditAccount').value;
                let projectCode = document.getElementById('verifyProject').value;
                if (!debitAccount || !creditAccount) { showToast('Pilih akun debit dan kredit', 'error'); return; }
                let ppn = ppnCheck.checked ? Math.round(req.amount * taxConfig.ppn_rate / 100) : 0;
                let pph = pphCheck.checked ? Math.round(req.amount * 0.02) : 0;
                let total = req.amount + ppn - pph;
                let suffix = companies.find(c => c.id == req.company_id)?.kode || 'ARK';
                let now = new Date();
                let voucherNo = `${suffix}/${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/VER/${String(req.id).padStart(4,'0')}`;
                await sb.from('payment_requests').update({ status: 'verified', verified_at: new Date(), verified_by: currentUser?.email, debit_account: debitAccount, credit_account: creditAccount, voucher_no: voucherNo, ppn: ppn, pph: pph, total_with_tax: total, project_code: projectCode || null }).eq('id', id);
                showToast(`Diverifikasi! Voucher: ${voucherNo}`, 'success');
                closeVerifikasiModal();
                refreshPaymentRequests();
            };
        } catch(err) { showToast('Error: ' + err.message, 'error'); }
        finally { hideLoading(); }
    }
    function closeVerifikasiModal() { let m = document.getElementById('verifikasiModal'); if(m) m.remove(); }

    async function loadInvoices() {
        let companyFilter = document.getElementById('invoiceCompanyFilter')?.value;
        let query = sb.from('invoices').select('*');
        if (companyFilter && companyFilter !== 'all') query = query.eq('company_id', parseInt(companyFilter));
        let { data: invoices } = await query.order('id', { ascending: false });
        let customers = await getCustomerList(currentCompanyId);
        let tbody = document.getElementById('invoiceTableBody');
        if (!invoices || !invoices.length) { tbody.innerHTML = '<tr><td colspan="6">Tidak ada数据</td></tr>'; return; }
        let html = '';
        for (let inv of invoices) {
            let cust = customers.find(c => c.id == inv.customer_id);
            html += `<tr><td><strong>${inv.invoice_no}</strong></td><td>${cust?.name || '-'}</td><td>${inv.invoice_date || '-'}</td><td class="text-right">Rp ${formatNumber(inv.total)}</td><td><span class="status-badge status-${inv.status}">${inv.status}</span></td><td><button class="action-btn" onclick="viewInvoiceDetail(${inv.id})"><i class="fas fa-eye"></i></button></td></tr>`;
        }
        tbody.innerHTML = html;
    }
    
    async function showCreateInvoiceForm() {
        let customers = await getCustomerList(currentCompanyId);
        let revenues = await getRevenueAccounts(currentCompanyId);
        let banks = await getBankList(currentCompanyId);
        let custOptions = '<option value="">Pilih Customer</option>'; customers.forEach(c => custOptions += `<option value="${c.id}">${c.name}</option>`);
        let revOptions = '<option value="">Pilih Akun Pendapatan</option>'; revenues.forEach(r => revOptions += `<option value="${r.account_code}">${r.account_code} - ${r.account_name}</option>`);
        let bankOptions = '<option value="">Pilih Bank</option>'; banks.forEach(b => bankOptions += `<option value="${b.code}">${b.display}</option>`);
        let today = new Date().toISOString().split('T')[0];
        let html = `<div class="form-card"><div class="form-header"><h2>Buat Invoice Baru</h2><button class="btn btn-secondary" onclick="loadInvoiceList()">Kembali</button></div>
            <div class="form-group"><label>Customer</label><select id="invCustomer" class="form-control">${custOptions}</select></div>
            <div class="form-group"><label>Akun Pendapatan</label><select id="invRevenueAccount" class="form-control">${revOptions}</select></div>
            <div class="form-group"><label>Bank Tujuan</label><select id="invBank" class="form-control">${bankOptions}</select></div>
            <div class="form-group"><label>Tanggal Invoice</label><input type="date" id="invDate" class="form-control" value="${today}"></div>
            <div class="form-group"><label>Total</label><input type="text" id="invTotal" class="form-control" placeholder="0" onkeyup="formatMoney(this)"></div>
            <div style="display:flex; gap:1rem; justify-content:flex-end;"><button class="btn btn-secondary" onclick="loadInvoiceList()">Batal</button><button class="btn btn-primary" onclick="saveInvoice()">Simpan Invoice</button></div></div>`;
        document.getElementById('content').innerHTML = html;
    }
    
    async function saveInvoice() {
        let customerId = document.getElementById('invCustomer').value;
        let revenueAccount = document.getElementById('invRevenueAccount').value;
        let bankCode = document.getElementById('invBank').value;
        let invoiceDate = document.getElementById('invDate').value;
        let total = parseRupiah(document.getElementById('invTotal').value);
        if (!customerId || !revenueAccount || !bankCode || !total) { showToast('Isi semua field', 'error'); return; }
        showLoading();
        let year = new Date().getFullYear();
        let month = String(new Date().getMonth() + 1).padStart(2,'0');
        let { data: lastInv } = await sb.from('invoices').select('invoice_no').eq('company_id', currentCompanyId).order('id', { ascending: false }).limit(1);
        let lastNum = 0;
        if (lastInv && lastInv[0] && lastInv[0].invoice_no) { let match = lastInv[0].invoice_no.match(/\d+$/); if (match) lastNum = parseInt(match[0]); }
        let invoiceNo = `INV/${year}/${month}/${String(lastNum + 1).padStart(4,'0')}`;
        let { error } = await sb.from('invoices').insert({ company_id: currentCompanyId, customer_id: parseInt(customerId), revenue_account: revenueAccount, bank_code: bankCode, invoice_date: invoiceDate, total: total, invoice_no: invoiceNo, status: 'draft', paid_amount: 0 });
        if (error) { showToast('Gagal: ' + error.message, 'error'); } else { showToast(`Invoice ${invoiceNo} berhasil dibuat`, 'success'); loadInvoiceList(); }
        hideLoading();
    }
    
    async function viewInvoiceDetail(id) {
        let { data: inv } = await sb.from('invoices').select('*').eq('id', id).single();
        if (!inv) return;
        alert(`Invoice #${inv.invoice_no}\nTotal: Rp ${formatNumber(inv.total)}\nStatus: ${inv.status}`);
    }
    
    // ==================== INVOICE PEMBELIAN ====================
    async function loadVendorInvoiceList() {
        let companyOptions = '';
        if (currentUserRole === 'direktur') { companyOptions = '<option value="all">Semua Perusahaan</option>'; companies.forEach(c => { companyOptions += `<option value="${c.id}" ${c.id == currentCompanyId ? 'selected' : ''}>${c.nama}</option>`; }); }
        else { companyOptions = `<option value="${currentCompanyId}" selected>${companies.find(c => c.id == currentCompanyId)?.nama || 'Perusahaan'}</option>`; }
        let html = `<div class="form-card"><div class="form-header"><h2>Invoice Pembelian (AP)</h2><div><button class="btn btn-primary" onclick="showCreateVendorInvoiceForm()"><i class="fas fa-plus"></i> Buat Invoice</button></div></div>
            <div class="filter-card"><div class="filter-grid"><div class="filter-item"><label class="filter-label">Perusahaan</label><select id="vendorCompanyFilter" class="filter-select" onchange="loadVendorInvoicesData()">${companyOptions}</select></div></div></div>
            <div class="table-container"><table class="table"><thead><tr><th>Vendor</th><th>No Invoice</th><th>Total</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="vendorInvoiceTableBody"><tr><td colspan="5">Loading...</td></tr></tbody>}</div></div>`;
        document.getElementById('content').innerHTML = html;
        await loadVendorInvoicesData();
    }
    
    async function loadVendorInvoicesData() {
        let companyFilter = document.getElementById('vendorCompanyFilter')?.value;
        let query = sb.from('vendor_invoices').select('*');
        if (companyFilter && companyFilter !== 'all') query = query.eq('company_id', parseInt(companyFilter));
        let { data: invoices } = await query.order('id', { ascending: false });
        let tbody = document.getElementById('vendorInvoiceTableBody');
        if (!invoices || !invoices.length) { tbody.innerHTML = '<tr><td colspan="5">Tidak ada数据</td></tr>'; return; }
        let html = '';
        for (let inv of invoices) {
            html += `<tr><td>${inv.vendor_name}</td><td><strong>${inv.invoice_no}</strong></td><td class="text-right">Rp ${formatNumber(inv.total)}</td><td><span class="status-badge status-${inv.payment_status}">${inv.payment_status}</span></td><td><button class="action-btn" onclick="viewVendorInvoiceDetail(${inv.id})"><i class="fas fa-eye"></i></button></td></tr>`;
        }
        tbody.innerHTML = html;
    }
    
    async function showCreateVendorInvoiceForm() {
        let vendors = await getVendorList(currentCompanyId);
        let accounts = await getAccountList(currentCompanyId);
        let banks = await getBankList(currentCompanyId);
        let venOptions = '<option value="">Pilih Vendor</option>'; vendors.forEach(v => venOptions += `<option value="${v.id}">${v.name}</option>`);
        let accOptions = '<option value="">Pilih Akun Beban</option>'; accounts.filter(a => a.account_type === 'Beban').forEach(a => accOptions += `<option value="${a.account_code}">${a.account_code} - ${a.account_name}</option>`);
        let bankOptions = '<option value="">Pilih Bank</option>'; banks.forEach(b => bankOptions += `<option value="${b.code}">${b.display}</option>`);
        let today = new Date().toISOString().split('T')[0];
        let html = `<div class="form-card"><div class="form-header"><h2>Buat Invoice Vendor</h2><button class="btn btn-secondary" onclick="loadVendorInvoiceList()">Kembali</button></div>
            <div class="form-group"><label>Vendor</label><select id="venVendor" class="form-control">${venOptions}</select></div>
            <div class="form-group"><label>No Invoice</label><input type="text" id="venInvoiceNo" class="form-control" placeholder="INV-001"></div>
            <div class="form-group"><label>Tanggal Invoice</label><input type="date" id="venDate" class="form-control" value="${today}"></div>
            <div class="form-group"><label>Akun Beban</label><select id="venAccount" class="form-control">${accOptions}</select></div>
            <div class="form-group"><label>Akun Kas/Bank</label><select id="venBankAccount" class="form-control">${bankOptions}</select></div>
            <div class="form-group"><label>Total</label><input type="text" id="venTotal" class="form-control" placeholder="0" onkeyup="formatMoney(this)"></div>
            <div class="form-group"><label>Upload Bukti</label><input type="file" id="venFile" class="form-control"></div>
            <div style="display:flex; gap:1rem; justify-content:flex-end;"><button class="btn btn-secondary" onclick="loadVendorInvoiceList()">Batal</button><button class="btn btn-primary" onclick="saveVendorInvoice()">Simpan</button></div></div>`;
        document.getElementById('content').innerHTML = html;
    }
    
    async function saveVendorInvoice() {
        let vendorId = document.getElementById('venVendor').value;
        let invoiceNo = document.getElementById('venInvoiceNo').value;
        let invoiceDate = document.getElementById('venDate').value;
        let accountCode = document.getElementById('venAccount').value;
        let bankCode = document.getElementById('venBankAccount').value;
        let total = parseRupiah(document.getElementById('venTotal').value);
        let fileInput = document.getElementById('venFile');
        if (!vendorId || !invoiceNo || !accountCode || !bankCode || !total || !fileInput.files.length) { showToast('Isi semua field', 'error'); return; }
        showLoading();
        let file = fileInput.files[0];
        let reader = new FileReader();
        reader.onload = async function(e) {
            try {
                let res = await fetch(GAS_UPLOAD_URL, { method: 'POST', body: JSON.stringify({ action: 'upload', file: e.target.result, name: file.name, mimeType: file.type, folderId: DRIVE_FOLDER_ID }) });
                let upload = await res.json();
                if (!upload.success) throw new Error(upload.message);
                let vendors = await getVendorList(currentCompanyId);
                let vendor = vendors.find(v => v.id == parseInt(vendorId));
                let { error } = await sb.from('vendor_invoices').insert({ company_id: currentCompanyId, vendor_id: parseInt(vendorId), vendor_name: vendor.name, invoice_no: invoiceNo, invoice_date: invoiceDate, account_code: accountCode, bank_code: bankCode, total: total, paid_amount: 0, payment_status: 'submitted', file_url: upload.url });
                if (error) throw error;
                showToast('Invoice vendor berhasil disimpan', 'success');
                loadVendorInvoiceList();
            } catch(err) { showToast('Gagal: ' + err.message, 'error'); }
            finally { hideLoading(); }
        };
        reader.readAsDataURL(file);
    }
    
    async function viewVendorInvoiceDetail(id) {
        let { data: inv } = await sb.from('vendor_invoices').select('*').eq('id', id).single();
        if (!inv) return;
        alert(`Vendor Invoice #${inv.invoice_no}\nVendor: ${inv.vendor_name}\nTotal: Rp ${formatNumber(inv.total)}\nStatus: ${inv.payment_status}`);
    }
    
    // ==================== MASTER DATA ====================
    async function loadCustomerList() {
        let cust = await getCustomerList(currentCompanyId);
        let html = `<div class="form-card"><div class="form-header"><h2>Data Customer</h2><button class="btn btn-secondary" onclick="loadDashboard()">Kembali</button></div><div class="table-container"><table class="table"><thead><tr><th>Kode</th><th>Nama</th><th>NPWP</th><tr></thead><tbody>${cust.map(c=>`<tr><td>${c.code||'-'}</td><td>${c.name}</td><td>${c.npwp||'-'}</td></tr>`).join('')}</tbody></table></div></div>`;
        document.getElementById('content').innerHTML = html;
    }
    
    async function loadProjectList() {
        let proj = await getProjectList(currentCompanyId);
        let html = `<div class="form-card"><div class="form-header"><h2>Data Project</h2><button class="btn btn-secondary" onclick="loadDashboard()">Kembali</button></div><div class="table-container"><table class="table"><thead><tr><th>Kode</th><th>Nama</th><th>Budget</th></tr></thead><tbody>${proj.map(p=>`<tr><td>${p.code}</td><td>${p.name}</td><td>${p.is_unlimited ? 'Unlimited' : 'Rp '+formatNumber(p.budget)}</td></tr>`).join('')}</tbody></table></div></div>`;
        document.getElementById('content').innerHTML = html;
    }
    
    async function loadVendorList() {
        let vend = await getVendorList(currentCompanyId);
        let html = `<div class="form-card"><div class="form-header"><h2>Data Vendor</h2><button class="btn btn-secondary" onclick="loadDashboard()">Kembali</button></div><div class="table-container"><table class="table"><thead><tr><th>Nama</th><th>NPWP</th><th>Bank</th></tr></thead><tbody>${vend.map(v=>`<tr><td>${v.name}</td><td>${v.npwp||'-'}</td><td>${v.bank_name||'-'}</td></tr>`).join('')}</tbody></table></div></div>`;
        document.getElementById('content').innerHTML = html;
    }
    
    // ==================== INITIALIZE ====================
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('companySelector').addEventListener('change', function(e) { changeCompany(e.target.value); });
    
    async function checkSession() {
        let { data } = await sb.auth.getSession();
        if (data.session) {
            let { data: profileData } = await sb.from('user_profiles').select('*').eq('email', data.session.user.email);
            let profile = profileData?.[0];
            currentUser = data.session.user;
            currentUserRole = profile?.role || 'staff';
            currentCompanyId = profile?.company_id || 1;
            let { data: comps } = await sb.from('companies').select('*');
            companies = comps || [];
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appPage').style.display = 'flex';
            document.getElementById('userName').innerText = profile?.name || currentUser.email;
            document.getElementById('userRole').innerText = currentUserRole;
            document.getElementById('userAvatar').innerText = (profile?.name || currentUser.email).charAt(0).toUpperCase();
            renderSidebar();
            loadDashboard();
        }
    }
    checkSession();
    </script>
</body>
</html>
