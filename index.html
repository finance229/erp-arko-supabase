        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary), var(--primary-light)); }

        /* ==================== PAYMENT REQUEST PREMIUM CSS ==================== */

        }
        .pagination-btn {

            transition: all 0.2s;
        }

        .toast-notify {

        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .toast-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .toast-warning { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .budget-card {

        .progress-fill { height: 100%; border-radius: 30px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; color: white; font-size: 10px; font-weight: 700; transition: width 0.5s ease; }
        .progress-fill.safe { background: linear-gradient(90deg, #10b981, #34d399); }
        .progress-fill.warning { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .progress-fill.danger { background: linear-gradient(90deg, #ea580c, #f97316); }
        .progress-fill.over { background: linear-gradient(90deg, #dc2626, #ef4444); }
        .progress-fill.unlimited { background: linear-gradient(90deg, #9ca3af, #d1d5db); }
        .payment-detail-table { width: 100%; border-collapse: collapse; }
        .payment-detail-table td { padding: 8px; border-bottom: 1px solid var(--gray-200); }
        .payment-detail-table td:first-child { background: var(--gray-50); width: 140px; font-weight: 500; }

        .verification-summary { background: var(--primary); color: white; padding: 1rem; border-radius: 12px; margin: 1rem 0; }
        .verification-summary table { width: 100%; color: white; }
        .verification-summary td { padding: 6px 0; }
        .verification-summary td:first-child { width: 40%; }
        .verification-summary td:last-child { text-align: right; font-weight: bold; }
        .voucher-preview { background: var(--gray-50); padding: 1rem; border-radius: 12px; text-align: center; font-size: 1.2rem; font-weight: bold; color: var(--accent); font-family: monospace; }
    </style>

<body>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>
    
    <div id="loginPage" class="login-container">

    <script>
    // ==================== KONFIGURASI SUPABASE ====================
    const SUPABASE_URL = 'https://vtkineqwvnuzxxcegofx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0a2luZXF3dm51enh4Y2Vnb2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDU4OTMsImV4cCI6MjA5MDg4MTg5M30.7ygetyHX-_-5JDU-pXS2eP3iLgpI_zP6Gqms1gSY0ys';
    const GAS_UPLOAD_URL = 'https://script.google.com/macros/s/AKfycbzQDc9CUWZELs7iw9a4lDJJPC74jMMZr5savRc-2GTWnuWpFyUytI_zrYYgaCWZfXrMMQ/exec';
    const DRIVE_FOLDER_ID = '15OqEW00HkWJrBEJtPnNPV5jwaMZ24wik';
    
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null, currentUserRole = null, currentCompanyId = 1;
    let companies = [], accounts = [], projects = [], customers = [], vendors = [];
    let statusChart = null, companyChart = null, trendChart = null, arapChart = null;
    let revenueAccounts = [];
    
    // ==================== PAYMENT REQUEST GLOBAL VARIABLES ====================
    let currentPaymentPage = 1;
    let currentPaymentPageSize = 50;
    let totalPaymentPages = 1;
    let totalPaymentItems = 0;
    let nilaiAsliPaymentRequest = 0;
    
    function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
    function formatNumber(num) { if (!num && num !== 0) return '0'; return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
    function parseRupiah(str) { if (!str) return 0; let cleaned = str.toString().replace(/[^0-9,-]/g, '').replace(',', '.'); return parseFloat(cleaned) || 0; }
    function formatMoney(input) { let v = input.value.replace(/\./g, '').replace(/[^0-9]/g, ''); input.value = v ? new Intl.NumberFormat('id-ID').format(parseInt(v)) : ''; }
    function formatDate(dateStr) { if (!dateStr) return '-'; let d = new Date(dateStr); return d.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' }); }
    
    async function getCustomerList(companyId) { let { data } = await sb.from('customers').select('*').eq('company_id', companyId); return data || []; }
    async function getProjectList(companyId) { let { data } = await sb.from('projects').select('*').eq('company_id', companyId); return data || []; }
    async function getAccountList(companyId) { let { data } = await sb.from('chart_of_accounts').select('*').eq('company_id', companyId); return data || []; }
    async function getRevenueAccounts(companyId) { let { data } = await sb.from('chart_of_accounts').select('*').eq('company_id', companyId).eq('account_type', 'Pendapatan'); return data || []; }
    async function getBankList(companyId) { let { data } = await sb.from('chart_of_accounts').select('*').eq('company_id', companyId).ilike('account_name', '%Bank%'); return data.map(b => ({ code: b.account_code, name: b.account_name, display: b.account_name })); }
    async function getVendorList(companyId) { let { data } = await sb.from('vendors').select('*').eq('company_id', companyId); return data || []; }
    async function getTaxConfig(companyId) { let configs = { 1: { ppn_rate: 11, is_pkp: true }, 2: { ppn_rate: 1.1, is_pkp: false }, 3: { ppn_rate: 1.1, is_pkp: false }, 4: { ppn_rate: 11, is_pkp: true } }; return configs[companyId] || { ppn_rate: 11, is_pkp: true }; }
    
    // ==================== TOAST NOTIFICATION ====================
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast-notify toast-${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // ==================== SKELETON LOADER ====================
    function showSkeletonLoader(tableId, rowCount = 5) {
        const tbody = document.getElementById(tableId);
        if (!tbody) return;
        let skeletonHtml = '';
        for (let i = 0; i < rowCount; i++) {
            skeletonHtml += `<tr>${'<td><div class="skeleton-loader" style="height:20px;"></div></td>'.repeat(8)}</tr>`;
        }
        tbody.innerHTML = skeletonHtml;
    }
    
    // ==================== AUTHENTICATION ====================
    async function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { let err = document.getElementById('loginError'); err.innerText = 'Isi email dan password'; err.style.display = 'block'; return; }
        showLoading();
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { hideLoading(); let err = document.getElementById('loginError'); err.innerText = error.message; err.style.display = 'block'; return; }
        const { data: profile } = await sb.from('user_profiles').select('*').eq('email', email).single();
        currentUser = data.user; currentUserRole = profile?.role || 'staff'; currentCompanyId = profile?.company_id || 1;
        const { data: comps } = await sb.from('companies').select('*'); companies = comps || [];
        document.getElementById('loginPage').style.display = 'none'; document.getElementById('appPage').style.display = 'flex';
        document.getElementById('userName').innerText = profile?.name || email; document.getElementById('userRole').innerText = currentUserRole;
        document.getElementById('userAvatar').innerText = (profile?.name || email).charAt(0).toUpperCase();
        renderSidebar(); loadDashboard(); hideLoading();

    async function refreshDashboard() {
        let companyId = document.getElementById('dashboardCompany')?.value || 'all';
        let month = document.getElementById('dashboardMonth')?.value || 'all';
        let year = document.getElementById('dashboardYear')?.value || 'all';
        
        let query = sb.from('payment_requests').select('*');
        if (companyId !== 'all') query = query.eq('company_id', parseInt(companyId));
        if (month !== 'all' && year !== 'all') { let start = `${year}-${month.padStart(2,'0')}-01`; let end = `${year}-${month.padStart(2,'0')}-31`; query = query.gte('request_date', start).lte('request_date', end); }
        let { data: payments } = await query.order('created_at', { ascending: false });
        
        let { data: invoices } = await sb.from('invoices').select('*');
        let totalPiutang = (invoices || []).reduce((a,b) => a + ((b.total||0) - (b.paid_amount||0)), 0);
        let totalApproved = (payments || []).filter(p => p.status === 'paid').reduce((a,b) => a + (b.amount||0), 0) || 0;
        let totalPending = (payments || []).filter(p => p.status === 'submitted' || p.status === 'verified').reduce((a,b) => a + (b.amount||0), 0) || 0;
        
        document.getElementById('totalKas').innerHTML = `Rp ${formatNumber(totalApproved)}`;
        document.getElementById('totalPiutang').innerHTML = `Rp ${formatNumber(totalPiutang)}`;
        document.getElementById('totalPending').innerHTML = `Rp ${formatNumber(totalPending)}`;
        
        let statusData = { draft: 0, submitted: 0, verified: 0, paid: 0, rejected: 0 };
        let companyData = { 1:0, 2:0, 3:0, 4:0 };
        let monthlyData = {};
        (payments || []).forEach(p => { 
            statusData[p.status] = (statusData[p.status] || 0) + 1; 
            companyData[p.company_id] = (companyData[p.company_id] || 0) + p.amount;
            let date = new Date(p.request_date);
            let monthKey = date.getMonth() + 1;
            monthlyData[monthKey] = (monthlyData[monthKey] || 0) + p.amount;
        });
        
        if (statusChart) statusChart.destroy();
        statusChart = new Chart(document.getElementById('statusChart'), { type: 'pie', data: { labels: ['Draft','Submitted','Verified','Paid','Rejected'], datasets: [{ data: [statusData.draft,statusData.submitted,statusData.verified,statusData.paid,statusData.rejected], backgroundColor: ['#9ca3af','#3b82f6','#f59e0b','#10b981','#ef4444'] }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });
        
        if (companyChart) companyChart.destroy();
        companyChart = new Chart(document.getElementById('companyChart'), { type: 'bar', data: { labels: ['Arko','MMC','USA','MST'], datasets: [{ data: [companyData[1]/1e6, companyData[2]/1e6, companyData[3]/1e6, companyData[4]/1e6], backgroundColor: '#3b82f6' }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: v => 'Rp ' + v + ' Jt' } } } } });
        
        let trendValues = []; for (let i = 9; i <= 12; i++) trendValues.push((monthlyData[i] || 0)/1e6); for (let i = 1; i <= 2; i++) trendValues.push((monthlyData[i] || 0)/1e6);
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(document.getElementById('trendChart'), { type: 'line', data: { labels: ['Sep','Okt','Nov','Des','Jan','Feb'], datasets: [{ data: trendValues, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: v => 'Rp ' + v + ' Jt' } } } } });
        
        if (arapChart) arapChart.destroy();
        arapChart = new Chart(document.getElementById('arapChart'), { type: 'bar', data: { labels: ['Piutang (AR)', 'Utang (AP)'], datasets: [{ data: [totalPiutang/1e6, 0], backgroundColor: ['#3b82f6', '#ef4444'] }] }, options: { responsive: true, maintainAspectRatio: false } });
        
        let tbody = ''; (payments || []).slice(0,5).forEach(p => { let company = companies.find(c => c.id == p.company_id)?.nama || '-'; tbody += `<tr><td>#${p.id}</td>.html${p.request_date || '-'}</td>.html${company}</td>.html${p.description || '-'}</td><td class="text-right">Rp ${formatNumber(p.amount)}</td>.html<span class="status-badge status-${p.status}">${p.status}</span></td>.html<button class="action-btn" onclick="viewPaymentRequest(${p.id})"><i class="fas fa-eye"></i></button></td></tr>`; });
        document.getElementById('recentTableBody').innerHTML = tbody || '<tr><td colspan="7">Belum ada数据</td></tr>';
        
        let priorities = (payments || []).filter(p => p.status === 'submitted' || p.status === 'verified');
        let priorityHtml = '<div class="table-container"><table class="table"><thead><tr><th>Tipe</th><th>Referensi</th><th>Keterangan</th><th>Jumlah</th><th>Status</th><th>Aksi</th></tr></thead><tbody>';
        priorities.forEach(p => {
            let actionBtn = p.status === 'submitted' && currentUserRole === 'finance' ? `<button class="btn btn-success btn-sm" onclick="verifyPaymentRequest(${p.id})">Verifikasi</button>` : (p.status === 'verified' && currentUserRole === 'direktur' ? `<button class="btn btn-success btn-sm" onclick="approvePaymentRequest(${p.id})">Approve</button>` : '');

        });

        let activityHtml = '<div class="activity-list">';
        (payments || []).slice(0,10).forEach(p => {
            let statusIcon = p.status === 'submitted' ? '📤' : p.status === 'verified' ? '✓' : p.status === 'paid' ? '💰' : '📝';
            activityHtml += `<div class="activity-item" style="display:flex; align-items:center; gap:0.8rem; padding:0.5rem 0; border-bottom:1px solid var(--gray-200);"><div style="width:32px; text-align:center;">${statusIcon}</div><div><strong>Payment Request #${p.id}</strong> ${p.status === 'submitted' ? 'diajukan ke finance' : p.status === 'verified' ? 'diverifikasi finance' : p.status === 'paid' ? 'disetujui direktur' : 'dibuat'}<br><small>${p.request_date} - Rp ${formatNumber(p.amount)}</small></div></div>`;

        document.getElementById('activityList').innerHTML = activityHtml || '<p>Belum ada aktivitas</p>';

    function changePaymentPageSize() { currentPaymentPageSize = parseInt(document.getElementById('paymentPageSizeSelect').value); currentPaymentPage = 1; refreshPaymentRequests(); }
    
    async function refreshPaymentRequests() {
        const month = document.getElementById('paymentMonthFilter')?.value || 'all';
        const year = document.getElementById('paymentYearFilter')?.value || 'all';
        const statusFilter = document.getElementById('paymentStatusFilter')?.value || 'all';
        showSkeletonLoader('paymentTableBody', 5);
        
        try {
            let query = sb.from('payment_requests').select('*');
            if (currentUserRole === 'staff') query = query.eq('requester_email', currentUser?.email);
            if (month !== 'all' && year !== 'all') {
                const startDate = `${year}-${month.padStart(2,'0')}-01`;
                const lastDay = new Date(year, month, 0).getDate();
                query = query.gte('request_date', startDate).lte('request_date', `${year}-${month.padStart(2,'0')}-${lastDay}`);
            } else if (year !== 'all') {
                query = query.gte('request_date', `${year}-01-01`).lte('request_date', `${year}-12-31`);
            }
            let { data: payments, error } = await query.order('id', { ascending: false });
            if (error) throw error;
            let filtered = payments || [];
            if (statusFilter !== 'all') filtered = filtered.filter(p => p.status === statusFilter);
            totalPaymentItems = filtered.length;
            totalPaymentPages = Math.ceil(totalPaymentItems / currentPaymentPageSize);
            if (currentPaymentPage > totalPaymentPages) currentPaymentPage = 1;
            const start = (currentPaymentPage - 1) * currentPaymentPageSize;
            const pageData = filtered.slice(start, start + currentPaymentPageSize);
            await renderPaymentTable(pageData, currentPaymentPage, totalPaymentPages, totalPaymentItems);
        } catch (error) { console.error(error); showToast('Gagal memuat data', 'error'); }
    }
    
    async function renderPaymentTable(requests, currentPage, totalPages, totalItems) {
        const tbody = document.getElementById('paymentTableBody');
        if (!tbody) return;
        if (!requests || requests.length === 0) { tbody.innerHTML = '<tr><td colspan="8" class="text-center">Tidak ada data</td></tr>'; updatePaymentPaginationControls(currentPage, totalPages, totalItems); return; }
        
        let html = '';
        for (const r of requests) {
            const company = companies.find(c => c.id == r.company_id)?.nama || '-';
            let statusClass = '', statusIcon = '';
            if (r.status === 'draft') { statusClass = 'status-draft'; statusIcon = '<i class="fas fa-pencil-alt"></i>'; }
            else if (r.status === 'submitted') { statusClass = 'status-submitted'; statusIcon = '<i class="fas fa-paper-plane"></i>'; }
            else if (r.status === 'verified') { statusClass = 'status-verified'; statusIcon = '<i class="fas fa-check"></i>'; }
            else if (r.status === 'paid') { statusClass = 'status-paid'; statusIcon = '<i class="fas fa-check-circle"></i>'; }
            else if (r.status === 'rejected') { statusClass = 'status-rejected'; statusIcon = '<i class="fas fa-times"></i>'; }
            
            let actions = `<button class="action-btn" onclick="viewPaymentRequest(${r.id})"><i class="fas fa-eye"></i></button>`;
            if (r.status === 'draft' && currentUserRole === 'staff' && r.requester_email === currentUser?.email) {
                actions += `<button class="action-btn" onclick="editPaymentRequest(${r.id})" style="color:var(--warning);"><i class="fas fa-edit"></i></button>`;
                actions += `<button class="action-btn" onclick="deletePaymentRequest(${r.id})" style="color:var(--danger);"><i class="fas fa-trash"></i></button>`;
                actions += `<button class="action-btn" onclick="submitPaymentRequest(${r.id})" style="color:var(--success);"><i class="fas fa-paper-plane"></i></button>`;
            }
            if (r.status === 'submitted' && currentUserRole === 'finance') {
                actions += `<button class="action-btn" onclick="verifyPaymentRequest(${r.id})" style="color:var(--success);"><i class="fas fa-check-circle"></i></button>`;
                actions += `<button class="action-btn" onclick="rejectPaymentRequest(${r.id})" style="color:var(--danger);"><i class="fas fa-times-circle"></i></button>`;
            }
            if (r.status === 'verified' && currentUserRole === 'direktur') {
                actions += `<button class="action-btn" onclick="approvePaymentRequest(${r.id})" style="color:var(--success);"><i class="fas fa-thumbs-up"></i></button>`;
            }
            html += `<tr><td>#${r.id}</td><td>${r.request_date || '-'}</td><td>${company}</td><td>${r.description || '-'}</td><td class="text-right">Rp ${formatNumber(r.amount)}</td><td class="text-right">Rp ${formatNumber(r.total_with_tax || r.amount)}</td><td><span class="status-badge ${statusClass}">${statusIcon} ${r.status}</span></td><td>${actions}</td></tr>`;
        }
        tbody.innerHTML = html;
        updatePaymentPaginationControls(currentPage, totalPages, totalItems);
    }
    
    function updatePaymentPaginationControls(currentPage, totalPages, totalItems) {
        const start = (currentPage - 1) * currentPaymentPageSize + 1;
        const end = Math.min(start + currentPaymentPageSize - 1, totalItems);
        document.getElementById('paymentShowingInfo').innerHTML = totalItems > 0 ? `Menampilkan ${start}-${end} dari ${totalItems} request` : 'Menampilkan 0-0 dari 0 request';
        document.getElementById('paymentPageInfo').innerHTML = `Halaman ${currentPage} dari ${totalPages || 1}`;
        document.getElementById('paymentPrevPageBtn').disabled = currentPage <= 1;
        document.getElementById('paymentNextPageBtn').disabled = currentPage >= totalPages;
    }
    
    function paymentNextPage() { if (currentPaymentPage < totalPaymentPages) { currentPaymentPage++; refreshPaymentRequests(); } }
    function paymentPreviousPage() { if (currentPaymentPage > 1) { currentPaymentPage--; refreshPaymentRequests(); } }

    async function savePaymentRequest(action) {
        const companyId = parseInt(document.getElementById('paymentCompany').value);
        const date = document.getElementById('paymentDate').value;
        const desc = document.getElementById('paymentDesc').value;
        const amount = parseRupiah(document.getElementById('paymentAmount').value);
        const bank = document.getElementById('paymentBank').value;
        const fileInput = document.getElementById('paymentFile');
        if (!desc || !amount || !bank) { showToast('Semua field harus diisi', 'error'); return; }
        if (!fileInput.files || fileInput.files.length === 0) { showToast('Upload bukti pendukung', 'error'); return; }
        const file = fileInput.files[0];
        if (file.size > 5 * 1024 * 1024) { showToast('Ukuran file maksimal 5MB', 'error'); return; }
        showLoading();
        try {
            const fileName = `payment_${Date.now()}_${file.name}`;
            const { error: uploadError } = await sb.storage.from('payment-files').upload(fileName, file);
            if (uploadError) throw uploadError;
            const { data: urlData } = sb.storage.from('payment-files').getPublicUrl(fileName);
            const { data, error } = await sb.from('payment_requests').insert({
                company_id: companyId, request_date: date, description: desc, amount: amount,
                bank_account: bank, bukti_url: urlData.publicUrl, requester_email: currentUser?.email,
                status: action === 'submit' ? 'submitted' : 'draft', submitted_at: action === 'submit' ? new Date() : null
            }).select().single();
            if (error) throw error;
            if (action === 'submit') {
                await sb.from('payment_logs').insert({ request_id: data.id, user_email: currentUser?.email, user_role: currentUserRole, old_status: 'draft', new_status: 'submitted', keterangan: 'Request diajukan ke finance' });
            }
            showToast(`Request berhasil ${action === 'submit' ? 'diajukan' : 'disimpan'}`, 'success');
            setTimeout(() => loadPaymentRequests(), 1500);
        } catch (error) { showToast('Gagal menyimpan: ' + error.message, 'error'); }
        finally { hideLoading(); }
    }

nchange="updatePaymentPajak()"> Gross Up PPh</label></div></div><div class="verification-summary"><table><tr><td>DPP</td><td id="paymentDPP">Rp ${formatNumber(req.amount)}</td></tr><tr><td>PPN ${taxConfig.ppn_rate}%</td><td id="paymentPPN">Rp 0</td></tr><tr><td>PPh 23 2%</td><td id="paymentPPh">Rp 0</td></tr><tr style="border-top:1px solid rgba(255,255,255,0.3);"><td><strong>TOTAL DIBAYAR</strong></td><td><strong id="paymentTotal">Rp ${formatNumber(req.amount)}</strong></td></tr><tr id="grossUpInfoRow" style="display:none;"><td colspan="2" style="text-align:center;font-style:italic;">Gross Up: Vendor terima bersih Rp <span id="vendorAmount">${formatNumber(req.amount)}</span></td></tr></table></div><div class="voucher-preview"><strong>Preview Voucher:</strong> <span id="voucherPreview">[Pilih project]</span></div><div style="display:flex;gap:1rem;justify-content:flex-end;margin-top:20px;"><button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Batal</button><button class="btn btn-success" onclick="submitVerification(${req.id})">Verifikasi & Buat Voucher</button></div><div id="verifyResult"></div></div></div>`;

    async function updateBudgetDisplay() {
        const projectCode = document.getElementById('verifyProject').value;
        const budgetDiv = document.getElementById('budgetDisplay');
        if (!projectCode || projectCode === '' || projectCode === 'NEW') { budgetDiv.style.display = 'none'; return; }
        const req = window.currentVerifikasiReq;
        try {
            const { data: project, error } = await sb.from('projects').select('*').eq('code', projectCode).eq('company_id', req.company_id).single();
            if (error || !project) { budgetDiv.style.display = 'none'; return; }
            const { data: payments } = await sb.from('payment_requests').select('amount, total_with_tax').eq('project_code', projectCode).eq('company_id', req.company_id).in('status', ['verified', 'paid']);
            const terpakai = (payments || []).reduce((a, b) => a + (b.total_with_tax || b.amount || 0), 0);
            const totalNanti = terpakai + req.amount;
            const persen = project.is_unlimited ? 0 : (totalNanti / project.budget) * 100;
            const persenFixed = Math.min(persen, 150);
            let warna = '', statusText = '';
            if (project.is_unlimited) { warna = 'unlimited'; statusText = '⚪ Unlimited (tanpa batas)'; }
            else if (persenFixed <= 70) { warna = 'safe'; statusText = '🟢 Aman'; }
            else if (persenFixed <= 90) { warna = 'warning'; statusText = '🟡 Mendekati batas'; }
            else if (persenFixed <= 100) { warna = 'danger'; statusText = '🟠 Hampir habis'; }
            else { warna = 'over'; statusText = '🔴 OVER BUDGET!'; }
            budgetDiv.style.display = 'block';
            budgetDiv.innerHTML = `<div class="budget-card"><div class="budget-title">🎯 ${project.name}</div><div class="budget-amount">${project.is_unlimited ? 'Unlimited' : `Rp ${formatNumber(project.budget)}`}</div><div class="progress-budget"><div class="progress-fill ${warna}" style="width: ${persenFixed}%;">${!project.is_unlimited ? Math.round(persenFixed) + '%' : ''}</div></div><div class="budget-stats"><span>Terpakai: Rp ${formatNumber(terpakai)}</span><span>Request ini: Rp ${formatNumber(req.amount)}</span><span>${statusText}</span></div>${!project.is_unlimited && totalNanti > project.budget ? `<div class="alert alert-warning" style="margin-top:0.5rem;">⚠️ Melebihi budget Rp ${formatNumber(totalNanti - project.budget)}</div>` : ''}</div>`;
        } catch (error) { budgetDiv.style.display = 'none'; }
    }
    
    function updatePaymentPajak() {
        const req = window.currentVerifikasiReq;
        const taxConfig = window.currentTaxConfig;
        if (!req) return;
        const kenaPPN = document.getElementById('ppnCheck')?.checked || false;
        const kenaPPh = document.getElementById('pphCheck')?.checked || false;
        const grossUp = document.getElementById('grossUpCheck')?.checked || false;
        let dpp = req.amount, ppn = 0, pph = 0, total = dpp;
        if (kenaPPN && kenaPPh) {
            if (grossUp) { dpp = Math.round(req.amount / 0.98); ppn = Math.round(dpp * (taxConfig.ppn_rate / 100)); pph = Math.round(dpp * 0.02); total = dpp + ppn; }
            else { ppn = Math.round(dpp * (taxConfig.ppn_rate / 100)); pph = Math.round(dpp * 0.02); total = dpp + ppn - pph; }
        } else if (kenaPPN && !kenaPPh) { ppn = Math.round(dpp * (taxConfig.ppn_rate / 100)); total = dpp + ppn; }
        else if (!kenaPPN && kenaPPh) {
            if (grossUp) { dpp = Math.round(req.amount / 0.98); pph = Math.round(dpp * 0.02); total = dpp; }
            else { pph = Math.round(dpp * 0.02); total = dpp - pph; }
        }
        document.getElementById('paymentDPP').innerHTML = `Rp ${formatNumber(dpp)}`;
        document.getElementById('paymentPPN').innerHTML = `Rp ${formatNumber(ppn)}`;
        document.getElementById('paymentPPh').innerHTML = `Rp ${formatNumber(pph)}`;
        document.getElementById('paymentTotal').innerHTML = `Rp ${formatNumber(total)}`;
        const grossUpRow = document.getElementById('grossUpInfoRow');
        if (grossUp && kenaPPh) { grossUpRow.style.display = 'table-row'; document.getElementById('vendorAmount').innerHTML = formatNumber(req.amount); }
        else { grossUpRow.style.display = 'none'; }
    }
    
    async function updateVoucherPreview() {
        const req = window.currentVerifikasiReq;
        if (!req) return;
        const projectSelect = document.getElementById('verifyProject');
        let projectCode = projectSelect.value === 'NEW' ? document.getElementById('newProjectCode')?.value.toUpperCase() || '' : projectSelect.value;
        const company = companies.find(c => c.id == req.company_id);
        const companyCode = company?.kode || 'ARK';
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        let basePattern = `${companyCode}/${year}/${month}`;
        if (projectCode && projectCode !== '') basePattern += `/${projectCode}`;
        const { data: existing } = await sb.from('payment_requests').select('voucher_no');
        let lastNumber = 0;
        (existing || []).forEach(v => { if (v.voucher_no && v.voucher_no.startsWith(basePattern)) { const num = parseInt(v.voucher_no.split('/').pop()); if (num > lastNumber) lastNumber = num; } });
        const nextNumber = (lastNumber + 1).toString().padStart(3, '0');
        let previewText = `${basePattern}/${nextNumber}`;
        if (projectSelect.value === 'NEW' && !document.getElementById('newProjectCode')?.value) previewText = `${basePattern}/[KODE]/001 (isi kode project dulu)`;
        document.getElementById('voucherPreview').innerHTML = `<strong>${previewText}</strong>`;
    }
    
    async function submitVerification(id) {
        const debitAccount = document.getElementById('debitAccount').value;
        const creditAccount = document.getElementById('creditAccount').value;
        const kenaPPN = document.getElementById('ppnCheck')?.checked || false;
        const kenaPPh = document.getElementById('pphCheck')?.checked || false;
        const grossUp = document.getElementById('grossUpCheck')?.checked || false;
        if (!debitAccount || !creditAccount) { showToast('Pilih akun debit dan kredit', 'error'); return; }
        const req = window.currentVerifikasiReq;
        const taxConfig = window.currentTaxConfig;
        let dpp = req.amount, ppn = 0, pph = 0;
        if (kenaPPN && kenaPPh) {
            if (grossUp) { dpp = Math.round(req.amount / 0.98); ppn = Math.round(dpp * (taxConfig.ppn_rate / 100)); pph = Math.round(dpp * 0.02); }
            else { ppn = Math.round(dpp * (taxConfig.ppn_rate / 100)); pph = Math.round(dpp * 0.02); }
        } else if (kenaPPN && !kenaPPh) { ppn = Math.round(dpp * (taxConfig.ppn_rate / 100)); }
        else if (!kenaPPN && kenaPPh) {
            if (grossUp) { dpp = Math.round(req.amount / 0.98); pph = Math.round(dpp * 0.02); }
            else { pph = Math.round(dpp * 0.02); }
        }
        const total = dpp + ppn - pph;
        showLoading();
        try {
            let projectCode = '';
            const projectSelect = document.getElementById('verifyProject');
            if (projectSelect.value === 'NEW') {
                projectCode = document.getElementById('newProjectCode')?.value.toUpperCase().trim();
                const projectName = document.getElementById('newProjectName')?.value.trim();
                const projectBudget = parseRupiah(document.getElementById('newProjectBudget')?.value);
                if (!projectCode || !projectName) { showToast('Isi kode dan nama project', 'error'); return; }
                const { data: existing } = await sb.from('projects').select('*').eq('company_id', req.company_id).eq('code', projectCode);
                if (!existing || existing.length === 0) {
                    await sb.from('projects').insert({ company_id: req.company_id, code: projectCode, name: projectName, budget: projectBudget || 0, is_unlimited: projectBudget === 0, created_by: currentUser?.email });
                }
            } else { projectCode = projectSelect.value; }
            const company = companies.find(c => c.id == req.company_id);
            const companyCode = company?.kode || 'ARK';
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            let basePattern = `${companyCode}/${year}/${month}`;
            if (projectCode && projectCode !== '') basePattern += `/${projectCode}`;
            const { data: existing } = await sb.from('payment_requests').select('voucher_no');
            let lastNumber = 0;
            (existing || []).forEach(v => { if (v.voucher_no && v.voucher_no.startsWith(basePattern)) { const num = parseInt(v.voucher_no.split('/').pop()); if (num > lastNumber) lastNumber = num; } });
            const voucherNo = `${basePattern}/${(lastNumber + 1).toString().padStart(3, '0')}`;
            await sb.from('payment_requests').update({ status: 'verified', verified_at: new Date(), verified_by: currentUser?.email, debit_account: debitAccount, credit_account: creditAccount, voucher_no: voucherNo, ppn: ppn, pph: pph, total_with_tax: total, project_code: projectCode, ppn_rate: taxConfig.ppn_rate, is_pkp: taxConfig.is_pkp }).eq('id', id);
            await sb.from('payment_logs').insert({ request_id: id, user_email: currentUser?.email, user_role: currentUserRole, old_status: 'submitted', new_status: 'verified', keterangan: `Verifikasi, Voucher: ${voucherNo}, Project: ${projectCode || '-'}, PPN: ${ppn}, PPh: ${pph}` });
            showToast(`✅ Diverifikasi! Voucher: ${voucherNo}`, 'success');
            setTimeout(() => { document.querySelector('.modal-overlay')?.remove(); refreshPaymentRequests(); }, 1500);
        } catch (error) { showToast('Gagal verifikasi: ' + error.message, 'error'); }
        finally { hideLoading(); }
    }

    async function checkSession() {
        const { data } = await sb.auth.getSession();
        if (data.session) {
            const { data: profile } = await sb.from('user_profiles').select('*').eq('email', data.session.user.email).single();
            currentUser = data.session.user; currentUserRole = profile?.role || 'staff'; currentCompanyId = profile?.company_id || 1;
            const { data: comps } = await sb.from('companies').select('*'); companies = comps || [];
            document.getElementById('loginPage').style.display = 'none'; document.getElementById('appPage').style.display = 'flex';
            document.getElementById('userName').innerText = profile?.name || currentUser.email; document.getElementById('userRole').innerText = currentUserRole;
            document.getElementById('userAvatar').innerText = (profile?.name || currentUser.email).charAt(0).toUpperCase();
            renderSidebar(); loadDashboard();
        }
    }
