        .main { flex: 1; margin-left: 260px; padding: 1.5rem; }

        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-warning { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .alert-info { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary), var(--primary-light)); }
        .login-card { background: white; border-radius: 20px; padding: 1.5rem; width: 100%; max-width: 380px; text-align: center; box-shadow: var(--shadow-lg); }
        .login-logo i { font-size: 2.5rem; color: var(--accent); margin-bottom: 0.3rem; }
        .login-logo h1 { font-size: 1.5rem; margin-bottom: 0.1rem; }
        .welcome-section { background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 16px; padding: 1rem; margin-bottom: 1rem; color: white; display: flex; justify-content: space-between; align-items: center; }
        .welcome-section h1 { font-size: 1.1rem; display: flex; align-items: center; gap: 0.3rem; }
        .welcome-date { background: rgba(255,255,255,0.15); padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }

        .mt-3 { margin-top: 0.8rem; }

        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } .stats-grid { grid-template-columns: 1fr 1fr; } .charts-grid { grid-template-columns: 1fr; } }
        
        /* ==================== PAYMENT REQUEST PREMIUM CSS ==================== */
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            padding: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .pagination-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .pagination-btn {
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--gray-300);
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pagination-btn:hover:not(:disabled) {
            background: var(--gray-100);
            border-color: var(--accent);
        }
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .page-size-select {
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--gray-300);
            background: white;
            cursor: pointer;
        }
        .page-info {
            padding: 0.4rem 1rem;

            border-radius: 8px;
            font-size: 0.8rem;
        }
        .skeleton-loader {
            background: linear-gradient(90deg, var(--gray-200) 25%, var(--gray-300) 50%, var(--gray-200) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 4px;
            height: 20px;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .toast-notify {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            max-width: 350px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .toast-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .toast-warning { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .budget-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 16px;
            padding: 1rem;
            color: white;
            margin-bottom: 1rem;
        }
        .budget-title { font-size: 0.7rem; opacity: 0.7; margin-bottom: 0.3rem; }
        .budget-amount { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
        .budget-stats { display: flex; justify-content: space-between; font-size: 0.65rem; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .progress-budget { background: rgba(255,255,255,0.2); border-radius: 30px; height: 24px; width: 100%; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 30px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; color: white; font-size: 10px; font-weight: 700; transition: width 0.5s ease; }
        .progress-fill.safe { background: linear-gradient(90deg, #10b981, #34d399); }
        .progress-fill.warning { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .progress-fill.danger { background: linear-gradient(90deg, #ea580c, #f97316); }
        .progress-fill.over { background: linear-gradient(90deg, #dc2626, #ef4444); }
        .progress-fill.unlimited { background: linear-gradient(90deg, #9ca3af, #d1d5db); }
        .payment-detail-table { width: 100%; border-collapse: collapse; }
        .payment-detail-table td { padding: 8px; border-bottom: 1px solid var(--gray-200); }
        .payment-detail-table td:first-child { background: var(--gray-50); width: 140px; font-weight: 500; }
        .history-log { background: var(--gray-50); border-radius: 8px; padding: 12px; margin-bottom: 8px; border-left: 3px solid var(--accent); }
        .history-log-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .history-log-status { font-weight: 600; color: var(--accent); }
        .history-log-time { font-size: 0.7rem; color: var(--gray-500); }
        .history-log-keterangan { font-size: 0.8rem; margin-bottom: 5px; }
        .history-log-user { font-size: 0.7rem; color: var(--gray-500); }
        .verification-summary { background: var(--primary); color: white; padding: 1rem; border-radius: 12px; margin: 1rem 0; }
        .verification-summary table { width: 100%; color: white; }
        .verification-summary td { padding: 6px 0; }
        .verification-summary td:first-child { width: 40%; }
        .verification-summary td:last-child { text-align: right; font-weight: bold; }
        .voucher-preview { background: var(--gray-50); padding: 1rem; border-radius: 12px; text-align: center; font-size: 1.2rem; font-weight: bold; color: var(--accent); font-family: monospace; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>
    
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <div class="login-logo"><i class="fas fa-building"></i><h1>ARKO GROUP</h1><p>ERP System</p></div>

            <div class="form-group"><label>Password</label><input type="password" id="loginPassword" class="form-control" placeholder="••••••••"></div>
            <button class="btn btn-primary" style="width:100%" onclick="login()">Login</button>
            <div id="loginError" class="alert alert-error" style="display:none; margin-top:0.5rem;"></div>

                <h1 class="page-title" id="pageTitle">Dashboard</h1>

                    <div><div class="user-name" id="userName">Loading...</div><div class="user-role" id="userRole">Loading...</div></div>

            <div id="content"></div>
        </div>
    </div>

    <script>
    // ==================== KONFIGURASI SUPABASE ====================
    const SUPABASE_URL = 'https://vtkineqwvnuzxxcegofx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0a2luZXF3dm51enh4Y2Vnb2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDU4OTMsImV4cCI6MjA5MDg4MTg5M30.7ygetyHX-_-5JDU-pXS2eP3iLgpI_zP6Gqms1gSY0ys';
    const GAS_UPLOAD_URL = 'https://script.google.com/macros/s/AKfycbzQDc9CUWZELs7iw9a4lDJJPC74jMMZr5savRc-2GTWnuWpFyUytI_zrYYgaCWZfXrMMQ/exec';
    const DRIVE_FOLDER_ID = '15OqEW00HkWJrBEJtPnNPV5jwaMZ24wik';
    
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null, currentUserRole = null, currentCompanyId = 1;
    let companies = [], accounts = [], projects = [], customers = [], vendors = [];
    let statusChart = null, companyChart = null, trendChart = null, arapChart = null;
    let revenueAccounts = [];
    
    // ==================== PAYMENT REQUEST GLOBAL VARIABLES ====================
    let currentPaymentPage = 1;
    let currentPaymentPageSize = 50;
    let totalPaymentPages = 1;
    let totalPaymentItems = 0;
    let nilaiAsliPaymentRequest = 0;
    
    function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
    function formatNumber(num) { if (!num && num !== 0) return '0'; return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
    function parseRupiah(str) { if (!str) return 0; let cleaned = str.toString().replace(/[^0-9,-]/g, '').replace(',', '.'); return parseFloat(cleaned) || 0; }
    function formatMoney(input) { let v = input.value.replace(/\./g, '').replace(/[^0-9]/g, ''); input.value = v ? new Intl.NumberFormat('id-ID').format(parseInt(v)) : ''; }
    function formatDate(dateStr) { if (!dateStr) return '-'; let d = new Date(dateStr); return d.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' }); }
    
    async function getCustomerList(companyId) { let { data } = await sb.from('customers').select('*').eq('company_id', companyId); return data || []; }
    async function getProjectList(companyId) { let { data } = await sb.from('projects').select('*').eq('company_id', companyId); return data || []; }
    async function getAccountList(companyId) { let { data } = await sb.from('chart_of_accounts').select('*').eq('company_id', companyId); return data || []; }
    async function getRevenueAccounts(companyId) { let { data } = await sb.from('chart_of_accounts').select('*').eq('company_id', companyId).eq('account_type', 'Pendapatan'); return data || []; }
    async function getBankList(companyId) { let { data } = await sb.from('chart_of_accounts').select('*').eq('company_id', companyId).ilike('account_name', '%Bank%'); return data.map(b => ({ code: b.account_code, name: b.account_name, display: b.account_name })); }
    async function getVendorList(companyId) { let { data } = await sb.from('vendors').select('*').eq('company_id', companyId); return data || []; }
    async function getTaxConfig(companyId) { let configs = { 1: { ppn_rate: 11, is_pkp: true }, 2: { ppn_rate: 1.1, is_pkp: false }, 3: { ppn_rate: 1.1, is_pkp: false }, 4: { ppn_rate: 11, is_pkp: true } }; return configs[companyId] || { ppn_rate: 11, is_pkp: true }; }
    
    // ==================== TOAST NOTIFICATION ====================
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast-notify toast-${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // ==================== SKELETON LOADER ====================
    function showSkeletonLoader(tableId, rowCount = 5) {
        const tbody = document.getElementById(tableId);
        if (!tbody) return;
        let skeletonHtml = '';
        for (let i = 0; i < rowCount; i++) {
            skeletonHtml += `<tr>${'<td><div class="skeleton-loader" style="height:20px;"></div></td>'.repeat(8)}</tr>`;
        }
        tbody.innerHTML = skeletonHtml;
    }
    
    // ==================== AUTHENTICATION ====================
    async function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { let err = document.getElementById('loginError'); err.innerText = 'Isi email dan password'; err.style.display = 'block'; return; }
        showLoading();
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { hideLoading(); let err = document.getElementById('loginError'); err.innerText = error.message; err.style.display = 'block'; return; }
        const { data: profile } = await sb.from('user_profiles').select('*').eq('email', email).single();
        currentUser = data.user; currentUserRole = profile?.role || 'staff'; currentCompanyId = profile?.company_id || 1;
        const { data: comps } = await sb.from('companies').select('*'); companies = comps || [];
        document.getElementById('loginPage').style.display = 'none'; document.getElementById('appPage').style.display = 'flex';
        document.getElementById('userName').innerText = profile?.name || email; document.getElementById('userRole').innerText = currentUserRole;

    async function refreshDashboard() {
        let companyId = document.getElementById('dashboardCompany')?.value || 'all';
        let month = document.getElementById('dashboardMonth')?.value || 'all';
        let year = document.getElementById('dashboardYear')?.value || 'all';
        
        let query = sb.from('payment_requests').select('*');
        if (companyId !== 'all') query = query.eq('company_id', parseInt(companyId));
        if (month !== 'all' && year !== 'all') { let start = `${year}-${month.padStart(2,'0')}-01`; let end = `${year}-${month.padStart(2,'0')}-31`; query = query.gte('request_date', start).lte('request_date', end); }
        let { data: payments } = await query.order('created_at', { ascending: false });
        
        let { data: invoices } = await sb.from('invoices').select('*');
        let totalPiutang = (invoices || []).reduce((a,b) => a + ((b.total||0) - (b.paid_amount||0)), 0);
        let totalApproved = (payments || []).filter(p => p.status === 'paid').reduce((a,b) => a + (b.amount||0), 0) || 0;
        let totalPending = (payments || []).filter(p => p.status === 'submitted' || p.status === 'verified').reduce((a,b) => a + (b.amount||0), 0) || 0;
        
        let { data: vendorInvoices } = await sb.from('vendor_invoices').select('*');
        let totalUtang = (vendorInvoices || []).reduce((a,b) => a + ((b.total||0) - (b.paid_amount||0)), 0);
        
        document.getElementById('totalKas').innerHTML = `Rp ${formatNumber(totalApproved)}`;
        document.getElementById('totalPiutang').innerHTML = `Rp ${formatNumber(totalPiutang)}`;
        document.getElementById('totalUtang').innerHTML = `Rp ${formatNumber(totalUtang)}`;
        document.getElementById('totalPending').innerHTML = `Rp ${formatNumber(totalPending)}`;
        
        let statusData = { draft: 0, submitted: 0, verified: 0, paid: 0, rejected: 0 };
        let companyData = { 1:0, 2:0, 3:0, 4:0 };
        let monthlyData = {};
        (payments || []).forEach(p => { 
            statusData[p.status] = (statusData[p.status] || 0) + 1; 
            companyData[p.company_id] = (companyData[p.company_id] || 0) + p.amount;
            let date = new Date(p.request_date);
            let monthKey = date.getMonth() + 1;
            monthlyData[monthKey] = (monthlyData[monthKey] || 0) + p.amount;
        });
        
        if (statusChart) statusChart.destroy();
        statusChart = new Chart(document.getElementById('statusChart'), { type: 'pie', data: { labels: ['Draft','Submitted','Verified','Paid','Rejected'], datasets: [{ data: [statusData.draft,statusData.submitted,statusData.verified,statusData.paid,statusData.rejected], backgroundColor: ['#9ca3af','#3b82f6','#f59e0b','#10b981','#ef4444'] }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });
        
        if (companyChart) companyChart.destroy();
        companyChart = new Chart(document.getElementById('companyChart'), { type: 'bar', data: { labels: ['Arko','MMC','USA','MST'], datasets: [{ data: [companyData[1]/1e6, companyData[2]/1e6, companyData[3]/1e6, companyData[4]/1e6], backgroundColor: '#3b82f6' }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: v => 'Rp ' + v + ' Jt' } } } } });
        
        let trendValues = []; for (let i = 9; i <= 12; i++) trendValues.push((monthlyData[i] || 0)/1e6); for (let i = 1; i <= 2; i++) trendValues.push((monthlyData[i] || 0)/1e6);
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(document.getElementById('trendChart'), { type: 'line', data: { labels: ['Sep','Okt','Nov','Des','Jan','Feb'], datasets: [{ data: trendValues, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: v => 'Rp ' + v + ' Jt' } } } } });
        
        if (arapChart) arapChart.destroy();
        arapChart = new Chart(document.getElementById('arapChart'), { type: 'bar', data: { labels: ['Piutang (AR)', 'Utang (AP)'], datasets: [{ data: [totalPiutang/1e6, totalUtang/1e6], backgroundColor: ['#3b82f6', '#ef4444'] }] }, options: { responsive: true, maintainAspectRatio: false } });
        
        let tbody = ''; (payments || []).slice(0,5).forEach(p => { let company = companies.find(c => c.id == p.company_id)?.nama || '-'; tbody += `<td>#${p.id}</td>.html${p.request_date || '-'}</td>.html${company}</td>.html${p.description || '-'}</td><td class="text-right">Rp ${formatNumber(p.amount)}</td>.html<span class="status-badge status-${p.status}">${p.status}</span></td>.html<button class="action-btn" onclick="viewPaymentRequest(${p.id})"><i class="fas fa-eye"></i></button></td></tr>`; });
        document.getElementById('recentTableBody').innerHTML = tbody || '<tr><td colspan="7">Belum ada数据</td></tr>';
        
        let priorities = (payments || []).filter(p => p.status === 'submitted' || p.status === 'verified');
        let priorityHtml = '<div class="table-container"><table class="table"><thead><tr><th>Tipe</th><th>Referensi</th><th>Keterangan</th><th>Jumlah</th><th>Status</th><th>Aksi</th></tr></thead><tbody>';
        priorities.forEach(p => {
            let actionBtn = p.status === 'submitted' && currentUserRole === 'finance' ? `<button class="btn btn-success btn-sm" onclick="verifyPaymentRequest(${p.id})">Verifikasi</button>` : (p.status === 'verified' && currentUserRole === 'direktur' ? `<button class="btn btn-success btn-sm" onclick="approvePaymentRequest(${p.id})">Approve</button>` : '');
            priorityHtml += `<tr><td>Payment</td><td>#${p.id}</td><td>${p.description}</td><td class="text-right">Rp ${formatNumber(p.amount)}</td><td><span class="status-badge status-${p.status}">${p.status}</span></td><td>${actionBtn}</td></tr>`;
        });
        priorityHtml += '</tbody></table></div>';
        document.getElementById('priorityTableBody').innerHTML = priorities.length ? priorityHtml : '<p style="padding:1rem; text-align:center;">Tidak ada yang perlu ditindaklanjuti</p>';
        
        let activityHtml = '<div class="activity-list">';
        (payments || []).slice(0,10).forEach(p => {
            let statusIcon = p.status === 'submitted' ? '📤' : p.status === 'verified' ? '✓' : p.status === 'paid' ? '💰' : '📝';
            activityHtml += `<div class="activity-item" style="display:flex; align-items:center; gap:0.8rem; padding:0.5rem 0; border-bottom:1px solid var(--gray-200);"><div style="width:32px; text-align:center;">${statusIcon}</div><div><strong>Payment Request #${p.id}</strong> ${p.status === 'submitted' ? 'diajukan ke finance' : p.status === 'verified' ? 'diverifikasi finance' : p.status === 'paid' ? 'disetujui direktur' : 'dibuat'}<br><small>${p.request_date} - Rp ${formatNumber(p.amount)}</small></div></div>`;
        });
        activityHtml += '</div>';
        document.getElementById('activityList').innerHTML = activityHtml || '<p>Belum ada aktivitas</p>';
    }

    function changePaymentPageSize() { currentPaymentPageSize = parseInt(document.getElementById('paymentPageSizeSelect').value); currentPaymentPage = 1; refreshPaymentRequests(); }
    
    async function refreshPaymentRequests() {
        const month = document.getElementById('paymentMonthFilter')?.value || 'all';
        const year = document.getElementById('paymentYearFilter')?.value || 'all';
        const statusFilter = document.getElementById('paymentStatusFilter')?.value || 'all';
        showSkeletonLoader('paymentTableBody', 5);
        
        try {
            let query = sb.from('payment_requests').select('*');
            
            if (currentUserRole === 'staff') {
                query = query.eq('requester_email', currentUser?.email);
            } else if (currentUserRole === 'finance' || currentUserRole === 'direktur') {
                query = query.or(`and(status.eq.draft,requester_email.eq.${currentUser?.email}),and(status.neq.draft,status.neq.null)`);
            }
            
            if (month !== 'all' && year !== 'all') {
                const startDate = `${year}-${month.padStart(2,'0')}-01`;
                const lastDay = new Date(year, month, 0).getDate();
                query = query.gte('request_date', startDate).lte('request_date', `${year}-${month.padStart(2,'0')}-${lastDay}`);
            } else if (year !== 'all') {
                query = query.gte('request_date', `${year}-01-01`).lte('request_date', `${year}-12-31`);
            }
            
            let { data: payments, error } = await query.order('id', { ascending: false });
            if (error) throw error;
            
            let filtered = payments || [];
            if (statusFilter !== 'all') {
                filtered = filtered.filter(p => p.status === statusFilter);
            }
            
            totalPaymentItems = filtered.length;
            totalPaymentPages = Math.ceil(totalPaymentItems / currentPaymentPageSize);
            if (currentPaymentPage > totalPaymentPages) currentPaymentPage = 1;
            const start = (currentPaymentPage - 1) * currentPaymentPageSize;
            const pageData = filtered.slice(start, start + currentPaymentPageSize);
            await renderPaymentTable(pageData, currentPaymentPage, totalPaymentPages, totalPaymentItems);
        } catch (error) { console.error(error); showToast('Gagal memuat data', 'error'); }
    }
    
    async function renderPaymentTable(requests, currentPage, totalPages, totalItems) {
        const tbody = document.getElementById('paymentTableBody');
        if (!tbody) return;
        if (!requests || requests.length === 0) { tbody.innerHTML = '<tr><td colspan="8" class="text-center">Tidak ada数据</td></tr>'; updatePaymentPaginationControls(currentPage, totalPages, totalItems); return; }
        
        let html = '';
        for (const r of requests) {
            const company = companies.find(c => c.id == r.company_id)?.nama || '-';
            let statusClass = '', statusIcon = '';
            if (r.status === 'draft') { statusClass = 'status-draft'; statusIcon = '<i class="fas fa-pencil-alt"></i>'; }
            else if (r.status === 'submitted') { statusClass = 'status-submitted'; statusIcon = '<i class="fas fa-paper-plane"></i>'; }
            else if (r.status === 'verified') { statusClass = 'status-verified'; statusIcon = '<i class="fas fa-check"></i>'; }
            else if (r.status === 'paid') { statusClass = 'status-paid'; statusIcon = '<i class="fas fa-check-circle"></i>'; }
            else if (r.status === 'rejected') { statusClass = 'status-rejected'; statusIcon = '<i class="fas fa-times"></i>'; }
            
            let actions = `<button class="action-btn" onclick="viewPaymentRequest(${r.id})"><i class="fas fa-eye"></i></button>`;
            if (r.status === 'draft' && r.requester_email === currentUser?.email) {
                actions += `<button class="action-btn" onclick="editPaymentRequest(${r.id})" style="color:var(--warning);"><i class="fas fa-edit"></i></button>`;
                actions += `<button class="action-btn" onclick="deletePaymentRequest(${r.id})" style="color:var(--danger);"><i class="fas fa-trash"></i></button>`;
                if (currentUserRole === 'staff') {
                    actions += `<button class="action-btn" onclick="submitPaymentRequest(${r.id})" style="color:var(--success);"><i class="fas fa-paper-plane"></i></button>`;
                }
            }
            if (r.status === 'submitted' && (currentUserRole === 'finance' || currentUserRole === 'direktur')) {
                actions += `<button class="action-btn" onclick="verifyPaymentRequest(${r.id})" style="color:var(--success);"><i class="fas fa-check-circle"></i></button>`;
                actions += `<button class="action-btn" onclick="rejectPaymentRequest(${r.id})" style="color:var(--danger);"><i class="fas fa-times-circle"></i></button>`;
            }
            if (r.status === 'verified' && currentUserRole === 'direktur') {
                actions += `<button class="action-btn" onclick="approvePaymentRequest(${r.id})" style="color:var(--success);"><i class="fas fa-thumbs-up"></i></button>`;
            }
            html += `<tr><td>#${r.id}</td><td>${r.request_date || '-'}</td><td>${company}</td><td>${r.description || '-'}</td><td class="text-right">Rp ${formatNumber(r.amount)}</td><td class="text-right">Rp ${formatNumber(r.total_with_tax || r.amount)}</td><td><span class="status-badge ${statusClass}">${statusIcon} ${r.status}</span></td><td>${actions}</td></tr>`;
        }
        tbody.innerHTML = html;
        updatePaymentPaginationControls(currentPage, totalPages, totalItems);
    }
    
    function updatePaymentPaginationControls(currentPage, totalPages, totalItems) {
        const start = (currentPage - 1) * currentPaymentPageSize + 1;
        const end = Math.min(start + currentPaymentPageSize - 1, totalItems);
        document.getElementById('paymentShowingInfo').innerHTML = totalItems > 0 ? `Menampilkan ${start}-${end} dari ${totalItems} request` : 'Menampilkan 0-0 dari 0 request';
        document.getElementById('paymentPageInfo').innerHTML = `Halaman ${currentPage} dari ${totalPages || 1}`;
        document.getElementById('paymentPrevPageBtn').disabled = currentPage <= 1;
        document.getElementById('paymentNextPageBtn').disabled = currentPage >= totalPages;
    }
    
    function paymentNextPage() { if (currentPaymentPage < totalPaymentPages) { currentPaymentPage++; refreshPaymentRequests(); } }
    function paymentPreviousPage() { if (currentPaymentPage > 1) { currentPaymentPage--; refreshPaymentRequests(); } }

    async function savePaymentRequest(action) {
        const companyId = parseInt(document.getElementById('paymentCompany').value);
        const date = document.getElementById('paymentDate').value;
        const desc = document.getElementById('paymentDesc').value;
        const amount = parseRupiah(document.getElementById('paymentAmount').value);
        const bank = document.getElementById('paymentBank').value;
        const fileInput = document.getElementById('paymentFile');
        
        if (!desc || !amount || !bank) { showToast('Semua field harus diisi', 'error'); return; }
        if (!fileInput.files || fileInput.files.length === 0) { showToast('Upload bukti pendukung', 'error'); return; }
        const file = fileInput.files[0];
        if (file.size > 5 * 1024 * 1024) { showToast('Ukuran file maksimal 5MB', 'error'); return; }
        
        showLoading();
        
        const reader = new FileReader();
        reader.onload = async function(e) {
            const base64 = e.target.result;
            
            try {
                const res = await fetch(GAS_UPLOAD_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'upload',
                        file: base64,
                        name: file.name,
                        mimeType: file.type,
                        folderId: DRIVE_FOLDER_ID
                    })
                });
                const result = await res.json();
                
                if (!result.success) throw new Error(result.message);
                
                const { data, error } = await sb.from('payment_requests').insert({
                    company_id: companyId,
                    request_date: date,
                    description: desc,
                    amount: amount,
                    bank_account: bank,
                    bukti_url: result.url,
                    requester_email: currentUser?.email,
                    status: action === 'submit' ? 'submitted' : 'draft',
                    submitted_at: action === 'submit' ? new Date() : null
                }).select().single();
                
                if (error) throw error;
                
                if (action === 'submit') {
                    await sb.from('payment_logs').insert({
                        request_id: data.id,
                        user_email: currentUser?.email,
                        user_role: currentUserRole,
                        old_status: 'draft',
                        new_status: 'submitted',
                        keterangan: 'Request diajukan ke finance'
                    });
                }
                
                showToast(`Request berhasil ${action === 'submit' ? 'diajukan' : 'disimpan'}`, 'success');
                setTimeout(() => loadPaymentRequests(), 1500);
                
            } catch (error) {
                console.error(error);
                showToast('Gagal menyimpan: ' + error.message, 'error');
            } finally {
                hideLoading();
            }
        };
        reader.readAsDataURL(file);
    }

    async function updatePaymentRequest(id) {
        const date = document.getElementById('editPaymentDate').value;
        const desc = document.getElementById('editPaymentDesc').value;
        const amount = parseRupiah(document.getElementById('editPaymentAmount').value);
        const bank = document.getElementById('editPaymentBank').value;
        const fileInput = document.getElementById('editPaymentFile');
        
        if (!desc || !amount || !bank || !date) { showToast('Semua field harus diisi', 'error'); return; }
        
        showLoading();
        
        try {
            let buktiUrl = null;
            
            if (fileInput.files && fileInput.files.length > 0) {
                const file = fileInput.files[0];
                
                const reader = new FileReader();
                const uploadResult = await new Promise((resolve, reject) => {
                    reader.onload = async function(e) {
                        try {
                            const res = await fetch(GAS_UPLOAD_URL, {
                                method: 'POST',
                                body: JSON.stringify({
                                    action: 'upload',
                                    file: e.target.result,
                                    name: file.name,
                                    mimeType: file.type,
                                    folderId: DRIVE_FOLDER_ID
                                })
                            });
                            const result = await res.json();
                            resolve(result);
                        } catch (err) { reject(err); }
                    };
                    reader.readAsDataURL(file);
                });
                
                if (uploadResult.success) buktiUrl = uploadResult.url;
            }
            
            const updateData = { request_date: date, description: desc, amount: amount, bank_account: bank };
            if (buktiUrl) updateData.bukti_url = buktiUrl;
            
            await sb.from('payment_requests').update(updateData).eq('id', id);
            showToast('Payment request berhasil diupdate', 'success');
            setTimeout(() => loadPaymentRequests(), 1500);
            
        } catch (error) {
            console.error(error);
            showToast('Gagal mengupdate: ' + error.message, 'error');
        } finally {
            hideLoading();
        }
    }
    
    async function deletePaymentRequest(id) {
        if (!confirm('Hapus payment request ini? Tindakan tidak bisa dibatalkan!')) return;
        showLoading();
        try {
            await sb.from('payment_requests').delete().eq('id', id);
            showToast('Payment request berhasil dihapus', 'success');
            refreshPaymentRequests();
        } catch (error) { showToast('Gagal menghapus: ' + error.message, 'error'); }
        finally { hideLoading(); }
    }

    async function rejectPaymentRequest(id) {

    async function approvePaymentRequest(id) {
        const { data: req, error } = await sb.from('payment_requests').select('*').eq('id', id).single();
        if (error) { showToast('Gagal memuat data', 'error'); return; }
        if (!confirm(`SETUJUI PEMBAYARAN INI?\n\nID: #${req.id}\nDeskripsi: ${req.description}\nJumlah: Rp ${formatNumber(req.amount)}\nTotal Transfer: Rp ${formatNumber(req.total_with_tax || req.amount)}\nProject: ${req.project_code || '-'}\n\nKlik OK untuk menyetujui`)) return;
        showLoading();
        try {
            const lastJournal = await sb.from('journals').select('id').order('id', { ascending: false }).limit(1);
            const journalId = (lastJournal.data?.[0]?.id || 0) + 1;
            const now = new Date();
            const dateStr = now.toISOString().split('T')[0];
            await sb.from('journals').insert({ id: journalId, company_id: req.company_id, journal_date: dateStr, period: dateStr.substring(0,7), description: `Pembayaran: ${req.description}`, reference: req.voucher_no, created_by: currentUser?.email, status: 'posted' });
            await sb.from('journal_lines').insert([{ journal_id: journalId, account_code: req.debit_account, debit: req.amount, credit: 0, description: `Beban dari ${req.voucher_no}` }, { journal_id: journalId, account_code: req.credit_account, debit: 0, credit: req.total_with_tax || req.amount, description: `Transfer ke vendor dari ${req.voucher_no}` }]);
            if (req.ppn > 0 && req.is_pkp) { const suffix = companies.find(c => c.id == req.company_id)?.singkatan || 'A'; await sb.from('journal_lines').insert({ journal_id: journalId, account_code: `1131-${suffix}`, debit: req.ppn, credit: 0, description: `PPN Masukan dari ${req.voucher_no}` }); }
            if (req.pph > 0) { const suffix = companies.find(c => c.id == req.company_id)?.singkatan || 'A'; await sb.from('journal_lines').insert({ journal_id: journalId, account_code: `2103-03-${suffix}`, debit: 0, credit: req.pph, description: `Utang PPh 23 dari ${req.voucher_no}` }); }
            await sb.from('payment_requests').update({ status: 'paid', paid_at: now, approved_by: currentUser?.email, journal_id: journalId }).eq('id', id);
            await sb.from('payment_logs').insert({ request_id: id, user_email: currentUser?.email, user_role: currentUserRole, old_status: 'verified', new_status: 'paid', keterangan: `Approved, Jurnal: ${journalId}` });
            showToast(`✅ Payment approved! Jurnal ID: ${journalId}`, 'success');
            refreshPaymentRequests();
        } catch (error) { showToast('Gagal approve: ' + error.message, 'error'); }
        finally { hideLoading(); }
    }

    // ==================== FUNGSI GLOBAL UNTUK VERIFIKASI ====================
    function handleProjectChange() {
        const select = document.getElementById('verifyProject');
        const newProjectDiv = document.getElementById('newProjectSection');
        const existingBudgetDiv = document.getElementById('existingProjectBudget');
        
        if (!select) return;
        
        if (select.value === 'NEW') {
            if (newProjectDiv) newProjectDiv.style.display = 'block';
            if (existingBudgetDiv) existingBudgetDiv.style.display = 'none';
        } else if (select.value && select.value !== '') {
            if (newProjectDiv) newProjectDiv.style.display = 'none';
            if (existingBudgetDiv) {
                existingBudgetDiv.style.display = 'block';
                updateExistingProjectBudget(select.value);
            }
        } else {
            if (newProjectDiv) newProjectDiv.style.display = 'none';
            if (existingBudgetDiv) existingBudgetDiv.style.display = 'none';
        }
        updateVoucherPreview();
    }
    
    function updateNewProjectPreview() {
        const budgetInput = document.getElementById('newProjectBudget');
        if (!budgetInput) return;
        
        const budget = parseRupiah(budgetInput.value);
        const previewDiv = document.getElementById('newProjectBudgetPreview');
        const req = window.currentVerifikasiReq;
        
        if (!previewDiv || !req) return;
        
        if (budget === 0) {
            previewDiv.innerHTML = `<div class="alert alert-info" style="margin-top:10px;"><i class="fas fa-infinity"></i> Project Unlimited - tidak ada batas budget</div>`;
            return;
        }
        
        if (budget > 0) {
            const persen = (req.amount / budget) * 100;
            const persenFixed = Math.min(persen, 150);
            let warna = '', statusText = '';
            if (persenFixed <= 70) { warna = 'safe'; statusText = '🟢 Aman'; }
            else if (persenFixed <= 90) { warna = 'warning'; statusText = '🟡 Mendekati batas'; }
            else if (persenFixed <= 100) { warna = 'danger'; statusText = '🟠 Hampir habis'; }
            else { warna = 'over'; statusText = '🔴 OVER BUDGET!'; }
            
            previewDiv.innerHTML = `
                <div class="budget-card">
                    <div class="budget-title">🎯 Preview Budget</div>
                    <div class="budget-amount">Rp ${formatNumber(budget)}</div>
                    <div class="progress-budget">
                        <div class="progress-fill ${warna}" style="width: ${persenFixed}%;">
                            ${Math.round(persenFixed)}%
                        </div>
                    </div>
                    <div class="budget-stats">
                        <span>Budget: Rp ${formatNumber(budget)}</span>
                        <span>Request: Rp ${formatNumber(req.amount)}</span>
                        <span>${statusText}</span>
                    </div>
                    ${persen > 100 ? `<div class="alert alert-warning" style="margin-top:0.5rem;">⚠️ Request melebihi budget Rp ${formatNumber(req.amount - budget)}</div>` : `<div class="alert alert-success" style="margin-top:0.5rem;">✅ Sisa budget: Rp ${formatNumber(budget - req.amount)}</div>`}
                </div>
            `;
        } else {
            previewDiv.innerHTML = '';
        }
    }
    
    async function updateExistingProjectBudget(projectCode) {
        const req = window.currentVerifikasiReq;
        const budgetDiv = document.getElementById('existingProjectBudget');
        
        if (!budgetDiv || !req) return;
        
        try {
            const { data: project, error } = await sb.from('projects').select('*').eq('code', projectCode).eq('company_id', req.company_id).single();
            if (error || !project) {
                budgetDiv.innerHTML = '<div class="alert alert-warning">Project tidak ditemukan</div>';
                return;
            }
            
            const { data: payments } = await sb.from('payment_requests').select('amount, total_with_tax').eq('project_code', projectCode).eq('company_id', req.company_id).in('status', ['verified', 'paid']);
            const terpakai = (payments || []).reduce((a, b) => a + (b.total_with_tax || b.amount || 0), 0);
            const totalNanti = terpakai + req.amount;
            const persen = project.is_unlimited ? 0 : (totalNanti / project.budget) * 100;
            const persenFixed = Math.min(persen, 150);
            
            let warna = '', statusText = '';
            if (project.is_unlimited) {
                warna = 'unlimited';
                statusText = '⚪ Unlimited (tanpa batas)';
            } else if (persenFixed <= 70) { warna = 'safe'; statusText = '🟢 Aman'; }
            else if (persenFixed <= 90) { warna = 'warning'; statusText = '🟡 Mendekati batas'; }
            else if (persenFixed <= 100) { warna = 'danger'; statusText = '🟠 Hampir habis'; }
            else { warna = 'over'; statusText = '🔴 OVER BUDGET!'; }
            
            budgetDiv.innerHTML = `
                <div class="budget-card">
                    <div class="budget-title">🎯 ${project.name}</div>
                    <div class="budget-amount">${project.is_unlimited ? 'Unlimited' : `Rp ${formatNumber(project.budget)}`}</div>
                    <div class="progress-budget">
                        <div class="progress-fill ${warna}" style="width: ${persenFixed}%;">
                            ${!project.is_unlimited ? Math.round(persenFixed) + '%' : ''}
                        </div>
                    </div>
                    <div class="budget-stats">
                        <span>Terpakai: Rp ${formatNumber(terpakai)}</span>
                        <span>Request ini: Rp ${formatNumber(req.amount)}</span>
                        <span>${statusText}</span>
                    </div>
                    ${!project.is_unlimited && totalNanti > project.budget ? `<div class="alert alert-warning" style="margin-top:0.5rem;">⚠️ Akan melebihi budget Rp ${formatNumber(totalNanti - project.budget)}</div>` : ''}
                </div>
            `;
        } catch (error) {
            budgetDiv.innerHTML = '<div class="alert alert-warning">Gagal memuat budget project</div>';
        }
    }
    
    function updatePaymentPajak() {
        const req = window.currentVerifikasiReq;
        const taxConfig = window.currentTaxConfig;

        let dpp = req.amount, ppn = 0, pph = 0;
        
        if (kenaPPN && kenaPPh) {
            if (grossUp) {
                dpp = Math.round(req.amount / 0.98);
                ppn = Math.round(dpp * (taxConfig.ppn_rate / 100));
                pph = Math.round(dpp * 0.02);
            } else {
                ppn = Math.round(dpp * (taxConfig.ppn_rate / 100));
                pph = Math.round(dpp * 0.02);
            }
        } else if (kenaPPN && !kenaPPh) {
            ppn = Math.round(dpp * (taxConfig.ppn_rate / 100));
        } else if (!kenaPPN && kenaPPh) {
            if (grossUp) {
                dpp = Math.round(req.amount / 0.98);
                pph = Math.round(dpp * 0.02);
            } else {
                pph = Math.round(dpp * 0.02);
            }
        }
        
        const total = dpp + ppn - pph;
        
        showLoading();
        
        try {
            let projectCode = '';
            const projectSelect = document.getElementById('verifyProject');
            
            if (projectSelect.value === 'NEW') {
                projectCode = document.getElementById('newProjectCode')?.value.toUpperCase().trim();
                const projectName = document.getElementById('newProjectName')?.value.trim();
                const projectBudget = parseRupiah(document.getElementById('newProjectBudget')?.value);
                
                if (!projectCode || !projectName) {
                    showToast('Isi kode dan nama project', 'error');
                    return;
                }
                
                const { data: existing } = await sb.from('projects')
                    .select('*')
                    .eq('company_id', req.company_id)
                    .eq('code', projectCode);
                
                if (!existing || existing.length === 0) {
                    const { error: insertError } = await sb.from('projects').insert({
                        company_id: req.company_id,
                        code: projectCode,
                        name: projectName,
                        budget: projectBudget || 0,
                        is_unlimited: projectBudget === 0,
                    });

            }).eq('id', id);
            
            if (updateError) throw updateError;
            
            await sb.from('payment_logs').insert({
                request_id: id,
                user_email: currentUser?.email,
                user_role: currentUserRole,
                old_status: 'submitted',
                new_status: 'verified',
                keterangan: `Verifikasi, Voucher: ${voucherNo}, Project: ${projectCode || '-'}, PPN: ${ppn}, PPh: ${pph}`
            });
            
            showToast(`✅ Diverifikasi! Voucher: ${voucherNo}`, 'success');
            
            setTimeout(() => {
                closeVerifikasiModal();
                refreshPaymentRequests();
            }, 1500);
            
        } catch (error) {
            console.error('Error submitting verification:', error);
            showToast('Gagal verifikasi: ' + error.message, 'error');
        } finally {
            hideLoading();
        }
    }

        const currentYear = today.getFullYear();

        let monthOptions = '<option value="all">Semua Bulan</option>';
        for (let i = 1; i <= 12; i++) monthOptions += `<option value="${i}" ${i == currentMonth ? 'selected' : ''}>${monthNames[i-1]}</option>`;
        
        let yearOptions = '<option value="all">Semua Tahun</option>';
        for (let y = currentYear - 2; y <= currentYear + 1; y++) yearOptions += `<option value="${y}" ${y == currentYear ? 'selected' : ''}>${y}</option>`;
        
        let html = `
            <div class="form-card">

                    <div class="filter-grid">

                        <div class="filter-item"><label class="filter-label">Tahun</label><select id="invoiceYearFilter" class="filter-select" onchange="loadInvoices()">${yearOptions}</select></div>
                        <div class="filter-item"><label class="filter-label">Status</label><select id="invoiceStatusFilter" class="filter-select" onchange="loadInvoices()">
                            <option value="all">Semua</option><option value="draft">Draft</option><option value="posted">Posted</option><option value="partial">Partial</option><option value="paid">Paid</option>
                        </select></div>
                    </div>
                </div>

            </div>
        `;
        document.getElementById('content').innerHTML = html;
        await loadInvoices();
    }
    
    async function loadInvoices() {
        const month = document.getElementById('invoiceMonthFilter')?.value || 'all';
        const year = document.getElementById('invoiceYearFilter')?.value || 'all';
        const status = document.getElementById('invoiceStatusFilter')?.value || 'all';
        
        showSkeletonLoader('invoiceTableBody', 5);
        
        try {
            let query = sb.from('invoices').select('*').eq('company_id', currentCompanyId).order('id', { ascending: false });
            if (month !== 'all' && year !== 'all') {
                const start = `${year}-${month.padStart(2,'0')}-01`;
                const lastDay = new Date(parseInt(year), parseInt(month), 0).getDate();
                const end = `${year}-${month.padStart(2,'0')}-${lastDay}`;
                query = query.gte('invoice_date', start).lte('invoice_date', end);
            } else if (year !== 'all') {
                query = query.gte('invoice_date', `${year}-01-01`).lte('invoice_date', `${year}-12-31`);
            }
            
            let { data: invoices, error } = await query;
            if (error) throw error;
            
            if (status !== 'all') invoices = invoices.filter(i => i.status === status);
            
            const customersList = await getCustomerList(currentCompanyId);
            const tbody = document.getElementById('invoiceTableBody');
            if (!invoices || invoices.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center">Tidak ada data invoice</td></tr>';
                return;
            }
            
            let html = '';
            for (const inv of invoices) {
                const cust = customersList.find(c => c.id == inv.customer_id);
                const sisa = (inv.total || 0) - (inv.paid_amount || 0);
                html += `<tr>
                    <td><strong>${inv.invoice_no}</strong></td>
                    <td>${cust?.name || '-'}</td>
                    <td>${inv.invoice_date || '-'}</td>
                    <td>${inv.project_code || '-'}</td>
                    <td class="text-right">Rp ${formatNumber(inv.total)}</td>
                    <td class="text-right">Rp ${formatNumber(inv.paid_amount || 0)}</td>
                    <td class="text-right">Rp ${formatNumber(sisa)}</td>
                    <td><span class="status-badge status-${inv.status || 'draft'}">${inv.status || 'draft'}</span></td>
                    <td>
                        <button class="action-btn" onclick="viewInvoiceDetail(${inv.id})"><i class="fas fa-eye"></i></button>
                        ${inv.status === 'draft' ? `<button class="action-btn" onclick="editInvoice(${inv.id})" style="color:var(--warning);"><i class="fas fa-edit"></i></button>` : ''}
                        ${inv.status === 'draft' ? `<button class="action-btn" onclick="deleteInvoice(${inv.id})" style="color:var(--danger);"><i class="fas fa-trash"></i></button>` : ''}
                        ${(inv.status === 'posted' || inv.status === 'partial') && sisa > 0 ? `<button class="action-btn" onclick="recordPayment(${inv.id})" style="color:var(--success);"><i class="fas fa-money-bill-wave"></i></button>` : ''}
                    </td>
                </tr>`;
            }
            tbody.innerHTML = html;
        } catch (error) { console.error(error); showToast('Gagal memuat data', 'error'); }
    }

    function toggleCustomerSection() {
        const select = document.getElementById('invCustomer');
        const newSection = document.getElementById('invNewCustomerSection');
        if (select.value === 'NEW') {
            newSection.style.display = 'block';
        } else {

    function renderInvoiceItem(id) {
        return `<div class="inv-item" id="inv-item-${id}" style="display:grid; grid-template-columns:3fr 1fr 1fr 1fr auto; gap:0.5rem; margin-bottom:0.5rem;">
            <input type="text" class="item-name form-control" placeholder="Nama Item" value="Item ${id+1}">
            <input type="number" class="item-qty form-control" placeholder="Qty" value="1" onchange="calculateInvoiceTotal()">
            <input type="text" class="item-price form-control" placeholder="Harga" value="0" onkeyup="formatMoney(this); calculateInvoiceTotal()">
            <input type="text" class="item-total form-control" placeholder="Total" readonly style="background:#f0f0f0;">
            ${id > 0 ? `<button class="btn btn-danger btn-sm" onclick="removeInvoiceItem(${id})"><i class="fas fa-trash"></i></button>` : '<div style="width:32px;"></div>'}
        </div>`;
    }
    
    function addInvoiceItem() { 
        const container = document.getElementById('invItemsContainer');
        const newItem = document.createElement('div');
        newItem.innerHTML = renderInvoiceItem(window.invoiceItemCounter++);
        container.appendChild(newItem.firstChild);
        calculateInvoiceTotal();
    }
    
    function removeInvoiceItem(id) { 
        document.getElementById(`inv-item-${id}`)?.remove(); 
        calculateInvoiceTotal(); 
    }
    
    function calculateInvoiceTotal() {
        let subtotal = 0;
        document.querySelectorAll('.inv-item').forEach(item => {
            const qty = parseFloat(item.querySelector('.item-qty')?.value) || 0;
            const price = parseRupiah(item.querySelector('.item-price')?.value);
            const itemTotal = qty * price;
            subtotal += itemTotal;
            const totalInput = item.querySelector('.item-total');
            if (totalInput) totalInput.value = formatNumber(itemTotal);
        });
        const kenaPPN = document.getElementById('invPPN')?.checked || false;
        const kenaPPh = document.getElementById('invPPh')?.checked || false;
        const ppn = kenaPPN ? subtotal * 0.11 : 0;
        const pph = kenaPPh ? subtotal * 0.02 : 0;
        const total = subtotal + ppn - pph;
        
        document.getElementById('invSubtotal').innerHTML = `Rp ${formatNumber(subtotal)}`;
        document.getElementById('invPPNAmount').innerHTML = `Rp ${formatNumber(ppn)}`;
        document.getElementById('invPPhAmount').innerHTML = `Rp ${formatNumber(pph)}`;
        document.getElementById('invTotal').innerHTML = `Rp ${formatNumber(total)}`;
    }
    
    function toggleInvoiceProjectSection() {
        const select = document.getElementById('invProject');
        const newSection = document.getElementById('invNewProjectSection');
        const budgetDiv = document.getElementById('invExistingProjectBudget');
        if (select.value === 'NEW') {
            newSection.style.display = 'block';
            budgetDiv.style.display = 'none';
        } else if (select.value && select.value !== '') {
            newSection.style.display = 'none';
            budgetDiv.style.display = 'block';
            updateInvoiceExistingProjectBudget(select.value);
        } else {
            newSection.style.display = 'none';
            budgetDiv.style.display = 'none';
        }
    }
    
    async function updateInvoiceExistingProjectBudget(projectCode) {
        const budgetDiv = document.getElementById('invExistingProjectBudget');
        const subtotal = parseRupiah(document.getElementById('invSubtotal').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        const kenaPPN = document.getElementById('invPPN')?.checked || false;
        const kenaPPh = document.getElementById('invPPh')?.checked || false;
        const ppn = kenaPPN ? subtotal * 0.11 : 0;
        const pph = kenaPPh ? subtotal * 0.02 : 0;
        const total = subtotal + ppn - pph;
        
        try {
            const { data: project } = await sb.from('projects').select('*').eq('code', projectCode).eq('company_id', currentCompanyId).single();
            if (!project) { budgetDiv.innerHTML = '<div class="alert alert-warning">Project tidak ditemukan</div>'; return; }
            
            // Ambil total yang sudah dibayar dari invoice yang sudah paid/partial
            const { data: paidInvoices } = await sb.from('invoices').select('paid_amount').eq('project_code', projectCode).eq('company_id', currentCompanyId).in('status', ['partial', 'paid']);
            const terpakai = (paidInvoices || []).reduce((a,b) => a + (b.paid_amount || 0), 0);
            const totalNanti = terpakai + total;
            const persen = project.is_unlimited ? 0 : (totalNanti / project.budget) * 100;
            let warna = project.is_unlimited ? 'unlimited' : (persen <= 70 ? 'safe' : persen <= 90 ? 'warning' : persen <= 100 ? 'danger' : 'over');
            
            budgetDiv.innerHTML = `<div class="budget-card"><div class="budget-title">🎯 ${project.name}</div><div class="budget-amount">${project.is_unlimited ? 'Unlimited' : `Rp ${formatNumber(project.budget)}`}</div><div class="progress-budget"><div class="progress-fill ${warna}" style="width: ${Math.min(persen, 150)}%;">${!project.is_unlimited ? Math.round(persen) + '%' : ''}</div></div><div class="budget-stats"><span>Terpakai (sudah dibayar): Rp ${formatNumber(terpakai)}</span><span>Invoice ini: Rp ${formatNumber(total)}</span></div></div>`;
        } catch(e) { budgetDiv.innerHTML = '<div class="alert alert-warning">Gagal memuat budget</div>'; }
    }
    
    async function saveInvoice() {
        const customerSelect = document.getElementById('invCustomer');
        const projectSelect = document.getElementById('invProject');
        const revenueAccount = document.getElementById('invRevenueAccount').value;
        const bankCode = document.getElementById('invBank').value;
        const invoiceDate = document.getElementById('invDate').value;
        const dueDate = document.getElementById('invDueDate').value;
        const notes = document.getElementById('invNotes').value;
        const kenaPPN = document.getElementById('invPPN').checked;
        const kenaPPh = document.getElementById('invPPh').checked;
        
        // Handle Customer
        let customerId = null;
        if (customerSelect.value === 'NEW') {
            const newCode = document.getElementById('invNewCustomerCode')?.value;
            const newName = document.getElementById('invNewCustomerName')?.value;
            const newNpwp = document.getElementById('invNewCustomerNpwp')?.value;
            const newTelp = document.getElementById('invNewCustomerTelp')?.value;
            const newEmail = document.getElementById('invNewCustomerEmail')?.value;
            const newAlamat = document.getElementById('invNewCustomerAlamat')?.value;
            
            if (!newCode || !newName) {
                showToast('Isi kode dan nama customer', 'error');
                return;
            }
            
            const { data: newCustomer, error: custError } = await sb.from('customers').insert({
                company_id: currentCompanyId, code: newCode, name: newName, npwp: newNpwp,
                telp: newTelp, email: newEmail, alamat: newAlamat
            }).select().single();
            if (custError) { showToast('Gagal buat customer: ' + custError.message, 'error'); return; }
            customerId = newCustomer.id;
            showToast('Customer berhasil dibuat', 'success');
        } else {
            customerId = parseInt(customerSelect.value);
            if (!customerId) { showToast('Pilih customer', 'error'); return; }
        }
        
        if (!revenueAccount) { showToast('Pilih akun pendapatan', 'error'); return; }
        if (!bankCode) { showToast('Pilih bank', 'error'); return; }
        
        const items = [];
        let hasError = false;
        document.querySelectorAll('.inv-item').forEach((item, idx) => {
            const name = item.querySelector('.item-name')?.value;
            const qty = parseFloat(item.querySelector('.item-qty')?.value) || 0;
            const price = parseRupiah(item.querySelector('.item-price')?.value);
            if (!name) { alert(`Item ${idx+1}: Nama harus diisi`); hasError = true; return; }
            if (qty <= 0) { alert(`Item ${idx+1}: Qty harus > 0`); hasError = true; return; }
            items.push({ description: name, quantity: qty, unit_price: price, amount: qty * price });
        });
        if (hasError || items.length === 0) return;
        
        const subtotal = parseRupiah(document.getElementById('invSubtotal').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        const ppn = kenaPPN ? subtotal * 0.11 : 0;
        const pph = kenaPPh ? subtotal * 0.02 : 0;
        const total = subtotal + ppn - pph;
        
        const processSave = async (projectCode) => {
            // Generate nomor invoice otomatis
            const year = new Date().getFullYear();
            const month = String(new Date().getMonth() + 1).padStart(2, '0');
            const { data: lastInv } = await sb.from('invoices').select('invoice_no').eq('company_id', currentCompanyId).order('id', { ascending: false }).limit(1);
            let lastNum = 0;
            if (lastInv && lastInv[0] && lastInv[0].invoice_no) {
                const match = lastInv[0].invoice_no.match(/\d+$/);
                if (match) lastNum = parseInt(match[0]);
            }
            const invoiceNo = `INV/${year}/${month}/${String(lastNum + 1).padStart(4, '0')}`;
            
            const { data: invoice, error } = await sb.from('invoices').insert({
                company_id: currentCompanyId, customer_id: customerId, project_code: projectCode || null,
                revenue_account: revenueAccount, bank_code: bankCode, invoice_date: invoiceDate, due_date: dueDate,
                notes: notes, items: items, subtotal: subtotal, ppn: ppn, pph23: pph, total: total,
                invoice_no: invoiceNo, status: 'draft', paid_amount: 0
            }).select().single();
            if (error) throw error;
            showToast(`Invoice berhasil dibuat! No: ${invoiceNo}`, 'success');
            setTimeout(() => loadInvoiceList(), 1500);
        };
        
        showLoading();
        try {
            if (projectSelect.value === 'NEW') {
                const newCode = document.getElementById('invNewProjectCode')?.value.toUpperCase().trim();
                const newName = document.getElementById('invNewProjectName')?.value.trim();
                const newBudget = parseRupiah(document.getElementById('invNewProjectBudget')?.value);
                if (!newCode || !newName) { showToast('Isi kode dan nama project', 'error'); hideLoading(); return; }
                const { error } = await sb.from('projects').insert({ company_id: currentCompanyId, code: newCode, name: newName, budget: newBudget || 0, is_unlimited: newBudget === 0 });
                if (error) throw error;
                await processSave(newCode);
            } else {
                await processSave(projectSelect.value);
            }
        } catch (error) { showToast('Gagal: ' + error.message, 'error'); }
        finally { hideLoading(); }
    }
    
    async function viewInvoiceDetail(id) {
        const { data: inv } = await sb.from('invoices').select('*').eq('id', id).single();
        if (!inv) { showToast('Invoice tidak ditemukan', 'error'); return; }
        const customersList = await getCustomerList(currentCompanyId);
        const cust = customersList.find(c => c.id == inv.customer_id);
        const sisa = (inv.total || 0) - (inv.paid_amount || 0);
        alert(`Invoice #${inv.invoice_no}\nCustomer: ${cust?.name || '-'}\nProject: ${inv.project_code || '-'}\nTotal: Rp ${formatNumber(inv.total)}\nDibayar: Rp ${formatNumber(inv.paid_amount || 0)}\nSisa: Rp ${formatNumber(sisa)}\nStatus: ${inv.status}`);
    }
    
    async function recordPayment(invoiceId) {
        const { data: inv } = await sb.from('invoices').select('*').eq('id', invoiceId).single();
        if (!inv) { showToast('Invoice tidak ditemukan', 'error'); return; }
        
        const sisa = (inv.total || 0) - (inv.paid_amount || 0);
        const today = new Date().toISOString().split('T')[0];
        
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content" style="max-width:500px;">
                <div style="padding:20px;">

                    <div class="form-group"><label>Tanggal Pembayaran</label><input type="date" id="payDate" class="form-control" value="${today}"></div>
                    <div class="form-group"><label>Jumlah Dibayar</label><input type="text" id="payAmount" class="form-control" value="${formatNumber(sisa)}" onkeyup="formatMoney(this)"></div>
                    <div class="form-group"><label>Referensi / No Bukti</label><input type="text" id="payRef" class="form-control" placeholder="No transfer / kuitansi"></div>
                    <div style="display:flex; gap:1rem; justify-content:flex-end;">
                        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Batal</button>
                        <button class="btn btn-success" onclick="submitPayment(${invoiceId}, '${inv.project_code || ''}', ${inv.total})">Simpan</button>

    async function submitPayment(invoiceId, projectCode, totalInvoice) {
        const payDate = document.getElementById('payDate').value;
        const payAmount = parseRupiah(document.getElementById('payAmount').value);
        const payRef = document.getElementById('payRef').value;
        
        if (!payDate || payAmount <= 0) { showToast('Isi tanggal dan jumlah pembayaran', 'error'); return; }
        
        showLoading();
        try {
            const { data: inv } = await sb.from('invoices').select('*').eq('id', invoiceId).single();
            const newPaidAmount = (inv.paid_amount || 0) + payAmount;
            const newStatus = newPaidAmount >= totalInvoice ? 'paid' : 'partial';
            
            // Update invoice
            await sb.from('invoices').update({ paid_amount: newPaidAmount, status: newStatus }).eq('id', invoiceId);
            
            // Buat jurnal penerimaan kas
            const lastJournal = await sb.from('journals').select('id').order('id', { ascending: false }).limit(1);
            const journalId = (lastJournal.data?.[0]?.id || 0) + 1;
            const dateStr = new Date().toISOString().split('T')[0];
            
            await sb.from('journals').insert({
                id: journalId, company_id: currentCompanyId, journal_date: dateStr, period: dateStr.substring(0,7),
                description: `Penerimaan pembayaran dari invoice ${inv.invoice_no}`, reference: payRef,
                created_by: currentUser?.email, status: 'posted'
            });
            
            // Debit: Kas/Bank, Credit: Piutang Usaha
            await sb.from('journal_lines').insert([
                { journal_id: journalId, account_code: inv.bank_code, debit: payAmount, credit: 0, description: `Penerimaan dari ${inv.invoice_no}` },
                { journal_id: journalId, account_code: `1102-01-${companies.find(c => c.id == currentCompanyId)?.singkatan || 'A'}`, debit: 0, credit: payAmount, description: `Pelunasan piutang ${inv.invoice_no}` }
            ]);
            
            showToast(`✅ Pembayaran Rp ${formatNumber(payAmount)} dicatat!`, 'success');
            setTimeout(() => { document.querySelector('.modal-overlay')?.remove(); loadInvoiceList(); }, 1500);
        } catch (error) { showToast('Gagal: ' + error.message, 'error'); }
        finally { hideLoading(); }
    }

    async function deleteInvoice(id) {
        if (!confirm('Hapus invoice ini?')) return;
        showLoading();

        if (error) showToast('Gagal: ' + error.message, 'error');

        } else {

        }

    function toggleVendorProjectSection() {
        const select = document.getElementById('venProject');
        const newSection = document.getElementById('venNewProjectSection');
        const budgetDiv = document.getElementById('venExistingProjectBudget');
        if (select.value === 'NEW') {
            newSection.style.display = 'block';
            budgetDiv.style.display = 'none';
        } else if (select.value && select.value !== '') {
            newSection.style.display = 'none';
            budgetDiv.style.display = 'block';
            updateVendorExistingProjectBudget(select.value);
        } else {
            newSection.style.display = 'none';
            budgetDiv.style.display = 'none';
        }
    }
    
    async function updateVendorExistingProjectBudget(projectCode) {
        const budgetDiv = document.getElementById('venExistingProjectBudget');
        const total = parseRupiah(document.getElementById('venTotal').value);
        const kenaPPN = document.getElementById('venPPN')?.checked || false;
        const kenaPPh = document.getElementById('venPPh')?.checked || false;
        const ppn = kenaPPN ? total * 0.11 : 0;
        const pph = kenaPPh ? total * 0.02 : 0;
        const finalTotal = total + ppn - pph;
        
        try {
            const { data: project } = await sb.from('projects').select('*').eq('code', projectCode).eq('company_id', currentCompanyId).single();
            if (!project) { budgetDiv.innerHTML = '<div class="alert alert-warning">Project tidak ditemukan</div>'; return; }
            
            // Ambil total yang sudah dibayar dari payment_requests yang sudah paid
            const { data: payments } = await sb.from('payment_requests').select('amount, total_with_tax').eq('project_code', projectCode).eq('company_id', currentCompanyId).in('status', ['paid']);
            const terpakai = (payments || []).reduce((a,b) => a + (b.total_with_tax || b.amount || 0), 0);
            const totalNanti = terpakai + finalTotal;
            const persen = project.is_unlimited ? 0 : (totalNanti / project.budget) * 100;
            let warna = project.is_unlimited ? 'unlimited' : (persen <= 70 ? 'safe' : persen <= 90 ? 'warning' : persen <= 100 ? 'danger' : 'over');
            
            budgetDiv.innerHTML = `<div class="budget-card"><div class="budget-title">🎯 ${project.name}</div><div class="budget-amount">${project.is_unlimited ? 'Unlimited' : `Rp ${formatNumber(project.budget)}`}</div><div class="progress-budget"><div class="progress-fill ${warna}" style="width: ${Math.min(persen, 150)}%;">${!project.is_unlimited ? Math.round(persen) + '%' : ''}</div></div><div class="budget-stats"><span>Terpakai (sudah dibayar): Rp ${formatNumber(terpakai)}</span><span>Invoice ini: Rp ${formatNumber(finalTotal)}</span></div></div>`;
        } catch(e) { budgetDiv.innerHTML = '<div class="alert alert-warning">Gagal memuat budget</div>'; }
    }
    
    function calculateVendorTotal() {
        const total = parseRupiah(document.getElementById('venTotal').value);
        const kenaPPN = document.getElementById('venPPN').checked;
        const kenaPPh = document.getElementById('venPPh').checked;
        const ppn = kenaPPN ? total * 0.11 : 0;
        const pph = kenaPPh ? total * 0.02 : 0;
        const finalTotal = total + ppn - pph;
        
        document.getElementById('venDPP').innerHTML = `Rp ${formatNumber(total)}`;
        document.getElementById('venPPNAmount').innerHTML = `Rp ${formatNumber(ppn)}`;
        document.getElementById('venPPhAmount').innerHTML = `Rp ${formatNumber(pph)}`;
        document.getElementById('venTotalAmount').innerHTML = `Rp ${formatNumber(finalTotal)}`;
    }
    
    async function saveVendorInvoice() {
        const vendorSelect = document.getElementById('venVendor');
        const projectSelect = document.getElementById('venProject');
        const invoiceNo = document.getElementById('venInvoiceNo').value;
        const invoiceDate = document.getElementById('venDate').value;
        const dueDate = document.getElementById('venDueDate').value;
        const accountCode = document.getElementById('venAccount').value;
        const total = parseRupiah(document.getElementById('venTotal').value);
        const kenaPPN = document.getElementById('venPPN').checked;
        const kenaPPh = document.getElementById('venPPh').checked;
        const fileInput = document.getElementById('venFile');
        
        // Handle Vendor
        let vendorId = null;
        let vendorName = '';
        if (vendorSelect.value === 'NEW') {
            const newName = document.getElementById('venNewVendorName')?.value;
            const newNpwp = document.getElementById('venNewVendorNpwp')?.value;
            const newBank = document.getElementById('venNewVendorBank')?.value;
            const newRekening = document.getElementById('venNewVendorRekening')?.value;
            const newTerm = parseInt(document.getElementById('venNewVendorTerm')?.value) || 30;
            
            if (!newName) { showToast('Isi nama vendor', 'error'); return; }
            
            const { data: newVendor, error: venError } = await sb.from('vendors').insert({
                company_id: currentCompanyId, name: newName, npwp: newNpwp,
                bank_name: newBank, bank_account: newRekening, payment_term: newTerm
            }).select().single();
            if (venError) { showToast('Gagal buat vendor: ' + venError.message, 'error'); return; }
            vendorId = newVendor.id;
            vendorName = newVendor.name;
            showToast('Vendor berhasil dibuat', 'success');
        } else {
            vendorId = parseInt(vendorSelect.value);
            if (!vendorId) { showToast('Pilih vendor', 'error'); return; }
            const vendorsList = await getVendorList(currentCompanyId);
            const vendor = vendorsList.find(v => v.id == vendorId);
            vendorName = vendor?.name || '';
        }
        
        if (!invoiceNo) { showToast('Isi no invoice', 'error'); return; }
        if (!accountCode) { showToast('Pilih akun beban', 'error'); return; }
        if (!fileInput.files.length) { showToast('Upload bukti invoice', 'error'); return; }
        
        const file = fileInput.files[0];
        if (file.size > 5 * 1024 * 1024) { showToast('File maksimal 5MB', 'error'); return; }
        
        const reader = new FileReader();
        reader.onload = async function(e) {
            showLoading();
            try {
                const res = await fetch(GAS_UPLOAD_URL, { method: 'POST', body: JSON.stringify({ action: 'upload', file: e.target.result, name: file.name, mimeType: file.type, folderId: DRIVE_FOLDER_ID }) });
                const upload = await res.json();
                if (!upload.success) throw new Error(upload.message);
                
                let projectCode = projectSelect.value;
                if (projectCode === 'NEW') {
                    const newCode = document.getElementById('venNewProjectCode')?.value.toUpperCase().trim();
                    const newName = document.getElementById('venNewProjectName')?.value.trim();
                    const newBudget = parseRupiah(document.getElementById('venNewProjectBudget')?.value);
                    if (!newCode || !newName) { showToast('Isi kode dan nama project', 'error'); hideLoading(); return; }
                    await sb.from('projects').insert({ company_id: currentCompanyId, code: newCode, name: newName, budget: newBudget || 0, is_unlimited: newBudget === 0 });
                    projectCode = newCode;
                }
                
                const ppn = kenaPPN ? total * 0.11 : 0;
                const pph = kenaPPh ? total * 0.02 : 0;
                const finalTotal = total + ppn - pph;
                
                // Buat jurnal saat invoice dibuat (Utang Usaha)
                const lastJournal = await sb.from('journals').select('id').order('id', { ascending: false }).limit(1);
                const journalId = (lastJournal.data?.[0]?.id || 0) + 1;
                const dateStr = new Date().toISOString().split('T')[0];
                
                await sb.from('journals').insert({
                    id: journalId, company_id: currentCompanyId, journal_date: dateStr, period: dateStr.substring(0,7),
                    description: `Pembelian dari ${vendorName} - ${invoiceNo}`, reference: invoiceNo,
                    created_by: currentUser?.email, status: 'posted'
                });
                
                // Jurnal: Debit Beban/Aset, Debit PPN Masukan, Kredit Utang Usaha, Kredit Utang PPh 23
                const journalLines = [
                    { journal_id: journalId, account_code: accountCode, debit: total, credit: 0, description: `Pembelian dari ${vendorName}` }
                ];
                if (kenaPPN) {
                    const suffix = companies.find(c => c.id == currentCompanyId)?.singkatan || 'A';
                    journalLines.push({ journal_id: journalId, account_code: `1131-${suffix}`, debit: ppn, credit: 0, description: `PPN Masukan dari ${invoiceNo}` });
                }
                journalLines.push({ journal_id: journalId, account_code: `2101-${companies.find(c => c.id == currentCompanyId)?.singkatan || 'A'}`, debit: 0, credit: finalTotal, description: `Utang usaha ke ${vendorName}` });
                if (kenaPPh) {
                    const suffix = companies.find(c => c.id == currentCompanyId)?.singkatan || 'A';
                    journalLines.push({ journal_id: journalId, account_code: `2103-03-${suffix}`, debit: 0, credit: pph, description: `Utang PPh 23 dari ${invoiceNo}` });
                }
                await sb.from('journal_lines').insert(journalLines);
                
                const { error } = await sb.from('vendor_invoices').insert({
                    company_id: currentCompanyId, vendor_id: vendorId, vendor_name: vendorName,
                    project_code: projectCode || null, invoice_no: invoiceNo, invoice_date: invoiceDate, due_date: dueDate,
                    account_code: accountCode, total: finalTotal, dpp: total, ppn: ppn, pph23: pph,
                    paid_amount: 0, payment_status: 'unpaid', file_url: upload.url, journal_id: journalId
                });
                if (error) throw error;
                showToast('Invoice vendor berhasil disimpan', 'success');
                setTimeout(() => loadVendorInvoiceList(), 1500);
            } catch(error) { showToast('Gagal: ' + error.message, 'error'); }
            finally { hideLoading(); }
        };
        reader.readAsDataURL(file);
    }

        alert(`Vendor Invoice #${inv.invoice_no}\nVendor: ${inv.vendor_name}\nProject: ${inv.project_code || '-'}\nTotal: Rp ${formatNumber(inv.total)}\nDibayar: Rp ${formatNumber(inv.paid_amount || 0)}\nSisa: Rp ${formatNumber(sisa)}\nStatus: ${inv.payment_status || 'unpaid'}`);
    }
    
    async function showAjukanPembayaranVendor(invoiceId) {
        const { data: inv } = await sb.from('vendor_invoices').select('*').eq('id', invoiceId).single();
        if (!inv) { showToast('Invoice tidak ditemukan', 'error'); return; }
        
        const sisa = (inv.total || 0) - (inv.paid_amount || 0);
