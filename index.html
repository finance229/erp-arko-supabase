    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; color: #1f2937; line-height: 1.5; }
        :root {
            --primary: #0f172a; --primary-light: #1e293b; --accent: #3b82f6;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #6366f1;
            --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
            --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        .app { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: white; border-right: 1px solid var(--gray-200); position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--gray-200); }
        .logo { font-size: 1.3rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; }
        .logo i { color: var(--accent); font-size: 1.5rem; }
        .sidebar-menu { padding: 1rem; }
        .menu-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.7rem 1rem; color: var(--gray-600); border-radius: 10px; cursor: pointer; margin-bottom: 0.2rem; transition: all 0.2s; }
        .menu-item:hover { background: var(--gray-100); color: var(--primary); }
        .menu-item.active { background: var(--primary); color: white; }
        .menu-item.has-dropdown { justify-content: space-between; }
        .dropdown-menu { margin-left: 1rem; border-left: 2px dashed var(--gray-300); margin-bottom: 0.5rem; }
        .menu-item.submenu { padding: 0.4rem 0.8rem; font-size: 0.8rem; padding-left: 2rem; }
        .main { flex: 1; margin-left: 260px; padding: 1.5rem; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; background: white; padding: 0.8rem 1.2rem; border-radius: 12px; box-shadow: var(--shadow); }
        .page-title { font-size: 1.3rem; font-weight: 600; }
        .user-menu { display: flex; align-items: center; gap: 1rem; }
        .user-name { font-weight: 600; font-size: 0.8rem; }
        .user-role { font-size: 0.7rem; color: var(--gray-500); text-transform: capitalize; }
        .user-avatar { width: 36px; height: 36px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
        .logout-btn { background: none; border: none; color: var(--danger); cursor: pointer; }
        .card { background: white; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
        .card h2 { font-size: 1rem; margin-bottom: 0.8rem; border-bottom: 1px solid var(--gray-200); padding-bottom: 0.3rem; display: flex; align-items: center; gap: 0.3rem; }
        .form-card { background: white; border-radius: 16px; padding: 1.2rem; border: 1px solid var(--gray-200); box-shadow: var(--shadow); }
        .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--gray-200); }
        .form-header h2 { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 0.3rem; }
        .form-group { margin-bottom: 0.8rem; }
        .form-group label { display: block; margin-bottom: 0.2rem; font-weight: 500; font-size: 0.75rem; color: var(--gray-700); }
        .form-control { width: 100%; padding: 0.4rem 0.6rem; border: 1px solid var(--gray-300); border-radius: 8px; font-size: 0.8rem; }
        .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }
        .filter-card { background: white; border-radius: 12px; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid var(--gray-200); }
        .filter-grid { display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: flex-end; }
        .filter-item { flex: 1; min-width: 120px; }
        .filter-label { font-size: 0.6rem; font-weight: 600; color: var(--gray-500); margin-bottom: 0.1rem; text-transform: uppercase; }
        .filter-select { width: 100%; padding: 0.3rem 0.5rem; border: 1px solid var(--gray-300); border-radius: 6px; background: white; font-size: 0.75rem; }
        .btn { padding: 0.3rem 0.7rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 500; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 0.3rem; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-sm { padding: 0.2rem 0.4rem; font-size: 0.65rem; }
        .action-btn { background: none; border: none; color: var(--gray-500); cursor: pointer; padding: 0.2rem; border-radius: 4px; }
        .action-btn:hover { color: var(--accent); background: var(--gray-100); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.8rem; margin-bottom: 1rem; }
        .stat-card { background: white; border-radius: 12px; padding: 0.8rem; text-align: center; box-shadow: var(--shadow); }
        .stat-value { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.6rem; color: var(--gray-500); text-transform: uppercase; margin-top: 0.2rem; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1rem; }
        .chart-card { background: white; border-radius: 12px; padding: 0.8rem; box-shadow: var(--shadow); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .chart-title { font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 0.2rem; }
        .chart-container { height: 180px; position: relative; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid var(--gray-200); font-size: 0.7rem; }
        th { background: var(--gray-100); font-weight: 600; color: var(--gray-600); text-transform: uppercase; font-size: 0.6rem; }
        tr:hover td { background: var(--gray-50); }
        .status-badge { padding: 0.1rem 0.4rem; border-radius: 20px; font-size: 0.6rem; font-weight: 600; display: inline-flex; align-items: center; gap: 0.1rem; }
        .status-draft { background: var(--gray-200); color: var(--gray-600); }
        .status-submitted { background: #dbeafe; color: #1e40af; }
        .status-verified { background: #fef3c7; color: #92400e; }
        .status-paid { background: #d1fae5; color: #065f46; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; border-radius: 12px; padding: 1rem; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; display: none; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .alert { padding: 0.5rem; border-radius: 8px; margin-bottom: 0.5rem; font-size: 0.7rem; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary), var(--primary-light)); }
        .login-card { background: white; border-radius: 20px; padding: 1.5rem; width: 100%; max-width: 380px; text-align: center; box-shadow: var(--shadow-lg); }
        .login-logo i { font-size: 2.5rem; color: var(--accent); margin-bottom: 0.3rem; }
        .login-logo h1 { font-size: 1.5rem; margin-bottom: 0.1rem; }
        .welcome-section { background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 16px; padding: 1rem; margin-bottom: 1rem; color: white; display: flex; justify-content: space-between; align-items: center; }
        .welcome-section h1 { font-size: 1.1rem; display: flex; align-items: center; gap: 0.3rem; }
        .welcome-date { background: rgba(255,255,255,0.15); padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-3 { margin-top: 0.8rem; }
        .fw-bold { font-weight: bold; }
        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } .stats-grid { grid-template-columns: 1fr 1fr; } .charts-grid { grid-template-columns: 1fr; } }
        /* Progress Bar */
.progress-budget {
    background: #e5e7eb;
    border-radius: 30px;
    height: 28px;
    width: 100%;
    overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
}
.progress-fill {
    height: 100%;
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 12px;
    color: white;
    font-size: 11px;
    font-weight: 700;
    transition: width 0.5s ease;
}
.progress-fill.safe { background: linear-gradient(90deg, #10b981, #34d399); }
.progress-fill.warning { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
.progress-fill.danger { background: linear-gradient(90deg, #ea580c, #f97316); }
.progress-fill.over { background: linear-gradient(90deg, #dc2626, #ef4444); }
.progress-fill.unlimited { background: linear-gradient(90deg, #9ca3af, #d1d5db); }

.budget-card {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    border-radius: 16px;
    padding: 1rem;
    color: white;
    margin-bottom: 1rem;
}
.budget-title { font-size: 0.7rem; opacity: 0.7; margin-bottom: 0.3rem; }
.budget-amount { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
.budget-stats { display: flex; justify-content: space-between; font-size: 0.65rem; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.1); }

/* Pagination */
.pagination { display: flex; justify-content: center; gap: 0.3rem; margin-top: 1rem; flex-wrap: wrap; }
.pagination .btn { min-width: 32px; justify-content: center; padding: 0.2rem 0.5rem; }

/* Toast Notification */
.toast-notify {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    padding: 0.7rem 1rem;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 500;
    max-width: 350px;
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
    animation: slideIn 0.3s ease;
}
@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>
    
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <div class="login-logo"><i class="fas fa-building"></i><h1>ARKO GROUP</h1><p>ERP System</p></div>
            <div class="form-group"><label>Email</label><input type="email" id="loginEmail" class="form-control" placeholder="email@example.com"></div>
            <div class="form-group"><label>Password</label><input type="password" id="loginPassword" class="form-control" placeholder="••••••••"></div>
            <button class="btn btn-primary" style="width:100%" onclick="login()">Login</button>
            <div id="loginError" class="alert alert-error" style="display:none; margin-top:0.5rem;"></div>
        </div>
    </div>
    
    <div id="appPage" class="app" style="display:none">
        <div class="sidebar">
            <div class="sidebar-header"><div class="logo"><i class="fas fa-building"></i> ARKO GROUP</div></div>
            <div class="sidebar-menu" id="sidebarMenu"></div>
        </div>
        <div class="main">
            <div class="top-bar">
                <h1 class="page-title" id="pageTitle">Dashboard</h1>
                <div class="user-menu">
                    <div><div class="user-name" id="userName">Loading...</div><div class="user-role" id="userRole">Loading...</div></div>
                    <div class="user-avatar" id="userAvatar">U</div>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
            <div id="content"></div>
        </div>
    </div>

    <script>
    // ==================== KONFIGURASI SUPABASE ====================
    const SUPABASE_URL = 'https://vtkineqwvnuzxxcegofx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0a2luZXF3dm51enh4Y2Vnb2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDU4OTMsImV4cCI6MjA5MDg4MTg5M30.7ygetyHX-_-5JDU-pXS2eP3iLgpI_zP6Gqms1gSY0ys';
    const GAS_UPLOAD_URL = 'https://script.google.com/macros/s/AKfycbzQDc9CUWZELs7iw9a4lDJJPC74jMMZr5savRc-2GTWnuWpFyUytI_zrYYgaCWZfXrMMQ/exec';
    const DRIVE_FOLDER_ID = '15OqEW00HkWJrBEJtPnNPV5jwaMZ24wik';
    
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null, currentUserRole = null, currentCompanyId = 1;
    let companies = [], accounts = [], projects = [], customers = [], vendors = [];
    let statusChart = null, companyChart = null;
    let revenueAccounts = [];
    let currentPaymentPage = 1;
    let paymentsPerPage = 10;
    let allPaymentsData = [];
    
    function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; setTimeout(() => { document.getElementById('loadingOverlay').style.display = 'none'; }, 10000); }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
    function formatNumber(num) { if (!num) return '0'; return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
    function parseRupiah(str) { if (!str) return 0; let cleaned = str.toString().replace(/[^0-9,-]/g, '').replace(',', '.'); return parseFloat(cleaned) || 0; }
    function formatMoney(input) { let v = input.value.replace(/\./g, '').replace(/[^0-9]/g, ''); input.value = v ? new Intl.NumberFormat('id-ID').format(parseInt(v)) : ''; }
    function formatDate(dateStr) { if (!dateStr) return '-'; let d = new Date(dateStr); return d.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' }); }
    
    async function getCustomerList(companyId) { let { data } = await sb.from('customers').select('*').eq('company_id', companyId); return data || []; }
    async function getProjectList(companyId) { let { data } = await sb.from('projects').select('*').eq('company_id', companyId); return data || []; }
    async function getAccountList(companyId) { let { data } = await sb.from('chart_of_accounts').select('*').eq('company_id', companyId); return data || []; }
    async function getRevenueAccounts(companyId) { let { data } = await sb.from('chart_of_accounts').select('*').eq('company_id', companyId).eq('account_type', 'Pendapatan'); return data || []; }
    async function getBankList(companyId) { let { data } = await sb.from('chart_of_accounts').select('*').eq('company_id', companyId).ilike('account_name', '%Bank%'); return data.map(b => ({ code: b.account_code, name: b.account_name, display: b.account_name })); }
    async function getVendorList(companyId) { let { data } = await sb.from('vendors').select('*').eq('company_id', companyId); return data || []; }
    async function getTaxConfig(companyId) { let configs = { 1: { ppn_rate: 11, is_pkp: true }, 2: { ppn_rate: 1.1, is_pkp: false }, 3: { ppn_rate: 1.1, is_pkp: false }, 4: { ppn_rate: 11, is_pkp: true } }; return configs[companyId] || { ppn_rate: 11, is_pkp: true }; }
    
    // ==================== AUTHENTICATION ====================
    async function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { let err = document.getElementById('loginError'); err.innerText = 'Isi email dan password'; err.style.display = 'block'; return; }
        showLoading();
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { hideLoading(); let err = document.getElementById('loginError'); err.innerText = error.message; err.style.display = 'block'; return; }
        const { data: profile } = await sb.from('user_profiles').select('*').eq('email', email).single();
        currentUser = data.user; currentUserRole = profile?.role || 'staff'; currentCompanyId = profile?.company_id || 1;
        const { data: comps } = await sb.from('companies').select('*'); companies = comps || [];
        document.getElementById('loginPage').style.display = 'none'; document.getElementById('appPage').style.display = 'flex';
        document.getElementById('userName').innerText = profile?.name || email; document.getElementById('userRole').innerText = currentUserRole;
        document.getElementById('userAvatar').innerText = (profile?.name || email).charAt(0).toUpperCase();
        renderSidebar(); loadDashboard(); hideLoading();
    }
    
    async function logout() { await sb.auth.signOut(); document.getElementById('loginPage').style.display = 'flex'; document.getElementById('appPage').style.display = 'none'; }
    
    function renderSidebar() {
        let menus = [
            { icon: 'fa-chart-pie', label: 'Dashboard', action: 'dashboard', roles: ['direktur', 'finance', 'staff'] },
            { icon: 'fa-book', label: 'Jurnal & Akuntansi', type: 'dropdown', submenus: [
                { icon: 'fa-pen', label: 'Input Jurnal', action: 'jurnal', roles: ['direktur', 'finance'] },
                { icon: 'fa-book', label: 'Buku Besar', action: 'ledger', roles: ['direktur', 'finance'] },
                { icon: 'fa-chart-line', label: 'Laba Rugi', action: 'labarugi', roles: ['direktur', 'finance'] },
                { icon: 'fa-scale-balanced', label: 'Neraca', action: 'neraca', roles: ['direktur', 'finance'] },
                { icon: 'fa-book-open', label: 'Jurnal Umum', action: 'jurnal_umum', roles: ['direktur', 'finance'] }
            ] },
            { icon: 'fa-file-invoice-dollar', label: 'Invoice & Payment', type: 'dropdown', submenus: [
                { icon: 'fa-user', label: 'Invoice Penjualan (AR)', action: 'invoice_penjualan', roles: ['direktur', 'finance'] },
                { icon: 'fa-users', label: 'Invoice Pembelian (AP)', action: 'invoice_pembelian', roles: ['direktur', 'finance'] },
                { icon: 'fa-money-bill-wave', label: 'Payment Request', action: 'payment', roles: ['direktur', 'finance', 'staff'] }
            ] },
            { icon: 'fa-chart-pie', label: 'Manajemen Aset', type: 'dropdown', submenus: [
                { icon: 'fa-clock', label: 'Transaksi Berulang', action: 'recurring', roles: ['direktur', 'finance'] },
                { icon: 'fa-chart-pie', label: 'Manajemen Aset', action: 'aset', roles: ['direktur', 'finance'] },
                { icon: 'fa-scale-balanced', label: 'Saldo Awal', action: 'opening_balance', roles: ['direktur', 'finance'] }
            ] },
            { icon: 'fa-database', label: 'Master Data', type: 'dropdown', submenus: [
                { icon: 'fa-users', label: 'Data Customer', action: 'customers', roles: ['direktur', 'finance'] },
                { icon: 'fa-project-diagram', label: 'Data Project', action: 'projects', roles: ['direktur', 'finance'] },
                { icon: 'fa-truck', label: 'Data Vendor', action: 'vendors', roles: ['direktur', 'finance'] }
            ] },
            { icon: 'fa-download', label: 'Export & Backup', action: 'export', roles: ['direktur', 'finance'] }
        ];
        let html = '';
        menus.forEach(menu => {
            if (menu.type === 'dropdown') {
                let hasAccess = menu.submenus.some(sub => sub.roles.includes(currentUserRole));
                if (!hasAccess) return;
                html += `<div class="menu-item has-dropdown" onclick="toggleDropdown('${menu.label}')"><i class="fas ${menu.icon}"></i><span style="flex:1;">${menu.label}</span><i class="fas fa-chevron-down" id="arrow-${menu.label}"></i></div><div id="dropdown-${menu.label}" class="dropdown-menu" style="display:none;">`;
                menu.submenus.forEach(sub => { if (sub.roles.includes(currentUserRole)) html += `<div class="menu-item submenu" onclick="showMenu('${sub.action}')"><i class="fas ${sub.icon}"></i> ${sub.label}</div>`; });
                html += `</div>`;
            } else if (menu.roles.includes(currentUserRole)) {
                html += `<div class="menu-item" onclick="showMenu('${menu.action}')"><i class="fas ${menu.icon}"></i> ${menu.label}</div>`;
            }
        });
        document.getElementById('sidebarMenu').innerHTML = html;
    }
    
    function toggleDropdown(label) { let d = document.getElementById(`dropdown-${label}`); let a = document.getElementById(`arrow-${label}`); if (d.style.display === 'none') { d.style.display = 'block'; if(a) a.style.transform = 'rotate(180deg)'; } else { d.style.display = 'none'; if(a) a.style.transform = 'rotate(0deg)'; } }
    
    function showMenu(menu) {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        if (event && event.currentTarget) event.currentTarget.classList.add('active');

    async function refreshDashboard() {
        let companyId = document.getElementById('dashboardCompany')?.value || 'all';
        let month = document.getElementById('dashboardMonth')?.value || 'all';
        let year = document.getElementById('dashboardYear')?.value || 'all';
        
        let query = sb.from('payment_requests').select('*');
        if (companyId !== 'all') query = query.eq('company_id', parseInt(companyId));
        if (month !== 'all' && year !== 'all') { let start = `${year}-${month.padStart(2,'0')}-01`; let end = `${year}-${month.padStart(2,'0')}-31`; query = query.gte('request_date', start).lte('request_date', end); }
        let { data: payments } = await query.order('created_at', { ascending: false });
        
        let { data: invoices } = await sb.from('invoices').select('*');
        let totalPiutang = (invoices || []).reduce((a,b) => a + ((b.total||0) - (b.paid_amount||0)), 0);
        let totalApproved = (payments || []).filter(p => p.status === 'paid').reduce((a,b) => a + (b.amount||0), 0) || 0;
        let totalPending = (payments || []).filter(p => p.status === 'submitted' || p.status === 'verified').reduce((a,b) => a + (b.amount||0), 0) || 0;
        
        document.getElementById('totalKas').innerHTML = `Rp ${formatNumber(totalApproved)}`;
        document.getElementById('totalPiutang').innerHTML = `Rp ${formatNumber(totalPiutang)}`;
        document.getElementById('totalPending').innerHTML = `Rp ${formatNumber(totalPending)}`;
        
        let statusData = { draft: 0, submitted: 0, verified: 0, paid: 0, rejected: 0 };
        let companyData = { 1:0, 2:0, 3:0, 4:0 };

        let trendValues = []; for (let i = 9; i <= 12; i++) trendValues.push((monthlyData[i] || 0)/1e6); for (let i = 1; i <= 2; i++) trendValues.push((monthlyData[i] || 0)/1e6);
        if (trendChart) trendChart.destroy();

        if (arapChart) arapChart.destroy();
        arapChart = new Chart(document.getElementById('arapChart'), { type: 'bar', data: { labels: ['Piutang (AR)', 'Utang (AP)'], datasets: [{ data: [totalPiutang/1e6, 0], backgroundColor: ['#3b82f6', '#ef4444'] }] }, options: { responsive: true, maintainAspectRatio: false } });
        
        let tbody = ''; (payments || []).slice(0,5).forEach(p => { let company = companies.find(c => c.id == p.company_id)?.nama || '-'; tbody += `<tr><td>#${p.id}</td>.html${p.request_date || '-'}</td>.html${company}</td>.html${p.description || '-'}</td><td class="text-right">Rp ${formatNumber(p.amount)}</td>.html<span class="status-badge status-${p.status}">${p.status}</span></td>.html<button class="action-btn" onclick="viewPaymentRequest(${p.id})"><i class="fas fa-eye"></i></button></td></tr>`; });

        priorities.forEach(p => {

        (payments || []).slice(0,10).forEach(p => {
            let statusIcon = p.status === 'submitted' ? '📤' : p.status === 'verified' ? '✓' : p.status === 'paid' ? '💰' : '📝';
            activityHtml += `<div class="activity-item" style="display:flex; align-items:center; gap:0.8rem; padding:0.5rem 0; border-bottom:1px solid var(--gray-200);"><div style="width:32px; text-align:center;">${statusIcon}</div><div><strong>Payment Request #${p.id}</strong> ${p.status === 'submitted' ? 'diajukan ke finance' : p.status === 'verified' ? 'diverifikasi finance' : p.status === 'paid' ? 'disetujui direktur' : 'dibuat'}<br><small>${p.request_date} - Rp ${formatNumber(p.amount)}</small></div></div>`;

    // ==================== PAYMENT REQUESTS ====================
       async function loadPaymentRequests() {
        showLoading();
        let query = sb.from('payment_requests').select('*');
        
        // Aturan akses berdasarkan role
        if (currentUserRole === 'staff') {
            // Staff hanya lihat draft milik sendiri
            query = query.eq('requester_email', currentUser?.email);
        } else if (currentUserRole === 'finance') {
            // Finance lihat semua yang statusnya submitted (belum diverifikasi)
            query = query.in('status', ['submitted', 'verified', 'paid', 'rejected']);
        } else if (currentUserRole === 'direktur') {
            // Direktur lihat semua yang sudah diverifikasi (menunggu approve)
            query = query.in('status', ['verified', 'paid', 'rejected']);
        }
        
        let { data: payments } = await query.order('id', { ascending: false });
        allPaymentsData = payments || [];
        
        // Ambil daftar perusahaan unik untuk filter
        let uniqueCompanies = [...new Set(allPaymentsData.map(p => p.company_id))];
        let companyFilterOptions = '<option value="all">Semua Perusahaan</option>';
        uniqueCompanies.forEach(cid => {
            let company = companies.find(c => c.id == cid);
            if (company) companyFilterOptions += `<option value="${cid}">${company.nama}</option>`;
        });
        
        let currentYear = new Date().getFullYear();
        let yearOptions = '<option value="all">Semua Tahun</option>';
        for (let y = currentYear - 1; y <= currentYear + 1; y++) {
            yearOptions += `<option value="${y}" ${y == currentYear ? 'selected' : ''}>${y}</option>`;
        }
        
        let monthOptions = '<option value="all">Semua Bulan</option>';
        let bulanNames = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
        for (let i = 0; i < 12; i++) {
            monthOptions += `<option value="${i+1}">${bulanNames[i]}</option>`;
        }
        
        let statusOptions = '<option value="all">Semua Status</option>';
        if (currentUserRole === 'staff') {
            statusOptions += `<option value="draft">Draft</option><option value="submitted">Submitted</option><option value="verified">Verified</option><option value="paid">Paid</option>`;
        } else if (currentUserRole === 'finance') {
            statusOptions += `<option value="submitted">Submitted</option><option value="verified">Verified</option><option value="paid">Paid</option><option value="rejected">Rejected</option>`;
        } else if (currentUserRole === 'direktur') {
            statusOptions += `<option value="verified">Verified</option><option value="paid">Paid</option><option value="rejected">Rejected</option>`;
        }
        
        let html = `<div class="form-card">
            <div class="form-header">
                <h2><i class="fas fa-money-bill-wave"></i> Payment Request</h2>
                <div>
                    <button class="btn btn-primary" onclick="showNewPaymentForm()"><i class="fas fa-plus"></i> Buat Request</button>
                    <button class="btn btn-secondary" onclick="exportTableToExcel('payment_requests')"><i class="fas fa-file-excel"></i> Export Excel</button>
                </div>
            </div>
            <div class="filter-card">
                <div class="filter-grid">
                    <div class="filter-item">
                        <label class="filter-label">Perusahaan</label>
                        <select id="filterCompany" class="filter-select" onchange="filterPaymentRequests()">${companyFilterOptions}</select>
                    </div>
                    <div class="filter-item">
                        <label class="filter-label">Bulan</label>
                        <select id="filterMonth" class="filter-select" onchange="filterPaymentRequests()">${monthOptions}</select>
                    </div>
                    <div class="filter-item">
                        <label class="filter-label">Tahun</label>
                        <select id="filterYear" class="filter-select" onchange="filterPaymentRequests()">${yearOptions}</select>
                    </div>
                    <div class="filter-item">
                        <label class="filter-label">Status</label>
                        <select id="paymentStatusFilter" class="filter-select" onchange="filterPaymentRequests()">${statusOptions}</select>
                    </div>
                </div>
            </div>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr><th>ID</th><th>Tgl</th><th>Perusahaan</th><th>Deskripsi</th><th>Jumlah</th><th>Total Transfer</th><th>Status</th><th>Aksi</th></tr>
                    </thead>
                    <tbody id="paymentTableBody"></tbody>
                </table>

            <div id="paginationControls" class="pagination"></div>
        </div>`;
        
        document.getElementById('content').innerHTML = html;

        function filterPaymentRequests() {
        let companyFilter = document.getElementById('filterCompany')?.value || 'all';
        let monthFilter = document.getElementById('filterMonth')?.value || 'all';
        let yearFilter = document.getElementById('filterYear')?.value || 'all';
        let statusFilter = document.getElementById('paymentStatusFilter')?.value || 'all';
        
        let filtered = allPaymentsData.filter(p => {
            if (companyFilter !== 'all' && p.company_id != companyFilter) return false;
            if (statusFilter !== 'all' && p.status !== statusFilter) return false;
            if (monthFilter !== 'all') {
                let d = new Date(p.request_date);
                if (d.getMonth() + 1 != monthFilter) return false;
            }
            if (yearFilter !== 'all') {
                let d = new Date(p.request_date);
                if (d.getFullYear() != yearFilter) return false;
            }
            return true;
        });
        
        renderPaymentTableWithPagination(filtered);
    }
    
    function renderPaymentTableWithPagination(filteredData) {
        let totalPages = Math.ceil(filteredData.length / paymentsPerPage);
        if (currentPaymentPage > totalPages) currentPaymentPage = 1;
        if (currentPaymentPage < 1) currentPaymentPage = 1;
        
        let start = (currentPaymentPage - 1) * paymentsPerPage;
        let end = start + paymentsPerPage;
        let pageData = filteredData.slice(start, end);
        
        let tbody = '';
        pageData.forEach(p => {
            let company = companies.find(c => c.id == p.company_id)?.nama || '-';
            let actions = `<button class="action-btn" onclick="viewPaymentRequest(${p.id})" title="Detail"><i class="fas fa-eye"></i></button>`;
            
            // Staff: hanya bisa submit/edit/hapus draft milik sendiri
            if (p.status === 'draft' && currentUserRole === 'staff' && p.requester_email === currentUser?.email) {
                actions += ` <button class="action-btn" onclick="submitPaymentRequest(${p.id})" title="Ajukan" style="color:var(--success);"><i class="fas fa-paper-plane"></i></button>`;
                actions += ` <button class="action-btn" onclick="editPaymentRequest(${p.id})" title="Edit" style="color:var(--warning);"><i class="fas fa-edit"></i></button>`;
                actions += ` <button class="action-btn" onclick="deletePaymentRequest(${p.id})" title="Hapus" style="color:var(--danger);"><i class="fas fa-trash"></i></button>`;
            }
            
            // Finance: verifikasi atau tolak request yang submitted
            if (p.status === 'submitted' && currentUserRole === 'finance') {
                actions += ` <button class="action-btn" onclick="verifyPaymentRequest(${p.id})" title="Verifikasi" style="color:var(--success);"><i class="fas fa-check-circle"></i></button>`;
                actions += ` <button class="action-btn" onclick="rejectPaymentRequest(${p.id})" title="Tolak" style="color:var(--danger);"><i class="fas fa-times-circle"></i></button>`;
            }
            
            // Direktur: approve request yang sudah diverifikasi
            if (p.status === 'verified' && currentUserRole === 'direktur') {
                actions += ` <button class="action-btn" onclick="approvePaymentRequest(${p.id})" title="Approve" style="color:var(--success);"><i class="fas fa-thumbs-up"></i></button>`;
            }
            
            tbody += `<tr>
                <td>#${p.id}</td>
                <td>${p.request_date || '-'}</td>
                <td>${company}</td>
                <td>${p.description || '-'}</td>
                <td class="text-right">Rp ${formatNumber(p.amount)}</td>
                <td class="text-right">Rp ${formatNumber(p.total_with_tax || p.amount)}</td>
                <td><span class="status-badge status-${p.status}">${p.status}</span></td>
                <td>${actions}</td>
            </tr>`;
        });
        
        document.getElementById('paymentTableBody').innerHTML = tbody || '<tr><td colspan="8">Belum ada data</td></tr>';
        
        // Pagination controls
        let paginationHtml = '';
        if (totalPages > 1) {
            paginationHtml += `<button class="btn btn-sm" onclick="changePaymentPage(${currentPaymentPage - 1})" ${currentPaymentPage === 1 ? 'disabled' : ''}>« Prev</button>`;
            for (let i = 1; i <= totalPages; i++) {
                paginationHtml += `<button class="btn btn-sm ${i === currentPaymentPage ? 'btn-primary' : ''}" onclick="changePaymentPage(${i})">${i}</button>`;
            }
            paginationHtml += `<button class="btn btn-sm" onclick="changePaymentPage(${currentPaymentPage + 1})" ${currentPaymentPage === totalPages ? 'disabled' : ''}>Next »</button>`;
        }
        document.getElementById('paginationControls').innerHTML = paginationHtml;
    }
    
    function changePaymentPage(page) {
        currentPaymentPage = page;
        filterPaymentRequests();
    }
        
    
    function showNewPaymentForm() {
        let modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-content"><h3><i class="fas fa-plus"></i> Buat Payment Request</h3>
            <div class="form-group"><label>Deskripsi</label><input type="text" id="newDesc" class="form-control" placeholder="Contoh: Pembayaran sewa"></div>
            <div class="form-group"><label>Jumlah (Rp)</label><input type="number" id="newAmount" class="form-control" placeholder="1000000"></div>
            <div class="form-group"><label>Bank / No Rekening</label><input type="text" id="newBank" class="form-control" placeholder="BCA 1234567890"></div>
            <div class="form-group"><label>Upload Bukti</label><input type="file" id="newFile" class="form-control" accept=".pdf,.jpg,.jpeg,.png"></div>
            <div style="display:flex; gap:0.5rem; margin-top:0.5rem;"><button class="btn btn-primary" onclick="saveNewPayment()">Simpan</button><button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Batal</button></div>
            <div id="newPaymentMsg" style="margin-top:0.5rem;"></div></div>`;
        document.body.appendChild(modal);
    }
    
    async function saveNewPayment() {
        let desc = document.getElementById('newDesc').value, amount = document.getElementById('newAmount').value, bank = document.getElementById('newBank').value, file = document.getElementById('newFile').files[0];
        if (!desc || !amount) { document.getElementById('newPaymentMsg').innerHTML = '<div class="alert alert-error">Isi semua field!</div>'; return; }
        let buktiUrl = '';
        if (file) {
            let reader = new FileReader();
            reader.onload = async (e) => {
                let base64 = e.target.result;
                let res = await fetch(GAS_UPLOAD_URL, { method: 'POST', body: JSON.stringify({ action: 'upload', file: base64, name: file.name, mimeType: file.type, folderId: DRIVE_FOLDER_ID }) });
                let result = await res.json();
                if (result.success) buktiUrl = result.url;
                await saveToSupabase(desc, amount, bank, buktiUrl);
            };
            reader.readAsDataURL(file);
        } else { await saveToSupabase(desc, amount, bank, ''); }
    }
    
    async function saveToSupabase(desc, amount, bank, buktiUrl) {
        let { error } = await sb.from('payment_requests').insert({ company_id: currentCompanyId, request_date: new Date().toISOString().split('T')[0], description: desc, amount: parseInt(amount), bank_account: bank, bukti_url: buktiUrl, requester_email: currentUser?.email, status: 'draft' });
        if (error) { document.getElementById('newPaymentMsg').innerHTML = `<div class="alert alert-error">${error.message}</div>`; }

    function toggleProjectInput() {
        let select = document.getElementById('verifyProject');
        let newProjectDiv = document.getElementById('newProjectInput');
        newProjectDiv.style.display = select.value === 'NEW' ? 'block' : 'none';
        if (select.value !== 'NEW') updateBudgetDisplay();
    }
    
    async function updateBudgetDisplay() {
        let select = document.getElementById('verifyProject');
        let projectCode = select.value;
        let budgetDiv = document.getElementById('budgetDisplay');
        
        if (!projectCode || projectCode === '' || projectCode === 'NEW') {
            budgetDiv.style.display = 'none';
            return;
        }
        
        let req = window.currentVerifikasiReq;
        let { data: project } = await sb.from('projects').select('*').eq('code', projectCode).eq('company_id', req.company_id).single();
        if (!project) { budgetDiv.style.display = 'none'; return; }
        
        let { data: payments } = await sb.from('payment_requests').select('amount, total_with_tax')
            .eq('project_code', projectCode).eq('company_id', req.company_id)
            .in('status', ['verified', 'paid']);
        let terpakai = (payments || []).reduce((a,b) => a + (b.total_with_tax || b.amount || 0), 0);
        
        let requestIni = req.amount;
        let totalNanti = terpakai + requestIni;
        let persen = project.is_unlimited ? 0 : (totalNanti / project.budget) * 100;
        persen = Math.min(persen, 150);
        
        let warna = '', statusText = '';
        if (project.is_unlimited) {
            warna = 'unlimited';
            statusText = '⚪ Unlimited (tanpa batas)';
        } else if (persen <= 70) { warna = 'safe'; statusText = '🟢 Aman';
        } else if (persen <= 90) { warna = 'warning'; statusText = '🟡 Mendekati batas';
        } else if (persen <= 100) { warna = 'danger'; statusText = '🟠 Hampir habis';
        } else { warna = 'over'; statusText = '🔴 OVER BUDGET!'; }
        
        budgetDiv.style.display = 'block';
        budgetDiv.innerHTML = `
            <div class="budget-card">
                <div class="budget-title">🎯 ${project.name}</div>
                <div class="budget-amount">${project.is_unlimited ? 'Unlimited' : `Rp ${formatNumber(project.budget)}`}</div>
                <div class="progress-budget"><div class="progress-fill ${warna}" style="width: ${persen}%;">${!project.is_unlimited ? Math.round(persen) + '%' : ''}</div></div>
                <div class="budget-stats"><span>Terpakai: Rp ${formatNumber(terpakai)}</span><span>Request: Rp ${formatNumber(requestIni)}</span><span>${statusText}</span></div>
                ${!project.is_unlimited && totalNanti > project.budget ? `<div class="alert alert-warning" style="margin-top:0.3rem; padding:0.2rem;">⚠️ Melebihi budget Rp ${formatNumber(totalNanti - project.budget)}</div>` : ''}
            </div>
        `;
    }

    async function submitVerifikasiDenganProject(id) {

        let ppn = kenaPPN ? Math.round(req.amount * (taxConfig.ppn_rate / 100)) : 0;

            let { data: existing } = await sb.from('projects').select('*').eq('company_id', req.company_id).eq('code', projectCode);

                await sb.from('projects').insert({

        }
        
        let company = companies.find(c => c.id == req.company_id);
        let companyCode = company?.kode || 'ARK';
        let now = new Date();
        let year = now.getFullYear();
        let month = String(now.getMonth() + 1).padStart(2, '0');
        
        let basePattern = `${companyCode}/${year}/${month}`;
        if (projectCode && projectCode !== '') basePattern += `/${projectCode}`;
        
        let { data: existing } = await sb.from('payment_requests').select('voucher_no');
        let lastNumber = 0;
        (existing || []).forEach(v => {
            if (v.voucher_no && v.voucher_no.startsWith(basePattern)) {

    async function filterInvoices() {
        let { data: invoices } = await sb.from('invoices').select('*').order('id', { ascending: false });
        let customersList = await getCustomerList(currentCompanyId);
        let statusFilter = document.getElementById('invoiceStatusFilter')?.value || 'all';
        let monthFilter = document.getElementById('invoiceMonthFilter')?.value || 'all';
        let yearFilter = document.getElementById('invoiceYearFilter')?.value || 'all';
        let searchFilter = document.getElementById('invoiceSearch')?.value || '';
        let filtered = (invoices || []).filter(inv => {
            if (statusFilter !== 'all' && inv.status !== statusFilter) return false;
            if (monthFilter !== 'all') { let d = new Date(inv.invoice_date); if (d.getMonth() + 1 != monthFilter) return false; }
            if (yearFilter !== 'all') { let d = new Date(inv.invoice_date); if (d.getFullYear() != yearFilter) return false; }
            if (searchFilter) { let cust = customersList.find(c => c.id == inv.customer_id); if (!inv.invoice_no?.toLowerCase().includes(searchFilter.toLowerCase()) && !cust?.name?.toLowerCase().includes(searchFilter.toLowerCase())) return false; }
            return true;
        });
        let tbody = '';
        for (let inv of filtered) {
            let customer = customersList.find(c => c.id == inv.customer_id);
            let sisa = (inv.total || 0) - (inv.paid_amount || 0);
            let statusClass = inv.status === 'paid' ? 'status-paid' : inv.status === 'posted' ? 'status-submitted' : inv.status === 'partial' ? 'status-verified' : 'status-draft';
            tbody += `<tr>
                <td><strong>${inv.invoice_no || '#'+inv.id}</strong></td>
                <td>${customer?.name || '-'}</td>
                <td>${inv.invoice_date || '-'}</td>
                <td>${inv.due_date || '-'}</td>
                <td class="text-right">Rp ${formatNumber(inv.total)}</td>
                <td class="text-right">Rp ${formatNumber(inv.paid_amount)}</td>
                <td class="text-right">Rp ${formatNumber(sisa)}</td>
                <td><span class="status-badge ${statusClass}">${inv.status || 'draft'}</span></td>
                <td>

    function renderInvoiceItem(id) {

    function addInvoiceItem() { let container = document.getElementById('invoiceItemsContainer'); window.invoiceItemCounter++; let newItem = document.createElement('div'); newItem.innerHTML = renderInvoiceItem(window.invoiceItemCounter); container.appendChild(newItem.firstChild); calculateInvoiceTotal(); }
    function removeInvoiceItem(id) { let item = document.getElementById(`invoice-item-${id}`); if (document.querySelectorAll('.invoice-item').length > 1) { item.remove(); calculateInvoiceTotal(); } else { alert('Minimal satu item harus ada'); } }
    
    function calculateInvoiceTotal() {
        let subtotal = 0;
        document.querySelectorAll('.invoice-item').forEach(item => {
            let qty = parseFloat(item.querySelector('.item-qty')?.value) || 0;
            let price = parseRupiah(item.querySelector('.item-price')?.value);
            let discount = parseFloat(item.querySelector('.item-discount')?.value) || 0;
            let itemTotal = qty * price * (1 - discount / 100);
            subtotal += itemTotal;
            let totalInput = item.querySelector('.item-total');
            if (totalInput) totalInput.value = formatNumber(itemTotal);
        });
        let companyId = currentCompanyId;
        let ppnRate = (companyId === 2 || companyId === 3) ? 1.1 : 11;
        let kenaPPN = document.getElementById('createInvoicePPN')?.checked || false;
        let ppn = kenaPPN ? subtotal * ppnRate / 100 : 0;
        document.getElementById('invoiceSubtotal').innerHTML = `Rp ${formatNumber(subtotal)}`;
        document.getElementById('invoicePPN').innerHTML = `Rp ${formatNumber(ppn)}`;
        document.getElementById('invoiceTotal').innerHTML = `Rp ${formatNumber(subtotal + ppn)}`;
        document.getElementById('ppnRateLabel').innerHTML = ppnRate + '%';
    }
    
    async function saveInvoice() {
        let customerId = parseInt(document.getElementById('createInvoiceCustomer').value);
        let projectId = document.getElementById('createInvoiceProject').value || null;
        let revenueAccount = document.getElementById('createInvoiceRevenueAccount').value;
        let bankCode = document.getElementById('createInvoiceBank').value;
        let invoiceDate = document.getElementById('createInvoiceDate').value;
        let dueDate = document.getElementById('createInvoiceDueDate').value;
        let notes = document.getElementById('createInvoiceNotes').value;
        let invoiceNo = document.getElementById('invoiceNo').value;
        let items = [];
        let hasError = false;
        document.querySelectorAll('.invoice-item').forEach((item, idx) => {
            let name = item.querySelector('.item-name')?.value;
            let qty = parseFloat(item.querySelector('.item-qty')?.value) || 0;
            let price = parseRupiah(item.querySelector('.item-price')?.value);
            let discount = parseFloat(item.querySelector('.item-discount')?.value) || 0;
            if (!name) { alert(`Item ${idx+1}: Nama harus diisi`); hasError = true; return; }
            let amount = qty * price * (1 - discount / 100);
            items.push({ description: name, quantity: qty, unitPrice: price, discount: discount * price * qty / 100, amount: amount });
        });
        if (hasError) return;
        let subtotal = parseRupiah(document.getElementById('invoiceSubtotal').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        let ppn = parseRupiah(document.getElementById('invoicePPN').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        let total = parseRupiah(document.getElementById('invoiceTotal').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        showLoading();
        let { data, error } = await sb.from('invoices').insert({
            company_id: currentCompanyId, customer_id: customerId, project_id: projectId, revenue_account: revenueAccount, bank_code: bankCode,
            invoice_date: invoiceDate, due_date: dueDate, notes: notes, dpp: subtotal, ppn: ppn, total: total, status: 'draft', invoice_no: invoiceNo, created_by: currentUser?.email
        }).select().single();
        if (error) { hideLoading(); document.getElementById('createInvoiceResult').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
        for (let item of items) { await sb.from('invoice_items').insert({ invoice_id: data.id, description: item.description, quantity: item.quantity, price: item.unitPrice, discount: item.discount, amount: item.amount }); }
        hideLoading(); document.getElementById('createInvoiceResult').innerHTML = `<div class="alert alert-success">✅ Invoice ${invoiceNo} berhasil dibuat!</div>`; setTimeout(() => loadInvoiceList(), 2000);
    }
    
    async function postInvoice(id) {
        if (!confirm('Posting invoice akan membuat jurnal otomatis. Lanjutkan?')) return;
        showLoading();
        let { data: invoice } = await sb.from('invoices').select('*').eq('id', id).single();
        let suffix = companies.find(c => c.id == invoice.company_id)?.singkatan || 'A';
        let piutangAkun = `1111-${suffix}`;
        let ppnAkun = `2103-01-${suffix}`;
        let lastJournal = await sb.from('journals').select('id').order('id', { ascending: false }).limit(1);
        let journalId = (lastJournal.data?.[0]?.id || 0) + 1;
        await sb.from('journals').insert({ id: journalId, company_id: invoice.company_id, journal_date: invoice.invoice_date, period: invoice.invoice_date.substring(0,7), description: `Penjualan Invoice ${invoice.invoice_no}`, reference: invoice.invoice_no, created_by: currentUser?.email, status: 'posted' });
        await sb.from('journal_lines').insert({ journal_id: journalId, account_code: piutangAkun, debit: invoice.total, credit: 0, description: `Piutang dari invoice ${invoice.invoice_no}` });
        await sb.from('journal_lines').insert({ journal_id: journalId, account_code: invoice.revenue_account, debit: 0, credit: invoice.dpp, description: `Pendapatan invoice ${invoice.invoice_no}` });
        if (invoice.ppn > 0) { await sb.from('journal_lines').insert({ journal_id: journalId, account_code: ppnAkun, debit: 0, credit: invoice.ppn, description: `PPN Keluaran invoice ${invoice.invoice_no}` }); }

        hideLoading(); alert(`✅ Invoice berhasil diposting! Jurnal ID: ${journalId}`); loadInvoiceList(); loadDashboard();

    async function recordPayment(invoiceId) {
        let amount = prompt('Jumlah pembayaran:', '0');
        if (!amount) return;
        let { data: invoice } = await sb.from('invoices').select('*').eq('id', invoiceId).single();
        let sisa = invoice.total - (invoice.paid_amount || 0);
        if (parseFloat(amount) > sisa) { alert(`Maksimal pembayaran Rp ${formatNumber(sisa)}`); return; }
        let newPaid = (invoice.paid_amount || 0) + parseFloat(amount);
        let newStatus = newPaid >= invoice.total ? 'paid' : 'partial';
        let suffix = companies.find(c => c.id == invoice.company_id)?.singkatan || 'A';
        let bankAkun = invoice.bank_code;
        let piutangAkun = `1111-${suffix}`;
        let lastJournal = await sb.from('journals').select('id').order('id', { ascending: false }).limit(1);
        let journalId = (lastJournal.data?.[0]?.id || 0) + 1;
        await sb.from('journals').insert({ id: journalId, company_id: invoice.company_id, journal_date: new Date().toISOString().split('T')[0], period: new Date().toISOString().substring(0,7), description: `Penerimaan pembayaran invoice ${invoice.invoice_no}`, reference: invoice.invoice_no, created_by: currentUser?.email, status: 'posted' });
        await sb.from('journal_lines').insert({ journal_id: journalId, account_code: bankAkun, debit: parseFloat(amount), credit: 0, description: `Penerimaan dari invoice ${invoice.invoice_no}` });
        await sb.from('journal_lines').insert({ journal_id: journalId, account_code: piutangAkun, debit: 0, credit: parseFloat(amount), description: `Lunasi piutang invoice ${invoice.invoice_no}` });
        await sb.from('invoices').update({ paid_amount: newPaid, status: newStatus, last_payment_date: new Date().toISOString().split('T')[0] }).eq('id', invoiceId);
        alert(`✅ Pembayaran Rp ${formatNumber(amount)} dicatat. Sisa: Rp ${formatNumber(sisa - amount)}`);
        loadInvoiceList(); loadDashboard();
    }

    async function filterVendorInvoices() {
        let { data: invoices } = await sb.from('vendor_invoices').select('*').order('id', { ascending: false });
        let statusFilter = document.getElementById('vendorStatusFilter')?.value || 'all';
        let monthFilter = document.getElementById('vendorMonthFilter')?.value || 'all';
        let yearFilter = document.getElementById('vendorYearFilter')?.value || 'all';
        let filtered = (invoices || []).filter(inv => {
            if (statusFilter !== 'all' && inv.payment_status !== statusFilter) return false;
            if (monthFilter !== 'all') { let d = new Date(inv.invoice_date); if (d.getMonth() + 1 != monthFilter) return false; }
            if (yearFilter !== 'all') { let d = new Date(inv.invoice_date); if (d.getFullYear() != yearFilter) return false; }
            return true;
        });
        let totalUtang = 0, totalDibayar = 0, totalJatuhTempo = 0;
        let today = new Date(); let nextWeek = new Date(); nextWeek.setDate(today.getDate() + 7);
        filtered.forEach(inv => {
            let sisa = (inv.total || 0) - (inv.paid_amount || 0);
            totalUtang += sisa;
            totalDibayar += (inv.paid_amount || 0);
            let dueDate = new Date(inv.due_date);
            if (sisa > 0 && dueDate >= today && dueDate <= nextWeek) totalJatuhTempo += sisa;
        });
        document.getElementById('totalUtangVendor').innerHTML = `Rp ${formatNumber(totalUtang)}`;
        document.getElementById('jatuhTempoMingguIni').innerHTML = `Rp ${formatNumber(totalJatuhTempo)}`;
        document.getElementById('sudahDibayarVendor').innerHTML = `Rp ${formatNumber(totalDibayar)}`;
        
        let tbody = '';
        for (let inv of filtered) {
            let sisa = (inv.total || 0) - (inv.paid_amount || 0);
            let statusClass = inv.payment_status === 'paid' ? 'status-paid' : inv.payment_status === 'partial' ? 'status-verified' : 'status-draft';
            let fileIcon = inv.file_url ? `<a href="${inv.file_url}" target="_blank" class="action-btn"><i class="fas fa-file-pdf" style="color:var(--danger);"></i></a>` : '<span class="action-btn"><i class="fas fa-file"></i></span>';
            tbody += `<tr>
                <td>${inv.vendor_name || '-'}</td>
                <td>${inv.invoice_no || '-'}</td>
                <td>${inv.invoice_date || '-'}</td>
                <td>${inv.due_date || '-'}</td>
                <td class="text-right">Rp ${formatNumber(inv.total)}</td>
                <td class="text-right">Rp ${formatNumber(inv.paid_amount)}</td>
                <td class="text-right">Rp ${formatNumber(sisa)}</td>
                <td><span class="status-badge ${statusClass}">${inv.payment_status}</span></td>
                <td class="text-center">${fileIcon}</td>
                <td>
                    <button class="action-btn" onclick="viewVendorInvoiceDetail(${inv.id})" title="Detail"><i class="fas fa-eye"></i></button>
                    ${sisa > 0 ? `<button class="action-btn" onclick="submitVendorPayment(${inv.id})" title="Ajukan Pembayaran" style="color:var(--success);"><i class="fas fa-money-bill-wave"></i></button>` : ''}
                </td>
            </tr>`;
        }
        document.getElementById('vendorTableBody').innerHTML = tbody || '<tr><td colspan="10">Belum ada数据</td></tr>';
    }
    
    async function viewVendorInvoiceDetail(id) {
        let { data: invoice } = await sb.from('vendor_invoices').select('*').eq('id', id).single();
        let sisa = (invoice.total || 0) - (invoice.paid_amount || 0);
        alert(`Detail Invoice Vendor\nVendor: ${invoice.vendor_name}\nNo Invoice: ${invoice.invoice_no}\nTanggal: ${invoice.invoice_date}\nTotal: Rp ${formatNumber(invoice.total)}\nDibayar: Rp ${formatNumber(invoice.paid_amount)}\nSisa: Rp ${formatNumber(sisa)}\nStatus: ${invoice.payment_status}\nFile: ${invoice.file_url || '-'}`);
    }
    
    async function submitVendorPayment(id) {
        let amount = prompt('Jumlah pembayaran:', '0');
        if (!amount) return;
        let { data: invoice } = await sb.from('vendor_invoices').select('*').eq('id', id).single();
        let sisa = invoice.total - (invoice.paid_amount || 0);
        if (parseFloat(amount) > sisa) { alert(`Maksimal pembayaran Rp ${formatNumber(sisa)}`); return; }
        let newPaid = (invoice.paid_amount || 0) + parseFloat(amount);
        let newStatus = newPaid >= invoice.total ? 'paid' : 'partial';
        let bankCode = prompt('Kode Bank (contoh: 1102-01-A):', invoice.bank_code);
        if (!bankCode) return;
        let suffix = companies.find(c => c.id == invoice.company_id)?.singkatan || 'A';
        let utangAkun = `2111-${suffix}`;
        let lastJournal = await sb.from('journals').select('id').order('id', { ascending: false }).limit(1);
        let journalId = (lastJournal.data?.[0]?.id || 0) + 1;
        await sb.from('journals').insert({ id: journalId, company_id: invoice.company_id, journal_date: new Date().toISOString().split('T')[0], period: new Date().toISOString().substring(0,7), description: `Pembayaran invoice ${invoice.invoice_no}`, reference: invoice.invoice_no, created_by: currentUser?.email, status: 'posted' });
        await sb.from('journal_lines').insert([
            { journal_id: journalId, account_code: utangAkun, debit: parseFloat(amount), credit: 0, description: `Pembayaran invoice ${invoice.invoice_no}` },
            { journal_id: journalId, account_code: bankCode, debit: 0, credit: parseFloat(amount), description: `Transfer ke ${invoice.vendor_name}` }
        ]);
        await sb.from('vendor_invoices').update({ paid_amount: newPaid, payment_status: newStatus, last_payment_date: new Date().toISOString().split('T')[0] }).eq('id', id);
        alert(`✅ Pembayaran Rp ${formatNumber(amount)} dicatat. Sisa: Rp ${formatNumber(sisa - amount)}`);
        loadVendorInvoiceList(); loadDashboard();
    }

    async function checkSession() {
        let { data } = await sb.auth.getSession();
        if (data.session) {
            let { data: profile } = await sb.from('user_profiles').select('*').eq('email', data.session.user.email).single();
            currentUser = data.session.user; currentUserRole = profile?.role || 'staff'; currentCompanyId = profile?.company_id || 1;
            let { data: comps } = await sb.from('companies').select('*'); companies = comps || [];
            document.getElementById('loginPage').style.display = 'none'; document.getElementById('appPage').style.display = 'flex';
            document.getElementById('userName').innerText = profile?.name || currentUser.email; document.getElementById('userRole').innerText = currentUserRole;
            document.getElementById('userAvatar').innerText = (profile?.name || currentUser.email).charAt(0).toUpperCase();
            renderSidebar(); loadDashboard();
        }
    }
