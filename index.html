    <style>

        body { font-family: 'Inter', sans-serif; background: #f3f4f6; color: #1f2937; line-height: 1.5; }
        :root {
            --primary: #0f172a; --primary-light: #1e293b; --accent: #3b82f6; --accent-soft: #60a5fa;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #6366f1;
            --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
            --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }
        .app { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: white; border-right: 1px solid var(--gray-200); position: fixed; height: 100vh; overflow-y: auto; z-index: 100; transition: transform 0.3s ease; }
        .sidebar-header { padding: 2rem 1.5rem; border-bottom: 1px solid var(--gray-200); }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 0.75rem; }
        .logo i { color: var(--accent); font-size: 2rem; }
        .sidebar-menu { flex: 1; padding: 1.5rem; overflow-y: auto; }
        .menu-item { display: flex; align-items: center; gap: 1rem; padding: 0.875rem 1rem; color: var(--gray-600); border-radius: 12px; margin-bottom: 0.25rem; transition: all 0.2s; cursor: pointer; font-weight: 500; }
        .menu-item i { width: 24px; font-size: 1.25rem; color: var(--gray-400); transition: all 0.2s; }
        .menu-item:hover { background: var(--gray-100); color: var(--primary); }
        .menu-item:hover i { color: var(--accent); }
        .menu-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; box-shadow: var(--shadow-lg); }
        .menu-item.active i { color: white; }
        .menu-item.has-dropdown { display: flex; align-items: center; justify-content: space-between; }
        .dropdown-menu { margin-left: 0.5rem; border-left: 2px dashed var(--gray-300); margin-bottom: 0.5rem; }
        .menu-item.submenu { padding: 0.6rem 1rem; font-size: 0.9rem; margin-bottom: 0.1rem; padding-left: 2rem; }
        .main { flex: 1; margin-left: 280px; padding: 2rem; transition: margin-left 0.3s ease; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: white; padding: 1rem 1.5rem; border-radius: 12px; box-shadow: var(--shadow); flex-wrap: wrap; gap: 1rem; }
        .page-title { font-size: 1.5rem; font-weight: 600; color: var(--gray-800); }
        .user-menu { display: flex; align-items: center; gap: 1rem; }
        .user-name { font-weight: 600; font-size: 0.875rem; }
        .user-role { font-size: 0.75rem; color: var(--gray-500); text-transform: capitalize; }
        .user-avatar { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
        .logout-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem; }
        .card { background: white; border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); }
        .card h2 { font-size: 1.2rem; margin-bottom: 1rem; border-bottom: 2px solid var(--gray-200); padding-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .form-card { background: white; border-radius: 20px; padding: 2rem; border: 1px solid var(--gray-200); box-shadow: var(--shadow); }
        .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--gray-200); flex-wrap: wrap; gap: 1rem; }

        .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }
        .filter-card { background: white; border-radius: 16px; padding: 1.2rem; margin-bottom: 1.5rem; border: 1px solid var(--gray-200); }
        .filter-grid { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; }
        .filter-item { flex: 1; min-width: 150px; }
        .filter-label { font-size: 0.7rem; font-weight: 600; color: var(--gray-500); margin-bottom: 0.2rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .filter-select { width: 100%; padding: 0.5rem 0.8rem; border: 1px solid var(--gray-300); border-radius: 10px; background: white; font-size: 0.8rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 10px; border: none; cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 0.5rem; transition: all 0.2s; font-size: 0.8rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-light); transform: translateY(-1px); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.7rem; }
        .action-btn { background: none; border: none; color: var(--gray-500); cursor: pointer; padding: 0.3rem; border-radius: 6px; transition: all 0.2s; }
        .action-btn:hover { color: var(--accent); background: var(--gray-100); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.2rem; margin-bottom: 1.5rem; }
        .stat-card { background: white; border-radius: 16px; padding: 1.2rem; text-align: center; box-shadow: var(--shadow); transition: all 0.2s; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .stat-value { font-size: 1.6rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.7rem; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 0.3rem; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-bottom: 1.5rem; }
        .chart-card { background: white; border-radius: 16px; padding: 1.2rem; box-shadow: var(--shadow); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; flex-wrap: wrap; }
        .chart-title { font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 0.3rem; }
        .chart-title i { color: var(--accent); }
        .chart-container { height: 220px; position: relative; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.8rem; text-align: left; border-bottom: 1px solid var(--gray-200); font-size: 0.85rem; }
        th { background: var(--gray-100); font-weight: 600; color: var(--gray-600); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.5px; }
        tr:hover td { background: var(--gray-50); }
        .status-badge { padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: inline-flex; align-items: center; gap: 0.2rem; }
        .status-draft { background: var(--gray-200); color: var(--gray-600); }
        .status-submitted { background: #dbeafe; color: #1e40af; }
        .status-verified { background: #fef3c7; color: #92400e; }
        .status-paid { background: #d1fae5; color: #065f46; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .status-active { background: #d1fae5; color: #065f46; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; border-radius: 20px; padding: 1.5rem; max-width: 700px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; display: none; }
        .loading-spinner { width: 50px; height: 50px; border: 3px solid var(--gray-200); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .alert { padding: 0.8rem 1rem; border-radius: 10px; margin-bottom: 1rem; font-size: 0.85rem; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-warning { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .alert-info { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary), var(--primary-light)); }
        .login-card { background: white; border-radius: 24px; padding: 2.5rem; width: 100%; max-width: 420px; text-align: center; box-shadow: var(--shadow-lg); }
        .login-logo i { font-size: 3rem; color: var(--accent); margin-bottom: 0.5rem; }
        .login-logo h1 { font-size: 1.8rem; margin-bottom: 0.2rem; color: var(--primary); }
        .login-logo p { color: var(--gray-500); margin-bottom: 1.5rem; }
        .welcome-section { background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 20px; padding: 1.5rem; margin-bottom: 2rem; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .welcome-section h1 { font-size: 1.4rem; display: flex; align-items: center; gap: 0.5rem; }
        .welcome-date { background: rgba(255,255,255,0.15); padding: 0.4rem 1rem; border-radius: 30px; font-size: 0.8rem; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-3 { margin-top: 0.8rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .fw-bold { font-weight: bold; }
        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        
        /* MOBILE RESPONSIVE */
        .mobile-menu-toggle { display: none; position: fixed; top: 1rem; left: 1rem; z-index: 101; background: var(--primary); color: white; border: none; border-radius: 8px; padding: 0.75rem; cursor: pointer; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99; }
        
        @media (max-width: 768px) {
            .mobile-menu-toggle { display: block; }
            .sidebar { transform: translateX(-100%); z-index: 100; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.active { display: block; }
            .main { margin-left: 0; padding: 1rem; padding-top: 4rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
            .charts-grid { grid-template-columns: 1fr; }
            .filter-grid { flex-direction: column; }
            .filter-item { min-width: 100%; }
            .form-header { flex-direction: column; align-items: flex-start; }
            .top-bar { flex-direction: column; text-align: center; }
            .welcome-section { flex-direction: column; text-align: center; }
            .card { padding: 1rem; }
            th, td { padding: 0.5rem; font-size: 0.75rem; white-space: nowrap; }
            .btn { padding: 0.4rem 0.8rem; font-size: 0.75rem; }
            .stat-value { font-size: 1.2rem; }
        }
        
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .modal-content { width: 95%; padding: 1rem; }
        }
        
        /* PRINT STYLES */
        @media print {
            .sidebar, .top-bar, .btn, .filter-card, .mobile-menu-toggle, .logout-btn { display: none !important; }
            .main { margin: 0; padding: 0; }
            .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
        }
    </style>
</head>
<body>

    </div>
        <script>
    // ==================== KONFIGURASI ====================
    const SUPABASE_URL = 'https://vtkineqwvnuzxxcegofx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0a2luZXF3dm51enh4Y2Vnb2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDU4OTMsImV4cCI6MjA5MDg4MTg5M30.7ygetyHX-_-5JDU-pXS2eP3iLgpI_zP6Gqms1gSY0ys';
    const GAS_UPLOAD_URL = 'https://script.google.com/macros/s/AKfycbzQDc9CUWZELs7iw9a4lDJJPC74jMMZr5savRc-2GTWnuWpFyUytI_zrYYgaCWZfXrMMQ/exec';
    const DRIVE_FOLDER_ID = '15OqEW00HkWJrBEJtPnNPV5jwaMZ24wik';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null, currentUserRole = null, currentCompanyId = 1;
    let companies = [], accounts = [], projects = [], customers = [], vendors = [];
    let statusChart = null, companyChart = null, trendChart = null, arapChart = null;
    let revenueAccounts = [];
    let journalLineCounter = 1;
    
    // ==================== FUNGSI HELPER ====================
    function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
    function formatNumber(num) { if (!num || isNaN(num)) return '0'; return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
    function parseRupiah(str) { if (!str) return 0; let cleaned = str.toString().replace(/\./g, '').replace(/[^0-9,-]/g, '').replace(',', '.'); return parseFloat(cleaned) || 0; }
    function formatMoney(input) { let v = input.value.replace(/\./g, '').replace(/[^0-9]/g, ''); input.value = v ? new Intl.NumberFormat('id-ID').format(parseInt(v)) : ''; }
    function formatDate(dateStr) { if (!dateStr) return '-'; let d = new Date(dateStr); return d.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' }); }
    function toggleMobileSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('active'); }
    
    async function getCustomerList(companyId) { let { data } = await supabaseClient.from('customers').select('*').eq('company_id', companyId); return data || []; }
    async function getProjectList(companyId) { let { data } = await supabaseClient.from('projects').select('*').eq('company_id', companyId); return data || []; }
    async function getAccountList(companyId) { let { data } = await supabaseClient.from('chart_of_accounts').select('*').eq('company_id', companyId); return data || []; }
    async function getVendorList(companyId) { let { data } = await supabaseClient.from('vendors').select('*').eq('company_id', companyId); return data || []; }
    async function getBankList(companyId) { let { data } = await supabaseClient.from('chart_of_accounts').select('*').eq('company_id', companyId).ilike('account_name', '%Bank%'); return data.map(b => ({ code: b.account_code, name: b.account_name, display: b.account_name })); }
    
    // ==================== AUTHENTICATION ====================
    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { let err = document.getElementById('loginError'); err.innerText = 'Isi email dan password'; err.style.display = 'block'; return; }
        showLoading();
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) { hideLoading(); let err = document.getElementById('loginError'); err.innerText = error.message; err.style.display = 'block'; return; }
        const { data: profile } = await supabaseClient.from('user_profiles').select('*').eq('email', email).single();
        currentUser = data.user; currentUserRole = profile?.role || 'staff'; currentCompanyId = profile?.company_id || 1;
        const { data: comps } = await supabaseClient.from('companies').select('*'); companies = comps || [];
        document.getElementById('loginPage').style.display = 'none'; document.getElementById('appPage').style.display = 'flex';
        document.getElementById('userName').innerText = profile?.name || email; document.getElementById('userRole').innerText = currentUserRole;
        document.getElementById('userAvatar').innerText = (profile?.name || email).charAt(0).toUpperCase();
        renderSidebar(); loadDashboard(); hideLoading();
    }
    
    async function handleLogout() { await supabaseClient.auth.signOut(); document.getElementById('loginPage').style.display = 'flex'; document.getElementById('appPage').style.display = 'none'; }
    
    function renderSidebar() {
        let menus = [
            { icon: 'fa-chart-pie', label: 'Dashboard', action: 'dashboard', roles: ['direktur', 'finance', 'staff'] },
            { icon: 'fa-book', label: 'Jurnal & Akuntansi', type: 'dropdown', submenus: [
                { icon: 'fa-pen', label: 'Input Jurnal', action: 'jurnal', roles: ['direktur', 'finance'] },
                { icon: 'fa-book', label: 'Buku Besar', action: 'ledger', roles: ['direktur', 'finance'] },
                { icon: 'fa-chart-line', label: 'Laba Rugi', action: 'labarugi', roles: ['direktur', 'finance'] },
                { icon: 'fa-scale-balanced', label: 'Neraca', action: 'neraca', roles: ['direktur', 'finance'] },
                { icon: 'fa-book-open', label: 'Jurnal Umum', action: 'jurnal_umum', roles: ['direktur', 'finance'] }
            ] },
            { icon: 'fa-file-invoice-dollar', label: 'Invoice & Payment', type: 'dropdown', submenus: [
                { icon: 'fa-user', label: 'Invoice Penjualan (AR)', action: 'invoice_penjualan', roles: ['direktur', 'finance'] },
                { icon: 'fa-users', label: 'Invoice Pembelian (AP)', action: 'invoice_pembelian', roles: ['direktur', 'finance'] },
                { icon: 'fa-money-bill-wave', label: 'Payment Request', action: 'payment', roles: ['direktur', 'finance', 'staff'] }
            ] },
            { icon: 'fa-chart-pie', label: 'Manajemen', type: 'dropdown', submenus: [
                { icon: 'fa-clock', label: 'Transaksi Berulang', action: 'recurring', roles: ['direktur', 'finance'] },
                { icon: 'fa-chart-pie', label: 'Manajemen Aset', action: 'aset', roles: ['direktur', 'finance'] },
                { icon: 'fa-scale-balanced', label: 'Saldo Awal', action: 'opening_balance', roles: ['direktur', 'finance'] }
            ] },
            { icon: 'fa-database', label: 'Master Data', type: 'dropdown', submenus: [
                { icon: 'fa-users', label: 'Data Customer', action: 'customers', roles: ['direktur', 'finance'] },
                { icon: 'fa-project-diagram', label: 'Data Project', action: 'projects', roles: ['direktur', 'finance'] },
                { icon: 'fa-truck', label: 'Data Vendor', action: 'vendors', roles: ['direktur', 'finance'] }
            ] },
            { icon: 'fa-download', label: 'Export & Backup', action: 'export', roles: ['direktur', 'finance'] }
        ];
        let html = '';
        menus.forEach(menu => {
            if (menu.type === 'dropdown') {
                let hasAccess = menu.submenus.some(sub => sub.roles.includes(currentUserRole));
                if (!hasAccess) return;
                html += `<div class="menu-item has-dropdown" onclick="toggleDropdown('${menu.label}')"><i class="fas ${menu.icon}"></i><span style="flex:1;">${menu.label}</span><i class="fas fa-chevron-down" id="arrow-${menu.label}"></i></div><div id="dropdown-${menu.label}" class="dropdown-menu" style="display:none;">`;
                menu.submenus.forEach(sub => { if (sub.roles.includes(currentUserRole)) html += `<div class="menu-item submenu" onclick="showMenu('${sub.action}');toggleMobileSidebar();"><i class="fas ${sub.icon}"></i> ${sub.label}</div>`; });
                html += `</div>`;
            } else if (menu.roles.includes(currentUserRole)) {
                html += `<div class="menu-item" onclick="showMenu('${menu.action}');toggleMobileSidebar();"><i class="fas ${menu.icon}"></i> ${menu.label}</div>`;
            }
        });
        document.getElementById('sidebarMenu').innerHTML = html;
    }
    
    function toggleDropdown(label) { let d = document.getElementById(`dropdown-${label}`); let a = document.getElementById(`arrow-${label}`); if (d.style.display === 'none') { d.style.display = 'block'; if(a) a.style.transform = 'rotate(180deg)'; } else { d.style.display = 'none'; if(a) a.style.transform = 'rotate(0deg)'; } }
    
    function showMenu(menu) {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        if (event && event.currentTarget) event.currentTarget.classList.add('active');
        const titles = { dashboard: 'Dashboard Keuangan', jurnal: 'Input Jurnal', invoice_penjualan: 'Invoice Penjualan', invoice_pembelian: 'Invoice Pembelian', payment: 'Payment Request', ledger: 'Buku Besar', labarugi: 'Laba Rugi', neraca: 'Neraca', jurnal_umum: 'Jurnal Umum', recurring: 'Transaksi Berulang', aset: 'Manajemen Aset', customers: 'Data Customer', projects: 'Data Project', vendors: 'Data Vendor', opening_balance: 'Saldo Awal', export: 'Export & Backup Data' };
        document.getElementById('pageTitle').innerText = titles[menu] || 'ERP';
        if (menu === 'dashboard') loadDashboard();
        else if (menu === 'jurnal') loadJurnalForm();
        else if (menu === 'invoice_penjualan') loadInvoiceList();
        else if (menu === 'invoice_pembelian') loadVendorInvoiceList();
        else if (menu === 'payment') loadPaymentRequests();
        else if (menu === 'ledger') loadLedgerForm();
        else if (menu === 'labarugi') loadLabaRugiForm();
        else if (menu === 'neraca') loadNeracaForm();
        else if (menu === 'jurnal_umum') loadJurnalUmum();
        else if (menu === 'recurring') loadRecurringList();
        else if (menu === 'aset') loadAsetList();
        else if (menu === 'customers') loadCustomerList();
        else if (menu === 'projects') loadProjectList();
        else if (menu === 'vendors') loadVendorList();
        else if (menu === 'opening_balance') loadOpeningBalanceForm();
        else if (menu === 'export') loadExportBackupForm();
    }

    async function refreshDashboard() {
        let companyId = document.getElementById('dashboardCompany')?.value || 'all';
        let month = document.getElementById('dashboardMonth')?.value || 'all';
        let year = document.getElementById('dashboardYear')?.value || 'all';
        
        let query = supabaseClient.from('payment_requests').select('*');
        if (companyId !== 'all') query = query.eq('company_id', parseInt(companyId));
        if (month !== 'all' && year !== 'all') { let start = `${year}-${month.padStart(2,'0')}-01`; let end = `${year}-${month.padStart(2,'0')}-31`; query = query.gte('request_date', start).lte('request_date', end); }
        let { data: payments } = await query.order('created_at', { ascending: false });
        
        let { data: invoices } = await supabaseClient.from('invoices').select('*');
        let totalPiutang = (invoices || []).reduce((a,b) => a + ((b.total||0) - (b.paid_amount||0)), 0);
        let totalApproved = (payments || []).filter(p => p.status === 'paid').reduce((a,b) => a + (b.amount||0), 0) || 0;
        let totalPending = (payments || []).filter(p => p.status === 'submitted' || p.status === 'verified').reduce((a,b) => a + (b.amount||0), 0) || 0;
        
        let { data: vendorInvoices } = await supabaseClient.from('vendor_invoices').select('*');
        let totalUtang = (vendorInvoices || []).reduce((a,b) => a + ((b.total||0) - (b.paid_amount||0)), 0);
        
        let { data: journals } = await supabaseClient.from('journals').select('*');
        let { data: journalLines } = await supabaseClient.from('journal_lines').select('*');
        let { data: coa } = await supabaseClient.from('chart_of_accounts').select('*');
        let totalPendapatan = 0, totalBeban = 0;
        for (let acc of (coa || [])) {
            if (acc.account_type === 'Pendapatan') {
                let amount = (journalLines || []).filter(l => l.account_code === acc.account_code).reduce((sum,l) => sum + (l.credit - l.debit), 0);
                totalPendapatan += amount;
            }
            if (acc.account_type === 'Beban') {
                let amount = (journalLines || []).filter(l => l.account_code === acc.account_code).reduce((sum,l) => sum + (l.debit - l.credit), 0);
                totalBeban += amount;
            }
        }
        let labaBersih = totalPendapatan - totalBeban;
        
        let { data: assets } = await supabaseClient.from('fixed_assets').select('*');
        let totalAset = (assets || []).reduce((a,b) => a + (b.harga_perolehan - (b.nilai_residu||0)), 0);
        
        let totalDue = 0;
        let today = new Date(); let nextWeek = new Date(); nextWeek.setDate(today.getDate() + 7);
        (vendorInvoices || []).forEach(inv => {
            let sisa = (inv.total||0) - (inv.paid_amount||0);
            let dueDate = new Date(inv.due_date);
            if (sisa > 0 && dueDate >= today && dueDate <= nextWeek) totalDue += sisa;
        });
        
        let totalDepresiasi = 0;
        (assets || []).forEach(a => {
            let penyusutanBulanan = (a.harga_perolehan - (a.nilai_residu||0)) / (a.umur_tahun * 12);
            totalDepresiasi += penyusutanBulanan;
        });
        
        document.getElementById('totalKas').innerHTML = `Rp ${formatNumber(totalApproved)}`;
        document.getElementById('totalPiutang').innerHTML = `Rp ${formatNumber(totalPiutang)}`;
        document.getElementById('totalUtang').innerHTML = `Rp ${formatNumber(totalUtang)}`;
        document.getElementById('labaBersih').innerHTML = `Rp ${formatNumber(labaBersih)}`;
        document.getElementById('totalAset').innerHTML = `Rp ${formatNumber(totalAset)}`;
        document.getElementById('totalPending').innerHTML = `Rp ${formatNumber(totalPending)}`;
        document.getElementById('totalDue').innerHTML = `Rp ${formatNumber(totalDue)}`;
        document.getElementById('totalDepresiasi').innerHTML = `Rp ${formatNumber(totalDepresiasi)}`;
        
        let statusData = { draft: 0, submitted: 0, verified: 0, paid: 0, rejected: 0 };
        let companyData = { 1:0, 2:0, 3:0, 4:0 };
        let monthlyData = {};
        (payments || []).forEach(p => { 
            statusData[p.status] = (statusData[p.status] || 0) + 1; 
            companyData[p.company_id] = (companyData[p.company_id] || 0) + p.amount;
            let date = new Date(p.request_date);
            let monthKey = date.getMonth() + 1;
            monthlyData[monthKey] = (monthlyData[monthKey] || 0) + p.amount;
        });
        
        if (statusChart) statusChart.destroy();
        statusChart = new Chart(document.getElementById('statusChart'), { type: 'pie', data: { labels: ['Draft','Submitted','Verified','Paid','Rejected'], datasets: [{ data: [statusData.draft,statusData.submitted,statusData.verified,statusData.paid,statusData.rejected], backgroundColor: ['#9ca3af','#3b82f6','#f59e0b','#10b981','#ef4444'] }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });
        
        if (companyChart) companyChart.destroy();
        companyChart = new Chart(document.getElementById('companyChart'), { type: 'bar', data: { labels: ['Arko','MMC','USA','MST'], datasets: [{ data: [companyData[1]/1e6, companyData[2]/1e6, companyData[3]/1e6, companyData[4]/1e6], backgroundColor: '#3b82f6' }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: v => 'Rp ' + v + ' Jt' } } } } });
        
        let trendValues = []; for (let i = 9; i <= 12; i++) trendValues.push((monthlyData[i] || 0)/1e6); for (let i = 1; i <= 2; i++) trendValues.push((monthlyData[i] || 0)/1e6);
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(document.getElementById('trendChart'), { type: 'line', data: { labels: ['Sep','Okt','Nov','Des','Jan','Feb'], datasets: [{ data: trendValues, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: v => 'Rp ' + v + ' Jt' } } } } });
        
        if (arapChart) arapChart.destroy();
        arapChart = new Chart(document.getElementById('arapChart'), { type: 'bar', data: { labels: ['Piutang (AR)', 'Utang (AP)'], datasets: [{ data: [totalPiutang/1e6, totalUtang/1e6], backgroundColor: ['#3b82f6', '#ef4444'] }] }, options: { responsive: true, maintainAspectRatio: false } });
        
        let tbody = ''; (payments || []).slice(0,5).forEach(p => { let company = companies.find(c => c.id == p.company_id)?.nama || '-'; tbody += `<tr><td>#${p.id}</td><td>${p.request_date || '-'}</td><td>${company}</td><td>${p.description || '-'}</td><td class="text-right">Rp ${formatNumber(p.amount)}</td><td><span class="status-badge status-${p.status}">${p.status}</span></td><td><button class="action-btn" onclick="viewPaymentRequest(${p.id})"><i class="fas fa-eye"></i></button></td>`; });
        document.getElementById('recentTableBody').innerHTML = tbody || '<tr><td colspan="7">Belum ada data</td></tr>';
        
        let priorities = (payments || []).filter(p => p.status === 'submitted' || p.status === 'verified');
        let priorityHtml = '<div class="table-responsive"><table class="table"><thead><tr><th>Tipe</th><th>Referensi</th><th>Keterangan</th><th>Jumlah</th><th>Status</th><th>Aksi</th></tr></thead><tbody>';
        priorities.forEach(p => {
            let actionBtn = '';
            if (p.status === 'submitted' && currentUserRole === 'finance') actionBtn = `<button class="btn btn-success btn-sm" onclick="verifyPaymentRequest(${p.id})">Verifikasi</button>`;
            else if (p.status === 'verified' && currentUserRole === 'direktur') actionBtn = `<button class="btn btn-success btn-sm" onclick="approvePaymentRequest(${p.id})">Approve</button>`;
            priorityHtml += `<tr><td>Payment</td><td>#${p.id}</td><td>${p.description}</td><td class="text-right">Rp ${formatNumber(p.amount)}</td><td><span class="status-badge status-${p.status}">${p.status}</span></td><td>${actionBtn}</td>`;
                    });
        priorityHtml += '</tbody></table></div>';
        document.getElementById('priorityTableBody').innerHTML = priorities.length ? priorityHtml : '<p style="padding:1rem; text-align:center;">Tidak ada yang perlu ditindaklanjuti</p>';
        
        let activityHtml = '<div class="activity-list">';
        (payments || []).slice(0,10).forEach(p => {
            let statusIcon = p.status === 'submitted' ? '📤' : p.status === 'verified' ? '✓' : p.status === 'paid' ? '💰' : '📝';
            activityHtml += `<div class="activity-item" style="display:flex; align-items:center; gap:0.8rem; padding:0.5rem 0; border-bottom:1px solid var(--gray-200);"><div style="width:32px; text-align:center;">${statusIcon}</div><div><strong>Payment Request #${p.id}</strong> ${p.status === 'submitted' ? 'diajukan ke finance' : p.status === 'verified' ? 'diverifikasi finance' : p.status === 'paid' ? 'disetujui direktur' : 'dibuat'}<br><small>${p.request_date} - Rp ${formatNumber(p.amount)}</small></div></div>`;
        });
        activityHtml += '</div>';
        document.getElementById('activityList').innerHTML = activityHtml || '<p>Belum ada aktivitas</p>';
    }
    
    // ==================== PAYMENT REQUESTS ====================
    async function loadPaymentRequests() {
        let { data: payments } = await supabaseClient.from('payment_requests').select('*').order('id', { ascending: false });
        let html = `<div class="form-card"><div class="form-header"><h2><i class="fas fa-money-bill-wave"></i> Payment Request</h2><div><button class="btn btn-primary" onclick="showNewPaymentForm()"><i class="fas fa-plus"></i> Buat Request</button><button class="btn btn-secondary" onclick="exportTableToExcel('payment_requests')"><i class="fas fa-file-excel"></i> Export Excel</button></div></div>
            <div class="filter-card"><div class="filter-grid"><div class="filter-item"><label class="filter-label">Status</label><select id="paymentStatusFilter" class="filter-select" onchange="filterPaymentRequests()"><option value="all">Semua</option><option value="draft">Draft</option><option value="submitted">Submitted</option><option value="verified">Verified</option><option value="paid">Paid</option></select></div></div></div>
            <div class="table-responsive"><table class="table"><thead><tr><th>ID</th><th>Tgl</th><th>Deskripsi</th><th>Jumlah</th><th>Total Transfer</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="paymentTableBody"></tbody></table></div></div>`;
        document.getElementById('content').innerHTML = html;
        renderPaymentTable(payments);

    function renderPaymentTable(payments) {
        let statusFilter = document.getElementById('paymentStatusFilter')?.value || 'all';
        let filtered = statusFilter === 'all' ? payments : payments?.filter(p => p.status === statusFilter);
        let tbody = '';
        (filtered || []).forEach(p => {
            let actions = `<button class="action-btn" onclick="viewPaymentRequest(${p.id})" title="Detail"><i class="fas fa-eye"></i></button>`;
            if (p.status === 'draft' && currentUserRole === 'staff' && p.requester_email === currentUser?.email) 
                actions += ` <button class="action-btn" onclick="submitPaymentRequest(${p.id})" title="Ajukan" style="color:var(--success);"><i class="fas fa-paper-plane"></i></button> <button class="action-btn" onclick="editPaymentRequest(${p.id})" title="Edit" style="color:var(--warning);"><i class="fas fa-edit"></i></button>`;
            if (p.status === 'submitted' && currentUserRole === 'finance') 
                actions += ` <button class="action-btn" onclick="verifyPaymentRequest(${p.id})" title="Verifikasi" style="color:var(--success);"><i class="fas fa-check-circle"></i></button>`;
            if (p.status === 'verified' && currentUserRole === 'direktur') 
                actions += ` <button class="action-btn" onclick="approvePaymentRequest(${p.id})" title="Approve" style="color:var(--success);"><i class="fas fa-thumbs-up"></i></button>`;
            tbody += `<tr>
                <td>#${p.id}</td>
                <td>${p.request_date || '-'}</td>
                <td>${p.description || '-'}</td>
                <td class="text-right">Rp ${formatNumber(p.amount)}</td>
                <td class="text-right">Rp ${formatNumber(p.total_with_tax || p.amount)}</td>
                <td><span class="status-badge status-${p.status}">${p.status}</span></td>
                <td>${actions}</td>
            </tr>`;
        });
        document.getElementById('paymentTableBody').innerHTML = tbody || '<tr><td colspan="7">Belum ada数据</td></tr>';
    }
    
    function filterPaymentRequests() { loadPaymentRequests(); }
    
    function showNewPaymentForm() {
        let modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-content"><h3><i class="fas fa-plus"></i> Buat Payment Request</h3>
            <div class="form-group"><label>Deskripsi</label><input type="text" id="newDesc" class="form-control" placeholder="Contoh: Pembayaran sewa"></div>
            <div class="form-group"><label>Jumlah (Rp)</label><input type="number" id="newAmount" class="form-control" placeholder="1000000"></div>
            <div class="form-group"><label>Bank / No Rekening</label><input type="text" id="newBank" class="form-control" placeholder="BCA 1234567890"></div>
            <div class="form-group"><label>Upload Bukti</label><input type="file" id="newFile" class="form-control" accept=".pdf,.jpg,.jpeg,.png"></div>
            <div style="display:flex; gap:1rem; margin-top:1rem;"><button class="btn btn-primary" onclick="saveNewPayment()">Simpan</button><button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Batal</button></div>
            <div id="newPaymentMsg" style="margin-top:1rem;"></div></div>`;

    async function saveNewPayment() {
        let desc = document.getElementById('newDesc').value, amount = document.getElementById('newAmount').value, bank = document.getElementById('newBank').value, file = document.getElementById('newFile').files[0];
        if (!desc || !amount) { document.getElementById('newPaymentMsg').innerHTML = '<div class="alert alert-error">Isi semua field!</div>'; return; }
        let buktiUrl = '';
        if (file) {
            let reader = new FileReader();
            reader.onload = async (e) => {
                let base64 = e.target.result;
                let res = await fetch(GAS_UPLOAD_URL, { method: 'POST', body: JSON.stringify({ action: 'upload', file: base64, name: file.name, mimeType: file.type, folderId: DRIVE_FOLDER_ID }) });
                let result = await res.json();
                if (result.success) buktiUrl = result.url;
                await saveToSupabase(desc, amount, bank, buktiUrl);
            };
            reader.readAsDataURL(file);
        } else { await saveToSupabase(desc, amount, bank, ''); }
    }
    
    async function saveToSupabase(desc, amount, bank, buktiUrl) {
        let { error } = await supabaseClient.from('payment_requests').insert({ company_id: currentCompanyId, request_date: new Date().toISOString().split('T')[0], description: desc, amount: parseInt(amount), bank_account: bank, bukti_url: buktiUrl, requester_email: currentUser?.email, status: 'draft' });
        if (error) { document.getElementById('newPaymentMsg').innerHTML = `<div class="alert alert-error">${error.message}</div>`; }
        else { document.getElementById('newPaymentMsg').innerHTML = '<div class="alert alert-success">✅ Berhasil!</div>'; setTimeout(() => { document.querySelector('.modal-overlay')?.remove(); loadPaymentRequests(); loadDashboard(); }, 1500); }
    }
    
    async function submitPaymentRequest(id) { await supabaseClient.from('payment_requests').update({ status: 'submitted', submitted_at: new Date() }).eq('id', id); loadPaymentRequests(); loadDashboard(); }
    
    async function viewPaymentRequest(id) {
        let { data: req } = await supabaseClient.from('payment_requests').select('*').eq('id', id).single();
        let { data: logs } = await supabaseClient.from('payment_logs').select('*').eq('request_id', id).order('created_at', { ascending: false });
        let logsHtml = '';
        (logs || []).forEach(log => { logsHtml += `<div style="padding:0.5rem; border-bottom:1px solid var(--gray-200);"><small>${new Date(log.created_at).toLocaleString()}</small><br><strong>${log.new_status}</strong> - ${log.keterangan}<br><small>${log.user_email}</small></div>`; });

    async function generateVoucherNo(companyId, projectCode, date) {
        let company = companies.find(c => c.id == companyId);
        let companyCode = company?.kode || 'ARK';
        let year = date.getFullYear();
        let month = String(date.getMonth() + 1).padStart(2, '0');
        let basePattern = `${companyCode}/${year}/${month}`;
        if (projectCode && projectCode !== '') basePattern += `/${projectCode}`;
        let { data } = await supabaseClient.from('payment_requests').select('voucher_no');
        let lastNumber = 0;
        (data || []).forEach(req => {
            if (req.voucher_no && req.voucher_no.startsWith(basePattern)) {
                let parts = req.voucher_no.split('/');
                let num = parseInt(parts[parts.length - 1]);
                if (num > lastNumber) lastNumber = num;
            }
        });
        let nextNumber = (lastNumber + 1).toString().padStart(3, '0');
        return { voucherNo: `${basePattern}/${nextNumber}`, preview: `${basePattern}/${nextNumber}` };
    }
    
    async function submitVerification(id) {
        let debitAccount = document.getElementById('debitAccount').value;
        let creditAccount = document.getElementById('creditAccount').value;
        let projectCode = document.getElementById('verifyProject').value;
        let kenaPPN = document.getElementById('kenaPPN').checked;
        let kenaPPh = document.getElementById('kenaPPh').checked;
        let totalBayar = parseRupiah(document.getElementById('totalBayar').value);
        if (!debitAccount || !creditAccount) { alert('Pilih akun debit dan kredit'); return; }
        let { data: req } = await supabaseClient.from('payment_requests').select('*').eq('id', id).single();
        let dpp = req.amount;
        let ppn = kenaPPN ? Math.round(dpp * 0.11) : 0;
        let pph = kenaPPh ? Math.round(dpp * 0.02) : 0;
        let total = totalBayar || (dpp + ppn - pph);
        let voucher = await generateVoucherNo(req.company_id, projectCode, new Date());
        await supabaseClient.from('payment_requests').update({ status: 'verified', verified_at: new Date(), verified_by: currentUser?.email, debit_account: debitAccount, credit_account: creditAccount, voucher_no: voucher.voucherNo, ppn: ppn, pph: pph, total_with_tax: total }).eq('id', id);
        await supabaseClient.from('payment_logs').insert({ request_id: id, user_email: currentUser?.email, user_role: currentUserRole, old_status: 'submitted', new_status: 'verified', keterangan: `Verifikasi, Voucher: ${voucher.voucherNo}` });
        document.getElementById('verifyResult').innerHTML = '<div class="alert alert-success">✅ Diverifikasi! Voucher: ' + voucher.voucherNo + '</div>';
        setTimeout(() => { document.querySelector('.modal-overlay')?.remove(); loadPaymentRequests(); loadDashboard(); }, 1500);
    }
    
    async function approvePaymentRequest(id) {
        if (!confirm('Setujui pembayaran ini?')) return;
        let { data: req } = await supabaseClient.from('payment_requests').select('*').eq('id', id).single();
        let lastJournal = await supabaseClient.from('journals').select('id').order('id', { ascending: false }).limit(1);
        let journalId = (lastJournal.data?.[0]?.id || 0) + 1;
        let now = new Date();
        let dateStr = now.toISOString().split('T')[0];
        await supabaseClient.from('journals').insert({ id: journalId, company_id: req.company_id, journal_date: dateStr, period: dateStr.substring(0,7), description: `Pembayaran: ${req.description}`, reference: req.voucher_no, created_by: currentUser?.email, status: 'posted' });
        await supabaseClient.from('journal_lines').insert([
            { journal_id: journalId, account_code: req.debit_account, debit: req.amount, credit: 0, description: `Beban dari ${req.voucher_no}` },
            { journal_id: journalId, account_code: req.credit_account, debit: 0, credit: req.total_with_tax || req.amount, description: `Transfer ke vendor dari ${req.voucher_no}` }
        ]);
        if (req.ppn > 0) {
            let suffix = companies.find(c => c.id == req.company_id)?.singkatan || 'A';
            await supabaseClient.from('journal_lines').insert({ journal_id: journalId, account_code: `1131-${suffix}`, debit: req.ppn, credit: 0, description: `PPN Masukan dari ${req.voucher_no}` });
        }
        if (req.pph > 0) {
            let suffix = companies.find(c => c.id == req.company_id)?.singkatan || 'A';
            await supabaseClient.from('journal_lines').insert({ journal_id: journalId, account_code: `2103-03-${suffix}`, debit: 0, credit: req.pph, description: `Utang PPh 23 dari ${req.voucher_no}` });
        }
        await supabaseClient.from('payment_requests').update({ status: 'paid', paid_at: now, approved_by: currentUser?.email, journal_id: journalId }).eq('id', id);
        await supabaseClient.from('payment_logs').insert({ request_id: id, user_email: currentUser?.email, user_role: currentUserRole, old_status: 'verified', new_status: 'paid', keterangan: `Approved, Jurnal: ${journalId}` });
        alert('✅ Payment approved! Jurnal ID: ' + journalId);
        loadPaymentRequests(); loadDashboard();
    }

    async function filterInvoices() {
        let { data: invoices } = await supabaseClient.from('invoices').select('*').order('id', { ascending: false });
        let customersList = await getCustomerList(currentCompanyId);
        let statusFilter = document.getElementById('invoiceStatusFilter')?.value || 'all';
        let monthFilter = document.getElementById('invoiceMonthFilter')?.value || 'all';
        let yearFilter = document.getElementById('invoiceYearFilter')?.value || 'all';
        let searchFilter = document.getElementById('invoiceSearch')?.value || '';
        let filtered = (invoices || []).filter(inv => {
            if (statusFilter !== 'all' && inv.status !== statusFilter) return false;
            if (monthFilter !== 'all') { let d = new Date(inv.invoice_date); if (d.getMonth() + 1 != monthFilter) return false; }
            if (yearFilter !== 'all') { let d = new Date(inv.invoice_date); if (d.getFullYear() != yearFilter) return false; }
            if (searchFilter) { let cust = customersList.find(c => c.id == inv.customer_id); if (!inv.invoice_no?.toLowerCase().includes(searchFilter.toLowerCase()) && !cust?.name?.toLowerCase().includes(searchFilter.toLowerCase())) return false; }
            return true;
        });
        let tbody = '';
        for (let inv of filtered) {
            let customer = customersList.find(c => c.id == inv.customer_id);
            let sisa = (inv.total || 0) - (inv.paid_amount || 0);
            let statusClass = inv.status === 'paid' ? 'status-paid' : inv.status === 'posted' ? 'status-submitted' : inv.status === 'partial' ? 'status-verified' : 'status-draft';
            tbody += `<tr>
                <td><strong>${inv.invoice_no || '#'+inv.id}</strong></td>
                <td>${customer?.name || '-'}</td>
                <td>${inv.invoice_date || '-'}</td>
                <td>${inv.due_date || '-'}</td>
                <td class="text-right">Rp ${formatNumber(inv.total)}</td>
                <td class="text-right">Rp ${formatNumber(inv.paid_amount)}</td>
                <td class="text-right">Rp ${formatNumber(sisa)}</td>
                <td><span class="status-badge ${statusClass}">${inv.status || 'draft'}</span></td>
                <td>
                    <button class="action-btn" onclick="previewInvoicePDF(${inv.id})" title="Print"><i class="fas fa-print"></i></button>
                    ${inv.status === 'draft' ? `<button class="action-btn" onclick="editInvoice(${inv.id})" title="Edit"><i class="fas fa-edit"></i></button><button class="action-btn" onclick="postInvoice(${inv.id})" title="Post"><i class="fas fa-check-circle"></i></button><button class="action-btn" onclick="deleteInvoice(${inv.id})" title="Hapus"><i class="fas fa-trash"></i></button>` : ''}
                    ${(inv.status === 'posted' || inv.status === 'partial') && sisa > 0 ? `<button class="action-btn" onclick="showRecordPaymentModal(${inv.id})" title="Record Payment"><i class="fas fa-money-bill-wave"></i></button>` : ''}
                </td>
            </tr>`;
        }
        document.getElementById('invoiceTableBody').innerHTML = tbody || '<tr><td colspan="9">Belum ada invoice</td></tr>';
    }

    function addInvoiceItem() { let container = document.getElementById('invoiceItemsContainer'); window.invoiceItemCounter++; let newItem = document.createElement('div'); newItem.innerHTML = renderInvoiceItem(window.invoiceItemCounter); container.appendChild(newItem.firstChild); calculateInvoiceTotal(); }
    function removeInvoiceItem(id) { let item = document.getElementById(`invoice-item-${id}`); if (document.querySelectorAll('.invoice-item').length > 1) { item.remove(); calculateInvoiceTotal(); } else { alert('Minimal satu item harus ada'); } }
    
    function calculateInvoiceTotal() {
        let subtotal = 0;
        document.querySelectorAll('.invoice-item').forEach(item => {
            let qty = parseFloat(item.querySelector('.item-qty')?.value) || 0;
            let price = parseRupiah(item.querySelector('.item-price')?.value);
            let discount = parseFloat(item.querySelector('.item-discount')?.value) || 0;
            let itemTotal = qty * price * (1 - discount / 100);
            subtotal += itemTotal;
            let totalInput = item.querySelector('.item-total');
            if (totalInput) totalInput.value = formatNumber(itemTotal);
        });
        let companyId = currentCompanyId;
        let ppnRate = (companyId === 2 || companyId === 3) ? 1.1 : 11;
        let kenaPPN = document.getElementById('createInvoicePPN')?.checked || false;
        let ppn = kenaPPN ? subtotal * ppnRate / 100 : 0;
        document.getElementById('invoiceSubtotal').innerHTML = `Rp ${formatNumber(subtotal)}`;
        document.getElementById('invoicePPN').innerHTML = `Rp ${formatNumber(ppn)}`;
        document.getElementById('invoiceTotal').innerHTML = `Rp ${formatNumber(subtotal + ppn)}`;
    }
    
    async function saveInvoice() {
        let customerId = parseInt(document.getElementById('createInvoiceCustomer').value);

    function removeEditInvoiceItem(id) { let item = document.getElementById(`edit-item-${id}`); if (item) item.remove(); calculateEditInvoiceTotal(); }
    
    function calculateEditInvoiceTotal() {
        let subtotal = 0;
        document.querySelectorAll('#editInvoiceItemsContainer .invoice-item').forEach(item => {
            let qty = parseFloat(item.querySelector('.item-qty')?.value) || 0;
            let price = parseRupiah(item.querySelector('.item-price')?.value);
            let discount = parseFloat(item.querySelector('.item-discount')?.value) || 0;
            let itemTotal = qty * price * (1 - discount / 100);
            subtotal += itemTotal;
            let totalInput = item.querySelector('.item-total');
            if (totalInput) totalInput.value = formatNumber(itemTotal);
        });
        let companyId = currentCompanyId;
        let ppnRate = (companyId === 2 || companyId === 3) ? 1.1 : 11;
        let kenaPPN = document.getElementById('editInvoicePPN')?.checked || false;
        let ppn = kenaPPN ? subtotal * ppnRate / 100 : 0;
        document.getElementById('editInvoiceSubtotal').innerHTML = `Rp ${formatNumber(subtotal)}`;
        document.getElementById('editInvoicePPN').innerHTML = `Rp ${formatNumber(ppn)}`;
        document.getElementById('editInvoiceTotal').innerHTML = `Rp ${formatNumber(subtotal + ppn)}`;
    }

            if (!name) { alert(`Item ${idx+1}: Nama harus diisi`); hasError = true; return; }

    async function postInvoice(id) {

        showLoading();
        let { data: invoice } = await supabaseClient.from('invoices').select('*').eq('id', id).single();

    async function recordPayment(invoiceId) {
        let amount = parseFloat(document.getElementById('paymentAmount').value);
        let paymentDate = document.getElementById('paymentDate').value;
        if (!amount || amount <= 0) { alert('Masukkan jumlah pembayaran'); return; }
        let { data: invoice } = await supabaseClient.from('invoices').select('*').eq('id', invoiceId).single();
        let sisa = invoice.total - (invoice.paid_amount || 0);
        if (amount > sisa) { alert(`Maksimal pembayaran Rp ${formatNumber(sisa)}`); return; }
        let newPaid = (invoice.paid_amount || 0) + amount;
        let newStatus = newPaid >= invoice.total ? 'paid' : 'partial';
        let suffix = companies.find(c => c.id == invoice.company_id)?.singkatan || 'A';
        let bankAkun = invoice.bank_code;
        let piutangAkun = `1111-${suffix}`;
        let lastJournal = await supabaseClient.from('journals').select('id').order('id', { ascending: false }).limit(1);
        let journalId = (lastJournal.data?.[0]?.id || 0) + 1;
        await supabaseClient.from('journals').insert({ id: journalId, company_id: invoice.company_id, journal_date: paymentDate, period: paymentDate.substring(0,7), description: `Penerimaan pembayaran invoice ${invoice.invoice_no}`, reference: invoice.invoice_no, created_by: currentUser?.email, status: 'posted' });
        await supabaseClient.from('journal_lines').insert({ journal_id: journalId, account_code: bankAkun, debit: amount, credit: 0, description: `Penerimaan dari invoice ${invoice.invoice_no}` });
        await supabaseClient.from('journal_lines').insert({ journal_id: journalId, account_code: piutangAkun, debit: 0, credit: amount, description: `Lunasi piutang invoice ${invoice.invoice_no}` });
        await supabaseClient.from('invoices').update({ paid_amount: newPaid, status: newStatus, last_payment_date: paymentDate }).eq('id', invoiceId);
        document.getElementById('paymentResult').innerHTML = '<div class="alert alert-success">✅ Pembayaran dicatat!</div>';
        setTimeout(() => { document.querySelector('.modal-overlay')?.remove(); loadInvoiceList(); loadDashboard(); }, 1500);
    }

    async function filterVendorInvoices() {
        let { data: invoices } = await supabaseClient.from('vendor_invoices').select('*').order('id', { ascending: false });
        let statusFilter = document.getElementById('vendorStatusFilter')?.value || 'all';
        let monthFilter = document.getElementById('vendorMonthFilter')?.value || 'all';
        let yearFilter = document.getElementById('vendorYearFilter')?.value || 'all';
        let filtered = (invoices || []).filter(inv => {
            if (statusFilter !== 'all' && inv.payment_status !== statusFilter) return false;
            if (monthFilter !== 'all') { let d = new Date(inv.invoice_date); if (d.getMonth() + 1 != monthFilter) return false; }
            if (yearFilter !== 'all') { let d = new Date(inv.invoice_date); if (d.getFullYear() != yearFilter) return false; }
            return true;
        });
        let totalUtang = 0, totalDibayar = 0, totalJatuhTempo = 0;
        let today = new Date(); let nextWeek = new Date(); nextWeek.setDate(today.getDate() + 7);
        filtered.forEach(inv => {
            let sisa = (inv.total || 0) - (inv.paid_amount || 0);
            totalUtang += sisa;
            totalDibayar += (inv.paid_amount || 0);
            let dueDate = new Date(inv.due_date);
            if (sisa > 0 && dueDate >= today && dueDate <= nextWeek) totalJatuhTempo += sisa;
        });
        document.getElementById('totalUtangVendor').innerHTML = `Rp ${formatNumber(totalUtang)}`;
        document.getElementById('jatuhTempoMingguIni').innerHTML = `Rp ${formatNumber(totalJatuhTempo)}`;
        document.getElementById('sudahDibayarVendor').innerHTML = `Rp ${formatNumber(totalDibayar)}`;
        
        let tbody = '';
        for (let inv of filtered) {
            let sisa = (inv.total || 0) - (inv.paid_amount || 0);
            let statusClass = inv.payment_status === 'paid' ? 'status-paid' : inv.payment_status === 'partial' ? 'status-verified' : 'status-draft';
            let fileIcon = inv.file_url ? `<a href="${inv.file_url}" target="_blank" class="action-btn"><i class="fas fa-file-pdf" style="color:var(--danger);"></i></a>` : '<span class="action-btn"><i class="fas fa-file"></i></span>';
            tbody += `<tr>
                <td>${inv.vendor_name || '-'}</td>
                <td>${inv.invoice_no || '-'}</td>
                <td>${inv.invoice_date || '-'}</td>
                <td>${inv.due_date || '-'}</td>
                <td class="text-right">Rp ${formatNumber(inv.total)}</td>
                <td class="text-right">Rp ${formatNumber(inv.paid_amount)}</td>
                <td class="text-right">Rp ${formatNumber(sisa)}</td>
                <td><span class="status-badge ${statusClass}">${inv.payment_status}</span></td>
                <td class="text-center">${fileIcon}</td>
                <td>
                    <button class="action-btn" onclick="viewVendorInvoiceDetail(${inv.id})" title="Detail"><i class="fas fa-eye"></i></button>
                    ${sisa > 0 ? `<button class="action-btn" onclick="submitVendorPayment(${inv.id})" title="Ajukan Pembayaran" style="color:var(--success);"><i class="fas fa-money-bill-wave"></i></button>` : ''}
                </td>
            </tr>`;
        }
        document.getElementById('vendorTableBody').innerHTML = tbody || '<tr><td colspan="10">Belum ada数据</td></tr>';
    }

    function renderVendorInvoiceItem(id) {

    function addVendorInvoiceItem() { let container = document.getElementById('vendorInvoiceItemsContainer'); window.vendorItemCounter++; let newItem = document.createElement('div'); newItem.innerHTML = renderVendorInvoiceItem(window.vendorItemCounter); container.appendChild(newItem.firstChild); calculateVendorTotal(); }
    function removeVendorInvoiceItem(id) { let item = document.getElementById(`vendor-item-${id}`); if (document.querySelectorAll('.vendor-item').length > 1) { item.remove(); calculateVendorTotal(); } else { alert('Minimal satu item harus ada'); } }
    
    function calculateVendorTotal() {
        let subtotal = 0;
        document.querySelectorAll('.vendor-item').forEach(item => {
            let qty = parseFloat(item.querySelector('.item-qty')?.value) || 0;
            let price = parseRupiah(item.querySelector('.item-price')?.value);
            let discount = parseFloat(item.querySelector('.item-discount')?.value) || 0;
            let itemTotal = qty * price * (1 - discount / 100);
            subtotal += itemTotal;
            let totalInput = item.querySelector('.item-total');
            if (totalInput) totalInput.value = formatNumber(itemTotal);
        });
        let kenaPPN = document.getElementById('vendorPPN')?.checked || false;
        let kenaPPh = document.getElementById('vendorPPh')?.checked || false;
        let ppn = kenaPPN ? subtotal * 0.11 : 0;
        let pph = kenaPPh ? subtotal * 0.02 : 0;
        let total = subtotal + ppn - pph;
        document.getElementById('vendorDPP').innerHTML = `Rp ${formatNumber(subtotal)}`;
        document.getElementById('vendorPPNAmount').innerHTML = `Rp ${formatNumber(ppn)}`;
        document.getElementById('vendorPPhAmount').innerHTML = `Rp ${formatNumber(pph)}`;
        document.getElementById('vendorTotal').innerHTML = `Rp ${formatNumber(total)}`;
    }
    
    function onVendorSelect() {
        let select = document.getElementById('vendorSelect');

        if (selected && selected.value) {
            let term = selected.getAttribute('data-term');
            if (term) {
                let invoiceDate = document.getElementById('vendorInvoiceDate').value;
                if (invoiceDate) {
                    let date = new Date(invoiceDate);
                    date.setDate(date.getDate() + parseInt(term));
                    document.getElementById('vendorDueDate').value = date.toISOString().split('T')[0];
                }

    async function saveVendorInvoice() {
        let companyId = parseInt(document.getElementById('vendorCompany').value);
        let showNew = document.getElementById('showNewVendor')?.checked || false;
        let vendorId = null, vendorName = '', vendorNpwp = '', vendorBank = '', vendorRekening = '', vendorTerm = 30;
        if (showNew) {
            vendorName = document.getElementById('newVendorName').value;
            vendorNpwp = document.getElementById('newVendorNpwp').value;
            vendorBank = document.getElementById('newVendorBank').value;
            vendorRekening = document.getElementById('newVendorRekening').value;
            vendorTerm = parseInt(document.getElementById('newVendorTerm').value) || 30;
            if (!vendorName) { alert('Nama vendor harus diisi'); return; }
        } else {
            vendorId = document.getElementById('vendorSelect').value;
            if (!vendorId) { alert('Pilih vendor'); return; }
            vendorName = document.getElementById('vendorSelect').options[document.getElementById('vendorSelect').selectedIndex]?.getAttribute('data-name') || '';
        }
        let invoiceNo = document.getElementById('vendorInvoiceNo').value;
        if (!invoiceNo) { alert('Nomor invoice harus diisi'); return; }
        let invoiceDate = document.getElementById('vendorInvoiceDate').value;
        let dueDate = document.getElementById('vendorDueDate').value;
        let accountCode = document.getElementById('vendorAccountCode').value;
        let bankCode = document.getElementById('vendorBankCode').value;
        if (!accountCode) { alert('Pilih akun debet'); return; }
        if (!bankCode) { alert('Pilih bank tujuan'); return; }
        let items = [];
        let hasError = false;
        document.querySelectorAll('.vendor-item').forEach((item, idx) => {
            let name = item.querySelector('.item-name')?.value;
            let qty = parseFloat(item.querySelector('.item-qty')?.value) || 0;
            let price = parseRupiah(item.querySelector('.item-price')?.value);
            let discount = parseFloat(item.querySelector('.item-discount')?.value) || 0;
            if (!name) { alert(`Item ${idx+1}: Nama harus diisi`); hasError = true; return; }
            let amount = qty * price * (1 - discount / 100);
            items.push({ description: name, qty: qty, price: price, discount: discount * price * qty / 100, amount: amount });
        });
        if (hasError) return;
        let file = document.getElementById('vendorInvoiceFile').files[0];
        if (!file) { alert('Upload bukti invoice'); return; }
        let dpp = parseRupiah(document.getElementById('vendorDPP').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        let ppn = parseRupiah(document.getElementById('vendorPPNAmount').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        let pph = parseRupiah(document.getElementById('vendorPPhAmount').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        let total = parseRupiah(document.getElementById('vendorTotal').innerHTML.replace('Rp ', '').replace(/\./g, ''));
        showLoading();
        let reader = new FileReader();
        reader.onload = async (e) => {
            let base64 = e.target.result;
            let res = await fetch(GAS_UPLOAD_URL, { method: 'POST', body: JSON.stringify({ action: 'upload', file: base64, name: file.name, mimeType: file.type, folderId: DRIVE_FOLDER_ID }) });
            let uploadResult = await res.json();
            if (!uploadResult.success) { hideLoading(); document.getElementById('vendorInvoiceResult').innerHTML = `<div class="alert alert-error">Upload gagal: ${uploadResult.message}</div>`; return; }
            let { data, error } = await supabaseClient.from('vendor_invoices').insert({
                company_id: companyId, vendor_id: vendorId, vendor_name: vendorName, invoice_no: invoiceNo, invoice_date: invoiceDate, due_date: dueDate,
                bank_code: bankCode, account_code: accountCode, dpp: dpp, ppn: ppn, pph23: pph, total: total, notes: document.getElementById('vendorNotes').value,
                file_url: uploadResult.url, status: 'posted', payment_status: 'unpaid', created_by: currentUser?.email
            }).select().single();
            if (error) { hideLoading(); document.getElementById('vendorInvoiceResult').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
            for (let item of items) { await supabaseClient.from('vendor_invoice_items').insert({ vendor_invoice_id: data.id, description: item.description, qty: item.qty, price: item.price, discount: item.discount, amount: item.amount }); }
            hideLoading(); document.getElementById('vendorInvoiceResult').innerHTML = `<div class="alert alert-success">✅ Invoice vendor berhasil disimpan! ID: ${data.id}</div>`; setTimeout(() => loadVendorInvoiceList(), 2000);
        };
        reader.readAsDataURL(file);
    }

    async function submitVendorPayment(id) {
        let amount = prompt('Jumlah pembayaran:', '0');
        if (!amount) return;
        let { data: invoice } = await supabaseClient.from('vendor_invoices').select('*').eq('id', id).single();
        let sisa = invoice.total - (invoice.paid_amount || 0);
        if (parseFloat(amount) > sisa) { alert(`Maksimal pembayaran Rp ${formatNumber(sisa)}`); return; }
        let newPaid = (invoice.paid_amount || 0) + parseFloat(amount);
        let newStatus = newPaid >= invoice.total ? 'paid' : 'partial';
        let bankCode = prompt('Kode Bank (contoh: 1102-01-A):', invoice.bank_code);
        if (!bankCode) return;
        let suffix = companies.find(c => c.id == invoice.company_id)?.singkatan || 'A';
        let utangAkun = `2111-${suffix}`;
        let lastJournal = await supabaseClient.from('journals').select('id').order('id', { ascending: false }).limit(1);
        let journalId = (lastJournal.data?.[0]?.id || 0) + 1;
        await supabaseClient.from('journals').insert({ id: journalId, company_id: invoice.company_id, journal_date: new Date().toISOString().split('T')[0], period: new Date().toISOString().substring(0,7), description: `Pembayaran invoice ${invoice.invoice_no}`, reference: invoice.invoice_no, created_by: currentUser?.email, status: 'posted' });
        await supabaseClient.from('journal_lines').insert([
            { journal_id: journalId, account_code: utangAkun, debit: parseFloat(amount), credit: 0, description: `Pembayaran invoice ${invoice.invoice_no}` },
            { journal_id: journalId, account_code: bankCode, debit: 0, credit: parseFloat(amount), description: `Transfer ke ${invoice.vendor_name}` }
        ]);
        await supabaseClient.from('vendor_invoices').update({ paid_amount: newPaid, payment_status: newStatus, last_payment_date: new Date().toISOString().split('T')[0] }).eq('id', id);
        alert(`✅ Pembayaran Rp ${formatNumber(amount)} dicatat. Sisa: Rp ${formatNumber(sisa - amount)}`);
        loadVendorInvoiceList(); loadDashboard();
    }

    async function saveJournal() {
        let lines = []; let totalDebit = 0, totalCredit = 0;
        document.querySelectorAll('.journal-line').forEach(item => {
            let account = item.querySelector('.account-select').value;
            let debit = parseRupiah(item.querySelector('.debit-input').value);
            let credit = parseRupiah(item.querySelector('.credit-input').value);
            let desc = item.querySelector('.desc-input').value;
            if (!account) { alert('Pilih akun'); return; }
            totalDebit += debit; totalCredit += credit;
            lines.push({ account_code: account, debit, credit, description: desc });
        });
        if (Math.abs(totalDebit - totalCredit) > 0.01) { alert('Total debit harus sama dengan total kredit'); return; }

            id: journalId, company_id: companyId, journal_date: journalDate, period: journalDate.substring(0,7),

    async function showLabaRugi() {
        let companyId = parseInt(document.getElementById('lrCompany').value);
        let startDate = document.getElementById('lrStart').value;
        let endDate = document.getElementById('lrEnd').value;
        showLoading();
        let { data: journals } = await supabaseClient.from('journals').select('*').eq('company_id', companyId).gte('journal_date', startDate).lte('journal_date', endDate);
        let { data: lines } = await supabaseClient.from('journal_lines').select('*').in('journal_id', journals.map(j=>j.id));

            let amount = lines.filter(l => l.account_code === acc.account_code).reduce((sum, l) => sum + (l.credit - l.debit), 0);
            if (amount !== 0) { pendapatan.push({ name: acc.account_name, amount: amount }); totalPendapatan += amount; }
        }
        for (let acc of coa.filter(a => a.account_type === 'Beban')) {
            let amount = lines.filter(l => l.account_code === acc.account_code).reduce((sum, l) => sum + (l.debit - l.credit), 0);
            if (amount !== 0) { beban.push({ name: acc.account_name, amount: amount }); totalBeban += amount; }
        }

    async function showNeraca() {
        let companyId = parseInt(document.getElementById('neracaCompany').value);
        let asOfDate = document.getElementById('neracaDate').value;
        showLoading();
        let { data: journals } = await supabaseClient.from('journals').select('*').eq('company_id', companyId).lte('journal_date', asOfDate);
        let { data: lines } = await supabaseClient.from('journal_lines').select('*').in('journal_id', journals.map(j=>j.id));
        let { data: coa } = await supabaseClient.from('chart_of_accounts').select('*').eq('company_id', companyId);
        let aset = [], liabilitas = [], ekuitas = [];
        let totalAset = 0, totalLiabilitas = 0, totalEkuitas = 0;
        for (let acc of coa) {
            let amount = lines.filter(l => l.account_code === acc.account_code).reduce((sum, l) => sum + ((acc.normal_balance === 'D' ? l.debit - l.credit : l.credit - l.debit)), 0);
            if (amount === 0) continue;
            if (acc.account_type === 'Aset') { aset.push({ name: acc.account_name, amount }); totalAset += amount; }
            else if (acc.account_type === 'Liabilitas') { liabilitas.push({ name: acc.account_name, amount }); totalLiabilitas += amount; }
            else if (acc.account_type === 'Ekuitas') { ekuitas.push({ name: acc.account_name, amount }); totalEkuitas += amount; }
        }
        let html = `<div style="display:flex; justify-content:flex-end; margin-bottom:1rem;"><button class="btn btn-primary" onclick="printReport('neracaReport')"><i class="fas fa-print"></i> Print / PDF</button></div>

    async function refreshJurnalUmum() {

                html += `<tr>

                firstLine = false;
            }
        }

    async function updateRecurring(id) {
        let lines = []; let totalDebit = 0, totalKredit = 0;
        document.querySelectorAll('#editRecLines .rec-line').forEach(line => {
            let account = line.querySelector('.rec-account').value;
            let debit = parseRupiah(line.querySelector('.rec-debit').value);
            let kredit = parseRupiah(line.querySelector('.rec-kredit').value);
            let ket = line.querySelector('.rec-ket').value;
            if (!account) { alert('Account code harus diisi'); return; }
            totalDebit += debit; totalKredit += kredit;
            lines.push({ account_code: account, debit, kredit, keterangan: ket });
        });
        if (Math.abs(totalDebit - totalKredit) > 0.01) { alert('Total debit harus sama dengan total kredit'); return; }
        let data = {
            nama: document.getElementById('editRecNama').value,
            deskripsi: document.getElementById('editRecDesc').value,
            total_cicilan: parseInt(document.getElementById('editRecTotal').value),
            mulai: document.getElementById('editRecMulai').value,
            status: document.getElementById('editRecStatus').value,
            bulan_ke: parseInt(document.getElementById('editRecBulanKe').value) || 0
        };
        showLoading();
        await supabaseClient.from('recurring_transactions').update(data).eq('id', id);
        await supabaseClient.from('recurring_lines').delete().eq('recurring_id', id);
        for (let line of lines) { await supabaseClient.from('recurring_lines').insert({ recurring_id: id, account_code: line.account_code, debit: line.debit, kredit: line.kredit, keterangan: line.keterangan }); }
        hideLoading(); document.getElementById('editRecMsg').innerHTML = '<div class="alert alert-success">✅ Berhasil diupdate!</div>'; setTimeout(() => { document.querySelector('.modal-overlay')?.remove(); loadRecurringList(); }, 1500);
    }
    
    async function deleteRecurring(id) {
        if (!confirm('Hapus transaksi berulang ini?')) return;
        showLoading();
        await supabaseClient.from('recurring_lines').delete().eq('recurring_id', id);
        await supabaseClient.from('recurring_transactions').delete().eq('id', id);
        hideLoading(); alert('Berhasil dihapus'); loadRecurringList();
    }

    function addRecLine() {
        let accountOptions = '<option value="">Pilih Akun</option>'; accounts.forEach(a => { accountOptions += `<option value="${a.account_code}">${a.account_code} - ${a.account_name}</option>`; });
        let container = document.getElementById('recLines');
        let lineId = window.recLineCounter++;
        let newLine = document.createElement('div'); newLine.className = 'rec-line'; newLine.id = `rec-line-${lineId}`;
        newLine.style.display = 'grid'; newLine.style.gridTemplateColumns = '2fr 1fr 1fr 2fr'; newLine.style.gap = '0.5rem'; newLine.style.marginBottom = '0.5rem';
        newLine.innerHTML = `<select class="rec-account form-control">${accountOptions}</select><input type="text" class="rec-debit form-control" placeholder="Debit" onkeyup="formatMoney(this)"><input type="text" class="rec-kredit form-control" placeholder="Kredit" onkeyup="formatMoney(this)"><input type="text" class="rec-ket form-control" placeholder="Keterangan">`;
        container.appendChild(newLine);
        $(newLine).find('.rec-account').select2({ width: '100%' });
    }
    
    async function saveRecurring() {
        let lines = []; let totalDebit = 0, totalKredit = 0;
        document.querySelectorAll('.rec-line').forEach(line => {
            let account = line.querySelector('.rec-account').value;
            let debit = parseRupiah(line.querySelector('.rec-debit').value);
            let kredit = parseRupiah(line.querySelector('.rec-kredit').value);
            let ket = line.querySelector('.rec-ket').value;
            if (!account) { alert('Semua akun harus dipilih'); return; }
            totalDebit += debit; totalKredit += kredit;
            lines.push({ account_code: account, debit, kredit, keterangan: ket });
        });
        if (Math.abs(totalDebit - totalKredit) > 0.01) { alert('Total debit harus sama dengan total kredit'); return; }
        let data = {
            company_id: parseInt(document.getElementById('recCompanyAdd').value),
            nama: document.getElementById('recNama').value,
            deskripsi: document.getElementById('recDesc').value,
            total_cicilan: parseInt(document.getElementById('recTotal').value),
            mulai: document.getElementById('recMulai').value,
            bulan_ke: 0,
            status: 'aktif',
            lines: lines
        };
        if (!data.nama || !data.total_cicilan || !data.mulai) { alert('Isi semua field'); return; }
        showLoading();
        let { data: newRec, error } = await supabaseClient.from('recurring_transactions').insert({
            company_id: data.company_id, nama: data.nama, deskripsi: data.deskripsi, total_cicilan: data.total_cicilan,
            mulai: data.mulai, bulan_ke: 0, status: 'aktif', created_by: currentUser?.email
        }).select().single();
        if (error) { hideLoading(); document.getElementById('recResult').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
        for (let line of lines) { await supabaseClient.from('recurring_lines').insert({ recurring_id: newRec.id, account_code: line.account_code, debit: line.debit, kredit: line.kredit, keterangan: line.keterangan }); }
        hideLoading(); document.getElementById('recResult').innerHTML = '<div class="alert alert-success">✅ Transaksi berulang disimpan!</div>'; setTimeout(() => loadRecurringList(), 2000);
    }
